body:
  text: 春秋左傳屬事卷十三明傅遜撰襄公滅紀隠公元年八月紀人伐夷夷不告故不書紀漢晉為劇縣舊有紀亭後廢夷漢晉為莊武縣後廢俱在今青萊二府境二年九月紀裂繻來逆女卿為君逆也冬紀子帛莒子盟于密魯故也裂繻紀大夫卿為君逆别于卿自逆也子帛裂繻字密今山東昌邑縣有密城莒魯有怨紀侯既昏魯故使子帛盟莒為魯釋之八年八月公及莒人盟于浮來以成紀好也浮來山在今莒州西一名公來一名浮丘前盟密為魯故今公尋之故曰成紀好桓公五年夏齊侯鄭伯朝于紀欲以襲之紀人知之六年夏㑹于成紀來諮謀齊難也冬紀侯來朝請王命以求成于齊公告不能齊欲滅紀紀來謀之因微弱不能自通于天子欲因公以請王命公無寵於王故告不能十三年春宋多責賂于鄭鄭不堪命故以紀魯及齊與宋衛燕戰責賂以立突也以左右之也詳見鄭厲公簒國十七年春盟于黄平齊紀也黄今外黄縣莊公三年秋紀季以酅入于齊紀於是乎始判冬公次于滑將㑹鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次季紀侯弟酅莒邑今山東臨淄縣東舊有酅亭以之入齊為附庸使先祀不廢判分為二難厲公在櫟故滑鄭邑今河南睢州西北舊有滑亭凡師日行三十里則宿為一舍二之稱信過二稱次四年紀侯不能下齊以與紀季夏紀侯大去其國違齊難也紀侯不能屈服事齊盡以國與紀季而去不復返故曰大違避也襄公之弑桓公十八年春公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之使公子彭生乗公公薨于車魯人告于齊齊人殺彭生濼齊地水謫譴也上車曰乗彭生多力拉公幹而殺之詳見文姜之亂莊公八年齊侯使連稱管至父戍葵丘瓜時而徃曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宫無寵使間公曰捷吾以女為夫人冬十二月齊侯遊於姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉袒而示之背信之費諸先入伏公而出鬭死於門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于户下遂弑之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔連稱管至父皆齊大夫戍守也葵丘在今河南考城縣東瓜時瓜熟時問命也如適如太子二人連管也間伺公間隙捷為夫人宣無知之言姑棼貝丘皆齊地今山東博興樂安二縣南舊有貝中聚田獵也彭生死而為妖公見大豕從者皆見彭生誅責也徒人費小臣示之背見鞭而怨公先入詐欲助賊也石之紛如孟陽亦小臣紛如與費鬬賊而死陽代公死無常政令無常叔牙小白傅夷吾召忽糾傳糾小白皆僖公庶子糾為兄初公孫無知虐于雍廪雍廩齊大夫九年春雍廪殺無知公及齊大夫盟于蔇齊無君也夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績公喪戎路傳乗而歸秦子梁子以公旗辟于下道是以皆止蔇魯地今山東沂州境舊有蔇亭乾時齊地戎路兵車傳乗乗他車秦梁二子公御右也以公旗避誤齊師使公得逸止獲也餘見桓公之伯十年春齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乗戰于長勺公將鼔之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之曹劌魯士肉食在位者間猶與也衣食為小惠不過左右故未徧信誠也每事不敢欺神然德不足以致享而徒以品物為敬故曰小信以情必盡已情此以誠心體民故曰忠乗同車也長勺魯地有伏恐詐奔轍亂旗靡怖遽真敗矣桓公五子爭立僖公二年秋齊寺人貂始漏師于多魚寺人内奄官齊桓多嬖寵内則如夫人者六人外則幸豎貂易牙之等終以亂國貂于此已擅貴寵洩漏桓公軍事多魚地闕十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯武孟公子無虧字惠公名元孝公名昭昭公名潘懿公名商人雍巫雍人名巫即易牙既有寵于公為長衛姬請立武孟内寵内官之有權寵者桓公死至殯凡六十七日桓以已國立已子不能以義自定而屬之宋既以孝公屬之宋而又許易牙立武孟是驅之使亂矣君臣皆英物也而若是國數世後定更不復振也宜哉十八年春宋襄公以諸侯伐齊三月齊人殺無虧殺之以説宋齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還秋八月𦵏齊桓公二十五年冬衛人平莒于我十二月盟于洮二十六年春王正月公㑹莒兹㔻公甯莊子盟于向尋洮之盟也齊師侵我西鄙討是二盟也夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還向莒地兹㔻莒君之號甯莊子衛大夫名速齊惡魯親衛故再來討而衛亦為魯伐齊犒師勞齊師也命詞命禽栁下惠也名獲罄磬同如磬之懸無一物又野無青草旱甚也載載書也職主也太師兼主司盟之官用用此盟保守聚聚衆也公使受詞知惠之賢矣而竟不之用何也東門襄仲臧文仲如楚乞師冬公以楚師伐齊取榖凡師能左右之曰以寘桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚左右指揮之也雍與孝公爭立故使居穀以偪之孝公不能撫公族兄弟皆仕於楚二十七年夏齊孝公卒有齊怨不廢喪紀禮也孝公弟昭公立喪紀弔贈之數史記云孝公弟潘因衛公子開方殺孝公子而立文公十四年子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位秋七月乙卯夜齊商人弑舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之叔姬魯女妃配同驟急數也貸以繼施之周也元商人兄故讓之元言商人懐簒志已久不得國其怨必蓄將復殺我故使為之齊人定懿公使來告難故書以九月齊公子元不順懿公之為政也終不曰公曰夫已氏襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬齊人不服懿公三月而後位定故以九月書于經元惡之惟稱為某甲而已昭姬即子叔姬也齊人恨魯以王命臨已故執王使與姬以辱魯十五年春季文子如晉為單伯與子叔姬故也夏曹伯來朝六月齊人許單伯詩而赦之使來致命書曰單伯至自齊貴之也齊畏晉亦以久拒王命故因魯請許之單伯雖見執而本王臣銜王命故仍貴之冬十一月齊人來歸子叔姬王故也齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣齊人禮遣叔姬歸以謝罪於王無禮謂其執王使而數虐魯詩小雅言君臣上下何不相畏是不畏天也又言人君能畏天威於是保福祿今齊反之其亡速矣十六年春王正月及齊平公有疾使季文子㑹齊侯于陽榖請盟齊侯不肯曰請俟君閒夏五月公使襄仲納賂于齊侯故盟于郪丘閒疾瘳也尚欲伐魯故托辭以拒既得賂而盟郪丘齊地今南直𨽻潁州有郪丘疑逺十七年夏四月齊侯伐我北鄙襄仲請盟六月盟于穀冬襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死穀在今山東東阿縣境有穀城齊既以賂盟魯而復伐之既再盟又欲食魯麥襄仲又以其言必其將死偷苟且也十八年春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乗夏五月公遊于申池二人浴于池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舍爵而行齊人立公子元秋襄仲莊叔如齊惠公立故戒期以伐魯公聞其有疾故卜之欲其先師期死尚庶幾也令龜以卜事告龜楚丘魯卜大夫言兆見齊侯先期當以惡終君又先齊侯薨令龜者亦有凶兆懿公怨歜父時已死乃斷其尸足僕御驂乗陪乗也申池臨淄城西申門之水扑箠也抶擊也歜閻相感激兩以所恨相發而弑君歸齊飲酒訖置爵乃去言齊人惡懿公二人無所畏皆如楚丘卜惠公前辭今卒得國靈公滅萊襄公二年春齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百疋齊師乃還君子是以知齊靈公之為靈也萊小國今山東黄縣有萊城萊州皆其地夙沙衛齊寺人索簡擇好者諡法亂而不損曰靈言諡應其行夏齊姜薨齊侯使諸姜宗婦來送𦵏召萊子萊子不㑹故晏弱城東陽以偪之宗婦同姓大夫之婦婦人越疆送𦵏非禮晏弱齊大夫東陽齊邉邑近萊六年十一月齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅于堞及把桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器于襄宫晏弱圍棠十一月丙辰而滅之遷萊于郳髙厚崔杼定其田謀謂賂夙沙衛子國聘在五年二月晏弱城東陽至四月復托治城遂圍萊堙土山以環其城而附之堞堞女牆把桓卒在此年三月王湫故齊人奔萊事見下崔慶之亂正輿子萊大夫棠萊邑今即墨縣舊有棠鄉三人帥别邑兵來解圍而大敗浮柔萊共公名無宇桓子陳𤣥孫襄宫齊襄公之廟遷萊遷其宗氏郳國名定定其疆崔慶之亂宣公十年夏齊惠公卒崔杼有寵於惠公髙國畏其偪也公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否惠公卒子頃公無野立髙國齊二正卿典策之法告者皆當書以名此齊以族告故因之違奔放也上某氏姓下某名玉帛之使謂聘問也情好相通則告而書之聘好不通即不告杼此年奔衛至襄公二十五年弑莊公相距五十一年又二年而自縊然奔衛前已有寵於惠公計其年亦不甚少矣五十年後而繼娶東郭姜生明可立後則又未耄也以年歲考之皆可疑况又記奔而無復於成十七年以杼為大夫前髙國畏其偪而逐之後以何故而得復也何復而即用之乎不應疎畧如此竊恐奔衛者非杼也經文書氏不名此疑宜闕焉而傳蓋曲為之解也成公十七年齊慶克通於聲孟子與婦人䝉衣乗輦而入於閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以㑹高鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛齊人來召鮑國而立之初鮑國去鮑氏而來為施孝叔臣施氏卜宰匡句須吉施氏之宰有百室之邑與匡句須邑使為宰以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子之知不如葵葵猶能衛其足慶克慶封父聲孟子靈公母夫人䝉衣亦婦人服與婦人相冒閎巷門鮑牽叔牙曽孫克以醜跡露慚不出謫譴也㑹㑹伐鄭索客蒐姦人也角靈公弟弱無咎子盧髙氏邑今山東長清縣有盧城國牽之弟文子臣家臣卜宰將立家宰而卜之匡句須亦施氏臣其宰舊有百室以為之禄匡句須以宰讓國不受其邑葵傾葉向日以蔽其根不如葵譏其不能以智自衛冬齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與之盟于徐闗而復之十二月盧降使國勝告難於晉待命于清圍盧討髙弱也佐惡克淫亂故以難請歸而殺之以穀叛齊侯謀殺佐恐其據邑佯與盟而復其位至盧降又使其子勝于晉羈之清邑以孤弱之清今屬肥城縣十八年春齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐於内宫之朝師逃於夫人之宫書曰齊殺其大夫國佐棄命專殺以榖叛故也使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司冦既齊侯反國弱使嗣國氏禮也華免齊士官慮佐為變故密誘而殺之内朝時變忽起侍從之師不知謀者逃入于夫人之宮又并殺勝湫佐黨封佐皆慶克子既而以勝弟弱嗣國氏慶克淫亂被殺非過也乃立其二子國子以忠忿殺人罪宜可議而并及其子齊之用刑頗矣宜召後亂也與襄公十年春㑹于柤㑹吳子夀夢也三月癸丑齊高厚相太子光以先㑹諸侯于鍾離不敬士莊子曰髙子相太子以㑹諸侯將社稷是衞而皆不敬棄社稷也其將不免乎柤鍾離皆楚地今鳳陽府有鐘離城夀夢吳子乗未至故光先與東諸侯㑹士莊子晉大夫不免不免於禍十七年冬齊晏桓子卒晏嬰麤縗斬苴絰帶杖菅屨食鬻居倚廬寝苫枕草其老曰非大夫之禮也曰唯卿為大夫桓子名弱晏嬰父麤三升布縗在胸前斬不緝之也苴麻之有子者取其麤在腰在首皆曰絰帶絞帶皆苴為之杖竹杖菅屨草屨歠鬻朝一溢米夕一溢米用木為廬在中門外倚東牆北户苫編藁也此禮與士喪禮畧同惟枕草枕凷異耳一云夏枕凷冬枕草此初喪為然既虞每殺禮父母之喪自天子達於公卿大夫與士無異時禮制廢士及大夫縗服不同晏子為大夫而行士禮故家臣不解譏之晏子惡直已以斥時失孫詞以自解十八年冬十月㑹于魯濟同伐齊齊侯禦諸平陰㑹晉㑹諸侯詳見晉平公楚康公爭伯十九年齊侯娶於魯曰顔懿姬無子其姪騣聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光使髙厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月壬辰晦齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛顔鬷皆二姬母姓因以為號懿聲皆諡諸子齊内官號戎子戎女仲子宋女皆子姓屬托也許齊侯許常嫡庶常分難事難成也謂光列於諸侯之㑹尊同諸侯矣東廢而徙之束鄙微密也疾病公疾甚也無刑無黥刖之刑雖犯罪刑不暴其尸莊公光也謂衛教公易已髙唐齊邑今山東髙唐州父未瞑目而殺其愛為忍已甚又何論其尸與否乎秋八月齊崔杼殺髙厚於灑藍而兼其室書曰齊殺其大夫從君於昏也灑藍齊地厚從公廢長立幼不能諫止故以國討為文齊慶封圍髙唐弗克冬十一月齊侯圍之見衛在城上號之乃下問守備焉以無備告揖之乃登聞師將傅食髙唐人殖綽工僂㑹夜縋納師醢衛於軍齊侯以衛下與已語且以情告故揖而禮焉欲生之衛志於戰死故不順而登城聞齊師將附城故食髙唐人使共守殖綽工僂齊二士㑹昏夜時登城而髙唐人方共食故不及禦二子縋納齊師獲衛而醢之二十一年春齊侯使慶佐為大夫復討公子牙之黨執公子買於句瀆之丘公子鉏來奔叔孫還奔燕慶佐崔杼黨買鉏還皆齊公族莊公斥逐親戚成崔慶之勢以至弑秋欒盈出奔楚冬㑹于商任錮欒氏也齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也知起中行喜州綽邢蒯出奔齊皆欒氏之黨也齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴莊公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數其可以與於此乎公曰子為晉君也對曰臣為𨽻新然二子者譬於禽獸臣食其肉而寝處其皮矣盈奔晉逐之也錮使諸侯不得受餘見晉卿族廢興經大經也輿喻其行守言其安知起等四子晉大夫前晉伐齊及平隂州綽獲殖綽郭最故自比于雞鬬勝而先鳴勇爵設爵位以命勇士一云爵飲酒器設此以觴勇士𨽻新臣齊日淺也食肉寢皮喻已能得而恣用之也二十二年秋欒盈自楚適齊晏平伯言於齊侯曰商任之㑹受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聴退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼晉知盈在齊故復錮之二十三年夏晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃藩車之有障蔽者若使媵妾在其中曲沃晉邑欒氏所分掌餘見晉卿族廢興秋齊侯伐衛先驅榖榮御王孫揮召揚為右申驅成秩御莒恒申鮮虞之傅摯為右曹開御戎晏父戎為右貳廣上之登御邢公盧蒲癸為右啓牢成御襄罷師狼蘧疏為右胠商子車御侯朝桓跳為右大殿商子游御夏之御冦崔如為右燭庸之越駟乗自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聴陳文子見崔武子曰將如君何武子曰吾言於君君弗聴也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也况以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平陰之役乃還趙勝帥東陽之師以追之獲晏氂先驅前鋒軍申驅次前鋒傅摯申鮮虞之子曹開晏父戎為公之御右為中軍貳廣公副車左翼曰啓右翼曰胠大殿後軍駟乗四人共乗殿軍也此傳詳其陳名將帥見莊公任武勇廢舊臣文子陳完曽孫須無武子崔杼言有急不能顧君欲弑之以恱晉文子言弑君之惡過於背盟主二隊分軍為二部孟門晉隘道大行山在今山西絳縣東二十里張武軍謂築壘壁熒庭晉地郫邵晉邑取而守之封晉尸於少水以為京觀趙勝趙旃之子東陽晉之山東今北直𨽻河問府地晏氂齊大夫冬晉人克欒盈于曲沃齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰期於夀舒把殖華還載甲夜入且于之隧宿於莒郊明曰先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼔之從而伐之獲把梁莒人行成齊侯歸遇把梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室得儁曰克且于莒邑夀舒莒地把殖華還齊大夫殖一名梁還一名周隧狹路蒲侯氏近莒邑有盟以盟要二子無死戰莒以小勝大故懼而行成梁戰死妻迎喪齊侯遇而弔之妻以行弔於野非禮故從而弔於其室二十四年春孟孝伯侵齊晉故也夏齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊社蒐軍實使客觀之陳文子曰齊將有冦吾聞之兵不戢必取其族秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根㑹于夷儀將以伐齊水不克冬楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭楚子自棘澤還使薳啓疆帥師送陳無宇期㑹期客謂啓疆戢藏也族類也取其族還自害也晉師夷儀之師辭辭有晉師未能㑹介根莒邑今為山東膠州有介根城齊既與莒平復侵伐之見無信也晉伐齊以報前伐而阻於水復以楚伐鄭還救之餘見晉平楚康争伯楚君歸使臣送其使其交固也齊人城郟郟王城也於是穀雒鬬毁王宫齊叛晉欲求媚於天子故為王城之二十五年春齊崔杼帥師伐我北鄙以報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不冦使民不嚴異於他日齊師徒歸孟公綽魯大夫大志謂將弑君不冦不為害不嚴以收衆心徒空也齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石徃不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其間伐晉也曰晉必將報欲弑公以説于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入于室與崔子自側戸出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聴命近於公宫陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弑之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝佗父祭於髙唐至復命不說弁而死於崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑於平陰晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私暱誰敢任之且人有君而弑之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天嘆曰嬰所不唯忠於君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以徃聞既書矣乃還閭丘嬰以帷縳其妻而載之與申鮮虞乗而出鮮虞推而下之曰君昏不能匡危不能救死不能死而知匿其暱其誰納之行及弇中將舍嬰曰崔慶其追我鮮虞曰一與一誰能懼我遂舍枕轡而寢食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂來奔崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乗不以兵甲晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公説莊公為杼所立而淫於其妻竟以見弑棠公齊棠邑大夫美美其色取為已娶丁公崔杼祖桓公東郭偃祖坎下兊上困六三變為大過巽下兌上坎為中男故曰夫變而為巽故曰從風夫則從風風能隕妻故不可娶困于石四句困六三爻辭下皆解其意坎為險為水水之險者石不可以動坎為險兊為澤澤之生物而險者蒺藜恃之則傷易曰非所困而团名必辱非所據而據身必危既辱且危死其將至妻不可得見矣今卜昏而遇此卦六三失位無應則喪其妻失其所歸也寡婦曰嫠杼言棠公已當此凶公通於其婦因得杼冠以賜人揚其穢故侍者諫公言不獨崔子有冠抒因是怒公又以其間晉難伐之故伺公可弑之間而弑公以説且于前見稱疾誘公來問歌歌以命姜賈舉為崔子間公止衆而閉門重言侍人别下賈舉請請免死近公宮言或淫者得以詐稱公干掫行夜言行夜得淫人受崔子命討之不知他賈舉等八子皆齊勇力之臣為公所嬖者與公共死髙唐有齊别廟故祭之弁爵弁祭服侍魚監取魚之官帑宰之妻子義死君之義鬷蔑平隂大夫公外嬖公所養非國士故死難皆嬖寵之人晏子聞難而來言已非君所嬖故不宜死無罪亦不宜亡君臣皆社稷是以故死亡皆以其故所謂社稷之臣也若為君所私暱陷君於弑則當同其禍患耳然雖不應死亡君死亦無歸安之義故以君尸枕已股而哭以敦盡臣禮宣伯魯僑如還齊羣公子納宣伯之女于靈公太宫太公廟崔慶盟書云所不與崔慶者有如上帝讀書未終晏子抄答易其辭因自歃其論君臣之義既大而悉矣又卓立於强暴之中誠大賢哉莒子朝齊亂作未歸故景公復與之盟太史兄弟既死於直筆而繼者猶未已古之史官守職如此崔杼之惡所以聞嬰虞二子亦莊公嬖臣乗共載下下嬰妻也匿藏暱親也弇中道狹言雖衆亦無所用枕轡食馬必藉之以免難故道廣衆得用故不可當鮮虞雖嬖臣亦知義而有知側瘞埋不殯於廟士孫人姓因以名里死十有三日即葬不待期喪車之飾天子八翣諸侯六翣大夫四翣蹕止行人下車送𦵏之車齊舊上公禮九乗又有兵車此皆降損適晉伐齊因歸罪於公以解餘見晉平楚康爭伯秋七月己巳同盟于重丘齊成故也重丘今屬東昌府二十七年春齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也季慶封字相鼠詩鄘風曰相鼠有皮人而無儀人而無儀不死何為慶封不知此詩為已言其閽甚崔杼生成及疆而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老于崔崔子許之偃與無咎弗予曰崔宗邑也必在宗主成與疆怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讎也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔疆殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之弗克使國人助之遂滅崔氏殺成與疆而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊崔明夜辟諸大墓辛巳崔明來奔慶封當國慶固黨崔於此復乗難斃之以專齊偏喪曰寡寡特也無咎棠公之子東郭偃姜之弟杼以姜故愛明故乗成有疾廢而立之成欲居崔邑以終老宗邑宗廟所在宗主謂崔明夫子謂崔杼嫳慶封屬大夫君謂莊公崔敗則慶專權故云崔薄慶厚圉人養馬者寺人奄人杼恐滅家禍不止其身堞短垣使其衆築之以守妻東郭姜無歸終如前筮辟墓開先人之塚以藏杼尸二十八年齊慶封好田而耆酒與慶舍政則以其内實遷于盧蒲嫳氏易内而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵妻之慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也子家曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必於嘗歸猶可及也子家弗聴亦無悛志子息曰亡矣幸而獲在吳越陳無宇濟水而戕舟發梁盧蒲姜謂癸曰有事而不告我必不捷矣癸告之姜曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于太公之廟慶舍莅事盧蒲姜告之且止之弗聴曰誰敢者遂如公麻嬰為尸慶奊為上獻盧蒲癸王何執寢戈慶氏以其甲環公宫陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈撃之解其左肩猶援廟桷動于甍以俎壺投殺人而後死遂殺慶繩麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸稅服而如内宫慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐内宫弗克反陳于嶽請戰弗許遂來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封氾祭穆子不説使工為之誦茅䲭亦不知既而齊人來讓奔吳吳句餘予之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃慶封字子家舍封之子字之子封當國乃以政付舍自以寳物妻妾遷居嫳家故國人就朝焉亡人辟崔氏難奔者癸何等也得賊告反以功贖也舍以女妻癸慶與盧蒲皆姜姓故使辟宗癸言已有求于慶氏不能復顧禮如賦詩者取其一章耳癸欲與莊公報仇故既反何復同求寵於廢氏寢戈親近兵杖也公膳公家食羣臣日膳饔人庖宰御進食者癸何謀使諸大夫怨慶氏故使饔人更雞以鶩御者復去肉饋洎洎肉汁也子雅子尾皆惠公孫封以二子怒告嫳嫳言能殺而席其皮因使析歸父告晏子欲殺二子晏子辭又告子車亦辭歸父字子家子車名佐皆齊大夫慶氏淫横國人共謀滅之陳文子名須無問其子無宇當得何物無宇桓子也時封有木積于六軌之道欲得此而已文子善其不貪故使慎守癸何既定謀反獻龜兆於舍舍決其必克無宇從封於田欲脫歸詐以母疾為辭見死兆而泣以見其誠慶氏之族嗣字子息者亦知使封歸猶可救封殊弗悟嗣嘆其必亡無宇既濟而復杜其歸路不使能救嘗秋祭姜癸妻亦知其父之愎乃譎以其謀告之而激之使出遂至公所臨祭尸祭尸上獻先獻廟在宫甲環之以備變也陳鮑使圉為俳優以誘其衆遂皆釋其甲束其馬而逺就魚里觀之故四族得介其所釋之甲子尾以桷撃扉者三以為期癸何遂或刺或撃舍肩既解猶效其多力而死桷椽也扉門闔甍瓦棟也俎壺即祭器公懼于亂國言除慶氏所以尊公文子以公歸其家稅祭服入于宫猶懼難也封以陳鮑在公所故伐内宫嶽里名展莊叔魯大夫禮食有祭示有所先也氾祭逺散所祭不恭工樂師茅䲭逸詩刺不敬句餘吴子餘祭朱方吳邑今丹徒縣殱盡也旃之也崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘及慶氏亡皆召之具其器用而反其邑焉與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之公以為忠故有寵釋盧蒲嫳于北竟求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬既崔氏之臣曰與我其拱璧吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯於大寢以其棺尸崔杼於市國人猶知之皆曰崔子也崔慶既除暫收還宗室賞及賢臣三子皆二十一年奔按二十一年齊侯討公子牙之黨故逐三子見本事内前此云崔氏之亂傳文前後自乖如此邶殿齊别都以邶殿邊鄙六十邑與晏嬰外亡在外也幅喻有度也遷移也以厚利皆人所欲唯正徳為之幅則有度而無黜嫚黜猶肆也釋放也崔慶一也故滅慶而後治崔罪前藏杼尸故不得穆子言葬用十人崔子不能令十人同心故其中必有自陳者已而果然拱璧崔氏大璧殯更殯大寢路寢崔氏弑莊公又葬不如禮故以莊公棺著崔杼尸邊以章其罪國人皆識其尸見陳之者真也二十九年春二月癸卯齊人葬莊公於北郭兵死不入兆域故葬北郭昭公三年秋齊侯田於莒盧蒲嫳見泣且請曰余髪如此種種余奚能為公曰諾吾告二子歸而告之子尾欲復之子雅不可曰彼其髪短而心甚長其或寢處我矣九月子雅放盧蒲嫳于北燕種種短也自言老不能為害子雅猶恨之故述其前言見其故知尚存恐其復作亂放之燕四年秋七月楚子以諸侯伐吳使屈申圍朱方八月甲申克之執齊慶封而盡滅其族崔慶暴而暗不足論也皆靈莊之不君啓之自為斧斤自戕其軀以成田氏之强惜也王癸之徒皆涉阻歴難必報其君之仇而後已豈可以嬖幸而槩鄙夷之耶景公納燕伯昭公三年燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也比相親比六年十一月齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也請請告於盟主士匄士文伯與范宣子同姓名相為鞅之介也禮得敬迎來者之禮不入言燕簡公不入其國不以信心不誠也七年春王正月暨齊平齊求之也癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聴命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斝耳不克而還齊伐燕燕人賂之反從求成如晏子言虢燕竟晳齊大夫濡水源出北直𨽻窮獨山至易州支分入城近東方四里許淵而不流歸燕姬嫁女與齊侯也瑶玉别名櫝匱也斝爵類旁有耳皆玉為之十二年春齊髙偃納北燕伯欵于唐因其衆也言因唐衆欲納之故得先入唐景公納莒郊公昭公十四年秋八月莒著丘公卒郊公不慼國人弗順欲立著丘公之弟庚與蒲餘侯惡公子意恢而善於庚與郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚與許之郊公著丘公之子弗順以其不懐父也與本輿庚與莒共公名蒲餘侯莒大夫名兹夫意恢鐸皆莒羣公子冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚與于齊齊隰黨公子鉏送之有賂田郊公奔以意恢殺也隰黨鉏齊大夫賂田莒賂齊以田也十九年秋齊髙發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼔譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀齊伐莒以莒不事齊也莒子庚與也紀鄣莒邑今淮安贛榆縣有紀鄣城孫書陳無宇之子字子占嫠夫殺而寡因紡纑連所紡以度城而藏之待外攻者欲以報仇投投繩於城外隨之而出齊師因縁繩登城鼓譟城下之未登者城上已登者二十二年春王二月甲子齊北郭啓帥師伐莒莒子將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗聴敗齊師于夀餘齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊淮盟盟于稷門之外莒於是乎大惡其君前莒子庚與自紀鄣出既復歸國傳失記北郭啓齊大夫苑羊牧之莒大夫夀餘莒地齊復伐怒其敗也竈齊大夫稷門齊城門二十三年秋莒子庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之庚輿將出聞烏存執殳而立於道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弑君成名遂來奔齊人納郊公烏即庚與鳥存莒大夫殳長丈二無刅田氏傾齊陳佗之亂附隠公六年五月庚申鄭伯侵陳大獲徃歲鄭伯請成于陳陳侯不許五父諫曰親仁善鄰國之寳也君其許鄭陳侯曰宋衛實難鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎商書曰惡之易也如火之燎于原不可鄉邇其猶可撲滅周任有言曰為國家者見惡如農夫之務去草焉芟夷蕰崇之絶其本根勿使能殖則善者信矣五父陳公子佗字難可畏也悛改也商書盤庚言火燎原野近之固難滅之尤難周任周大夫芟刈夷殺蕰積崇聚也七年冬陳及鄭平十二月陳五父如鄭涖盟壬申及鄭伯盟歃如忘洩伯曰五父必不免不賴盟矣鄭良佐如陳涖盟辛巳及陳侯盟亦知陳之將亂也涖臨也如忘志不在盟不賴盟言不以盟為重洩伯良佐皆鄭大夫陳亂觀其政治而知之也桓公五年春正月甲戌己丑陳侯鮑卒再赴也於是陳亂文公子佗殺太子免而伐之公疾病而亂作國人分散故再赴佗稱文公子明非桓公母弟免桓公子六年蔡人殺佗厲公躍立見下以上附陳佗之亂莊公二十二年春陳人殺其太子御冦陳公子完與顓孫奔齊顓孫自齊來奔齊侯使敬仲為卿辭曰覉旅之臣幸若獲宥及於寛政赦其不閑於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乗招我以弓豈不欲徃畏我友朋使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌並于正卿八世之後莫之與京陳厲公蔡出也故蔡人殺五父而立之生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其予孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賓于王庭實旅百奉之以玉帛天地之美具焉故曰利用賓于王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政公子完字敬仲與顓孫皆御冦黨羇寄旅客也詩逸詩翹翹髙貌古者聘士以弓言雖貪顯命懼為朋友所譏工正掌百工之官桓公賢完就其家飲而完能閑之以禮淫樂而過也懿氏陳大夫妻懿氏妻雄曰鳳雌曰皇雌雄俱飛相和而鳴鏘鏘然猶敬仲夫妻相隨適齊有聲譽媯陳姓姜齊姓與京並大也出甥也周史周太史坤下巽上觀六四變而為否觀國光利用賓其爻詞巽變為乾故曰風為天自二至四有艮象艮為山則材之所生上有乾下有坤故言土上照之以天光四為諸侯變而之乾有國朝王之象故曰觀國光用賓于王艮為門庭乾為全玉坤為布帛諸侯朝王陳贄帛之象旅陳也百言物備觀者觀他之詞非已也故曰在後巽為風風動物也巽在坤上故為行而著於土則不在本國故曰在異國姜姓之先為堯四嶽變而象艮故知當興於四嶽之後山嶽則興雲降雨有配天之功凢物不兩大故陳衰乃昌桓子陳無宇諡敬仲五世孫成子陳常諡敬仲八世孫自完有禮於齊子孫乗齊失徳以竊其因故備言其始終于時桓方圖霸國方盛强任賢以共其功而代其國者已胚胎於此天意其可測也哉襄公二十九年秋九月齊公孫蠆公孫竈放其大夫髙止於北燕乙未出書曰出奔罪髙止也髙止好以事自為功且專故難及之為髙氏之難故髙豎以盧叛十月庚寅閭丘嬰帥師圍盧髙豎曰苟使高氏有後請致邑齊人立敬仲之曽孫酀良敬仲也十一月乙卯髙豎致盧而出奔晉晉人城緜而寘旃蠆字子尾竈字子雅放者宥之使逺實放書奔所以示罪豎髙止之子閭丘嬰齊大夫致邑還邑於君敬仲髙傒良賢之也晉城緜而寘豎善豎也三十一年齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭丘嬰以說於我師工僂灑渻竈孔虺賈寅出奔莒出羣公子陽州齊魯境上邑工僂等四子皆嬰黨蠆欲殺嬰乃使伐魯魯以師問故歸罪於嬰殺之以謝魯既逐其黨又出羣公子欒髙既滅崔慶以徳禮綏定其國家田氏其敢生心哉而乃任情多殺自弱其宗室皆所以啓田氏之强而授之利柄也昭公二年春晉侯使韓宣子來聘宣子遂如齊納幣見子雅子雅召子旗使見宣子宣子曰非保家之主也不臣見子尾子尾見彊宣子謂之如子旗大夫多笑之唯晏子信之曰夫子君子也君子有信其有以知之矣韓宣子名起餘見卿族廢興納幣為平公聘少姜子旗子雅之子不臣志氣亢也彊子尾之子如子旗亦不臣也晏子謂起有信其言不妄三年春齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釡鐘四升為豆各自其四以登於釡釡十則鐘陳氏三量皆登一焉鐘乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰然雖吾公室今亦季世也初景公欲更晏子之宅曰子之宅近市湫隘嚻塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公為是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已其是之謂乎及晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之田氏謀齊厚施於民以隂移之晏子以為憂因叔向至齊與語晉少姜卒齊復請以女繼之詳見晉失諸侯成昏許昏成受禮受賓享之禮豆區釡鐘皆量名四豆得一斗六升為區四區得六斗四升為釡釡十則六斛四斗而為鐘此公量也陳氏於公量皆自其十分而加之一每量而積之以至於鐘則於公鐘加六斗四升故曰大貸厚而收薄以利收民心如徃也弗加價依山海不加貴也二入公賦斂重也三老謂上夀中夀下壽皆八十已上貨積於上不見養遇踊則足者屨踊貴則者多也燠休温煦安息也或謂田氏民愛而歸無所辟也箕伯等四人皆舜後陳之先胡公陳始封之祖太姬其妃相隨也一云助也言陳氏雖為人臣將有齊國其先世鬼神已在齊求饗叔向言晉國之衰與齊同詳見卿族廢興景公亦知晏子忠欲美其宅晏子性本崇儉又以國衰不欲大其居湫下隘小嚻聲塵土也爽塏明燥也先臣晏子之先旅衆也不敢勞里閭之衆為已宅因刑繁刖者多致踊鬻於市此晏子先以告君而後語叔向出於忠悃也詩小雅如行也祉福也遄疾也言君子行福則亂疾止拜謝新宅里室鄰里之室本壊里室以大晏子之宅故復之宅人故居人反還其故卜卜良鄰二三子謂鄰人傳言齊哀賢臣懐憂且見陳氏之興冬齊公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉姜族弱矣而媯將始昌二惠競爽猶可又弱一个焉姜其危哉司馬竈齊大夫子旗子雅子不免以其不臣也媯陳氏子雅子尾皆惠公之孫競並爽强明也自晏子而外憂齊者惟得一竈耳八年七月甲戌齊子尾卒子旗欲治其室丁丑殺梁嬰八月庚戌逐子成子工子車皆來奔而立子良氏之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳桓子善於子尾亦授甲將助之或告子旗子旗不信則數人告將徃又數人告於道遂如陳氏桓子將出矣聞之而還游服而逆之請命對曰聞彊氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之其若先人何子盍謂之周書曰惠不惠茂不茂康叔所以服𢎞大也桓子稽顙曰頃靈福子吾猶有望遂和之如初子旗名欒施宣子所謂不臣者以子尾卒其子幼兼治其家政梁嬰子尾家宰子成頃公子名固子工成之弟名鑄子車頃公之孫名捷皆齊大夫子尾之屬也子良子尾之子名髙彊子旗為之立宰孺子謂子良將徃徃子良家桓子名無宇游服游戲之服去戎服而著之請命子旗請桓子所至也亦授甲桓子使子旗以甲相攻也寵秩為之立宰若先人何言若相攻無以見其子尾也謂之以此意達之也周書康誥言施惠於不惠者勸勉於不勉者茂勉也服行也頃靈二公欒氏所事之君有望望惠及已和和欒髙二家時陳氏蓄圖二家之謀聞子旗言而中止可見誠義足以感人而智謀雖工必有間而能逞也使自是而終守於正二家其可動哉九月楚公子棄疾帥師圍陳冬十一月壬午滅陳詳見楚滅陳晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也嵗在鶉火是以卒滅陳將如之今在析木之津猶將復由且陳氏得政于齊而後陳卒亡自幕至於􅮊瞍無違命舜重之以明德寘德於遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百世祀虞之世數未也繼守將在齊其兆既存矣陳祖舜舜出顓頊氏水德也嵗在鶉火火盛故水滅箕斗之間有天漢謂之析木之津近北方水位故當復由由本作甹木再生條也言陳復興得政而陳亡以物不兩大也幕舜之先瞽瞍舜父從幕至瞽瞍無違棄天命者而舜為大聖寘置之也殷之興封舜後於遂舜徳置于遂也胡公滿遂之後事周武王賜姓曰媯封諸陳紹舜後兆形之將見者十年齊惠欒髙氏皆耆酒信内多怨彊於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉徃遂伐虎門晏平仲端委立于虎門之外四族召之無所徃其徒曰助陳鮑乎曰何善焉助欒髙乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之五月庚辰戰于稷欒髙敗又敗諸莊國人追之又敗諸鹿門欒施髙彊來奔陳鮑分其室晏子謂桓子必致諸公讓徳之主也讓之謂懿徳凢有血氣皆有爭心故利不可强思義為愈義利之本也蕰利生孽姑使無蕰乎可以滋長桓子盡致諸公而請老于莒桓子召子山私具幄幕器用從者之衣屨而反棘焉子商亦如之而反其邑子周亦如之而與之夫于反子城子公公孫捷而皆益其祿凢公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟曰詩云陳錫載周能施也桓公是以霸公與桓子莒之旁邑辭穆孟姬為之請髙唐陳氏始大欒子旗髙子良同出惠公皆好酒信婦人言取怨于國國人搆難而妄告陳鮑陳如鮑謀道逢子良醉中騁歸文子名國二子子旗子良彼謂二子不信不實也恐以授甲為罪而見逐遂乗其既醉復飲酒時伐之得公挾公以令也公不聴入故伐公之虎門端委朝服晏子以四族行鈞皆不從而入於公王黑齊大夫靈姑銔公旗名斷三尺不敢與君同稷齊地莊六軌道鹿門齊城門欒髙三敗奔魯陳與鮑獲分其室既用晏子言以明讓復施德公族蕰畜也孽妖害也莒齊邑子山子商子周皆子尾所逐私具不告公棘子山故邑山東臨淄縣西舊有戟里亭子周本無邑更與之夫于山東長山縣舊有于亭子城子公公孫捷皆子旗所逐私分使恩歸已詩大雅言文王能布陳大利以賜天下行之周徧桓公亦能施以成霸穆孟姬景公母髙唐今髙唐州章丘縣子尾子旗本公族也乃自逐其族而使陳氏得以施恩焉凡厥所為皆以為陳氏地也欲國之不移于陳也得乎九月昭子至自晉大夫皆見髙彊見而退昭子詔諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎詩曰不自我先不自我後其是之謂乎昭子因彊以明戒推之推車難不慎言不可不慎夫人謂子尾詩小雅言禍亂不在他正當已身喻彊身自取此禍也二十年冬齊侯疥遂痁期而不瘳諸侯之賓問疾者多在梁丘據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓公説告晏子晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與欵謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有徳之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思誘讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虚以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之闗暴征其私承嗣大夫强易其賄布常無藝徵歛無度宫室日更淫樂不違内寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史脩徳而後可公說使有司寛政毁闗去禁薄斂已責十二月齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之齊侯至自田晏子侍于遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聴之以平其心心平徳和故詩曰德音不暇今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專壹誰能聴之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也田氏務施而景公復肆暴於民以驅之晏子因事盡言疥誤應作痎間發瘧也痁頻作熱瘧之甚矣期期月梁丘據裔欵皆齊嬖大夫欲殺嚚固以稱謝來問疾之賓故晏子言范武子之徳以啓公問無猜無猜欵之事不祈無祈求於神五君文襄靈成景不廢無廢事也無愧心以君功徳稱其陳説也厭私厭足其私掠奪取也還猶顧也言祝史與君同其禍福齊侯不徳鬼神所憎將禍延祝史而可誅之乎衡鹿舟鮫虞候祈望皆官名公立官專山澤之利不與民共介隔也廹近國都之闗言邊鄙既入服公政又為近闗所征稅枉暴奪其私物承嗣大夫世位者彊易强以易之藝法制也言布政無法違去也肆放也僭令自為令也養長也以私欲長養其所求欲益縱而求為廣也應應之以罪聊攝齊西界今山東聊城縣姑尤齊東界今山東萊州有小沽河大沽河姑即大沽河尤即小沽河也萬萬曰億萬億曰兆景公從晏子暫施徳於民既疾愈行獵沛澤名虞人掌山澤之官君招當徃道之常也非物不進官之制也韙是也官與道豈二乎栁子以為非夫子之言必矣遄臺在今山東臨朐縣西子猶梁丘據字燀炊也詩商頌言中宗能與賢者和齊可否其政如羮之備五味既成戒其事復和平其心鬷總也嘏大也總齊大政上下無怨當時之民皆無爭心一氣隂陽也雖二名而皆謂之氣二體文武舞也三類風雅頌也四物律度量衡也五聲宫商角徵羽六律黄鐘大簇姑洗㽔賓夷則無射七音以宫商角徵羽而加變宫變徴也詳見上卷八風八方之風九歌九功之德皆可歌也六府三事謂之九功詩豳風義取心平則徳無闕此和同之辨其義精美匪特論治而已用以廣夫子論語之旨不亦善乎爽鳩氏少皥氏之司冦也季蒯虞夏諸侯代爽鳩氏者逢伯陵殷諸侯姜姓蒲姑氏殷周之間代逢公者今山束臨朐縣逢山有伯陵祠博興縣有薄姑城齊侯躭樂圖久生晏子稱此節之二十六年冬齊有彗星齊侯使禳之晏子曰無益也祇取誣焉天道不諂不貳其命若之何禳之且天之有彗也以除穢也君無穢徳又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥徳不囘以受方國君無違徳方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德囘亂民將流亡祝史之為無能補也公説乃止彗星出齊之分野示田氏將簒齊也公欲禳祭以除其殃誣欺也諂濫也不濫惟徳是與不貳誠一也詩大雅翼翼共也聿惟也囘違也言文王徳不違天人故四國徃歸之又詩逸詩也言追監夏殷之亡皆以亂政故齊侯與晏子坐于路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在徳對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釡鐘之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無徳與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聴禮也君令而不違臣共而不貳父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聴而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之路寢正寢公自知徳不能久有國故嘆晏子言將歸於陳氏猶欲公以禮防之取之公以公量收施之民以私量貸詩小雅義取雖無大徳要有喜恱之心欲歌舞之式用也施不及國惡收民心也不遷不移不變各有專業也不濫必得人也不滔敬其職也不收公利常祿有限也以令共慈孝愛敬和柔慈聴為禮而又以不違不貳教箴友順義正從婉為禮之善此天之所以重于世與天地等而為上也蓋其本原於天地先王稟之心制斯禮以範世非出於私也哀公五年齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼寘羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎燕姬景公夫人不成未冠也諸子齊内官號荼安孺子也諸臣以荼庶孽立之有亂故恐景公意欲立荼而難發故謾言以塞其請國惠子名夏髙昭子名張竟屬荼於二子而逐羣公子萊國前滅之為邑五子皆景公子在萊者萊人哀其失所而為之歌師衆也黨所也之徃也六年齊陳乞偽事髙國者每朝必驂乗焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰髙國得君必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乗如公戰于莊敗國人追之國夏奔莒遂及髙張晏圉弦施來奔八月齊邴意兹來奔髙張國夏受命立荼陳乞欲害之故先偽事焉言言其罪過需疑也就位就諸大夫位欲與之共謀髙國也牧鮑圉孫莊六軌之道敗髙國敗也圉晏嬰子與弦施意兹皆髙國黨前殞崔慶今亡髙國齊之公族盡矣前逐欒髙施彊來奔髙氏與欒俱亡而髙張復為景公托孤則欒滅而髙猶存也然欒髙稱二惠而髙傒世為齊卿久矣則二髙所出各異也哉陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬於季孫不入於上乗故又獻此請與子乗之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至於齊國人知之僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而徃其臣差車鮑㸃曰此誰之命也陳子曰受命于鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江説囚王豹于句竇之丘公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冐淳陽生悼公名且于齊公子鉏在魯南郭故以為稱陽生既得陳僖子之召畏在家人聞其言故二人共載以試馬為辭乗共載也萊門魯郭門闞止陽生家臣字子我待外欲俱去壬陽生子後為簡公戒之恐洩言也夜至恐人知國人知而不言見陳氏得衆子士母僖子之妾皆入陽生與饋食者偕入宫也盟盟諸大夫差車主車之官鮑㸃其名孺子荼也景公嘗銜繩為牛使荼牽之以為戲荼頓地公齒折言此見景公愛荼之深稽首過禮於鮑牧不必亡一大夫言已可為君必不怨鮑子不必亡一公子恐鮑殺已故要之公子悼公自謂胡姬景公妾賴齊邑安荼之號鬻姒荼之母王甲江説王豹皆孺子黨景公嬖臣朱毛齊大夫悼公忌荼恐僖子復立荼而廢已使欲除之故僖以為疑已言以國故立長君求以濟難而乃欲妄殺公以不直自悔乃私除荼困謂饑荒憂謂兵革大謂國政小謂殺荼將殺荼於駘恐駘人不從故毛駐於野張帳而殺之駘齊邑殳冐淳齊地八年齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡或譖胡姬於齊侯曰安孺子之黨也六月齊侯殺胡姬齊侯使如吳請師將以伐我秋及齊平九月臧賓如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖鮑牧又謂羣公子曰使女有千乗乎公子愬之公謂鮑子或譖子子姑居於潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乗及潞麇之以入遂殺之冬十二月齊人歸讙及闡季姬嬖故也魴侯季康子叔父讙闡俱今山東定陶縣界又屬寧陽縣胡姬以安孺子如賴者齊侯無道殺之又以季姬故挑釁强吳餘見康子搆怨邾齊賓如㑹子丘明嬰子季姬淫而嬖亦無道也有馬千乗使為君也鮑牧本不欲立陽生故諷動羣公子潞齊邑公減其侍從至二乗而殺之麇束縳也鮑去而陳氏無二矣九年春齊侯使公孟綽辭師于吳吳子曰昔歲寡人聞命今又革之不知所從將進受命於君冬吳子使來儆師伐齊齊既與魯平且姬嬖故辭吳師吳子怒而反與魯謀伐齊十年春公㑹吳子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴于師鄎齊地弑悼公以説吳餘見越滅呉十四年齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之驟顧諸朝諸御鞅言於公曰陳闞不可並也君其擇焉弗聴子我夕陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉饗守囚者醉而殺之而逃子我盟諸陳於陳宗初陳豹欲為子我臣使公孫言己巳有喪而止既而言之曰有陳豹者長而上僂望視事君子必得志欲為子臣吾憚其為人也故緩以告子我曰何害是其在我也使為臣他日與之言政説遂有寵謂之曰我盡逐陳氏而立女若何對曰我逺於陳氏矣且其違者不過數人何盡逐焉遂告陳氏子行曰彼得君弗先必禍子子行舍於公宫夏五月壬申成子兄弟四乗如公子我在幄出逆之遂入閉門侍人禦之子行殺侍人公與婦人飲酒于檀臺成子遷諸寢公執戈將撃之太史子餘曰非不利也將除害也成子出舍于庫聞公猶怒將出曰何所無君子行抽劒曰需事之賊也誰非陳宗所不殺子者有如陳宗乃止子我歸屬徒攻闈與大門皆不勝乃出陳氏追之失道於弇中適豐丘豐丘人執之以告殺諸郭闗成子將殺大陸子方陳逆請而免之以公命取車於道及耏衆知而東之出雍門陳豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讎何以見魯衛之士東郭賈奔衛庚辰陳恒執公于舒州公曰吾早從鞅之言不及此六月甲午齊陳恒弑其君壬于舒州悼公弑子壬立是為簡公闞止字子我時政在陳氏而任止故田常心不安而顧之數成子田常諡鞅齊大夫擇擇一而任夕夕視事逆陳宗字子行殺人于途止逢而執之陳氏欲謀齊國故睦使逆詐病因内潘沐并内酒肉潘米汁可以沐頭逆得饗醉守者殺之而逃失逆懼其為變故盟之豹亦陳宗公孫止友言已求介達之有喪豹有喪既終喪也長身長僂曲脊望視目望陽得志得止之志憚憚其多詐逺疏逺違不從也止既寵豹欲用以代陳氏之執政者豹既婉言以辭復以其意告陳氏遂逆謀先事殺之禍子謂田常也舍隠也逆始隱於族既又隠於宫成子兄弟凡八人昭子莊簡子齒宣子夷穆子安廩丘子意兹芒子盈惠子得二人共一乗田世家言兄弟四人一人一乗今不可考幄帳也聴政之所止見陳氏出迎之成子既入反閉門不納止逆素在内故得殺其侍人檀臺内宫臺成子使公居正寢欲挾以令衆也公怒其作亂故撃之子餘亦陳氏黨飾言為公除害成子舍於庫以公怒欲出避逆脅留之其弑君之謀已決於此子我不得入歸家聚徒衆攻公門亦欲得公也再不勝奔而被殺闈宫中小門大門公門弇中狹路豐丘陳氏邑郭闗齊闗名大陸子方一名郭東賈子我臣田氏欲殺之獲免矯以公命取道中行人車耏齊地衆知其矯命奪而逐之東雍門齊城門逆為請豹與車見陳氏務施而子方弗受車亦以義拒也陳恒即成子公臨難而悔不誅之舒州地闕其後三傳至康公田恒之曽孫和竟遷之於海上簒齊為諸侯自田氏簒齊六卿分晉三桓專魯公羊遂謂春秋譏世卿而孟子云仕者世祿於是儒者有世祿不世官之説焉愚以為非也古者天子諸侯大夫皆以徳為之殺各保姓受氏以守宗祧故曰天子建國諸侯立家豈有天子諸侯世而大夫獨不世者乎且封國土地有限官於朝者既有常禄而仕者之子孫日繁安得以無限之祿給之大率權之所在未有不為患者人君惟務脩德以固天命秉正道以任忠良耳其祚之脩短聖人有不能自必者何至因事察形曲設疑防猜阻逆為備患計以自固乎其位耶觀其君皆庸暗滔淫為臣所制并自啓亂門而濟之者𢎞多跡田氏至景公時其勢成矣晏子每事陳誨既已深切景不惟不從而且廢嫡立庶以遂其謀髙國國之望也皆懵焉而從於邪鮑復二三其間以自殞斃與前之崔慶欒髙皆柤率為之驅除焉且弑悼而立簡簡身乎其慽畧無嫉忌之心任闞止一愚人與之並事皆天閉其衷而相趨於亡也哀夫豈太公之烈至是而盡也哉假卿不世國其能以永存乎緑公羊學極尊漢武時適霍氏王氏世顓漢柄魏相劉向因盛述公羊之説以動主聴而王氏卒以簒漢其説遂為至允蓋援此專論漢事與為後衰世慮固當而聖人之意實不爾也愚怪世儒好附㑹前説更叅已意以縁飾之其説似美而不可行也故為之辨春秋左傳屬事卷十三
