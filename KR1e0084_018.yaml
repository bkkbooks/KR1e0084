body:
  text: 春秋左傳屬事卷十八明傅遜撰楚武王伐隨桓公六年春楚武王侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬭伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難閒也漢東之國隨為大隨張必弃小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬭伯比曰以為後圖少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉徳而無違心也所謂馨香無讒慝也故務其三時脩其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑脩政而親兄弟之國庶免於難隨侯懼而脩政楚不敢伐隨國今湖廣徳安府隨州有隨城山薳章楚大夫瑕隨地少師隨寵臣董正也鬬伯比楚大夫令尹子文之父熊率且比亦楚大夫季梁隨賢臣伯比欲示弱以驕隨且比以季賢知吾謀將不行故伯此言隨侯今雖從季梁終當以少師計為善可為後圖毁軍從伯比謀許追楚信楚弱也正辭不虚辭稱君美矯舉詐稱功徳以欺鬼神牲牛羊豕牷純色完全也腯亦肥也黍稷曰粢在器曰盛鬼神之情依民而行故民為神之主告神以博碩肥腯意實兼此四謂民力適完則六畜既大而滋博廣碩大也疥癬曰瘯蠡作筋結病癧也皮毛無此疾又兼備而無有闕皆民力之存奉盛奉醴意皆歸於徳民非徒以物故聖人養而教之先民而後神三時春夏秋嘉善粟敬也馨香之逺聞者五教以五倫為教禋潔敬也九族謂自髙祖至𤣥孫為九非必已有髙𤣥凡與髙𤣥為一世者是也乏主民饑餒也脩政以内撫民親兄弟以為外援八年春隨少師有寵楚鬬伯比曰可矣讎有釁不可失也夏楚子合諸侯于沈鹿黄隨不㑹使薳章讓黄楚子伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠冦也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也弗從戰于速把隨師敗績隨侯逸鬭丹獲其戎車與其戎右少師秋隨及楚平楚子將不許鬬伯比曰天去其疾矣隨未可克也乃盟而還無徳者寵國之釁也故謀伐隨沈鹿楚地讓責也黄今為河南光州今隨州境有楚子城以其築城伐隨而名下之請服也君必左楚君必在左弗從不從季梁速把隨地逸逃也鬬丹楚大夫戎車君所乘兵車戎右車右寵少師故為右被獲而死故云去疾莊公四年春楚武王荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼嘆曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為㑹於漢汭而還濟漢而後發喪尸陳也荆即楚更為楚陳兵之法揚雄方言孑者㦸也楚始於此參用㦸為陳將授兵於太廟故齊蕩動散薨于行不死於敵也樠木木名今湖廣承天府樠木山有楚子廟鬬祁屈重謀祕王喪為竒兵更開直道為梁於溠溠水在隨州城東南築軍壘以臨隨為持乆計隨人莫測懼而求成水曲曰汭漢之西也請㑹示隨不疑僖公二十年秋隨以漢東諸侯叛楚冬楚鬬穀於菟帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗由已而由人乎哉詩曰豈不夙夜謂行多露鬬穀於菟字子文詩召南言豈不欲早暮而行懼多露之濡巳以喻違禮而行必有汚辱是量力相時之義屈瑕敗鄖敗絞伐羅桓公十一年春楚屈瑕將盟貳軫鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之鬬廉曰鄖人軍其郊必不誡且日虞四邑之至也君次於郊郢以禦四邑我以銳師宵加於鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離莫敖曰盍請濟師於王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷卒盟而還貳軫二國名盟盟以服之鄖亦國今為湖廣徳安府有鄖子國蒲騷鄖邑今應城縣有蒲騷城隨絞州蓼四國也州在今監利縣境蓼在南直𨽻夀州有蓼國城莫敖楚官屈瑕為之鬬廉楚大夫誡備虞度也四邑謂四國以國小而邑名之君謂屈瑕郊郢楚地今為承天府舊名郢中恃其城度敗而有城可保也濟益也不敵紂衆武王寡也卒盟盟貳軫也十二年冬楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還伐絞之役楚師分渉於彭羅人欲伐之使伯嘉諜之三巡數之扞衞也樵薪也獲獲楚人坐猶守也覆設伏兵以待之也城下之盟諸侯所深耻彭水名羅熊姓國在湖廣南漳縣南境有羅國城後徙枝江縣伯嘉羅大夫諜伺也巡徧也十三年春楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾髙心不固矣遂見楚子曰必濟師楚子辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令徳見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖使狥于師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之莫敖縊于荒谷羣帥囚于冶父以聴刑楚子曰孤之罪也皆免之趾足也伯比難言瑕將敗故以濟師諷諌武王不解其㫖故拒之鄧蔓王夫人言伯比意不在益衆而在王之以徳刑信為訓也狃狎也不假易言天不借貸慢易之人賴人賴人仕於楚者狥宣令也鄢水在襄陽宜城縣入漢無次無復行伍之次備戰備盧戎南蠻縊自經荒谷冶父皆楚地文王滅息鄧敗蔡黄隱公十一年秋鄭息有違言息侯伐鄭鄭伯與戰于竟息師大敗而還君子是以知息之將亡也不度徳不量力不親親不徴辭不察有罪犯五不韙而以伐人其喪師也不亦宜乎息後見違言以言語相違恨不度言徳薄不量言國弱息鄭同姓為親徴辭言當明徴其辭審曲直以察罪之所在韙是也桓公九年春巴子使韓服告于楚請與鄧為好楚子使道朔將巴客以聘於鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓於鄧鄧人弗受夏楚使鬭廉帥師及巴師圍鄾鄧養甥𥅆甥帥師救鄾三逐巴師不克鬬廉衡陳其師於巴師之中以戰而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰鄧今為鄧州又湖廣襄陽府東北有鄧城亦云鄧地巴國今為四川重慶府韓服巴行人楚子武王也道朔楚大夫巴客韓服也鄾鄧邑在鄧城南八里有鄾城弗受言非鄾人所攻廉圍而討之二甥皆鄧甥仕舅氏衡横也分巴師為二部廉横陳於其中以與鄧戰而偽走誘鄧師背巴師而逐已已還戰巴師自其背與夾攻之故鄧敗鄾人失援夜潰北走也宵夜也莊公六年冬楚文王伐申過鄧鄧祈侯曰吾甥也止而享之騅甥𥅆甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之申伯國今為河南信陽縣祁諡也姊妹之子曰甥三甥欲因享於飲食中毒殺楚子噬齊若齧腹齊喻不可及鄧侯言因享而害人大致人疑不食吾之餘矣焉取餘言國亡無食不復有其餘也還年伐申還之年十年夏蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸息侯國今為河南息縣妻之姊妹曰姨弗賓不敬禮也莘蔡地十四年蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎繩譽也食入享偽設享食之具因而納兵未言不與王言示恨意入蔡以說息媯商書盤庚言惡宜逺而宜滅蔡侯以惡自害也十八年初楚武王克權使鬭緡尹之以叛圍而殺之遷權於那處使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛楚而伐那處取之遂門于楚閻敖游涌而逸楚子殺之其族為亂冬巴人因之以伐楚權國在今湖廣當陽縣東南舊有權城以叛緡以權叛殺之殺緡也那處楚地在荆門州境舊有那口成閻敖楚大夫驚其師驚巴師門攻楚城門涌水舊在監利縣境今闕敖不能守城游涌水而走十九年春楚子禦之大敗於津還鬻拳弗納遂伐黄敗黄師于踖陵還及湫有疾夏六月庚申卒鬻拳葬諸夕室亦自殺也而葬於絰皇初鬻拳强諌楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善津楚地鬻拳楚大閽黄嬴姓國踖陵黄地湫夕室皆楚地絰皇冢前闕生守門故死不失職大閽守城門者以太伯稱示寵異使子孫常主此官因以兵諫而自刖既刖而復進忠諌卒以自殺故為愛君拳雖非人臣之正而心實出於忠愛况已自殺後人復何罪之深也特不可以為法耳然楚能盡其忠愛所以興乎成王滅弦黄夔僖公五年秋楚鬭穀於菟滅弦弦子奔黄於是江黄道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡於菟即子文弦國今河南光山縣道國在今河南安陽縣南柏國在今河南西平縣有柏亭十一年黄人不歸楚貢冬楚人伐黄十二年黄人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黄二十六年夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬭宜申帥師滅夔以夔子歸夔國今湖廣歸州東有夔子城祝融髙辛氏之火正楚之逺祖也鬻熊距祀融一千二百餘年其苗裔也夔楚之别封故亦世紹其祀熊摯楚嫡子有疾不得嗣位别封為䕫子得臣子玉宜申子西成王之弑僖公二十二年冬十一月己巳朔宋公及楚人戰于泓宋師敗績丙子晨鄭文夫人芈氏姜氏勞楚子於柯澤楚子使師縉示之俘馘君子曰非禮也婦人送迎不出門見兄弟不踰閾戎事不邇女器丁丑楚子入饗于鄭九獻庭實旅百加籩豆六品饗畢夜出文芉送于軍取鄭二姬以歸叔詹曰楚王其不沒乎為禮卒於無别無别不可謂禮將何以沒諸侯是以知其不遂霸也宋敗詳見宋襄圖伯楚子還過鄭鄭文公夫人芈氏楚女姜氏齊女也柯澤鄭地師縉楚樂師俘所得囚馘所截耳言戎事尚嚴不近女子所御之物況使婦人至軍中又示以俘馘乎享為鄭所享用上公之禮九獻酒而禮畢庭中所陳品數百也食物六品加於籩豆二姬文芈女也不沒不以壽終楚子所以即敗城濮終為商臣所弑文公元年初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聴既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也從之江芈怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聴丁未王縊諡之曰靈不瞑曰成乃瞑穆王立以其為太子之室與潘崇使為太師且掌環列之尹商臣穆王名齒未年尚少黜乃亂謂既立而黜之則生亂舉立也江芈成王妹嫁於江呼發聲役夫賤者稱事臣之也行出奔大事謂弑君宫甲太子宫甲熊掌難熟冀乆將有外變亂而不損曰靈未斂而加惡諡忍之極也環列之尹宫衞之官列兵而環王宫十年初楚范巫矞似謂成王與子玉子西曰三君皆將强死城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使為商公㳂漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸矞似范邑之巫城濮見晉文公之伯商楚邑㳂順流泝逆流小洲曰渚司敗司冦也子西本欲為亂見王懼而飾詞言願歸死焉工尹掌百工之官宜申子西仲歸子家穆王滅江蓼六文公三年秋楚師圍江晉先僕伐楚以救江冬晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還晉本無救江之心乃為虚聲耳四年秋楚人滅江五年六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉六今南直𨽻六安州有六城蓼今霍丘縣成大心得臣子仲歸子家也六臯陶後舊云庭堅臯陶字恐非一云蓼庭堅後亦未詳忽亡之速也又傷二國之君不能建徳以衛其民子燮子儀子越之亂文公九年冬楚子越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也越椒子文從子凡聘必告廟又其珪璋皆傳之先世故言傲其先君十四年秋楚莊王立子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密廬戢棃及叔麇誘之遂殺鬭克及公子燮初鬭克囚于秦秦有殽之敗而使歸求成成而不得志公子燮求令尹而不得故二子作亂時莊王幼弱子儀為師子燮為傅作亂不克而刧王以出商密漢為丹水縣後廢廬楚邑在今湖廣襄陽府城南有中廬城戢棃邑大夫叔麇其佐鬬克子儀名不得志無賞報也宣公四年初楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒鬭般為令尹子越為司馬蒍賈為工正譛子揚而殺之子越為令尹已為司馬子越又惡之乃以若敖氏之族圄伯嬴於轑陽而殺之遂處烝野將攻王王以三王之子為質焉弗受師于漳澨秋七月戊戌楚子與若敖氏戰于臯滸伯棼射王汰輈及鼓跗著于丁寧又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶於䢵生鬭伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使弃諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳穀謂虎於菟故命之曰鬭穀於菟以其女妻伯比實為令尹子文其孫箴尹克黄使於齊還及宋聞亂其人曰不可以入矣箴尹曰弃君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生子良子文弟若敖子文之先因以為氏餒不祀也而語助般子文之子字子揚子越椒字别字伯棼蒍賈字伯嬴為椒譛子揚而位以第遷椒復惡賈而殺之圄囚也轑陽烝野皆楚邑三王文成穆漳澨漳水之邊臯滸亦楚地汰過也輈車轅跗以架鼓矢過車轅上及跗而著丁寜丁寜鉦也笠轂用笠為蓋蔽轂上以禦暑雨矢又過車轅及蓋師見椒發矢異常故懼王為設詞以强其心遂奮而克之䢵鄖同畜養也夢澤名今徳安府有雲夢城雲夢縣縣有於菟鄉為虎乳子文而名告告女私通所生箴尹官名克黄子揚之子曰生明更生之三王滅庸舒莊共康文公十年厥貉之㑹麇子逃歸麇國今為湖廣岳州十一年春楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫穴成大心字孫伯防渚錫穴皆麇地錫穴今為鄖縣十二年春楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢成嘉若敖曽孫字子孔羣舒謂舒庸舒鳩舒蓼等皆東夷小國今南直𨽻有舒城縣父有龍舒城平舒君名宗巢二國羣舒之黨十六年秋楚大饑戎伐其西南至于阜山師于大林又伐其東南至于陽丘以侵訾枝庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次于句澨使廬戢棃侵庸及庸方城庸人逐之囚子揚䆫三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯裨鯈魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師于臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸戎山夷也阜山在湖廣房山境與大林陽丘訾枝皆楚邑庸屬楚小國今為湖廣竹山縣有庸山選楚地百濮夷也皆叛楚聚而伐之申息二邑北門不啓懼中國也阪髙楚險地衆欲遷國於此以避冦蒍賈字伯嬴叔孫敖之父獨不可欲乘不意而伐庸以庸帥羣蠻也濮夷無屯聚見難則散歸罷散也廬楚邑往往伐庸振發廩倉也同食與下同甘苦也句澨楚西界地戢梨廬大夫使帥偏師先進方城庸地竹山縣東有方城山揚䆫戢之官屬被囚逸歸欲復就句澨之師且發兵方進師叔楚大夫名潘尫不可謀驕彼怒我以克之蚡冒楚武王父據史記世家為兄未詳陘隰地名北敗也裨鯈魚庸三邑蓋見楚師累敗遂輕楚但使三邑人逐之驛傳車臨品地名隊部也兩道俱進子越名鬭椒子貝闕石溪仞皆入庸道蠻見楚强復從之盟庸遂滅而楚復安傳言楚有謀臣所以興宣公八年夏楚為衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟呉越而還舒蓼衆舒之一疆正其界滑汭滑水之曲盟服之也成公十七年冬舒庸人以楚師之敗也道呉人圍巢伐駕圍釐虺遂恃呉而不設備楚公子橐師襲舒庸滅之敗鄢陵之敗舒庸前見巢今巢縣與駕釐虺楚四邑襄公二十四年夏楚子為舟師以伐呉詳見呉通上國冬呉人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹壽與師祁犂讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不貳吾又何求若猶叛我無辭有庸乃還荒浦舒鳩地沈尹夀師祁犂楚大夫薳子令尹字子馮卒終也無辭有庸乘彼之曲易有功也二十五年秋楚薳子馮卒舒鳩人卒叛楚令尹子木伐之及離城呉人救之子木遽以右師先子彊息桓子捷子駢子盂帥左師以退呉人居其間七日子彊曰乆將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為呉禽從之五人以其私卒先撃呉師呉師奔登山以望見楚師不繼復逐之𫝊諸其軍簡師㑹之呉師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩十二月楚子以滅舒鳩賞子木辭曰先大夫蒍子之功也以與蒍掩離城舒鳩别城子木先至舒鳩子彊等五子不及子木與呉師相遇而退故呉居其兩軍之間墊隘慮水雨簡簡閱精兵駐後為陳視視其形勢而救助從如其謀呉還逐五子至其本軍所陳精兵與其軍㑹撃之故呉敗遂前及子木共圍滅舒鳩蒍子前謀善而今滅之故以為功五令尹代政襄公十三年秋楚共王卒謀諡子囊曰請諡之共大夫從之詳見晉楚鄢陵之戰十四年冬楚子囊還自伐呉卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘增其名將死不忘衞社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也楚徙都郢未有城郭公子燮公子儀因築城為亂事未得訖子囊欲訖而未暇故遺言見意詩小雅忠信為周言徳行歸於忠信即為萬民所瞻望十五年春楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈到為莫敖公子追舒為箴尹屈蕩為連尹養由基為宫廏尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懷人寘彼周行能官人也王及公侯伯子男甸采衞大夫各居其列所謂周行也午字子庚代子囊子馮叔敖從子屈到屈蕩子追舒莊王子字子南屈蕩與屈到父同名覦心覬覦之心詩周南寘置行列周徧也詩人嗟歎言我思得賢人置之徧於列位是后妃之志以官人為急言自玉以下諸侯大夫各任其職則是詩人周行之志也甸采衞五服之名也天子所居千里曰圻其外曰侯服次曰甸服次曰男服次曰采服次曰衛服五百里為一服不言侯男畧舉也二十一年夏楚子庚卒楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹叔豫叔時之孫蓋子馮所敬寵權貴弱無威繭綿也瘠而未動言無疾知其詐也二十二年冬楚觀起有寵於令尹子南未益禄而有馬數十乘楚人患之王將討焉子南之子弃疾為王御士王每見之必泣弃疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之洩命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂弃疾請徙子尸於朝曰君臣有禮唯二三子三日弃疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰弃父事讎吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之子南偏寵觀起令富故馬多御士御王車王賢弃疾將討子南惜之而泣爾其居欲留使事已也父殺而居為不孝洩君命為不忠而王遂殺子南徙尸犯命取殯也有禮先盡國法而後私情也弃疾自以不與父言為與殺王於事為仇於分為君行與事之皆不可故自縊康王與人子謀其父殊失君道而弃疾可悲甚矣然曷若聞命即死庶以警父或以啓王之悔而不忍邪薳子寵八人如觀起申叔三避之使怪而就問叔難言八人唯以已懼禍為詞薳子悟惶遽馳歸以再生恩歸之辭遣八人君臣始相安二十五年秋楚薳子馮卒屈建為令尹屈蕩為莫敖冬楚蒍掩為司馬子木使庀賦數甲兵甲午蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰臯井衍沃量入脩賦賦車籍馬賦車兵徒兵甲楯之數既成以授子木禮也屈建屈到之子子木蒍掩蒍子馮之子庀治也數閲數之書土田書其所宜度山林量度其材以共國用鳩聚也聚其財物入之王府若周官澤虞之職辨别也絶髙曰京大阜曰陵别之以為冢墓之地淳鹵地宜鹽者可資民用表之疆潦疆界有流潦者數之使勿壅滯偃豬下濕之地規度其受水多少廣平曰原防隄也隄防間地不得方正如井田者别為小頃町隰臯水厓下濕為芻牧之地衍沃平美之地則如周禮制為井田六尺為步步百為畆畆百為夫九夫為井量九土之所入而治理其賦稅車亦倣周制甸出長轂一乘之數籍疏其馬之毛色歳齒以備軍用車兵甲士徒兵步卒與甲楯器械之屬皆有常數得治國之禮傳言楚之所以興二十六年初楚伍參與蔡太師子朝友其子伍舉與聲子相善也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戌將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寜其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僭不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人寘諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老㓜反孤疾二人役歸一人簡兵蒐乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈争夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通呉於晉教呉叛楚教之乘車射御驅侵使其子狐庸為呉行人焉呉於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師熸子反死之鄭叛呉興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其禄爵而復之聲子使椒鳴逆之聲子子朝之子名歸生伍舉子胥祖父一名椒舉班布也布荆坐地共議歸楚事朋友世親也通使為蔡通平事也晉故晉之故事杞梓美木與皮革皆楚産而晉用之喻楚亡臣多用於晉夫發語國從之從之亡也詩大雅殄盡也瘁病也夏書大禹謨不經不用常法商頌言湯賞罸皆中無怠皇故受天命於下國為天子勸賞樂行賞畏刑憚用刑春夏秋冬皆順天時飫饜也酒食賜下無不饜足以加膳故也不舉不舉盛饌療治也不能不能用其材也殿後軍鈞同其聲獲麗事見晉景公楚共王争伯不善不善别其曲直鄐晉邑簡擇也蒐閲也次舍也焚舍示必死逸囚使聞之失東夷謂楚東小國見楚弱而皆叛事見晉悼公之伯子靈巫臣雍擁同邢晉邑子靈事見呉通上國若敖亂即子越之亂見前欒范將中軍兵精故簡易兵備欲令楚貪已不復顧二穆之兵郤錡中行偃郤至三人分良以攻二穆楚子重子反皆出穆王故曰二穆四萃四面集攻之夷兵傷呉楚之間謂火滅為熸弗圖不以為意比叔向以才能比之椒鳴舉子傳言聲子有詞伍舉所以反子孫復仕於楚愚謂聞言知懼而用能子木之賢也二十七年崔氏之亂申鮮虞來奔僕賃於野以喪莊公冬楚人召之遂如楚為右尹喪莊公為之服喪楚人義之故召為右尹言其能用賢也觀春秋諸國惟楚英賢最多而出於公族者為尤楚親疏叅用而為令尹執國政者皆其公族少有僨事旋即誅死無少貸與晉齊魯衞立法殊異所以强大累世而威權畧無下移固其君之强明亦其傳國用人之制獨善也平王得國靈王之簒附前襄公二十六年夏楚子秦人侵呉及雩婁聞呉有備而還遂侵鄭五月至于城麇鄭皇頡戍之出與楚師戰敗穿封戌囚皇頡公子圍與之争之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉戌怒抽戈逐王子圍弗及楚人以皇頡歸雩婁楚地今鳳陽府霍丘縣城麇鄭邑皇頡鄭大夫戍守也圍共王子是為靈王正正曲直君子言圍與戍皆非細人易别介大也州犂手與言皆有輕重以導囚意弱焉因為所禽餘見晉平楚康争伯二十九年夏四月葬楚康王諸侯之大夫皆至于墓楚郟敖即位王子圍為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖郟敖康王子熊麇子羽言楚王弱令尹强必取而代之三十年春王正月楚子使薳罷來聘通嗣君也穆叔問王子之為政何如對曰吾儕小人食而聴事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣嗣君郟敖子蕩薳罷字時諸侯皆知圍之將簒秋楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免無宇芉尹偏佐也四體言俱股肱也三十一年十二月北宫文子相衞襄公以如楚文子北宫佗衞侯在楚北宫文子見令尹圍之威儀言於衞侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衞詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必先教訓以威儀也周書數文王之徳曰大國畏其力小國懷其徳言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也令尹言語瞻視行步不常故佗知其有異志而不終君臣倫之大者威儀稱焉順也順之以下至于父子兄弟夫婦朋友士農商工皁𨽻牧圉咸當其分而不踰故能相固令尹侈僣故知不終衞詩邶風棣棣富而閑也選數也周詩大雅攸所攝正也又引大雅言文王惟則象於天故為天下法深言威儀之宜慎而令也昭公元年春楚公子圍聘于鄭遂㑹于虢三月甲辰盟楚公子圍設服離衞叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宫有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣陳公子招曰不憂何成二子樂矣衞齊子曰苟或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之退㑹子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鲋字而敬子與子家持之皆保世之主也齊衞陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之太誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物其是之謂矣聘鄭詳見子産相國㑹虢詳見晉楚為成服服從也離兩相麗也圍陳設其儀從侍衞皆僣侈如王行有二執戈者在前緝蒲為王殿屋屏蔽以自殊異故穆子嘆其美似君子皮子家相與議之州犂言假之王以飾其過揮言將遂真矣時鄭子晳殺伯有背命放誕將為國難州犂言子且自憂此無為楚憂子羽行人揮字言弃疾有當璧之命圍雖得國猶將有難國子名弱代州犂憂王子圍代子羽憂子晳招言事以能憂而成成則樂齊子名惡言先知為備則憂而無害左師言共承大國之命不敢知其他小旻詩小雅其卒章義取非惟暴虎馮河之可畏不敬小人亦危殆王鮒從斯義故不敢議圍絞切也譏其似君反謂之美故曰婉無所臧否故曰簡共事大國故曰禮字愛也不犯凶人所以自愛敬子謂子皮子家名歸生持之言無所取與太誓周書兆憂開憂兆也物類也察言以知禍福之類其後招以殺太子偃師而身放國滅國弱齊惡當身各無患秋楚公子圍使公子黑肱伯州犂城犫櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之遂殺其二子幕及平夏右尹子干出奔晉宫廏尹子晳出奔鄭殺太宰伯州犂于郟葬王于郟謂之郟敖使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長楚靈王即位薳罷為令尹薳啓疆為太宰黒肱圍弟字子晳犫今河南魯山縣東南有犫城櫟河南鈞州郟河南郟縣本鄭地時屬楚城之鄭以偪已懼大事謂弑君縊絞也幕平夏皆郟敖子子干亦圍弟名比子晳因築城而奔州犂被殺楚人謂未成君者為敖葬於郟故曰郟敖伍舉問使更赴辭使若應立者告終稱嗣不以簒弑赴諸侯餘見秦晉交伐靈王即位更名熊䖍詳見靈王之亂六年六月楚公子弃疾如晉過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸柤辭不敢見固請見之見如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子太叔以馬二匹禁芻牧採樵不入田不樵樹不采蓺不抽屋不强匃誓曰有犯命者君子廢小人降舍不為暴主不慁賓往來如是鄭三卿皆知其將為王也如晉報聘事見靈王之亂辭不敢當國君之榮柤鄭地如見王如見楚王私面為私見之禮如上卿如楚上卿廢不得居位降退給下劇慁患也三卿虎僑吉也七年楚子之為令尹也為王旌以田芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽入焉無宇執之有司弗與曰執人於王宫其罪大矣執而謁諸王王將飲酒無宇辭曰天子經畧諸侯正封古之制也封畧之内何非君土食土之毛誰非君臣故詩曰普天之下莫非王土率土之濱莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隷隷臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人於王宫將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之析羽為旌王旌游至於軫時圍僣之章華宫在今胡廣監利縣閽入焉有罪亡入之也有司王之有司執執無宇經畧經營天下畧有四方正封謂封疆有定分毛草也詩小雅甲至癸為十日王至臺為十等養馬曰圉養牛曰牧荒大也閲蒐也有亡人當大蒐其衆僕區刑書名一云僕隱也區匿也隱亡人之法亦未詳隱器隱盜所得器封汝啓封疆北至汝水以行善法也無陪臺皆逃故也萃集也天下逋逃悉以紂為淵藪集而歸之致死致死力以討紂盜有所言王亦為盗盜有寵王自謂也八年冬十一月壬午滅陳使穿封戌為陳公曰城麇之役不謟侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎對曰若知君之及此臣必致死禮以息楚滅陳為縣使戌為其縣公城麇役在本事内前死禮以死盡臣禮前州犂隂附圍而竟為所殺戌與圍抗乃以是獲賞君子惟秉道行義而已邪媚取容亦何濟乎十一年冬十一月楚子滅蔡十二月楚子城陳蔡不羮使弃疾為蔡公王問於申無宇曰弃疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立齊桓公城穀而寘管仲焉至于今賴之臣聞五大不在邊五細不在庭親不在外羇不在内今弃疾在外鄭丹在内君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子游齊渠丘實殺無知衞蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉君所知也不羮今河南襄城縣東南舊有不羮亭子元鄭公子莊公寘之櫟厲公因以殺櫟大夫檀伯居櫟卒使昭公不安位而見殺城穀寘管仲成霸業今猶賴其强二事皆增飾見親不可使在外尢須擇人上古金木水火土謂之五官𤣥鳥氏丹鳥氏亦有五又以五鳩鳩民五雉為五工正蓋立官之本也末世隨事施職是以官無常數時無宇稱習古言故云五大言五官之長專盛過節則不可居邊細弱不勝任亦不可居朝廷丹子革也以鄭臣奔楚曼伯即檀伯殺子游見宋閔之弑殺無知見齊襄之弑出獻公見孫甯廢立折本折掉運用也十二年夏楚子謂成虎若敖之餘也遂殺之或譖成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也成虎令尹子玉之孫與鬬氏同出於若敖前鬬椒作亂此楚子信譖而逺託討若敖之餘懷寵懷思寵祿也冬楚子狩于州來使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼呉楚子次于乾谿以為之援徐呉與國乾谿楚邑餘詳見靈王之亂十三年楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之㑹越大夫戮焉王奪鬭韋龜中犫又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝呉曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已狥於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝呉曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子弃疾蔓成然蔡朝呉帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲為名故請為武軍蔡公知之曰欲速且役病矣請藩而已乃藩為軍蔡公使須務牟與史猈先入因正僕人殺太子祿及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子弃疾為司馬先除王宫使觀從從師于乾谿而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待于郊以聴國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聴大國之圖君也王曰大福不再祇取辱焉然丹乃歸于楚王㳂夏將欲入鄢芋尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可弃吾其從王乃求王遇諸棘闈以歸夏五月癸亥王縊于芋尹申亥氏申亥以其二女殉而葬之觀從謂子干曰不殺弃疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙夘夜弃疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰弃疾即位名曰熊居葬子干于訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗為令尹楚師還自徐呉人敗諸豫章獲其五帥平王封陳蔡復遷邑致羣賂施舍寛民宥罪舉職召觀從王曰唯爾所欲對曰臣之先佐開卜乃使為卜尹使枝如子躬聘于鄭且致犫櫟之田事畢弗致鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對曰臣過失命未之致也王執其手曰子毋勤姑歸不穀有事其告子也他年芋尹申亥以王柩告乃改葬之初共王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於太室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐鬭韋龜屬成然焉且曰弃禮違命楚其危哉子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亡無愛徴可謂無徳王虐而不忌楚君子干涉五難以弑舊君誰能濟之有楚國者其弃疾乎君陳蔡城外屬焉苛慝不作盜賊伏隠私欲不違民無怨心先神命之國民信之芉姓有亂必季實立楚之常也獲神一也有民二也令徳三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵弃矣民無懷焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衞姬之子也有寵於僖有鮑叔牙賓須無隰朋以為輔佐有莒衞以為外主有國髙以為内主從善如流下善齊肅不藏賄不從欲施舎不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不貳生十七年有士五人有先大夫子餘子犯以為腹心有魏犫賈佗以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主亡十九年守志彌篤惠懷弃民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異於子干共有寵子國有奥主無施於民無援於外去晉而不送歸楚而不逆何以冀國靈王横虐聚怨已多至此乘王不在國合焉而舉居薳之族殺薳掩前見圍許大夫蔡洧仕楚其父在蔡故死王將至乾谿設守備侑與焉越大夫常壽過也韋龜令尹子文𤣥孫中犫其食邑成然韋龜子郊尹治郊境大夫蔡公弃疾故猶舊也啓道也息舟即城邑之固者觀起死於子南事見五令尹代政朝呉蔡大夫聲子之子觀從事之知呉忠於蔡故勸之乘此機以復國以子干子晳有次立之分而弃疾得衆兼有利權可假以濟遂詐其命以召二子而告之情强盟之襲入蔡弃疾方食驚逃從使子干居其床食其食復偽為與蔡公盟之騐以示衆而使行又誑衆言蔡公召之將助之以師衆將執之又言二子已去蔡公已成軍殺已一人不足以解亂賊謂二子也朝呉因言若能為王死亡則可遣蔡公之命以待成敗何如求安不如與蔡公以得所欲上謂蔡公言其命不可違於是合謀而盟以舉事以陳蔡人有故國之思復其國名以依其衆四族薳氏許圍蔡洧蔓成然也陳蔡欲壘壁為復讐名以示後弃疾不欲假其名阻之藩籬也須務牟史猈楚大夫弃疾之黨正僕太子之近官禄罷敵靈王二子魚陂楚地在湖廣景陵縣西有甘魚陂使觀從弃疾使之告令叛王劓截鼻王還至訾梁而衆散擠排也然丹子革三為王畫計不可為弃王歸夏漢别名順流為㳂順漢水南至鄢再奸命謂斷王旌執人於章華宫也棘里名闈門也申亥以靈王再赦其父故葬王并用女為殉以報徳子玉觀從也忌弃疾欲殺之以謀不用而亡國相駭以靈王天啓弃疾也弃疾因而遂其謀使以己見殺怖殺二子不成君無號諡葬于訾故曰訾敖殺囚詐為靈王見已死也故皆安子旗蔓成然也前圍徐之師還以國亂故呉得敗之豫章五帥皆獲此豫章在江北淮南後徙於江南前陳蔡徒以國名此乃實封之遷邑九年所遷詳見靈王之亂始舉事時所許賂竟致之施施恩惠舍舍逋負以寛民力宥赦罪戾脩舉廢官觀從教殺弃疾多其智召用之佐開卜佐卜人開龜兆枝如子躬楚大夫犫櫟本鄭邑楚中取之平王新立故使還以賂鄭子躬知鄭自悅服不須賂故弗致降服如今解冠以謝違命王善其有權有事將與謀之故曰其告子既得王柩于申亥而改葬焉餘見靈王之亂傳又推弃疾得國與子干無成之故冢大也羣望境内名山大川巴姬共王寵妾太室祖廟齊齊戒長入從長㓜以次拜也跨過其上初埋璧時微見璧紐以為識故知厭紐韋龜知其兆故以子托禮於羣望命於當璧而違弃之故知必危同惡謂同謀造難者相求如市賈之趨利向言子干本無黨無有與之同謀者寵父所寵愛人賢才主内外為應援者謀策畫民得民心徳為人仰望子干皆無之徒以楚人不堪靈王之虐故借子干以君名而作亂子干涉是五難以被弑君之名終無能成弃疾兼兹五利必當有國時穿封戌死并領陳蔡故君陳蔡不違不以私欲違民事獲神謂當璧有民民信之令徳無苛慝寵貴謂權寵用事居常謂季少也宣子又言桓文皆在外乘國亂而入如子干叔向又詳其與比異齊桓出奔莒衞有舅氏之助髙國二氏齊上卿齊嚴也肅敬也不貳志篤也五士未詳或即顛頡司空季子狐毛之倫子餘趙衰子犯狐偃魏犫武子賈佗晉公族從後為太師齊妻以女宋贈以馬楚人送秦秦伯納之欒欒枝郤郤縠狐狐突先先軫獻公有子九惟文公在故無異寵子奥主謂弃疾叔盻之料人與事審矣十四年夏楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勲合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師禮也上國在國都之西居上流者宗丘楚地分與也振救也介特單身民也收養不使離散宥寛其賦稅詰責問也淹滯有才徳而未敘者新羇旅舊舊徳勲功也親九族也良賢良物審也東國在國都之東者亦如上國也禮以安國治民故曰禮秋楚令尹子旗有徳於王不知度與養氏比而求無厭王患之九月甲午楚子殺鬭成然而滅養氏之族使鬭辛居鄖以無忘舊勲子旗成然字有佐立之徳不度不以法自檢也辛子旗之子鄖今湖廣徳安府其地十六年春楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也蠻氏在今河南府城東南有鄤聚是也質信也不絶其嗣故云禮春秋左傳屬事卷十八
