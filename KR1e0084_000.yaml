body:
  text: 春秋左傳屬事目録春秋類卷一周桓王伐鄭子克子頽子帶之亂王臣爭政定靈昏齊劉康公敗于茅戎景王讓晉王臣喪亡子朝之亂王朝交魯卷二伯齊桓公之伯宋襄公圖伯晉文公之伯附襄公繼伯卷三伯晉靈公楚穆王爭伯楚莊王之伯晉景公楚共王爭伯卷四伯晉楚鄢陵之戰晉悼公復伯卷五伯晉平公楚康王爭伯晉楚為成卷六伯楚靈王之亂晉失諸侯卷七魯隱公攝國文姜之亂附莊公忘讎魯與邾莒之怨附邾莒事季康子搆怨邾齊卷八魯魯與宋衛之好小國交魯魯取小國孔子仕魯列卿世嗣之變卷九魯三桓弱公室卷十魯陪臣交叛列國災異郊祀搜狩城築卷十一晉曲沃並晉附獻公除公族獻公滅虞虢驪姬之亂並諸戎狄附長狄之亡卷十二晉卿族廢興卷十三齊襄公滅紀襄公之弒桓公五子爭立靈公滅萊崔慶之亂景公納燕伯景公納莒郊公田氏傾齊附陳他之亂卷十四宋殤公之弒閔公之弒昭公之弒桓族之亂子罕之賢華向之亂桓魋之亂景公滅曹大尹亂政卷十五衛州吁之亂惠公竊國文公定狄難寧武子弭晉難孫寧廢立靈公之立莊公出公父子爭國卷十六鄭莊公克叔段莊公入許厲公篡國穆公之立靈公僖公之弒西宮純門之難子産相國滅許高克曼滿石制駟秦之敗卷十七秦納芮取梁穆公霸西戎秦晉交伐卷十八楚武王伐隨屈瑕敗鄖敗絞伐羅文王滅息鄧敗蔡黃成王滅弦黃夔成王之弒穆王滅江蓼六子燮子儀子越之亂三王滅庸舒五令尹代政平王得國附靈王之篡卷十九吳楚吳通上國附季札讓國闔廬入郢卷二十楚吳越昭王復國白公勝之亂楚滅陳句踐滅吳臣等謹按春秋左傳屬事二十卷明傅遜撰遜字士凱太倉人嘗遊歸有光之門困頓場屋晚嵗乃以嵗貢授建昌訓導是書發端於其友王執禮而遜續成之倣宋建安袁樞紀事本末之體變編年為屬事事以題分題以國分傳文之後各櫽括大意而論之於杜氏集解之未安者頗有更定而凡傳文之有乖於世教者時亦糾正焉遜嘗自云傳中文義頗竭思慮特於地理殊多遺憾恨不獲遍搜天下郡縣志而精考之又云元凱無漢儒不能為集解遜無元凱不能為此注其用心深至而推讓古人勝於文人相輕者多矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋左傳屬事序史之體不一而編年其正也三代以前邈矣罕睹焉唯左氏發夫子筆削之㫖而著傳司馬君實奉英宗命而修通鑑上下二千餘年蓋灝乎無不苞矣司馬子長離腐刑之慘發其忿毒而為本紀世家列傳等言似重乎其人袁仲樞因通鑑以纂紀事本末似重乎其事至夫藝文類聚與錦繡萬花合璧事類等書似重乎其物吾嘗評之重乎人者慕古尚友考世之士斯多取焉重乎事者經世制變撥亂致理之士斯多取焉重乎物者則鉤句摘事攟托嫓偶之士斯多取焉是皆魁人墨士各任其志好攄幽發粹志實載往以流惠乎後人者也吾姻黨傅遜士凱氏少抱志略挫抑沉鬱於時用袁氏體纂左傳屬事以稍自露其長豫謂國語戰國策太史公八書已類是非始於袁氏也而士凱之所自負者尤在訓詁中自謂能革千載之訛豫觀其明簡雅核多以意悟於注家誠可稱善若祧廟七音筮短龜長數事皆探前人微㫖抉其疑似而暢衍之非漫為臆說也至辨髦下二如身雖已較勝舊說而士凱猶自懷疑從豫正之豫謂冠禮算位本如是特辨髦句於文氣覺拗然古人文字亦多有然者其他大者無慮百餘條小者數百皆去杜之舛以發左之意其有杜本無謬而為他說所詿誤者仍辨之以復於杜左氏之詭於正者亦以義裁之使無悖乎聖人之訓誠亦可謂卓爾不羣者矣㑹其左宦引歸貧不自聊亟欲此書之布於世數遺豫書曰公為序之既冕其首而尤附之翼也豫謂凡古之立言以圖不朽者孰不同是心哉顧其顯晦也似有數焉司馬史記今家藏士習好之甚於六經而更兩漢猶不顯獨楊惲以其自出能讀之耳韓昌黎文為七大家之冠或以配孟子亦更四百餘年至歐陽永叔而始大行是編也蓋不與二書侔然觀其比事而屬之也俱有意義焉如齊桓之霸始以鮑之薦管其不能勝楚也以子文晉悼之復霸始以荀罃之歸而其後之失霸也以范鞅諸臣之賄其他事事必指要陳詞昭為誡鑒務思有益於世非徒逞辨博摽竒麗為搦管濡翰之資已也有天下國家之責者俯而讀之其必㑹於𠂻而發其志智者多矣使世之君子惟榮顯之圖或雕蟲之是工則匪直是編諸古籍皆覆瓿類耳如以措大自任體國經治為懷則是編也將靡翼而橫飛矣序與不序也奚與乎豫惟重有望於天下之士焉爾吳郡王錫爵撰欽定四庫全書春秋左傳屬事序昔者夫子春秋成而三氏翼之左氏嘗及事夫子其好惡與之同而又身掌國史典故其事最詳而辭甚麗公穀二氏私淑之子夏而以能創義例有所禆益於經學士大夫多習之其為左氏而顯者漢丞相張蒼諸王太傅賈誼京兆尹張敞太中大夫劉公子丞相翟方進之屬賈誼至為之訓故然終不得與二氏並而中壘校尉劉歆始篤好之至移書太常博士明其屈幾用此獲罪其後獲竝立於學官而晉征南大將軍杜預深究晳其學復傳之而稱其或先經以始事或後經以終義或依經而辨理或錯經以合義自杜預之傳行而左氏彬乎粲然公穀反不得稱竝矣宋有胡安國者負其精識以為獨能得夫子褒貶之微意衷三氏而去取之自胡氏之傳行而三氏俱絀獨為古文辭者尚好左氏不能盡廢之而所謂好者好其語而已爾於是稱左史者舍經而言史大抵史之體有二左氏則編年而司馬氏乃紀傳世家編年者貴在事而紀傳世家貴在人貴在事則人或略而尚可推貴在人則事易復而於天下之大計不可以次第得然自司馬氏之紀傳行而後世之為史者亡所不沿襲當左氏時所謂晉之乘楚之檮杌以至魏之汲冢其簡者若倣經而詳者則為左其後奪於司馬氏雖有荀恱袁宏之類然不甚為世稱說而能法左氏之編年者司馬氏之後人光也光所著史曰資治通鑑其文雖不敢望左氏之精鑿要亦有以繼之而上下千餘年其事為年隔而不能整栗建安袁樞取而類分之名曰紀事本末而左氏其祖禰也顧未有若袁樞者出而吾鄉傅遜氏少有雄志博涉曉兵尤好推前代理亂大原謂左氏足以發其竒益覃思詳索而融貫其義用袁樞法而整齊之其大體先王室次盟主次列國次外夷取事之大者與國之大者比而小者附見焉不必如訓家之所謂張本為伏為應一舉始而終遂瞭然若指掌其它句為之故字為之考雖不能不資之杜氏而杜氏之有舛僻者亦掊而正之必使之無負乎左氏而後已故執杜氏以治左氏十而得入執傅氏以治左氏十不失一且也為杜而左者難為傅而左者易故夫傅氏者左氏之慈孫而杜氏之諍臣也漢之時左氏故不能大重如公穀而為之者如嚮所稱三張賈生輩皆通達國體而公穀之學公孫𢎞用以繩下而張湯傅為峻文決理又請用博士弟子治之者補廷尉史雖以董江都之賢而不能免於決事比之刻豈所謂屬事者多達而析義者易深耶使傅氏及是時而成此書令三張賈生者見之其有禆於漢治當何如也傅氏今雖尚墨墨守學官部使者已從守令科三論薦矣其將使之展而效之時哉吳郡王世貞撰欽定四庫全書春秋左傳屬事序古史之存寡矣唯左氏釋經以著傳故魯二百五十五年之史獨完而諸國事亦往往可以概見雖當世衰季篡弒攻奪蒸姣之醜不絶於篇而其間英臣偉士名言懿行猶足為世規准至戰陳射御燕享辭命卜筮皆非後世之所能及蓋以去古未逺而先聖之法尚有存焉故也然體本編年而紀載繁博或一簡而幾事錯陳或纍卷而一事乃竟或以片言而張本至巨或以微事而古典攸徴兹欲遡流窮委尋要領而繹㫖歸蓋亦難矣自司馬子長變古法以為紀傳世家等言而後之作史者卒不能易名編年者雖自荀恱以後無慮四十家而書不多存事無通㑹至宋司馬文正始粹一千三百六十二年之事以為通鑑而趙興智滅實以上接左氏襄子惎智伯事建安袁氏復因之以纂紀事本末使每事成敗始終之迹一覽而得讀史者咸便而葆之遜嘗欲祖其法以纂左傳事而先師歸熙甫謂當難於通鑑數倍遜頗悟其㫖取王敬文本蕆而成焉懼其事繁紊且遺也故於諸國事各以其國分屬而仍次第之於時王道既衰伯圖是賴故以伯繼周而凡盛衰盛衰離合大故皆使自為承續而不列於諸國之中以其文古須注可讀元凱好之自謂成癖而其集解乃多紕繆踈略或傳文未斷而裂其句以為之注如防川介山失其竒勝且意義亦難於㑹解遜故竟其篇章而總用訓詁於後并參衆說酌鄙意僭為之釐正焉又讀胡身之注通鑑時有評議以發明其事之得失輒慕而效之其是非或不大悖於聖人而微藴亦因以少見遜少好讀史兹傳雖以釋經而與後之言經者多抵牾難合故經不能強明而獨耽其文辭視以古史妄纂兹録名曰春秋左傳屬事頗自謂得古人讀史之遺意有助於考古者之便云然袁氏書為世所好而事多遺脫稍有錯誤若得為之補其遺正其誤而更益之以宋與元使數千百年成敗興衰之故皆得並論而詳列之豈非生平之一快也哉而未敢必其能與否也噫理難至當人莫自知以古人之賢猶不能無失矧遜於古人無能為役寧不百其失乎唯祈知言之君子不鄙而教之時皇明萬厯十有三年乙酉初夏日吳郡後學傅遜士凱自序欽定四庫全書春秋左傳屬事凡例一列諸國先後俱依經文事既分屬而小國以事交於某國者即附見於某國之中一纂事從題無題從類凡事與題稍相涉者因為附見以無遺古史之文一凡一事而宜分見兩屬者則置於所重之中而於其輕者則從節仍云詳見某處又有因事起事而於他事為要本事無與者則直置於他事而云餘見某處凡節文皆空一字以别於全文若有一二句從節者止空一字不復云詳見餘見一凡雖一事而歲月既久枝節自繁則於一題之內又分數題其年月亦因其內事以為先後如三桓弱公室小國交魯之類一有大事而中有數事不可分析者則於二事之交加一圈以别異之如隱公攝國晉楚爭伯之類一杜注於一事之始云為某事張本於終則云終某人之言今事既類聚故俱不用其云在某公幾年者今云在某事內一此編本為明達者之資故多總括其意以注而於字句或略焉以待觀者之自悟悟而得之則得之於心也固一凡名物度數不可以意求者則俱從詳且以備檢考焉一凡注或仍或革於必然無疑者則直解其中不復致辨其有疑似難析古制難辨必須詳考乃定深思方得者則於去取創見之際俱不敢苟故另為辨誤二卷以求正於博雅其或無可考據思之不得者則並存其說以并求正焉一有本不必注而先為杜注所謬者則亦解之以正其謬或見於辨誤中一左氏好以成敗論人凡於生死治亂之先必預為徴兆而後以事為應驗固有未必盡然者先儒譏之以誣當矣然於世教有補故皆因焉而有悖倫傷化之極者不得已而略評數語於中以明大義凡評議仍用小圈以别於訓注總評於後者則用大圈一傳中地名元凱皆釋以晉時所名今皆易以昭代之制古蹟晉有而今無者則加舊字以存疑未有考者姑闕前見者從略於其事有關係者仍從詳一杜於晉朝元皇后喪議太子應既葬除服故凡傳中喪制皆曲為強解以信其說先儒謂其巧飾經傳以附人情今注中悉為釐正一傳中於一人或以名或以字或以諡或以邑錯見於一事之中觀者卒難别識今於一人始見即詳其姓名字諡等庶使易曉一傳中多古字通用及竒字難識或以一字屢見若悉為音釋似覺太繁故另分部音釋附於辨誤之前一傳中有三代器名以形不明故義亦難解今皆考而圖其形并為好古者之一資
