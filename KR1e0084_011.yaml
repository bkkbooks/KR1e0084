body:
  text: 春秋左傳屬事卷十一明傅遜撰晉曲沃篡晉隱公五年春曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨夏六月曲沃叛王秋王命虢公伐曲沃而立哀侯于翼曲沃晉别封成師之邑今山西曲沃縣莊伯成師子也翼晉舊都今山西翼縣尹氏武氏皆周世族大夫隨晉邑哀侯翼侯之子光六年春翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯唐叔始封受懷姓九宗職官五正遂世為晉强家五正五官之長九宗一姓為九族也嘉父晉大夫鄂晉别邑桓王前立此侯之子於翼故别名鄂桓公二年初晉穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命太子曰仇弟曰成師始兆亂矣兄其㬱乎惠之二十四年晉始亂故封桓叔于曲沃靖侯之孫欒賔傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有二宗士有𨽻子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年晉潘父弒昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯伐翼弒孝侯翼人立其弟鄂侯鄂侯生哀侯哀侯侵陘庭之田陘庭南鄙啓曲沃伐翼傳因曲沃篡晉追記其始條晉地太子文侯也名仇意取攻戰相仇成師桓叔名意取能成其衆師服晉大夫言命名獲其宜而義禮政出焉由之以治易之則亂穆侯愛少子桓叔俱取於戰以為名所附意異師服知桓叔之後必盛於晉以傾宗國而預言之惠魯惠公晉文侯卒子昭侯立見桓叔强逼封之為曲沃伯靖侯桓叔之高祖父言得貴寵公孫為傅師服益知晉之將亡國諸侯家卿大夫側室衆子二宗小宗也皆於其中立官以自輔士以子弟為僕𨽻庶人無尊卑則以親踈為分别見貴賤皆有差不得以並嫡覬覦冀望也甸侯諸侯而在甸服者潘父晉大夫孝侯昭侯子莊伯桓叔子陘庭翼南鄙邑三年春曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右逐翼侯于汾隰驂絓而止夜獲之及欒共叔武公莊伯子韓萬莊伯弟御戎僕也右戎車之右汾隰汾水之次汾水源出岢嵐州經靈石至臨汾絳州滎河注于海驂絓哀侯之驂絓於木共叔欒賔之子賓傅桓叔共叔傅哀侯共殉所奉之主共叔并見獲而死七年冬曲沃伯誘晉小子侯殺之曲沃伯武公也小子侯哀侯子八年春滅翼曲沃滅之冬王命虢仲立晉哀侯之弟緡于晉虢仲王卿士虢公林父九年秋虢仲芮伯梁伯荀侯賈伯伐曲沃莊公十六年冬王使虢公命曲沃伯以一軍為晉侯曲沃武公遂并晉國僖王因就命為晉侯小國故一軍十八年春虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人王之覲羣后始則行饗禮先置醴酒示不忘古飲宴則命以幣物助歡敬宥助也雙玉為瑴侯而與公同賜是假人以禮以下附獻公除公族二十三年夏晉桓莊之族逼獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之桓叔莊伯之子孫强盛逼迫公室士蒍晉大夫富子二族之有謀而強盛者蒍假為羣公子謀以富子終為羣公子害因誣譖以罪羣公子不悟而去之二十四年秋晉士蒍又與羣公子謀使殺游氏之二子士蒍告晉侯曰可矣不過二年君必無患游氏二子亦桓莊之族二十五年秋晉士蒍使羣公子盡殺游氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子聚晉邑二十六年春晉士蒍為大司空夏士蒍城絳以深其宫絳晉所都在今山西太平縣南舊有晉城為蒍所築獻公滅虞虢桓公十年春虢仲譖其大夫詹父於王詹父有辭以王師伐虢夏虢公出奔虞虢國在今陜西寶雞縣虢仲虢公也王卿士詹父屬大夫有辭其辭直虞國在今河南虞城縣初虞叔有玉虞公求旃弗獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻之又求其寶劒叔曰是無厭也無厭將及我遂伐虞公故虞公出奔共池虞叔虞公弟賈買也旃之也及我禍將連及我共池地闕莊公二十六年秋虢人侵晉冬虢人又侵晉二十七年冬晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必弃其民無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也虢弗畜也亟戰將饑畜養也以禮樂慈愛教民所以預養戰勝之具讓事禮之極樂和樂之極愛親慈之極哀喪愛之極虢弗畜而力戰必自斃其力而饑三十二年秋七月有神降于莘惠王問諸內史過曰是何故也對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之王曰若之何對曰以其物享焉其至之日亦其物也王從之內史過往聞虢請命反曰虢必亡矣虐而聽於神神居莘六月虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽於神神聰明正直而一者也依人而行虢多涼德其何土之能得神降以聲接人莘虢地今河南陜州城有莘原神降之所過周大夫言四代興亡皆有神異享祭也物類也若以甲乙日至祭先脾玉用蒼服上青以比類祭之請命請命以土田祝太祝宗宗人史太史應區嚚皆名聽於民政順民心也聽神求福於神也依人唯德是與涼薄也閔公二年春虢公敗犬戎于渭汭舟之僑曰無德而祿殃也殃將至矣遂奔晉犬戎西戎别在中國者渭汭渭水之曲渭水源出臨洮府鳥鼠山東至咸陽華隂入河舟之僑虢大夫之僑於此智矣而後以違命為戮何哉僖公二年春晉荀息請以屈産之乘與垂棘之璧假道於虞以伐虢公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能强諫且少長於君君昵之雖諫將不聽乃使荀息假道於虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦唯君故今虢為不道保於逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宫之竒諫不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽先書虞賄故也荀息字叔屈地生良馬垂棘出美玉故以為名今山西石樓縣有屈産泉傳云有馬飲此泉而生龍駒即此馬也四馬曰乘自晉適虢途出於虞故假道今山西蒲州中條山有虞坂傳荀息由此假道外府言代我藏之耳宫之竒虞賢臣息謂虞君親而狎之必輕其言冀國今山西河津縣舊有冀亭顛軨虞地山西平陸縣舊有顛軨坂鄍虞邑攻其三門虞報伐冀使其國病將欲假道先稱其强以恱之逆旅客舍也虢稍遣人分依客舍以聚衆抄晉邊邑故問虢以何罪伐我虞喜於厚賂而欲求媚故請先晉不信虞故自主兵經先書虞惡其賄也下陽虢邑今山西平陸縣秋虢公敗戎于桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必易晉而不撫其民矣不可以五稔桑田虢地在今河南陜州東北鑒以自照驕則生疾稔熟也五年秋晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏於盟府將虢是滅何愛於虞且虞能親於桓莊乎其愛之也桓莊之族何罪而以為戮不唯逼乎親以寵逼猶尚害之況以國乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物如是則非德民不和神不享矣神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月甲午晉侯圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謡云丙之晨龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子朔晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢於王故書曰晉人執虞公罪虞且言易也晉定謀滅虞虢再假以伐竒知其謀故以輔車脣齒為喻輔車兩旁夾木也詩曰其車既載無弃爾輔太伯虞仲太王二子皆不從父命讓適吳母弟王季立後武王封虞仲庶孫為西吳虞公其後虢仲虢叔王季之子文王之母弟以周世次計太伯虞仲為昭二虢為穆仲虞本仲雍因子孫封虞而追稱之仲叔二虢始封君之字盟府司盟之府桓莊事見前據猶固也馨香之逺聞黍稷牲玉享與不享原於德之有無物一而用異故云不易臘歲終祭衆神之名上陽虢國都在今河南陜州東南卜偃晉卜大夫述童謡云云龍尾尾星日月之會曰辰日在尾故尾星伏不見均作袀袀服黑衣振振盛貌旗軍之旌旗鶉鶉火星也賁賁鳥星之體天策傅說星時近日星微焞焞無光耀也言丙子平旦鶉火中軍事有成也童齔未有感慮會成戲言若有馮者博覽懼思之士聞而兼志之以備鑒戒偃以此推之知九十月之交虢當滅蓋以夏時也交晦朔交㑹是夜日月合朔於尾月行疾故至旦而過在策秦穆姬晉獻公女送女曰媵以屈辱之虞祀虞所命祀驪姬之亂莊公二十八年晉獻公娶于賈無子蒸於齊姜生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心戎之生心民慢其政國之患也若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯說之夏使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦賈姬姓國齊姜武公妾大戎唐叔子孫别封在戎狄者小戎戎之别種子姓驪戎在今陜西臨潼縣有驪山驪戎城姬姓男其君之爵納女於人曰女外嬖寵臣梁姓五名東關居國東塞亦名五曲沃桓叔所封宗廟在焉蒲今山西蒲縣二屈一為今吉州一為今石樓縣有屈産泉旌章也伐功也廣莫曠絶也言以戎地之曠絶而在晉則為都其威逺樹宜闢土之廣獻公方好外略故以此恱之鄙居於邊也二耜相耦廣一尺共起一伐喻二人共墾傷晉室也閔公元年冬晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃士蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳太伯不亦可乎猶有令名與其及也且諺曰心苟無瑕何恤乎無家天若祚太子其無晉乎前王命以一軍為晉侯今獻公作二軍有廢太子心使將兵耿今山西河津縣東南有耿城霍今為霍州魏今為平陸縣北有魏侯城三國皆姬姓晉滅之餘見卿族廢興卿始有軍行將下軍故曰位以卿極無以加及禍及也無瑕精白也祚福也二年冬晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事也師在制命而已稟命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修己而不責人則免於難太子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要逺災親以無災又何患焉狐突嘆曰時事之徴也衣身之章也佩𠂻之旗也故敬其事則命以始服其身則衣之純用其𠂻則佩之度今命以時卒閟其事也衣之尨服逺其躬也佩以金玦弃其𠂻也服以逺之時以閟之尨涼冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有內讒不如違之狐突欲行羊舌大夫曰不可違命不孝弃事不忠雖知其寒惡不可取子其死之太子將戰狐突諫曰不可昔辛伯諗周桓公云內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也獻公廢太子之心已決再使將兵而尤示之意臯落赤狄别種今山西樂平縣有臯落山其地也里克申生傅冢大也兵尚專制宣威太子以孝為德故其事多悖命非其任故失官分妨其權故不威不對以言不經也克既以正諫君而又以孝勉太子於此盡其宜矣而惜乎後之不終也偏衣左右異色其半似公服玦如環而不連以金為之申生以太子將上軍狐突重耳外祖為之御先友為其右罕夷以卿將下軍梁餘子養為之御先丹木為其右羊舌大夫叔向祖尉軍尉先友以衣佩為吉偏半也玦主決故曰要分身之半為親故無慝威權在己可除害故逺災兼之則無患突嘆先友不知君心章顯也旌表也賞以春為始一其服為純𠂻中也世子珮瑜玉則合度今以冬十二月幽閉之義尨非純也金玦非度也涼殺寒離皆不祥之稱豈可恃以為安子養意與突同告於廟受師命宜於社受脤肉韋辨服軍之常尨偏衣也雜色竒怪非常之服待命者賜之玦則去故不復心害太子之心丹木亦知不吉周禮方相氏狂夫四人黃金四目𤣥衣朱裳執戈揚盾阻古作詛將服是服先詛之云必盡敵違避之也突欲太子他適羊舌勸太子死戰寒心薄惡不忠孝之惡名辛伯周大夫諗告也亂本以驪姬寵奚齊嬖也奉身為孝不戰為安民有功益見疑故云速禍據國語申生敗狄於稷桑而反讒言益起僖公四年初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長且其繇曰專之渝攘公之羭一薰一蕕十年尚猶有臭必不可弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂太子曰君夢齊姜必速祭之太子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城公殺其傅杜原款或謂太子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎太子曰君實不察其罪被此名也以出人誰納我十二月戊申縊于新城姬遂譖二公子曰皆知之重耳奔蒲夷吾奔屈公必欲立驪姬卜不吉而復筮龜筮本無長短卜人意在規諫故云筮短龜長繇卜兆辭渝變也攘奪也羭美也言專愛之則能使公心變而攘奪其美薰香草蕕臭草十年有臭言善易消惡難除也中大夫舊云里克恐非齊姜太子母公夢其求食姬欲讒太子而無由假以公夢使祭度必歸胙可致毒也墳起也毒食經宿輒敗豈能六日此明非太子毒公乃惑焉而不察或云以此自理君必辨太子以君愛姬甚而老矣不忍使姬得罪以傷君心又以蒙惡名不奔而縊新城曲沃也時二子在朝各奔其邑五年春晉侯使以殺太子申生之故來告初晉侯使士蒍為二公子築蒲與屈不慎置薪焉夷吾訴之公使讓之士蒍稽首而對曰臣聞之無喪而戚憂必讎焉無戎而城讎必保焉冦讎之保又何慎焉守官廢命不敬固讎之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘尨茸一國三公吾誰適從及難公使寺人披伐蒲重耳曰君父之命不校乃徇曰校者吾讎也踰垣而走披斬其袪遂出奔翟讓譴也蒍知公將廢太子而并及二子故預以為固讎所保而勸公修德以固宗子必讎必當之保保而守之詩大雅懷德以安則宗子之固若城尨茸亂貌公與二公子為三言城不堅則為所訴堅之則為固仇故不知所從祛袂也六年春晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁賈華晉大夫夷吾非不欲校力不能守不如重耳賢芮嫌與重耳同謀相隨以梁為秦所親幸秦既大國且穆姬在焉故欲因以求入九年秋九月晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦居無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人已乎冬十月里克殺奚齊于次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉㔻鄭亦晉大夫克黨三公子申生重耳夷吾藐弱小貌指奚齊卓子欲使保護之往死者居生者耦兩也送死事生兩無疑恨所謂貞也三怨三公子之徒能謂人已言不能止里克使不忠於申生等次喪次詩大雅斯言之玷荀息有焉惜其前失言也蓋息既從君於昏而許之以死則於義有不得不死者矣晉郤芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有從之齊隰朋帥師會秦師納晉惠公秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讎夷吾弱不好弄能鬬不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也郤芮郤缺父從夷吾欲乘二子弒謀歸得國言國非已有何愛而不以賂秦能得民不患無土隰朋齊大夫桓以稱伯故㑹秦納之芮又以無黨無仇微勸秦弄戲也不過有節也公孫枝奉大夫字子桑詩大雅帝天則法也言文王行由自然合天之法僭過差賊傷害也無此則可為人法多忌適以自害晉弱則秦强故曰吾利十年夏四月周公忌父王子黨會齊隰朋立晉侯晉侯殺里克以說將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死於是㔻鄭聘于秦且謝緩賂故不及忌父周卿士黨周大夫說自解非篡也㔻鄭克黨以在秦故不及其難晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓共太子申生諡下國國之東忽如夢相見狐突本申生御故使登為僕夷吾蒸於賈君故雖於申生改葬加諡而謂無禮請帝討之不見其象忽沒敝敗也韓晉地獨敝惠公故言罰有罪明不復以晉畀秦㔻鄭之如秦也言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宫山祁皆里㔻之黨也㔻豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君吕甥郤稱冀芮皆晉大夫不從不與秦賂也問聘遺蔑無也泠至秦大夫祁舉亦克黨周禮侯伯七命二車七人每車一大夫主之共華等七子也豹鄭子大主謂秦小怨里㔻也秦伯言能殺里㔻必得衆能出君必不奔十一年春晉侯使以㔻鄭之亂來告天王使召武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自弃也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世天王周襄王召武公周卿士內史過周大夫諸侯即位天子賜之圭為瑞幹言其立輿言其載於此知惠公之不終十三年冬晉荐饑使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼命之曰泛舟之役荐重也民攜無義以離其心也百里秦大夫豹欲為父報仇故請伐雍秦都臨渭水絳晉都臨汾水其粟自渭運入河汾故名泛舟十四年秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國沙鹿山在今北直𨽻元城縣卜偃晉卜大夫國主山川故崩而國幾亡冬秦饑使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰弃信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於冦不如勿與慶鄭曰背施幸災民所弃也近猶讎之況怨敵乎弗聽退曰君其悔是哉慶鄭虢射皆晉大夫共議秦乞糴鄭謂必宜與之射以皮喻所許秦地以毛喻糴言既背秦賂致怨已深今與之糴猶無皮而施毛也又言與秦粟不足解怨適足使秦强鄭以如此民雖近猶弃而仇我敵怨更深必自悔十五年晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脉僨興外彊中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其太子必得大成晉未可滅而殺其君祇以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕吕飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晉於是乎作爰田吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晉於是乎作州兵初晉獻公筮嫁伯姬於秦遇歸妹之暌史蘇占之曰不吉其繇曰士刲羊亦無衁也女承筐亦無貺也西鄰責言不可償也歸妹之暌猶無相也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敢于宗丘歸妹暌孤寇張之弧姪其從姑六年其逋逃歸其國而弃其家明年其死於高梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓背憎職競由人穆姬申生姊秦穆夫人也賈君獻公正妃賈女驪姬詛無畜羣公子故使納之中大夫國內執政里㔻等河外河南從河南而東盡虢界也華山在今陜西華州解梁今山西解州輸粟閉糴見本事徒父秦之掌龜卜者兼掌筮筮法用雜占不皆取易詞詞意云秦伯之車涉河則晉侯之車敗秦伯不解詰之周易巽下艮上蠱利涉大川往有事也亦秦勝之卦即此所云千乘三去三言蓋卜筮書雜詞雄君象狐狡媚故以謂晉君狐蠱必雄狐之誤內卦為貞外卦為悔巽為風秦象艮為山晉象周九月夏七月孟秋也艮為山山有木今歲已秋秋風既肅山木之實皆落材亦可取而用在秦則克在晉則敗晉以師禦秦於境三敗退秦逐之及於韓故云冦深鄭以公怒秦至此故云君實深之惡其訐不以為右步揚郤犨父鄭國馬名小駟公乘之鄭又諫以為必須自用其土産變變其常度易猶逆也狡戾也僨動也馬之氣血與脉交鬱而橫興外似强而內實乾竭必不能進退周旋於戎事韓簡晉大夫萬之孫狃狎也公以秦兵雖奮尤不可使之狎我而輕來定列定位也簡知師必敗恐死故以囚為幸韓原在今陜西韓城縣有古韓城濘泥也還便旋也小駟不調故墮泥中如慶鄭言輅迎也止獲也反首亂髮反下垂也拔茇同革舍止壞形毁服以示戚妖夢謂狐突不寐而遇申生帝許罰有罪之言踐實也以至以晉侯至其國也實聞此言懼其或變也罃康公名𢎞其母弟簡璧罃𢎞姊妹古之宫閉者皆居之臺以抗絶之穆姬外為惠公告罪而內為劫制之術故登臺而荐之以薪令上下者履薪乃通并率子女於其上若將以火自焚之狀免衰絰遭喪之服令行人服此服迎秦伯而且告以朝夕將死之言故不以晉侯入靈臺周之故臺亦以抗絶令不得通內外厚歸以厚獲而歸喪歸或夫人自殺也何有猶何得縶秦大夫聚慝恐晉侯歸而相聚為仇惡也祇適也史佚周武王太史名佚怙恃也恃人之亂為已利也郤乞晉大夫瑕吕飴甥即吕甥也姓瑕吕名飴甥字子金晉侯聞秦將許之平故告使迎已以危難欲收衆心故先賞之於朝二代也圉惠公太子懷公哭哀君不還也爰本􅧱易也以公田之肥美者易其臣之磽確者征賦也繕治也孺子圉也州兵使州長各繕甲兵五黨為州二千五百家也周禮卿大夫以歲時登其夫家之衆寡辨其可任者州長則否今以州長督察少而易精史蘇晉卜大夫兊下震上歸妹上六變而之暌兊下離上其繇爻辭衁血也貺賜也刲羊士之功承筐女之職上六無應所求不獲故下刲無血上承無實不吉之象兊為少女震為長男故稱士女將嫁女於西而遇不吉之卦故知有責讓之言不可報償歸妹女嫁之卦暌乖離之象故曰無相相助也震離二卦變而氣相通嬴秦姓姬晉姓震為雷離為火火動熾而害其母女嫁反害其家之象故曰為嬴敗姬輹車下縛也丘猶邑也震為車離為火上六爻在震則無應故車脫輹在離則失位故火焚旗言皆失車火之用也車敗旗焚故不利行師火還害母故敗不出國近在宗邑歸妹暌孤冦張之弧此暌上九爻辭處暌之極故曰暌孤失位孤絶故遇冦難而有弓矢之警皆不吉之象震為木離為火火從木生震變為離是姪從其姑之象謂子圉質秦也逋亡也弃家謂子圉弃婦懷嬴而歸惠公死之明年文公入殺懷公於高梁凡筮者用周易則其象可推若臨時占者或取於象或取於氣或取於時日王相以成其占必盡附㑹以爻辭則構虛而不經故略言其歸趣簡又因公恨而言龜以象示筮以數告象數皆緣物而生故可以知吉凶不可以變吉凶先君之德宜致敗而後有此凶數是敗已先定數其可及乎占之從不從無救於敗詩小雅言民之有邪惡非天所降僔沓面語背相憎疾皆人競所作因以諷諫惠公有以召此禍也竊謂簡論獻公之敗德是矣所論象數非也夫天地間有理斯有氣有氣而象數固已畢具乎其中矣物由以生豈緣物始有乎又豈有先後之分乎簡固淺乎為言而杜更繆用以解龜筮之長短諸書又多引以為徴何皆陋也十月晉隂飴甥會秦伯盟于王城秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是歲晉又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者於是秦始征晉河東置官司焉隂飴甥即吕甥食采於隂王城秦地在今陜西臨晉縣境舊有王城甥欲秦歸晉侯詭言國人之情皆忠愛於其君一役統戰韓而言德刑並用可伯也牛羊豕各為一牢將歸之故厚其禮蛾析晉大夫陷君謂君號鄭而鄭去之也殺而後入見忮忌終不化也晉國河東秦國河西征賦也置官司越河而有之也十七年夏晉太子圉為質於秦秦歸河東而妻之惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉懷子曰孕過期過十月不産卜招父梁太卜圉飬馬者不聘曰妾宦事秦為妾二十二年秋晉太子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸弃君命也不敢從亦不敢言遂逃歸嬴氏秦所妻子圉懷嬴也婢子婦人之卑稱巾以帨手櫛以理髮二十三年九月晉惠公卒懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服已則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有懷公圉也亡人重耳期期示之期而至其期也弗召乃心重耳故䇿名書名於所臣之策質贄通臣始見君必有贄周書康誥言君能大明則民服晉公子重耳之及於難也遂奔狄過衛及齊及曹及鄭及楚乃送諸秦詳見晉文公之伯二十四年春王正月秦伯納之不書不告入也濟河圍令狐入桑泉取臼衰二月甲午晉師軍于廬栁秦伯使公子縶如晉師師退軍于郇辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫戊申使殺懷公于高梁不書亦不告也吕郤畏逼將焚公宫而弒晉侯寺人披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濱女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鈎而使管仲相君若易之何辱命焉行者甚衆豈唯刑臣公見之以難告三月晉侯濳㑹秦伯于王城己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衛於晉三千人實紀綱之僕不告不告於魯餘見文公之伯濟河秦納重耳之師令狐今山西猗氏縣桑泉今臨晉縣有桑泉城臼衰在今解州東南舊有臼城晉師懷公遣拒重耳之師受穆公命而退郇在解州西北武宫武公之廟懷公奔重耳使殺之高梁在今北直𨽻寧晉縣境吕甥郤芮惠公舊臣畏為文公所逼害辭辭不見田獵也袪猶在言披所斬之袂尚在不忘也余何有言當二君世君為蒲狄人耳於我有何義射鈎管仲射桓公中帶鈎何辱命言若反齊桓已將自去不煩君命披奄人故稱刑臣以難告告吕郤將焚公夫人秦穆女文嬴也以新有吕郤之難國未輯睦故以兵衛之紀綱言能總攝可任也吕甥忠智所事非人而不獲終傷哉初晉侯之豎頭須守藏者也其出也竊藏以逃盡用以求納之及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣僕人以告公遽見之豎左右小吏頭須一曰里鳧須出公出納納公心主謀畫既覆則所圖謀者亦反遽惶遽也言文公弃小怨所以能安衆晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人唯君在矣惠懷無親外內弃之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎竊人之財猶謂之盜況貪天之功以為已力乎下義其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人介之推文公從臣蒙欺也知之欲以達於公也綿上在今山西介休縣有山名介山有介廟獻公任用智勇滅國拓疆晉之强也實自公始誠亦可稱雄傑之主矣特以嬖愛驪姬廢長立幼以至國亂纍世子孫交殺幾盡自古不能克情制欲耽昵袵席功業雖高而不獲令終者多矣豈特一獻公哉噫此誠正修齊之訓亘萬世而莫能易也歟并諸戎狄僖公八年晉里克帥師梁由靡御虢射為右以敗狄于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月采桑在今山西太寧縣境舊有采桑津此前事也靡言狄不恥走故可逐克恐怨深而羣黨來報射料以見弱必來十六年秋狄侵晉取狐厨受鐸涉汾及昆都因晉敗也狐厨受鐸昆都晉三邑今山西臨汾縣舊有狐谷亭汾水出太原南入河敗韓原之敗二十二年秋秦晉遷陸渾之戎于伊川詳見景王讓晉二十八年冬晉侯作三行以禦狄三十一年秋晉搜于清原作五軍以禦狄清原今山西稷山縣境舊有清原為文搜軍之地三十三年夏狄侵齊因晉喪也喪文公薨故秋狄伐晉及箕箕今山西太谷縣東有箕城八月戊子晉侯敗狄于箕郤缺獲白狄子白狄狄别種也詳見卿族廢興宣公六年秋赤狄伐晉圍懷及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也周書曰殪戎殷此類之謂也懷今為河南武陟縣邢丘在今懷慶府城東驕則數戰為民所疾以索穿物曰貫惡之多如物之盈於貫殪殺也周書康誥戎大也蓋言武王使殷王之罪稔而滅之七年夏赤狄侵晉取向隂之禾晉用桓子謀故縱狄十一年夏晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉秋會于櫕函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非德莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤況寡德乎攢函狄地有繼其功可繼也從從衆狄也詩周頌言文王勤以創業十三年秋赤狄伐晉及清十五年夏潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之諸大夫皆曰不可酆舒有三俊才不如待後之人伯宗曰必伐之狄有五罪俊才雖多何補焉不祀一也耆酒二也弃仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其俊才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之潞子國今山西潞州有潞城酆舒潞之相俊絶異也仲章潞賢人黎氏黎侯國今為山西黎城縣有黎侯城命天命也文字也乏古文作五正本射侯正以受矢五以御矢是相反也五言矢於此匱乏不去也此反正是乏絶之道曲梁今永年縣秋七月壬午晉侯治兵于稷以略狄土立黎侯而還稷今山西稷山縣西有稷神山略定其疆也前狄奪黎氏地故晉復立之晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職說是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫載周能施也率是道也其何不濟荀林父諡桓子字伯千室千家也桓子與楚戰邲而敗晉侯將殺之士伯諫止故并賞瓜衍闕職叔向父周書康誥庸用也祗敬也物事也言文王能用可用敬可敬詩大雅言文王布陳大利以錫天下故能行周道福流子孫林父敗軍之將幸而不死避楚之强而苟以闢土於狄庶可免罪耳晉侯之賞已過而以文王事比之大不侔矣十六年春晉士㑹帥師滅赤狄甲氏及留吁鐸辰鐸辰留吁之屬餘見卿族廢興成公三年秋晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰上失民也晉滅赤狄其民散入牆咎如故討之九年冬秦人白狄伐晉諸侯二故也十二年夏狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛晉楚為成故盟宋交剛地闕昭公元年夏晉中行穆子敗無終及羣狄于太原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之太原即大鹵今山西太原縣無終山戎今北直𨽻玉田縣崇尚也魏舒以車利平地步利險阻故言彼徒我車所遇又厄將何以勝若更十人以當一車之用則步兵多既可克遇險則步兵利又可克前此車步參用未有皆用卒者今自我創始皆卒乃毁車為步陳乘車者三人五乘十五人今改去車更以五人為伍分三伍因斬主將之嬖人違命者以徇布列五陳以相逺於前為兩於後為伍右角為專左角為參前拒為偏其名臨時所定翟人笑其失常猶未陳為晉人所薄大敗徒步也厄險也傳言苟吳能用善謀十二年六月晉荀吳僞會齊師者假道於鮮虞遂入昔陽鮮虞白狄别種今為北直𨽻新樂縣有鮮虞亭昔陽今山西清源縣有昔陽城秋八月壬午滅肥以肥子綿臯歸肥白狄也今為北直𨽻盧龍縣有肥兒國綿臯名冬晉伐鮮虞因肥之役也十三年八月鮮虞人聞晉師之悉起也而不警邊且不修備晉荀吳自著雍以上軍侵鮮虞及中人驅衝競大獲而歸晉平丘之㑹甲車四千乘故為悉起不警不為備夷狄無謀也中人戎地今北直𨽻慶都縣境舊有中人城衝衝車競爭逐也驅衝車與敵人爭逐十五年秋晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒弃舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸荀吳諡穆子鼓白狄之别今北直𨽻晉州舊名鼓城所適所歸也賈買也完保守也卒終也爽差也義所義之所在也䳒鞮鼓子名穆子於此風彩差可畏愛十七年秋晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文宫屠蒯晉之膳宰以忠諫進雒雒水在洛陽三塗山在嵩縣陸渾戎其地即嵩縣警備警戒以備戎欲因晉勢以獲戎俘也棘津在北直𨽻棗强縣境有棘津城甘鹿周地大獲因先警備也以文公示夢故獻俘以告成二十二年晉之取鼓也既獻而反鼓子焉又叛於鮮虞六月荀吳略東陽使師僞糴者負甲以息于昔陽之門外遂襲鼓滅之以鼓子䳒鞮歸使涉他守之獻獻於廟叛叛晉而屬鮮虞東陽晉之山東邑今北直𨽻河間府其地僞糴詐為將販糴於鼓昔陽鼓子所都守守鼓地也定公三年秋九月鮮虞人敗晉師于平中獲晉觀虎恃其勇也平中晉地恃勇輕敵故被獲五年冬晉士鞅圍鮮虞報觀虎之役也長狄之亡附文公十一年秋鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御皇父充石公子穀甥為右司冦牛父駟乘以敗狄于長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耐班使食其征謂之耐門晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首於周首之北門衛人獲其季弟簡如鄋瞞由是遂亡鄋瞞北方長狄國名人長三丈防風氏之後漆姓得臣諡莊叔侯叔夏綿房甥富父終甥皆魯大夫四人共車故曰駟乘僑如鄋瞞之君摏猶衝也狄長戈短蓋遙擲戈以衝之子駒魯郭門埋首於此骨節非常恐後世怪之故詳其處得臣命其子名僑如以自志其功宣伯僑如諡伐宋事在春秋前皇父戴公子充石其名耐班穀甥牛父皆宋大夫亦四人同乘長丘宋地緣斯亦狄名皇父二子從軍偕戰死應受賞傳失記至後皇瑗皇緩猶其後也賞耐班使食關門之租因以名門齊襄誤本惠公也惠之二年為魯宣之二年在滅潞十三年前成父齊大夫榮如焚如之弟周首齊地簡如伐齊退走至衛見獲長狄之種遂絶春秋左傳屬事卷十一
