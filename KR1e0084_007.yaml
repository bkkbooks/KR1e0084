body:
  text: 春秋左傳屬事卷七明傅遜撰魯隱公攝國惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨是以隱公立而奉之元妃始嫡夫人子宋姓不稱薨不成喪也無諡先夫死不得從諡諸侯始娶同姓之國以娣姪媵元妃死次妃攝治内事不得稱夫人謂之繼室聲諡也藎孟子之姪娣也婦人謂嫁曰歸宋以仲子手理自然成字有若天命故嫁之於魯隱公繼室之子當嗣世以禎祥之故追成父志為桓尚少故立為太子帥國人奉之隱公元年春王周正月不書即位攝也周正月夏之十一月也公假攝君政不修即位之禮故史不書三月公及邾儀父盟于蔑邾子克也未王命故不書爵曰儀父貴之也公攝位而欲求好于邾故為蔑之盟邾曹姓附庸國儀父其君之字克名也後服事齊桓以奬王室王命為邾子至魯繆公改為鄒時王未賜命故不爵能自通於大國故貴以字魯都曲阜今山東兖州府其地邾今為鄒鄒平縣比壤故求好蔑魯地今泗水縣境一名姑蔑舊有姑城秋七月天王使宰咺來歸惠公仲子之賵餘見王朝交魯惠公之季年敗宋師于黄公立而求成焉九月及宋人盟于宿始通也黄今在河南把縣有外黄城宿小國山東東平州境冬十月庚申改葬惠公公弗臨故不書惠公之薨也有宋師太子少葬故有闕是以改葬衞侯來㑹葬不見公亦不書公以桓為太子故讓不為䘮主衞侯㑹葬非禮鄭人以王師虢師伐衞南鄙請師于邾邾子使私於公子豫豫請往公弗許遂行及邾人鄭人盟于翼不書非公命也新作南門不書亦非公命也豫魯大夫私私請師翼邾地南門南城門十二月衆父卒公不與小斂故不書日衆父公子益師字禮卿佐之䘮小斂大斂君皆親臨之崇恩厚也公於禮有闕故不書日以示慢國累有大事而非公命或不與皆公之不立也三年夏君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏夫人䘮禮有三薨則赴于同盟之國一也既葬日中自墓反虞於正寢所謂反哭于寢二也卒哭而祔于祖姑三也若此則書曰夫人某氏薨葬我小君某氏此備禮之文也其或不赴不祔則為不成䘮故死不稱夫人薨葬不言葬我小君某氏反哭則書葬不反哭則不書葬今聲子三禮皆闕不書姓辟正夫人也隱見為君故特書于經稱曰君氏以别凡妾媵四年春衞州吁弑桓公而立公與宋公為㑹將尋宿之盟未及期衞人來告亂夏公及宋公遇于清聞衞亂簡禮清今為山東東阿縣舊有清亭宋公陳侯蔡人衞人伐鄭圍其東門秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也羽父翬字其無君已兆於此餘詳見衞州吁之亂與宋襄公之弑五年春公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也魚漁通魚獵事相近僖伯公子彄諡言人君宜親獵不宜親魚蓋君以匡民而軌物匡之之具尤必以身為之率故舉動不可以輕其舉也以旌旗矛㦸之物於祀戎大事而講之以准度軌法度量因取鳥獸皮革齒牙等材以章明物色采飾則軌物以彰而國家斯治不然是謂亂政而敗亡由之故既於四時之隙以蒐苗獮狩而復有治兵振旅飲至之禮取其材以為祭祀軍國之需皆先王所制以防亂也故必是慎蒐索也擇取禽獸之不孕者苗為苗除害也獮殺也以順秋氣狩圍守也冬物畢成獲則取之無所擇也三年大習出曰治兵始治其事畢則整衆而還振整也旅衆也飲於廟以數車徒器械及其獲也君大夫士車服旌旗各有文章故曰昭田獵之制貴者先殺賤者以次居後故曰明列上下之等明坐作進退故曰辨出則少者在前趨敵之義還則少者在後殿師之義故曰順威可畏儀可象故曰習登爼以供祭祀登器以為采飾不射不親射實菱芡魚鱉之類資資以為用皁𨽻言㣲賤官司言職守公重違正議遜詞以略地為名如棠設捕魚之備觀之棠今山東魚臺縣有觀魚臺竊謂隱固不君矣然周頌云有鱣有鮪鰷鱨鰋鯉以享以祀禮經月令云天子乗舟薦鮪于寢廟則魚亦登於爼而君亦親之者豈僖伯志在匡諫姑舉其大而舎其細耶九月考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也禮諸侯無二適孟子入惠公之廟仲子祭享無所隱以桓故别立廟而祀之既成安其主而祭之曰考萬舞也羽數執羽人數舞有二武則左執朱干右秉玉戚文則左執籥右執翟翟即羽也以仲子婦人無武事故獨奏文樂而用羽衆仲魯大夫用八八八六十四人六六八四十八人四四八三十二人二二八十六人八音金石絲竹匏土革木八風八方之風也以八音之氣播八方之風手舞足蹈節其制而敘其情唯樂原於八故自天子至士雖有等殺而皆以八魯止文王周公廟得用八後他公遂因而僣用之今隱公特立婦人廟因問仲而用六佾佾舞列也八音金鐘石磬絲琴瑟竹簫管土塤木柷敔匏笙革鼓也八方之風謂東方谷風東南清明風南方凱風西南涼風西方閶闔風西北不周風北方廣莫風東北融風宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也古者鄰國有急以策書告命公知邾鄭兵深入宋郭以為憂而使者尚有鄰敵疑忌之心隱實以對故公怒以其所對與求捄之㫖殊别而止冬十二月辛巳臧僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等諸侯稱同姓大夫長曰伯父少曰叔父有憾恨諫觀魚不從一等加常禮一等六年春鄭人來渝平更成也渝變也公之為公子與鄭戰于狐壤為所執逃歸怨鄭故厚宋今鄭窺知公怒宋故因來求成以變宋之成夏盟于艾始平于齊也春秋前魯與齊不平故云始艾在今山東沂州西有艾山七年夏齊侯使夷仲年來聘結艾之盟也秋宋及鄭平七月庚申盟于宿公伐邾為宋討也公距宋更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以悅宋八年春鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也成王營王城有志遷都故賜周公近許之田以為朝宿地後世因立周公别廟焉又王時巡狩至泰山鄭桓公以宣王母弟故賜其旁祊邑令助祭泰山為湯沐邑時鄭以天子不能復巡狩魯亦不復朝周故欲以祊易許田各從本國所近恐魯以周公别廟為疑故云已廢泰山之祀而為魯祀周公遜辭以有求也宛鄭大夫祊屬山東費縣境夏四月齊人卒平宋衞于鄭冬齊侯使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明徳圖相圖也鳩安集也無駭卒羽父請諡與族公問族于衆仲衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏無駭卒應賜諡又先未有族故翬為請之公以諡不必問惟問所以為族者衆云天子位尊立有徳以為諸侯因其所生之地以賜之姓禄之土田而因命之以為氏諸侯位卑不得賜姓唯以其臣之字為之氏遂以為族如有能世其官者即以其官為族或食於其邑者以邑為族故公取無駭之字展以為其子孫之氏氏族一也諡氏音之訛賜姓賜氏若舜由媯汭故媯姓封陳而氏曰陳者是其類也官族若司馬司空之類邑若韓趙范魏之類魯後有展禽展喜無駭之後也若魯三桓鄭七穆等皆以公子為宗其孫以王父字為氏亦皆以字而與無駭不同九年夏宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公㑹齊侯于防謀伐宋也不王不供王職也公前雖不救宋猶未忘宋好前為伐邾以說宋宋尚怨公不告鄭伐故公絶其使鄭乘是隙以王命來告公遂與齊謀伐之防魯地曲阜縣境有防山公先與邾盟繼與宋盟既以宋故伐邾又以鄭故伐宋誠二三其徳矣十年春王正月公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期夏五月羽父先㑹齊侯鄭伯伐宋中丘在今沂州境鄧亦魯地師期出師之期先㑹非公本期也餘見桓王伐鄭翬於伐鄭伐宋無君之心炳如矣而公略不忌焉何其懵哉十一年冬羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營莵裘吾將老焉羽父懼反譖公于桓公而請弑之公之為公子也與鄭人戰於狐壤止焉鄭人囚諸尹氏賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弑公于寪氏立桓公而討寪氏有死者不書葬不成䘮也公本意立桓翬乃欲殺桓為己功既知公意復譛公欲害桓而弑之菟裘魯邑在今山東泗水縣境舊有菟裘聚不欲復居魯朝故别營外邑内諱獲故言止狐壤鄭地尹氏鄭大夫鍾巫尹氏所祭之主禱之求歸既歸立其主祭之此將祭而齊遇弑寪氏魯大夫翬以弑君之罪加寪氏而免已討桓弑隱簒立故䘮禮不成桓公元年春公即位脩好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也夏四月丁未公及鄭伯盟于越結祊成也盟曰渝盟無享國冬鄭伯拜盟魯不宜聴鄭祀周公又不宜易取祊田犯二不宜以動故言若進璧以假田非乆易也垂越衞地結祊成結成易二田之事也十七年春及邾儀父盟于趡尋蔑之盟也秋伐邾宋志也趡魯地桓既簒隱位事皆踵其跡而終之以取媚于鄰國隠公追成父志以國讓弟而自居於攝雖未協之至正猶藹乎古之遺厚焉特以威信不立而馭臣交鄰俱失其道至羽父邪謀又不能亟斷而立誅乃遭凶殞其禍豈在讓乎而後之議者乃謂讓國以生亂何不達也且七代之君其蓄猜窮忍戕害本支極矣而覆亡更速焉何哉文姜之亂附莊公忘讐桓公三年春㑹于嬴成昏于齊也嬴齊邑今山東泰安州境公自與齊侯㑹而成昏非禮秋公子翬如齊逆女脩先君之好故曰公子齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之冬齊仲年來聘致夫人也古者婚禮雖奉時君之命其言必稱先君以為禮辭女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故以致夫人釋之翬固弑逆之賊豈以逆昏而遂以公子貴之乎六年秋九月丁夘子同生以太子生之禮舉之接以太牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以徳命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同禮世子生以太牢之禮接見之三日卜其士之吉者負之射人以桑弧蓬矢射天地四方卜士之妻為乳母三月君夫人沐浴于外寢立于阼階西向世婦抱子升自西階君命之名乃降皆以重適也太牢牛羊豕禮言世婦兩媵也此宗婦同宗之婦申繻魯大夫以生若唐叔虞魯公子友以徳若文王名昌武王名發以類若孔子象尼丘名丘取物若伯魚生人有饋鯉因名鯉取父若子同生與父同者其諸國國號及夫官職至於山川與隠痛疾病六畜犠牲器用玉帛皆不以名蓋諱禮始於周人死曰終名終曰諱自父至高祖皆不敢斥名故當預有所避廢名以國不可廢故也廢職若晉僖公名司徒故廢之改為中軍宋武公名司空廢之而為司城廢主謂易其名具敖二山也魯獻公名具武公名敖更以其鄉名山廢祀謂名豬則廢豬名羊則廢羊廢禮以諱其名而不用其器帛不得成禮也隠疾避不祥也物類也同同日也十七年春盟于黄夏及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆場之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉黄齊地盟與齊盟奚魯地一畫一之故界不虞忽至之敵兵事兵事也方盟而即侵齊襄之無良也十八年春公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乘公公薨于車魯人告于齊曰寡君畏君之威不敢寧居來脩舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生時姜氏父母已卒義無歸寧乃欲如齊公不能制與之偕行故申繻諫云男女各安其室家無相瀆亂禮也無禮必敗公果有淫弑之慘濼水在山東歴城縣西源自温泉而北達於河除除恥辱之惡也於此而猶受其享與其臣同乘桓之魄奪矣豈以弑兄惡大故假手於淫兇乎莊公元年春不稱即位文姜出故也三月夫人孫于齊不稱姜氏絶不為親禮也秋築王姬之館于外為外禮也文姜與桓俱行而桓為齊所殺故不敢還莊公父弑母出故不忍行即位之禮魯臣子於姜女為不共天之仇然以母故則宜絶之禮天子嫁女諸侯使同姓國主之此魯主昏與齊因䘮故于外忘仇而為之主昏䘮心甚矣而傳謂之禮不大謬乎二年冬夫人姜氏㑹齊侯于禚書姦也禚齊地一云濟南府未詳三年春溺㑹齊師伐衞疾之也溺魯大夫疾其㑹仇讐伐同姓也六年冬齊人來歸衞寳文姜請之也公親與齊共伐衞事畢而還文姜淫于齊侯故求其所獲珍寳使以歸魯欲說魯以謝慙七年春文姜㑹齊侯于防齊志也八年春治兵于廟禮也夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不徳齊師何罪罪我之由夏書曰臯陶邁種徳徳乃降姑務修徳以待時乎秋師還君子是以善魯莊公慶父以齊不與共功故欲伐之公引徳以自止書稱臯陶能勉種其徳為人所降莊公既從母亂又忘父深仇與之㑹盟伐國而復受其侮無人心矣而乃假虚言以自文君子何善之有魯與邾莒之怨閔公二年秋八月辛丑共仲使卜齮賊公于武闈奔莒以賂求共仲於莒莒人歸之共仲公子慶父也齮卜大夫名賊弑也武闈宫中小門詳見三桓弱公室僖公元年秋九月公敗邾師于偃虚丘之戍將歸者也虚丘邾地戍之欲以侵魯既不克歸公邀而敗之其事始末不見經傳蓋有闕文杜註臆説孔疏亦言其無據故不取冬莒人來求賂公子友敗諸酈獲莒子之弟挐莒以歸慶父為已功故求賂友敗而獲之酈魯地詳見三桓弱公室二十一年任宿須句顓臾風姓也實司太皥與有濟之祀以服事諸夏邾人滅須句須句子來奔因成風也成風為之言于公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皥濟而修祀紓禍也任今為山東鉅野縣宿已前見顓臾今山東費縣有顓臾城須句今為山東東平州太皥伏羲也四國皆其後故主其祀司主也近濟水因并祀之以與諸夏同服王事成風須句女也保安也蠻夷謂邾迫近諸戎雜用夷禮故極言之猾亂也紓解也二十二年春伐邾取須句反其君焉禮也得恤小寡之禮秋邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天維顯思命不易哉先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而況國乎弗聴八月丁未公及邾師戰于升陘我師敗績邾人獲公胄懸諸魚門詩小雅言常懷戒懼又詩周頌顯明也思助辭言有國宜敬戒天明臨下奉承其命甚難升陘魯地胄兜鍪魚門邾城門縣之以辱公三十三年夏公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾文公七年春公伐邾閒晉難也三月甲戌取須句寘文公子焉非禮也時晉襄公卒故為難閒猶乘也邾文公子叛在魯公使守須句絶太皥之祀以與鄰國叛臣非禮十三年夏邾文公卜遷于繹史曰利于民而不利于君邾子曰苟利于民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命繹邾邑今山東鄒縣繹山其地命已定于天不遷繹亦卒邾子以利民為急而不以死生二其心所謂知命也十四年邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉秋晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還定公名貜且成公十八年八月邾宣公來朝即位而來見也襄公元年九月邾子來朝禮也冬衞子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也禮以安國家利社稷為本四年夏穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子貟問之曰子以君命辱于敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮于周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜穆叔叔孫豹諡金奏擊鍾而奏也肆夏之三肆夏樊遏渠吕叔玉云肆夏時邁也樊遏執競也渠思文也皆周頌工樂人文王之三大雅之首文王大明緜小雅之首鹿鳴四牡皇華獻子名起行人通使之官肆夏文王為樂之大而鹿鳴為小故以疑穆子之拜元侯牧伯肆夏之三皆昭周之令徳受景福於天故以享元侯文王之三皆稱文王之徳受命作周故諸侯㑹同以相樂鹿鳴取其我有嘉賔以儗叔孫奉命而來叔孫歸徳于君故云嘉寡君四牡騑騑勤行不止晉以叔孫來聘故以此勞之皇華君遣使臣之詩言能光輝君命如華之皇皇然又當諮於忠信以補己之不及忠信為周其言曰周爰諮諏周爰諮謀周爰諮度周爰諮詢言必忠信之人諮此四事咨咨于善也親戚故云詢禮儀故云度政事故云諏患難故云謀此見叔孫善于使而魯與晉通好蓋難起於鄫也冬公如晉聴政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇于仇讎而願固事君無失官命鄫無賦于司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之鄫今為山東嶧縣聴政受貢賦多少之數以魯不能供其政而鄫小國也故請欲以鄫屬如須句顓臾之比以自助仇讐齊楚也官命徴發之命司馬掌諸侯之賦冬十月邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘國人逆喪者皆髽魯於是乎始髽國人誦之曰臧之狐裘敗我于狐駘我君小子朱儒是使朱儒朱儒使我敗于邾臧紇字武仲狐駘邾地髽麻髪合結也時戰亡遭䘮者多不能備凶服髽而已狐裘紇時所服襄公幼弱故曰小子臧孫短故曰朱儒五年夏穆叔覿鄫太子于晉以成屬鄫書曰叔孫豹鄫太子巫如晉言比諸魯大夫也九月丙午盟于戚穆叔以屬鄫為不利使鄫大夫聴命于㑹屬鄫本以假助而邾莒方共虐鄫魯數救之反為國病且恐致罪故豹辭歸于晉六年秋莒人滅鄫鄫恃賂也冬穆叔如邾聘且修平晉人以鄫故來討曰何故亡鄫季武子如晉見且聴命鄫有貢賦之賂于魯恃之慢莒故為莒所滅武子代父為卿見伯國且謝亡鄫聴命受罪八年五月莒人伐我東鄙以疆鄫田莒滅鄫魯侵其西界故于此正其封疆十年秋莒人閒諸侯之有事也故伐我東鄙事討鄭之事十二年春莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤台魯邑今山東費縣舊有台亭乘勝故云遂鄆莒邑今鄆城縣十五年秋邾人伐我南鄙使告于晉晉將為㑹以討邾莒晉侯有疾乃止冬晉悼公卒遂不克㑹十六年春葬晉悼公平公即位㑹于湨梁以我故執邾宣公莒犂比公且曰通齊楚之使湨梁事詳見晉平楚康爭伯犂比莒子號邾莒在齊楚往來道中故并以此為責十七年冬邾人伐我南鄙為齊故也是秋齊伐魯未得志故邾助之十九年春諸侯還自沂上盟于督揚執邾悼公以其伐我故遂次于泗上疆我田取邾田自漷水歸之于我還自伐齊沂水源出今山東尼山之麓西流入泗水泗源自陪尾山四泉並發循泗水縣北合為一晉正邾魯之界以邾田在漷水之北者與魯漷水在南直𨽻沛縣東北出山東滕縣界入潮陽泗水二十年春及莒平孟莊子㑹莒人盟于向督揚之盟故也因盟以和解之故二國復自共盟以結好邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之二十一年春公如晉拜師及取邾田也邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜于其從者於是魯多盗季孫謂臧武仲曰子盍詰盗武仲曰不可詰也紇又不能季孫曰我有四封而詰其盗何故不可子為司冦將盗是務去若之何不能武仲曰子召外盗而大禮焉何以止吾盗子為正卿而來外盗使紇去之將何以能庶其竊邑于邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盗禮焉以君之姑姊與其大邑其次皁牧輿馬其小者衣裳劍帶是賞盗也賞而去之其或難焉紇也聞之在上位者洒濯其心壹以待人軌度其信可明徵也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由已壹也信由已壹而後功可念也庶其非卿也以地來雖賤必書重地也庶其邾大夫漆閭丘邾二邑皆在今山東嵫陽縣境舊有漆鄉顯閭鄉詰治也武仲深病季孫之過厚庶其及其僕從為賞盗故極云盗不可治洒濯精白無私慾也壹誠也明徴其軌法以信而明白可徴也夏書禹謨謂行此事當念使可施于此釋除也謂欲有所除治于人亦當顧已得無有之名此事言此事亦皆當令可施于此允信也信出于此則善亦在此此帝舜所以念其功者謂皆由已誠壹而後功可念非徒責之人也武仲之論詰盗聖人之徒不是過矣二十八年夏邾悼公來朝時事也三十一年冬莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立去疾奔齊齊出也展輿呉出也書曰莒人弑其君買朱鉏言罪之在也犂比名密州字買朱鉏展輿以既立而廢乘國人之怨弑之而自立去疾其兄齊之甥也罪在罪在鉏也無據傳則展輿實弑其父而言罪在于鉏則弑父乃謂罪乎誖義甚矣昭公元年春㑹于虢晉楚成而為㑹詳見晉楚為成三月季武子伐莒取鄆莒人告于㑹楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨于叔孫而為之請使請帶焉弗與梁其踁曰貨以藩身子何愛焉叔孫曰諸侯之㑹衞社稷也我以貨免魯必受師是禍之也何衞之為人之有牆以蔽惡也牆之隙壞誰之咎也衞而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也莒魯争鄆為日乆矣苟無大害于其社稷可無亢也固請諸楚乃免叔孫季孫前入鄆此復取尋盟尋弭兵之盟瀆慢也其使叔孫豹時在㑹故請戮之桓子樂王鮒諡難指求貨故以帶為辭其踁叔孫家臣藩猶䕶也豹喻己為國衞如牆為人蔽隙壊猶咎在牆又惡之罪益甚矣出出使處處守褊小也言帶狹小故裂裳偽若不解且杜其意也趙孟諡文子忠謂魯受師信謂叔出季處貞謂不以貨免敬命不敢辟戮亢禦也詳見晉楚為成夏叔孫歸曽夭御季孫以勞之旦及日中不出曽夭謂曽阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其内焉用之阜曰數月於外一旦於是庸何傷賈而欲贏而惡嚻乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之豹恨季孫故乆不出夭阜二氏家臣夭言忍外是欲受楚戮不忍内謂日中不出阜言譬如商賈求贏利者不得惡諠嚻之聲意以季孫貪於取邑宜受慢也楹柱也叔孫喻魯有季孫猶屋有柱雖惡之而不能去也莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔呉叔弓帥師疆鄆田因莒亂也於是莒務婁瞀胡及公子滅明以大厖與常儀靡奔齊君子曰莒展之不立弃人也夫人可弃乎詩曰無競惟人善矣疆鄆田以前所取者正其界務婁瞀胡滅明皆展輿黨大厖常儀靡莒二邑弃人謂奪羣公子秩詩大雅言無與競者惟得人也舍其弑父之罪而咎弃人何失類也四年秋九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取著丘去疾也五年春公如晉夏莒牟夷以牟婁及防兹來奔牟夷非卿而書尊地也莒人愬于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之閒而以師討焉乃歸公秋七月公至自晉莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也如晉即位往見餘見三桓弱公室牟夷莒大夫牟婁今為山東安丘縣有牟山防兹今山東徳平縣境舊有防亭皆莒邑尊重也重地故書以名其人終為不義閒暇也來討討受牟婁也蚡泉魯地六年夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免于討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為驩也對曰寡君猶未敢況下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨受莒叛晉不討故拜謝加籩籩豆多于常數周禮大夫三獻獻視饔餼之數若加籩則三獻不稱故以此辭驩加禮致驩心好貨宴好之貨補聘禮卿五獻此自卑從大夫禮十年秋七月平子伐莒取郠獻俘始用人于亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰徳音孔昭視民不佻佻之謂甚矣而壹用之將誰福哉平子季孫意如諡武子之子郠莒邑用人以人祭亳社殷社在齊因前奔也詩小雅佻偷也言明徳君子必愛民壹同也同人於畜牲也十一年夏孟僖子㑹邾莊公盟于祲祥修好禮也祲祥地舊闕餘見列卿世嗣之變十二年夏公如晉至河乃復取郠之役莒人愬于晉晉有平公之䘮未之治也故辭公公子憖遂如晉十三年夏為取郠故晉將以諸侯來討七月遂合諸侯于平丘邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公甲戌同盟于平丘公不與盟晉人執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲冰以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從平丘衞地不共不供職故侵陵之故餘詳見晉失諸侯蒙覆冒也司鐸射魯大夫飲氷以壺藏于氷猶飲羽之飲因值暑季孫蒙幕欲壺漿之寒解鬱熱也蒲伏作匍匐冬公如晉士景伯辭公于河季孫猶在晉子服惠伯私于中行穆子乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠于會宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪于晉君自歸于魯君微武子之賜不至于今雖獲歸骨于晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館于西河其若之何且泣平子懼先歸惠伯待禮私私與言也詳見晉失諸侯晉歸季孫惠伯欲諸侯會盟時以禮見遣暴魯無罪而晉信讒執之故宣子以為患乃使叔魚以詐恐季孫季孫本無志節遂逃歸老尊卿稱死命死晉命也鮒叔魚名鮒以叔虎黨欒氏奔魯見卿族廢興西使近河逺無歸期故懼泣以信其言待禮待見遣之禮十四年春意如至自晉尊晉罪已也尊晉罪已禮也謂舍族也二十一年夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢叔孫名婼諡昭子以三命為國政平子憎其在已上欲使惡于晉故以七牢禮士鞅稱此禮鮑國之禮以激鞅怒遂十一牢按聘禮使卿主國待之饔餼五牢前加二而為七于七加四為十一益非禮也鞅于此已憾昭子歸費見陪臣交叛二十三年春邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鋤弱地邾人愬于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聴其辭而愬諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子于都叔孫旦而立期焉乃館諸箕舍子服昭伯于他邑范獻子求貨于叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居于箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至翼離姑邾二邑公孫鉏徐鉏丘弱茅地邾四大夫師從離姑則道過魯之武城故鉏欲勿過武城依山南而去三子恐雨山道下濕不從鉏言遂為武城人邀取婼因此使晉被執與坐訟曲直欲以屈叔孫叔孫據王制以拒又欲與邾以辱之去兵衆示欲以身死義不為辱彌牟字伯時邾子在晉若亡國無所歸故云悔之何及因更分館二國以兩聴其辭皆執之者蓋以邾不假道亦曲也復審魯曲尤甚屬叔孫於吏減其侍從過邾使見之歸邾子都别邑即箕也旦立以待其期見敬命且不懾也晉復别其介困之獻子欲貨故以請冠為辭叔孫以二冠俱進則無冠故先取其法以製别冠而盡與之曰盡者絶其後請也使申豐欲以貨免乃留使不出不肯免于貨也狗初弗與示不相假歸毅與之示不愛所居雖蹔必治臨行如始皆見嚴整無所苟也昭子風節高勁如此春秋中僅一見而已冬公為叔孫故如晉及河有疾而復二十四年春王正月晉士彌牟逆叔孫于箕叔孫使梁其踁待于門内曰余左顧而欬乃殺之右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以乆子不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸二月婼至自晉尊晉也逆于箕將禮而歸之叔孫疑士伯復加屈辱將以死抗謀殺之既而以乆執謝禮遣之故叔孫竟受其禮以歸叔孫雖賢而魯取邾師不為無罪故尊晉邾莒之難一也叔孫父子守正不屈不惟國免于兵而且足以為國之重意如逃遁苟免大致辱國人材之係于國也諒哉然豹遇趙孟則以賢聞而免戮婼遇韓范則危困而幾殆又可以見晉政之汚隆矣三十一年冬邾黑肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚或求名而不得或欲蓋而名章懲不義也齊豹為衞司冦守嗣大夫作而不義其書為盗邾庶其莒牟夷邾黒肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將寘力焉是以春秋書齊豹曰盗三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之黑肱邾大夫非卿故曰賤濫邾邑在今山東滕縣有濫城傳言人咸以有名為貴又有所謂有名不如無名者已猶無也回邪也見利不苟不回其心疚病也見義則為無疚于心守嗣守先人嗣言其尊豹殺衞侯兄將求勇名而書盗求名而不得也三叛人以邑竊食鄰國欲隱其名而賤必名之是蓋而彌章也二物二事也齊豹書盗懲肆也三叛人名去貪也大人在位者章徹謂勇名顯著攻難專作禍難奔走趨赴也無名不書其名數列也無禮惡逆皆列之不遺記事之善者也微文微顯義顯婉辭婉辨㫖别在上者能使此義昭明則可以為世勸懼故為貴季康子搆怨邾齊邾事附定公二年冬邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之夷射姑邾大夫與公飲而出以避酒閽守門者從之乞肉射姑既不與復奪其杖以敲其頭三年春二月辛夘邾子在門臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于牀廢于鑪炭爛遂卒先葬以車五乘殉五人莊公卞急而好潔故及是門臺門上有臺公在上下視庭閽以去年杖敲之恨故以缾水灌庭令邾子見怒而問答以為射姑旋溺所汚故以水浄遂命執射姑不得愈怒甚至墮鑪中以死及葬先以車殉别為便房恐汚藏中也卞躁急也十五年春邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀䘮戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能乆高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎隠公益也玉朝者之贄不度不合禮度嘉事謂朝禮不體不得其體之正夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也以微知著知之難者子貢言語之士此言而中仲尼懼其易言故抑之哀公二年春伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟絞邾邑漷沂漷水以東沂水以西七年夏公㑹呉于鄫季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保于城城保于徳失二徳者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯于塗山執玉帛者萬國今其存者無數十焉惟大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聴茅成子請告于吳不許曰魯擊柝聞于邾呉二千里不三月不至何及于我且國内豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保于繹師宵掠以邾子益來獻于亳社囚諸負瑕負瑕故有繹邾茅夷鴻以束帛乘韋自請救于吳曰魯弱晉而逺呉馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟于鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之貳也邾賦六百乘君之私也以私奉貳唯君圖之呉子從之呉伯中國故㑹鄫餘見句踐滅吳季子將伐邾而謀于衆以示同實不用其議景伯以不信于呉不仁于邾必危國孟孫以其言為賢欲使諸大夫從之皆對以夏時諸侯以萬計惟大小相攻伐故胥以亡今背盟伐邾既不恤小又不事大不相趨於亡乎何不言但言而不聴耳凡以兵加人徳足以勝之而后可今徳不過邾伐之豈可耶蓋諸大夫皆以伐邾有呉患不能回季孫之意故不樂塗山在今鳳陽府懷逺縣執玉大國執帛小國范門邾郭門擊鐘不禦冦也茅成子名夷鴻邾大夫茅其食邑今為山東嵫陽縣舊有茅鄉亭請告求救也邾子以魯近呉逺雖救不及且國内自足以拒魯成子以茅叛知亡國欲以自守也魯師遂入處其公宫晝夜掠以其君歸獻亳社見其亡國與殷同負瑕魯邑嵫陽縣舊有瑕丘城繹邾所都昔魯得邾之繹民在負瑕故囚此辱之康子殘暴已甚十端為束韋熟皮也四數曰乘僻陋也鄫衍即鄫也求成不違言魯成其所求無違逆也貳副也私屬也八年春呉為邾故將伐魯問于叔孫輙叔孫輙對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問于子洩對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月呉伐我子洩率故道險從武城初武城人或有因于吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之王犯嘗為之宰澹臺子羽之父好焉國人懼懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉呉師克東陽而進舍于五梧明日舍于蠶室公賔庚公甲叔子與戰于夷獲叔子與析朱鉏獻于王王曰此同車必使能國未可望也明日舎于庚宗遂次于泗上微虎欲宵攻王舍私屬徒七百人三踊于幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害吳而多殺國士不如已也乃止之吳子聞之一夕三遷吳人行成將盟景伯曰楚人圍宋易子而食析骸而㸑猶無城下之盟我未及虧而有城下之盟是弃國也吳輕而逺不能乆將歸矣請少待之弗從景伯負載造于萊門乃請釋子服何于吳吳人許之以王子姑曹當之而後止吳人盟而還輙字子張不狃字子洩皆故魯人奔吳名大國名情實也違奔亡也未臣所適國若有伐本國者則還奔命死其難所曽因托者則為之隠諱又不可以私怨惡廢弃鄉黨之好輙魯公族故謂宗國不狃言魯緩時雖無黨急則必有共其患救之者晉齊楚合魯而為四不可輕也又故由險道欲使魯成備田僑田呉界鄫人亦僑田于呉漚菅漬菅草于水滋濁也道鄉道也武城魯邑今山東費縣有武城亭王犯呉大夫先奔魯為之宰子羽武城人其父與犯善呉既克武城則其人以二子之故將固與呉呉得據之以為魯患非若客兵逺涉敵境者比故懼景伯言康子召兵何求何須訪求也東陽五梧蠶室皆魯地山東青州府北有東陽城公賔庚公甲叔子析朱鉏為三人同車戰言二人獲言二人者傳互言之同車能俱死是能使人致死必能守國庚宗魯地泗泗水微虎魯大夫于帳前設格令士試躍之于七百人中終得三百人卒終也有若與其内三遷畏微虎也景伯欲呉退師以禮魯而與平引華元事為言季孫弗從遂負載書將欲出盟釋舎也魯人恐盟猶未已欲因留景伯為質于吳既得吳許復求吳王子交質呉不肯遂已齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡六月齊侯使如吳請師將以伐我乃歸邾子邾子又無道呉子使太宰子餘討之囚諸樓臺栫之以棘使諸大夫奉太子革以為政秋及齊平九月臧賔如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖冬十二月齊人歸讙及闡悼公名陽生前以不得立奔魯陳僖子召而立之詳見田氏傾齊魴侯康子叔父鮑牧齊大夫以不歸季姬故伐我取二邑復請師于呉呉前為邾討魯既盟而去邾子猶未歸今魯懼二國同心故歸邾子子餘宰嚭字栫擁也革邾太子賔臧㑹子明嬰之子季姬歸而嬖故歸邑讙闡定陶縣境舊有讙亭有闡鄉九年春齊侯使公孟綽辭師于呉呉子曰將進受命于君詳見句踐滅呉冬呉子使來儆師伐齊前年呉與齊謀伐魯齊既與魯成而止故呉恨之反與魯謀伐齊十年春邾隱公來奔齊甥也故遂奔齊公會呉子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴于師呉師乃還鄎齊邑齊弑悼公以說於吳詳見田氏傾齊句踐滅呉十一年春齊為鄎故國書高無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子强問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而蒐乘孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為已徒卒老幼守宫次于雩門之外五日右師從之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰於郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請三刻而踰之如之衆從之師入齊軍右師奔齊人從之陳瓘陳莊涉泗孟之側後入以為殿抽矢策其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢于邴洩子羽銳敏我不欲戰而能黙洩曰驅之公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衞社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也齊與魯平故辭呉師而魯反與呉伐齊故齊報焉清齊地今山東肥城縣境舊有清亭一子季孫二子孟孫叔孫境齊魯之界封疆境内近郊之地求始欲公親將而二子以師從則兵勢壯可禦齊于境二子不可齊師深入則國危故必季氏專將凡國人皆從有决死之心而後齊可敵又言齊車雖衆不及魯都邑之家敵之猶有餘不須患寡二子以政不在身不能戰非其所恥季子身任魯政不戰而䘮列是宜恥耳季感其言朝而使從與二子言黨氏朝中地叔孫始問之辭孟强問之言小人以諷其不能故叔孫以為鄙我蒐閲車乘為戰備孺子洩懿子之子武伯彘也顔羽邴洩孟氏臣弱少也用命致死也徒卒精兵以自衞也雩門南城門右師五日乃從不欲戰也務人昭公子公為保守事充繇役煩政重賦多勉死戰蓋傷國勢之微而以身矯之也稷曲郊地名不信子言求號令未信也三刻與衆三刻約信如如遲言從之踰溝也冉有之師遂入齊師孟孺子之師已奔齊逐之二陳齊大夫之側孟氏族言馬不進不伐善也不狃魯士五人為伍敗而欲走不狃言我不如誰而乃走伍謂止而戰乎不狃言止戰惡足為賢皆無戰志師獲冉求師所獲不能師不能整師也見魯亦有勇士而齊師亦弱季孫不能使其衆以勝之求雖屢鼓其志不少競孟孺子既以右師奔復以已與御羽右洩自為優劣觀洩曰驅之師之奔皆洩罪矣言之尤非軍帥體汪錡童名乘同車時人疑童子當殤故夫子以社稷為重勿殤冉有用矛師皆奮而入敵故稱以義是時魯勢微甚幾不國矣故皆勵而振之夏為郊戰故公㑹呉子伐齊戰于艾陵大敗齊師獲國書艾陵齊地今山東沂州齊魯之境詳見句踐滅吳秋季孫命修守備曰小勝大禍齊至無日矣十五年秋齊陳瓘如楚過衞仲由見之曰天或者以陳氏為斧斤既斲䘮公室而他人有之不可知也其使終饗之亦不可知也若善魯以待時不亦可乎何必惡焉子玉曰然吾受命矣子使告我弟冬及齊平瓘陳恒之兄字子玉時陳氏簒齊之勢已成故公言之仲由得其情遂與平餘見陪臣交叛十七年十二月公㑹齊侯盟于蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首武伯問於高柴曰諸侯盟誰執牛耳季羔曰鄫衍之役呉公子姑曹發陽之役衞石魋武伯曰然則彘也齊侯簡公弟平公敖也蒙魯地今山東蒙隂縣齊稽首而公不答故怒執牛耳謂尸盟者季羔高柴也鄫衍在七年發陽即鄖也在十二年見句踐滅呉彘武伯名以呉夷也圖伯要盟而妄執非可據衞與魯宋盟差次宜執魯兹與類故同之羔惟兩舉所見武伯自得之衞也二十一年秋八月公及齊侯邾子盟于顧齊人責稽首因歌之曰魯人之臯數年不覺使我高蹈唯其儒書以為二國憂是行也公先至於陽穀齊閭丘息曰君辱舉玉趾以在寡君之軍羣臣將傳遽以告寡君比其復也君無乃勤為僕人之未次請除館於舟道辭曰敢勤僕人顧齊地臯緩也高蹈猶逺行二國齊魯也言魯人臯緩乆不覺悔謝愆使我逺行來為此㑹惟據周禮不肯屈致主客俱有兵革之憂息閭丘明後遽驛騎也僕人魯君之從者次舍也舟道齊地息以魯侯在齊齊侯不能即至欲為魯除館而魯辭之敢不敢也二十二年夏四月邾隱公自齊奔越曰呉為無道執父立子越人歸之太子革奔越時句踐已滅呉伯中國故也二十四年夏四月邾子又無道越人執之以歸而立何何亦無道二十七年春越子使后庸來聘且言邾田封于駘上二月盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰然何不召曰固將召之文子曰他日請念越欲使魯還邾田以駘上為封界三子季康子叔孫文子孟武伯皆從公與后庸盟病恥從蠻夷盟也因思子贛而言及之言若在必無此辱文子恨季孫不能用于平日臨難方思故言他日請念以過此復不念矣春秋左傳屬事卷七
