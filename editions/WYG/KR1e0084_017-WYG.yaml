body:
  text: 春秋左傳屬事卷十七明傅遜撰秦納芮取梁桓公三年冬芮伯萬之母芮姜惡芮伯之多寵人也故逐之岀居于魏芮今山西芮城縣魏今平陸縣四年秋秦師侵芮敗焉小之也冬王師秦師圍魏執芮伯以歸秦以芮小輕之遂為所敗前芮伯出魏芮更立君秦憾前敗故以芮伯歸將納之十年秋秦人納芮伯萬于芮僖公十八年冬梁伯益其國而不能實也命曰新里秦取之梁今陜西韓城邰陽二縣其國也多築城邑無民以實秦乘其虚取之十九年春遂城而居之冬梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁不書取梁者主名以見梁自致於亡穆公霸西戎僖公九年冬晉郤芮使夷吾重賂秦以求入齊隰朋帥師㑹秦師納晉惠公十三年冬晉荐饑使乞糴于秦秦於是乎輸粟于晉自雍及絳相繼雍秦都今陜西鳳翔縣絳晉都今山西絳州十四年冬秦饑使乞糴于晉晉人弗與十五年夏秦伯伐晉戰于韓原獲晉侯以歸十月晉隂飴甥㑹秦伯盟于王城改館晉侯十一月晉侯歸是歲晉又饑秦伯又餼之粟曰吾怨其君而矜其民於是秦始征晉河東置官司焉十七年夏晉太子圉為質於秦秦歸河東而妻之以上俱節詳見晉驪姬之亂二十三年晉公子重耳之及於難也遂奔狄過衞及齊及曹及鄭及楚乃送諸秦詳見晉文公之伯驪姬之亂二十四年春王正月秦伯納之送衞於晉三千人實紀綱之僕詳見晉文公之伯秋頺叔桃子奉太叔以狄師伐周王出適鄭處于汜使左鄢父告于秦二十五年春秦伯師于河上將納王晉侯辭秦師而下詳見王室子帶之亂晉文之伯三十年九月甲午晉侯秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯說與鄭人盟使把子逢孫揚孫戍之乃還子犯請撃之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之無禮謂文公出亡時函陵函谷之陵在今河南靈寳縣南汜南汜水之南在今河南熒陽中牟縣南此東汜也佚之狐燭之武皆鄭大夫縋縣城而下鄙以鄭為邉鄙越晉故逺而難保陪益也行李使人晉君謂惠公焦瑕晉河外五城之二邑朝濟河夕設版築以距秦言背秦之速肆大也封疆也杞子逢孫揚孫秦三大夫背晉反為鄭守撃撃秦夫人謂秦穆懷人之徳為仁得其所與為智以整定亂為武若撃秦皆反之三十二年冬晉文公卒庚辰將殯于曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我撃之必大捷焉殯窆棺曲沃有舊宫柩中如牛响聲卜偃晉卜大夫謂此文公之命大事戎事軼突也古之巫卜多能通鬼神故云爾杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是閒余收爾骨焉秦師遂東把子戌鄭鄭信委之故得其管籥因謀其國蹇叔秦大夫老而賢無所無所得悖心以師不空出將害善良也辭不受其言孟明姓百里名視西乞名術白乙名丙皆秦臣上夀百二十中夀百下夀八十合手曰拱言其乆當死老耄不可用也殽山名本作崤在今河南永寜縣北六十里大阜曰陵臯夏桀之祖父崤有土崤石崤此道在二崤之閒南谷中谷深委阻兩山相嶔故可以辟風雨古道由此魏武伐巴漢惡其險更開北山髙道蹇叔以其深阨故知秦師必困於此三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衞且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹乆於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也吾子取其麋鹿以閒敝邑若何把子奔齊逢孫揚孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還北門王城北門胄兜鍪兵車非大將御者在中故左右下御不下輕而無禮謂過天子門不卷甲束兵且超乘示勇脫易也滿幼而智故知必敗商行賈名弦髙四數曰乘熟皮曰韋先韋乃入牛古者獻物於人必有以先之步猶行也腆厚也淹乆也積芻米菜薪衛捍禦之具遽驛馬客館秦三大夫之館束束矢載載弓厲磨厲秣穀食蓋嚴備以應秦師乾肉曰脯糧曰資生曰餼牛羊豕曰牽原圃今河南中牟縣有圃田澤爾雅十藪鄭有圃田魯有鉅野宋有孟諸晉有大陸楚有雲夢秦有陽陓餘不見傳不悉閒暇也欲秦戌自取麋鹿為行資使鄭得閒暇三子以謀敗而奔滅滑所謂悖心也晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨文嬴請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國堕軍實而長冦讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不㬱孟明孤之過也大夫何罪且吾不以一眚掩大徳秦師還過晉境先軫謀邀而伐之奉與也枝言以君死忘秦施為死君軫言秦無禮施不足顧為國逺謀乃懷君也遽驛馬欲速也晉文未葬故襄公稱子以凶服從戎故墨之後遂以為常因記禮所由變文嬴襄公嫡母文公適秦所妻軫知孟明歸必報晉患深故怒甚處父假公命贈以左驂誘使還拜謝因執之孟明知其詐遥於舟中稽首纍囚繋也殺人以血塗鼓謂之釁鼓拜賜欲伐晉雪辱飾言拜謝免歸之賜替廢也不廢其師而用之取敗也眚過也文公元年殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聴言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政詩大雅隧蹊徑也周大夫芮伯刺厲王言貪人之敗善類若大風之行毁壞衆物所在成蹊昏亂之君得道聴塗説之言則喜而答對典誦之言則如醉而不聞覆反也俾使也不用良臣之言反使我為悖亂二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎孤鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明增脩國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而增徳不可當也詩曰毋念爾祖聿脩厥徳孟明念之矣念徳不怠其可敵乎彭衙今陜西白水縣有彭衙城孟明報前忿而復敗因其言拜君賜故晉以嗤之死所可死之所為難作亂殺先軫周志周書明堂策功序徳之所故不義之士不得升死於義為勇敬恭以死于國用斯義也作亂而死不義更成無勇宜見黜矣不可言不我知屬屬已之兵詩小雅言君子之怒必以止亂遄速也沮止也又詩大雅言文王赫然奮怒則整師旅以討亂狼瞫得二詩之義孟明再敗猶用益脩政而厚施成子趙衰也以為不可敵詩大雅言念其祖考則宜述脩其徳以顯之毋念念也冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇徳三年夏秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之壹也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉孟明既再敗復受伐故奮勇而出焚舟示必死王官郊晉邑今陜西澄城縣有王官城茅津今河南陜州晉既避之威伸西陲傳因美之周備也謂不以一惡棄其善壹專也子桑名公孫枝舉孟明者詩國風言沼沚之蘩至薄猶采以共公侯以喻秦穆不遺賢也又詩大雅美仲山甫取以美孟明之能敬懼又詩大雅燕安翼成也美武王能遺其子孫善謀以安成之喻子桑有舉善之謀也穆公平亂善鄰䘏災討罪綽乎伯者之風焉惜其既信燭之武之言復狥把子之計惟利焉趨背向彌速以至將禽師殞幾不自振雖僅收之桑榆曷克以償之夫文公雖甚憾鄭無必滅焉之志也欲持其危以好喻晉使兩釋兵而歸則仁昭而義著矣顧舍戍焉以啓邪謀誠始慮之不詳哉四年秋晉侯伐秦圍邧新城以報王官之役邧新城秦邑楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣降服素服出次辟正寢不舉去盛饌鄰國之禮有數秦伯過之詩大雅言夏商之君為政不得人心故四方諸侯皆懼而謀度其政事秦穆感江之滅懼而思政爰於也究度皆謀也五年初鄀叛楚即秦又貳於楚夏秦人入鄀六年夏秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥君子曰秦穆之不為盟主也宜哉死而弃民先王違世猶詒之法而況奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以並建聖哲樹之風聲分之物采著之話言為之律度陳之藝極引之表儀予之法制告之訓典教之防利委之常秩道之以禮則使毋失其土宜衆𨽻賴之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也任好穆公名子車秦大夫其三子皆秦之良以人從葬為殉黄鳥秦風取黄鳥止于棘桑往來得其所傷三良不然詩大雅言善人亡則國瘁病建聖哲以牧民繼其勲烈樹立也立其風化聲教采物旌旗衣服各有分制著作也著其話言之善者為遺則律度度量權衡藝準也極中也貢獻多少之法引道也表儀威儀之則法制賞罰之制訓典先王之書防防惡利興利委任也常秩司官之常職即命就用上命也東征征討東土為伯主也秦晉交伐文公六年八月乙亥晉襄公卒靈公少晉人以難故欲立長君趙孟使先蔑士㑹如秦逆公子雍詳見卿族廢興七年夏四月秦康公送公子雍于晉曰文公之入也無衞故有呂郤之難乃多與之徒衞穆嬴日抱太子以啼于朝宣子與諸大夫乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及堇隂宣子曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦帥于令狐至于刳首己丑先蔑奔秦士㑹從之吕郤難見驪姬之亂穆嬴靈公母先蔑士㑹逆公子雍時還晉晉人既以大義立靈公先蔑不能異故猶在戎職既以所逆不終而奔堇隂晉地蓐食於寢蓐令狐猗氏縣刳首地接八年夏秦人伐晉取武城以報令狐之役前役節詳卿族廢興十年春晉人伐秦取少梁夏秦伯伐晉取北徴少梁今陜西韓城縣有少梁城北徴今陜西澄城縣有北徴城十二年秋秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賓答曰寡君願徼福于周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之時晉主盟魯方事晉術欲伐晉故辭玉以拒之大器圭璋也即所辭玉禮君聘以珪夫人以璋以珪璋聘重禮也已聘而還之輕財也使執之以信故又曰瑞節則還玉於聘終此初聘而辭玉故術知為拒已而必欲致之以成其好徼要也魯公伯禽稱先君以固結之珪璋傳之先世又告廟而行故稱先君以玉為信曰瑞節符也藉薦也襄仲嘉其有詞而稱之賄贈送也秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之十二月秦軍掩晉上軍趙穿追之不及秦師夜遁復侵晉入瑕羈馬晉邑陜西邰陽縣有羈馬城瑕晉邑詳見卿族廢興十三年春晉侯使詹嘉處瑕以守桃林之塞詹嘉晉大夫桃林在今河南靈寳縣西至潼闗賜嘉瑕邑令帥衆守之以備秦宣公元年秋晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成崇秦之與國二年春秦師伐晉以報崇也遂圍焦夏晉趙盾救焦焦晉邑八年春白狄及晉平夏㑹晉伐秦晉人獲秦諜殺諸絳市六日而蘇蓋記異也十五年秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以略狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回杜回躓而顚故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報輔氏稷皆晉地畧取也晉時新破狄土地未安權秦師之弱故别遣魏顆拒秦而東行定狄地以狄前奪黎侯地故復立之及雒晉侯還及雒也雒晉地武子魏犨顆之父亢禦也而汝也成公九年冬秦人白狄伐晉諸侯貳故也為汶陽之田故諸侯貳見晉景公楚共王争伯十二年冬秦晉為成將㑹于令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東晉郤犨盟秦伯于河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成史顆秦大夫齊一心質實也十三年春晉侯使郤錡來乞師三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之昏姻天禍晉國文公如齊惠公如秦無禄獻公即世穆公不忘舊徳俾我惠公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊徳矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之將致命于秦文公恐懼綏静諸侯秦師克還無害則是我有大造于西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聴而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩揺我邉疆我是以有令狐之役康猶不悛入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊垂我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車來命我景公曰吾與女同好弃惡復脩舊徳以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背弃盟誓白狄及君同州君之仇讎而我昏姻也君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不穀惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聴命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙㫋將新軍郤至佐之郤毅御戎欒鍼為右孟獻子曰晉帥乘和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父曹宣公卒于師師遂濟涇及侯麗而還迓晉侯于新楚乞師以伐秦餘見卿族廢興欲賜欲王賜巳以行人不加厚也介輔相威儀者獻子相公以禮故王重賜之餘見王臣喪亡吕相魏錡子以書達晉侯命于秦穆公夫人獻公之女故云昏姻文如齊惠如秦辟驪姬也集安定也成成功也草行為跋圍鄭者晉自以無禮于已又二於楚今言侵秦者誣之盟鄭者穆公謙言大夫時無諸侯蓋假以致徳西指秦也不弔不見傷惻寡弱也滑都於費今河南偃師縣舊勲納文之勲赦罪解怨也即楚謀謂秦使鬬克歸楚求成也事見楚儀燮之亂自出晉之甥蝥賊禾稼蟲名謂子雍涑水自山西絳縣經聞喜縣至蒲州東南入河東道晉自謂君謂秦桓公惠稱盟加惠于晉而舉盟䖍劉皆殺也聚衆師也延長也獻穆晉獻秦穆伯車秦桓公子本言寡人兩言寡君誤也祥善也及與也狄應且憎言狄雖應答秦而心實憎秦無信三公穆康共三王成穆莊出入猶往來暱親也承寧承君之惠以寧静諸侯徼要也晉辭多誣惟既盟令狐而召狄與楚伐晉三事為實故傳舉言以正秦罪帥軍帥乘車士不更秦爵涇水自陜西平陽府白巖發源至涇州東南至邠州界又東北由髙陵縣界入渭迓迎也既戰晉侯止新楚故師還過迎之麻隧新楚侯麗皆秦地襄公九年夏秦景公使士雃乞師于楚將以伐晉楚子許之秋楚子師于武城以為秦援秦人侵晉晉饑弗能報也詳見悼公復伯十年六月晉荀罃伐秦報其侵也十一年四月諸侯伐鄭九月諸侯悉師以復伐鄭十二月秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴御之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也庶長秦爵救鄭為楚救也時秦與楚通好故濟從輔氏渡河也櫟晉地十二年冬秦嬴歸于楚楚司馬子庚聘于秦為夫人寧禮也秦景公妹為楚共王夫人子庚莊王子名午諸侯夫人父母既没歸寜使卿故曰禮十四年夏諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衞北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子説二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役於是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衞北宫括不書於向書於伐秦攝也晉以諸侯之師伐秦不濟不肯渡涇也詩邶風義取於深則厲淺則掲言已志在于必濟棫林秦地塞井夷竈示即行馬首是瞻將率之西入黶惡偃不謀羣帥而自專故弃之歸左史晉大夫莊子魏絳中行伯荀偃夫子謂偃也黶帥下軍莊子為佐故曰吾帥蓋絳亦以偃專為非伯游偃字言軍帥不和多自遺禽獲於秦大還皆還遷延退卻也餘見卿族廢興惰臨事怠慢如之亦惰也攝能整攝從子蟜俱濟涇向㑹見呉通上國時荀偃專命欒黶擅還而悼公罔聞君威阻矣十九年於四月丁未鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也六月晉侯請於王王追賜之大路使以行禮也大路天子所賜車之揔名以行行葬禮傳言大夫有功則賜服路㑹于夷儀之歲其五月秦晉為成晉韓起如秦涖盟秦伯車如晉涖盟成而不結伯車秦伯之弟名鍼不結不固結也二十六年春秦伯之弟鍼如晉脩成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劒從之叔向曰秦晉不和乆矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎吾臣之所争者大師曠曰公室懼卑臣不心競而力争不務徳而争善私欲已侈能無卑乎脩成脩前成召子員使答秦命也御進也言朱次當行從逐叔向易變也拂振也庶庶幾于治争者大非私忿也心競心自競於忠力争謂撫劒拂衣争善各以所行為善私欲侈則公義廢故卑昭公元年夏五月秦后子有寵於桓如二君於景其母曰弗去懼選癸夘鍼適晉其車千乘書曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所賛也后子見趙孟趙孟曰吾子其曷歸對曰鍼懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國於天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰鍼聞之國無道而年穀和熟天賛之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民翫歲而愒日其與幾何后子名鍼一名伯車秦桓公子景公母弟其權寵如二君選數也恐景公數其罪而加戮罪罪失教也享為晉侯設享禮造舟為梁于河通秦晉之道以十里為一舍每舍置車八乘為八反之備秦之雍晉之絳相去千里用八百乘以備九獻禮每獻必有酬幣始自齎其一續八皆歸取於秦各以次載幣而還晉不徑至故八反千里用車八百乘其二百乘以自隨故曰千乗此蓋度其道里以次第舍車各預置酬幣於車中復計其逺近使之先日續發約享日仍以每享次第而至享畢車亦畢鍼極奢富以盡敬於所赴司馬侯晉大夫字女叔齊見其車多故抑之以為盡于此已乎鍼自言已以車多故出奔令圖善謀曷歸何時歸有與立言國與天地叅而並立植之固也鮮不五稔言無道反獲天助將恃之而驕其死必速故不及五稔稔年也蔭日景趙孟意衰視之而言人生難保朝夕不能常有此日月豈能待五翫愒皆偷安不為社稷生靈長乆慮幾何言不能乆趙孟果於此歳終冬楚子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰厎祿以徳徳鈞以年年同以尊公子以國不聞以富且夫以千乘去其國彊禦以甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒辭曰鍼懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎史佚有言曰非羇何忌子干公子比字避楚䖍亂奔晉同食同其食禄百人一卒也其祿足百人富謂鍼富强秩禄不宜與子干同厎致也詩大雅齒齊列也不獲不得自安言俱奔有優劣唯主人命所處蓋謙辭又言已先仕晉為臣子干後至猶為羇客已當降損引史佚言唯羇當敬忌敬也五年冬秦后子復歸于秦景公卒故也春秋左傳屬事卷十七
