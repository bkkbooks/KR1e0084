body:
  text: 春秋左傳屬事卷二明傅遜撰伯齊桓公之伯桓公二年秋七月蔡侯鄭伯會于鄧始懼楚也蔡今為河南汝寧府有上蔡新蔡縣鄭今為河南鄭州新鄭汜水縣鄧今為河南鄧州楚都郢今為湖廣江陵縣時楚武王僣號稱王馮陵上國蔡鄧鄭地與之鄰故懼而會以謀自是滅鄧虜蔡服鄭并諸小國更文王成王其勢轉熾二十六年而桓公立於齊莊公八年初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔無常政令無常小白糾襄公庶弟糾為長齊都營丘今山東青州濟南府皆其地莒今莒州近齊鮑叔牙小白傅管夷吾召忽糾傅鮑先亂去又能舉管明哲絶人桓之伯實由之九年夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於高傒使相可也公從之桓公小白也乾時齊地在今山東臨淄縣西南有時水其源淺旱則乾故名餘見齊襄公之弑鮑叔欲生得管仲故乘勝進兵脅魯復托辭以誘之管仲射桓公故曰讐甘心快意也生竇魯地堂阜齊地在今山東蒙隂縣境舊有夷吾亭稅解其縳高傒齊卿字敬仲鮑叔以管仲治理之才多于敬仲可使相國十年齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師滅譚譚無禮也譚子奔莒同盟故也譚今為山東章丘縣有譚城十二年秋宋萬弑閔公于蒙澤蒙澤宋地餘見宋閔公之弑十三年春會于北杏以平宋亂遂人不至夏齊人滅遂而戍之北杏齊地遂舜後國今山東定陶縣境戍守也冬盟于柯始及齊平也柯齊地今山東東阿縣魯與齊平也宋人背北杏之會十四年春諸侯伐宋齊請師于周夏單伯會之取成于宋而還冬會于鄄宋服故也齊脩伯業故假王命以示順單伯周大夫成平也鄄衞地今屬山東濮州宋爵既上公而復國今河南歸徳州及直𨽻徐州皆介南北之衝故齊桓創伯即於宋首事其制而撫之者勤矣晉文晉悼其業皆自宋始至天下分為南北而彭城遂為南朝重鎮安史之亂張許據睢陽以遮蔽江淮其地誠古今要害之區也哉十五年春復會焉齊始霸也秋諸侯為宋代郳鄭人閒之而侵宋郳附庸屬宋而叛齊桓為之伐郳鄭未服因侵宋十六年夏諸侯伐鄭宋故也鄭伯自櫟入緩告于楚秋楚伐鄭及櫟為不禮故也櫟鄭邑入櫟詳見厲公簒國冬同盟于幽鄭成也幽宋地時盟者凡九國鄭在南北之交與宋同皆圖伯者所必争也然宋固事中國而鄭反覆二伯間幾終春秋世十七年春齊人執鄭詹鄭不朝也詹鄭卿夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉四氏遂之彊宗殱盡也二十二年春陳人殺其太子御冦陳公子完與顓孫奔齊完顓孫皆御冦之黨餘見田氏傾齊二十七年夏同盟于幽陳鄭服也陳亂而齊納敬仲鄭伯前納成于楚皆二心于齊今始服也冬王使召伯廖賜齊侯命召伯廖王卿士賜命為侯伯周禮九命作伯王官伯也餘見子頹之亂二十八年夏楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎御人以告子元子元曰婦人不忘襲讎我反忘之秋子元以車六百乘伐鄭入于桔柣之門子元鬬御彊鬬梧耿之不比為斾鬬班王孫游王孫喜殿衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止文夫人文王夫人息媯也子元文王弟欲蠱惑以滛事振作萬舞總名此武舞也嫠自稱未亡人御人夫人之侍人襲繼事也桔柣鄭逺郊之門斾軍前大旗殿拒後也子元分軍為二自與三子為前軍鬬班等三子為後軍純門鄭外郭門逵市國内方九軌道上之市縣門施于内城門鄭示楚以閒暇既不閉出兵而復效楚言故子元畏之不敢進而救適至遂遁諜閒也幕空故有烏三十年楚公子元歸自伐鄭而處王宫鬬射師諫則執而梏之秋申公鬬班殺子元鬬穀於菟為令尹自毁其家以紓楚國之難處王宫滛偪甚矣射師名廉足曰桎手曰梏申國楚滅之為縣今河南南陽縣楚僣號縣尹皆稱公鬬穀於莵令尹子文也毁減紓解也子文賢而相楚故桓卒不能勝冬遇于魯濟謀山戎也以其病燕故也濟水歴齊魯界在魯稱魯濟燕北燕召公封國今京師山戎與古孤竹俱國今永平府地逼燕通齊三十一年夏六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻於王王以警於夷中國則否諸侯不相遺俘桓公伐戎而勝史所謂北伐山戎離枝孤竹也前與魯謀故以其俘馘遺魯於禮無之三十二年春城小穀為管仲也小穀今山東東阿縣穀城有夷吾井公感齊桓之徳故為管仲城私邑齊侯為楚伐鄭之故請會于諸侯宋公請先見于齊侯夏遇于梁丘梁丘今山東金鄉縣境八月癸亥公薨于路寢子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏立閔公子般莊公子黨氏魯大夫家共仲公子慶父也賊弑也詳見三桓弱公室閔公元年春狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可弃也宴安酖毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢邢今為北直𨽻邢臺縣敬仲以戎狄為豺狼諸夏為親暱宴安為酖毒詩小雅文王為西伯勞來諸侯之詩簡書鄰國有急相戒命者冬齊仲孫湫來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未己公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不弃周禮未可動也君其務寧魯難而親之親有禮因重固閒擕貳覆昏亂霸王之器也湫字仲孫四者霸王所用故以器為喻重固安也擕貳疑也二年秋八月辛丑共仲使卜齮賊公于武闈哀姜與知之故孫于邾齊人取而殺之于夷魯卜大夫名齮宫中小門謂之闈内奔曰遜邾小國今山東鄒縣夷魯地詳見三桓弱公室冬十二月狄人伐衞遂滅衞衞之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩共及滕衞别邑廬舍也曹衞下邑戴公名申立其年卒而文公立無虧齊桓子歸遺也四馬曰乘衣單複具曰稱與門材使先立門户魚軒夫人車以魚皮為飾重錦錦之熟細者以二丈雙行故曰兩兩匹也餘詳見衞文公定狄難僖之元年齊桓公遷邢于夷儀二年封衞于楚丘邢遷如歸衞國忘亡深言桓公恤難之周僖公元年春諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯救患分災討罪禮也狄復病邢桓又以諸侯救之師次聶北夷儀邢地邢臺縣有夷儀城無私軍令嚴整故也秋楚人伐鄭鄭即齊故也盟于犖謀救鄭也犖即檉宋地在今河南陳州境舊有檉城二年春諸侯城楚丘而封衞焉不書所會後也楚丘衞邑在今北直𨽻滑縣有廢衞南縣其地君死國滅故言封諸侯既會而魯後至秋盟于貫服江黄也貫宋地江今為河南確山縣黄今河南光州境有古黄國皆楚與國始來服齊故為合諸侯冬楚人伐鄭鬬章囚鄭􅅨伯鬬章楚大夫􅅨伯鄭大夫三年秋會于陽穀謀伐楚也齊侯為陽穀之會來尋盟冬公子友如齊涖盟楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我弃徳不祥陽穀齊地今山東陽穀縣南有盟臺𫝊桓公會江黄于此因楚侵鄭桓謀伐之以公不與會使來尋盟友往蒞之孔叔鄭大夫勤勤恤其患齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之蔡姬齊侯夫人蕩摇也蓋池在苑中竊謂因此伐蔡非也蔡自被執以後計已服屬于楚不與中國會盟畧無畏桓之心故桓因而治之豈專以一婦人故哉傳蓋失其意耳四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福于敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以徳綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯說與之虎牢執轅濤塗秋伐陳討不忠也許穆公卒于師葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等於是有以衮斂冬叔孫戴伯帥師會諸侯之師侵陳陳成歸轅濤塗桓公君臣謀楚已乆至此乘鋭伐之牝牡相誘曰風楚使言二國去逺雖馬牛風亦不相及今以何事至此蓋醜詆之辭召康公周太保奭也仲言自先世受王命得征討四國五侯五等諸侯九伯九州之伯河海東西之極穆陵楚之境無棣在遼西賜履而以此命之者欲其踐履之廣如此也包裹束茅菁茅有刺三脊束茅而灌之以酒為縮酒昭王成王之孫南巡至楚楚膠其舟至漢而溺故以二事為楚罪而猶婉其詞楚服小拒大言水濵亦嫚詞故復進師完來納欵故退師以示禮陘召陵皆楚地今河南郾城縣有召陵城陘在召陵南舊有陘亭乘共載也桓言諸侯附從非為己乃尋先好然其先實邈矣亦柔來之意孤寡不穀諸侯謙稱方城山在今河南裕州東北漢水源自今陜西漢中至荆門州東境下流與沔水入江完言此見其山河險固應對皆中機宜遣使如此國有人哉完進退以禮而桓服楚謀歸道轅濤塗陳大夫申侯鄭大夫國病有供給之費故東夷郯莒徐夷也觀兵以示威屝草屨虎牢鄭邑今河南汜水縣不忠誤軍道也諸侯命有三等公為上等侯伯為中等子男為下等衮衣公服加二等也今許以男用侯禮加一等故曰禮陳服罪故歸濤塗戴伯名兹叔牙之子五年夏會于首止會王太子鄭謀寧周也陳轅宣仲怨鄭申侯之反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜于王命而懼其不朝于齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所䘮多矣君必悔之弗聴逃其師而歸首止衞地今河南陳留縣境舊有首鄉惠王以惠后故將廢太子立子帶故齊桓帥諸侯會王太子以定其位濤塗申侯俱從其君于㑹故得勸之城而復為之請宣仲濤塗字申侯前既反而傾之復不虞其䧟已也狡而實愚也已周公宰孔王恨齊侯定太子故使鄭伯叛齊時唯晉楚為齊敵國故以安鄭鄭伯因拒諫而逃親黨援也六年夏諸侯代鄭以其逃首止之盟故也圍新密鄭所以不時城也秋楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城許男面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所楚子從之新密即新城今河南密縣鄭畏諸侯之討不俟時而速城以禦敵諸侯因楚圍許即解鄭圍以救之楚子退舍武城猶有忿志而諸侯各罷兵故蔡將許君歸楚縛手于後惟見其面以璧為質手縛故銜之櫬棺也將受死故衰絰武城楚地今河南信陽縣東北有武城逢伯楚大夫微子啓紂庶兄宋之祖也祓除凶之禮按論語微子去之是先紂滅而逺蹈矣武王既克商微子何用過自毁辱以迎之乎果爾則武王何不即封之俟武庚既誅而後封之宋耶皆非事理故鄱陽鄒氏亦深辨其誣史記禮記與此傳皆沿而襲之蔡氏書傳亦不察此踈矣七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能彊又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君夏鄭殺申侯以說于齊且用陳轅濤塗之譛也初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭予取予求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已秋盟于甯母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷逺以德德禮不易無人不懷齊侯脩禮於諸侯諸侯官受方物鄭伯使太子華聴命於會言於齊侯曰洩氏孔氏子人氏三族實違君命若君去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今苟有釁從之不亦可乎對曰君若綏之以徳加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若揔其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇徳也會而列姦何以示後嗣夫諸侯之會其徳刑禮義無國不記記姦之位君盟㬱矣作而不記非盛徳也君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟于齊前圍未服而解故再伐競彊憚難病卑弱之病說以逃盟之罪歸申侯姊妹之子為出蓋楚甥也疵瑕咎釁也求多以禮義大責望之小國必政狹法峻弗可改嘆其當也甯母魯地在今山東魚臺縣舊有泥母亭謀謀所以服之仲云服人心者莫如禮故以招攜感人心者莫如徳故以懷逺攜離也脩禮脩朝聘之禮令諸侯以其方貢所産物于天子諸官司受之而歸三氏鄭大夫内臣封内之臣鄭子華以國叛於齊桓公欲因釁圖鄭而管仲備言其必不可奸犯也命君命時時事姦邪也私也揔將領也唯德可以示後用子華是列姦而不徳必徳刑禮義可記而後㑹盟足恃子華以姦人列位而記之是自廢其盟若以不可記而諱之則徳衰蓋徳盛者作必可記且不許鄭必感徳而服介因也卒皆如仲言閏月惠王崩襄王惡太叔帶之難懼不立不發䘮而告難于齊八年春盟于洮謀王室也鄭伯乞盟請服也襄王定位而後發䘮洮曹地九年夏會于葵丘尋盟且脩好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耊老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受秋齊侯盟諸侯于葵丘曰凢我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無會也齊侯不務徳而勤逺畧故北伐山戎南伐楚西為此會也東畧之不知西則否矣其在亂乎君務靖亂無勤于行晉侯乃還葵丘在今河南考城縣東尋尋洗盟王深徳桓公定其位故賜胙尊之比二王後有事祭也天子謂異姓諸侯曰伯舅八十曰耊桓年未及稱耊以優之使無下拜桓言君天也其威無適不臨近在顔面不可不懼八寸曰咫隕越顛墜以越分魂撓也竟拜堂下受胙堂上晉侯欲求會葵丘故孔止之料齊將及亂而復戒獻公以自靖其國可謂明矣九月晉獻公卒冬十月里克殺奚齊于次十一月里克殺公子卓于朝齊侯以諸侯之師伐晉及高梁而還討晉亂也令不及魯故不書齊隰朋帥師會秦師納晉惠公次䘮寢高梁晉地在今山西臨汾縣境詳見晉驪姬之亂十年夏四月周公忌父王子黨會齊隰朋立晉侯詳見驪姬之亂十一年夏揚拒泉臯伊雒之戎同伐京師王子帶召之也秦晉伐戎以救周召戎欲因以簒位餘詳見子帶之亂十二年春諸侯城衞楚丘之郛懼狄難也黄人恃諸侯之睦于齊也不共楚職夏楚滅黄桓業將衰冬齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣王以齊桓翼戴之謀多出于仲故因其來厚禮之國子高子天子所命為齊守臣為上卿節時也諸侯之臣稱于天子曰陪臣伯舅之使故曰舅氏督正也謂功勲美德正而不可忘言職者管仲位卑而執齊政故以職尊之管子不以職自高卒受本位之禮詩大雅愷樂也悌易也言樂易君子為神所勞來故世祀也竊以管仲之後不顯于齊而云世祀者想以功德世為齊人所祀如董安于之祀于趙廟或如諸葛武侯之祀于蜀人也十三年春齊侯使仲孫湫聘于周詳見王朝子帶之亂夏會于鹹淮夷病把故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之鹹衞地今北直𨽻開州有鹹城淮夷淮南北之夷杞今為河南杞縣十四年春諸侯城縁陵而遷杞焉不書其人有闕也縁陵把邑把迫于淮夷故城之以定其遷闕謂器用不具城池未固而去為惠不終也十五年春楚人伐徐徐即諸夏故也三月盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之秋伐厲以救徐也冬楚敗徐于婁林徐恃救也徐國南直𨽻泗州有徐城牡丘齊地山東東昌府城東北有牡丘匡衞邑北直𨽻長垣縣有匡城厲楚與國湖廣隨州境舊有厲村婁林徐地南直𨽻虹縣東北舊有婁亭十六年夏齊伐厲不克救徐而還秋王以戎難告于齊齊徴諸侯而戍周十一年戎伐京師以來遂為王室難冬十一月乙卯鄭殺子華十二月會于淮謀鄫且東畧也城鄫役人病有夜登丘而呼曰齊有亂不果城而還淮水自今泗州龜山北流入淮安府界東入海鄫國今山東嶧縣鄫為淮夷所病故謀之役人遇厲氣不堪乆駐故作妖言然齊亂亦兆矣十七年春齊人為徐伐英氏以報婁林之役也英氏楚與國咎繇之後都六今為直𨽻六安州冬十月乙亥齊桓公卒古稱齊地沃衍負海之饒仲用以伯讀管子國語其所以治齊者皆變古聖法而為之至其兵威所至無不靡從雖由扶義以動而畧亦宏矣特楚國方强而子文適相故姑薄伐焉而徒問其細使之受盟斯止其亦審于勢哉及陳德禮之訓拒子華之請誠雋乎其言也為伯者倡而名繼三王良以是夫而齊不為之置後與鮑氏俱顯何耶宋襄公圖伯僖公八年冬宋公疾太子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退兹父襄公名目夷其庶兄字子魚不順亂嫡庶之分也九年春宋桓公卒未葬而襄公會諸侯故曰子凡在䘮王曰小童公侯曰子小童蒙㓜之稱子者繼父之辭公侯位尊上連王者下絶伯子男冬宋襄公即位以公子目夷為仁使為左師以聴政於是宋治故魚氏世為左師十五年冬宋人伐曹討舊怨也莊十四年齊桓公伐宋曹與焉故也桓尚在而伐曹不忌桓也時已有代桓之心矣然苟有伯者之畧弃怨以明徳于天下夫豈不可而必怨焉是討是離其心而去之矣十六年春隕石于宋五隕星也六鷁退飛過宋都風也周内史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大䘮明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也石本星也至地而為石六鷁遇迅風而退飛祥吉凶之先見者内史中大夫叔興其字言隂陽順逆為吉凶之兆而非吉凶之所由生吉凶由於人之善惡所感必先有以感之而後見於兆譏襄公不脩人事而徒問物變且以已對嫌于宣露故更正言以諱之焉鷁水鳥或作鶂雌雄相視則孕或云雄鳴上風雌承下風亦孕世多繪形舟前為飾十七年冬齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋孝公桓公所屬之宋公者詳見桓公五子争立十八年春宋襄公以諸侯伐齊三月齊人殺無虧鄭伯始朝于楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鍾楚以其金利故也傳言其無逺畧夏五月宋敗齊師于甗立孝公而還甗齊地十九年春宋人執滕宣公夏宋公使邾文公用鄫子于次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一會而虐二國之君又用諸滛昏之鬼將以求霸不亦難乎得死為幸睢水在河南陳留縣東北經睢州達寧陵縣時此水次有妖神東夷皆社祠之用殺之以為牲襄公滛虐子魚憂之六畜馬牛羊犬豕雞不相為用若祭馬先不用馬之類三亡國邢衞把薄徳謂其徳不若古聖王滛鬼非周社也得死得良死也秋宋人圍曹討不服也子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降退脩教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動崇崇侯虎因壘不益備也詩大雅言文王之教自近及逺以服崇子魚欲公省徳而自止陳穆公請脩好于諸侯以無忘齊桓之徳冬盟于齊脩桓公之好也宋襄暴虐故思齊桓二十年冬宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟二十一年春宋人為鹿上之盟以求諸侯于楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗秋諸侯會宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬㑹于薄以釋之子魚曰禍猶未也未足以懲君鹿上宋地在今南直𨽻汝州境舊有原鹿縣盂宋地薄闕二十二年春三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣秋楚人伐宋以救鄭宋公將戰大司馬固諫曰天之弃商乆矣君將興之弗可赦也已弗聴冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不皷不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而皷之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有于二毛明耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金皷以聲氣也利而用之阻隘可也聲盛致志皷儳可也伐鄭楚必救之故曰禍大司馬固莊公孫公孫固也宋商後商滅於紂故云天弃言違天天必不宥泓水名司馬子魚也門官守門者師行則在君左右殱盡也二毛謂髪有二色以阻隘乘之以制勝也子魚言楚本勍敵乘其隘而不列猶懼不勝胡耉元老也言明設刑罰以恥不果本期交殺設傷而未死尚能害己何可勿重若妄有愛惜不如服而不戰則殺傷自無利乘其便也兵以皷進金鉦也鳴之以節鼓聲宣也宣倡士卒之勇氣儳儳巖未整也二十三年春齊侯代宋圍緡以討其不與盟于齊也緡宋地今山東金鄉縣有緡城夏五月宋襄公卒傷于泓故也創死如子魚慮子成公王臣立二十四年秋宋及楚平宋成公如楚還入于鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有䘮拜焉豐厚可也鄭伯從之享宋公有加禮也武子鄭卿有事祭宗廟也尊之故賜以祭胙宋弔周喪王特拜謝之傳善鄭能尊先代宋襄矯誣小慧妄慕大名無足論者子魚才非管仲而伐崇之喻識則逺矣然豈襄公之所能及哉且齊晉俱大國而稍逺于楚故圖回數年一出而能與楚競宋既國小而密邇楚境將畏偪之不暇而安能以布其謀猷乎使戰泓而勝禍亦不旋踵矣非文王之至徳曷足以勝之晉文公之伯附襄公繼伯僖公二十三年秋楚成得臣帥師伐陳討其貳于宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾成得臣字子玉焦夷陳二邑焦一名譙夷一名城父俱今南直𨽻亳縣有廢譙縣廢城父縣頓近陳小國今河南商水縣城之以偪陳叔伯薳吕臣字以子玉不任令尹子文言將矜功為亂不可不賞子玉非文公敵也故卒以楚敗且慮其為亂而舉豈任人之體哉晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生禄於是乎得人有人而校罪莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗以叔隗妻趙衰將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子處狄十二年而行過衞衞文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懷與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自貳焉乃饋盤飱寘璧焉公子受飱反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啓人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至于今一也離外之患而天不靖晉國殆將啓之二也有三士足以上人而從之三也晉鄭同儕其過子弟固將禮焉況天之所啓乎弗聴及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜重耳文公名難由驪姬事見十卷蒲其治邑今山西蒲縣以恃君命而得禄以聚衆故順命而奔時從者猶有狐毛賈佗而止言五人者或有後先故逸之也廧咎如赤狄之别種隗姓就木死而棺也五鹿衞地今北直𨽻大名府東有五鹿墟塊為土得國之祥時齊桓既與秦納惠公不欲復納重耳猶忌其賢以計縻之至桓公卒孝公立諸侯皆叛壻又去恐孝公怒故從者密謀欲行而姜殺聞者以滅口復醉遣之公子殊無去志也姜氏即公所妻者其明智過人駢脅并肋也薄迫也僖負羈曹大夫以相用以相國也自貳自别異也臣無境外之交故用盤藏璧飱中公子廉故返璧時宋襄獨厚遺之叔詹鄭卿啓開也公子母狐姬故曰姬出離罹也三士據國語狐偃趙衰賈佗皆相才楚成知公子賢故享而問何報以觀其志三十里為一舍命止師之命弭弓末無縁者櫜以受箭鞬以受弓屬著也欲與楚爭衡決勝成伯業子玉畏其志大請殺之楚子以天意所鍾弗許廣志廣儉體儉晉侯指惠公秦近晉送使納之而秦亦知其將伯矣懷嬴子圉妻匜以注水於盤中沃手曰盥既已揮卻也以黷姓故嬴不喻怒懼懼訴文儀度文辭河水逸詩義取河水朝宗于海海以喻秦六月詩小雅稱尹吉甫佐宣王征伐喻公子還晉匡王國也稽首見天子禮故伯降而辭諸臣從亡忠勤至矣而獨於懷嬴事乃陷其君於瀆倫焉國語載懷嬴之納文公欲辭之而胥臣子餘皆勸之使娶豈所謂將順其美者耶二十四年春王正月秦伯納之及河子犯以璧授公子曰臣負羈絏從君巡于天下臣之罪甚多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧于河羈馬絡首絏馬繮子犯重耳舅有如水言此水之神實臨之因投璧以質信於神二月丁未朝于武宫詳見驪姬之亂秋頽叔桃子奉太叔以狄師伐周王出適鄭王使簡師父告于晉使左鄔父告于秦詳見王室子帶之亂二十五年春秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黄帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王享吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也晉侯辭秦師而下三月甲辰次于陽樊右師圍温左師逆王夏四月丁巳王入于王城取太叔于温殺之于隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代徳而有二王亦叔父之所惡也與之陽樊温原欑茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰徳以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民子犯以勤王為伯業之始晉文侯仇為平王侯伯匡輔周室故云繼文公猶疑參之以卜筮黄帝與神農之後姜氏戰于阪泉之野勝之今得其兆故以為吉公自謂已當之故言不堪偃以今之周王自當帝兆非公也乾下離上大有兊下離上睽大有九三變而為睽三為三公而得位變而為兊兊說得位而說故能為王所宴饗而協吉更揔言二卦之義乾為天兊為澤乾變為兊而上當離離為日日之在天垂曜在澤天子在上說心在下是降心逆公之象去睽卦還論大有亦有此象乾尊離卑降尊下卑故其象同辭秦師使還獨納王順流曰下王徳晉除太叔既行享禮復設醴酒又加幣帛以助歡宥助也隧一云掘地通道王之葬禮一作遂王畿有六遂天子六軍之制未詳四邑先與鄭復歸今賜晉在晉山南河北故為南陽今河南脩武縣有南陽城倉葛陽樊人出民惟取其土蓋晉都絳太行山西黄河東今山西平陽太原等府皆其地自獻公啓土多在西北得周賜邑而轉南矣秋秦晉伐鄀楚鬬克屈禦冦以申息之師戍商密秦人過析隈入而係輿人以圍商密昏而傅焉宵坎血加書偽與子儀子邊盟者商密人懼曰秦取析矣戍人反矣乃降秦師秦師囚申公子儀息公子邊以歸楚令尹子玉追秦師弗及遂圍陳納頓子于頓鄀秦楚界上小國都商密漢為丹水縣後廢鬬克申公子儀名屈禦㓂息公子邊名因秦晉伐鄀戍以衞之析楚邑近商密今為河南内鄉縣隈隱蔽之處二子戍商密實屯兵于析以為之援秦以計係縛輿人詐為克析得其囚俘者昏時傅城使商密不知囚非析人復掘地為坎以埋盟之餘血加盟書其上若二子已從之而盟故商密懼降秦既降而析戍亦敗二子被囚冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫于冀趙衰為原大夫狐溱為温大夫晉侯問原守于寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原伯貫周守原大夫冀晉邑今山西河津縣有冀亭古國狐溱狐毛子勃鞮披也從從亡徑餒途中饑也言衰廉且仁不忘君衰之賢素矣乃咨之寺人栁子故有議焉二十六年夏東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也時魯两被齊兵故使二臣乞師報之言其不臣于周可以此罪伐之楚豈能臣者而使之伐之也宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取穀楚申公叔侯戌之戍之以偪齊詳見齊桓公五子爭立二十七年秋楚子將圍宋使子文治兵于暌終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政于子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣苟入而賀何後之有冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新婚於衞若伐曹衞楚必救之則齊宋免矣於是乎蒐于被廬作三軍謀元帥趙衰曰卻縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓于狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犨為右楚前伐宋猶不服將復圍之而治兵子文時不為令尹故云使欲委重子玉故畧其事皆賀賀子玉堪其任蒍賈字伯嬴孫叔敖父靖國述前子文答伯叔之言三百乘二萬二千五百人言其才止能將此過則以衆敗而不能入國暌蒍皆楚邑晉因宋告急先軫決策救之偃謀攻楚所愛則宋圍自解於是蒐兵選將得郤縠於趙衰棄之論將誠善宜為世法春蒐禮敬其始也被廬晉地三軍備大國之制夏書益稷謨賦取試用庸功也尚書賦作敷試作庶狐毛偃兄欒枝謚貞子欒賔之孫林父謚桓子魏犨謚武子御戎戎車之御右車右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大蒐以示之禮作執秩以正其官民聴不惑而後用之出穀戍釋宋圍一戰而伯文之教也文公謀伯教民以戰子犯又慎其所以示之者三謂民無義則苟生而無以自固故以義利民而民懷其生無信則不知其所以為用而交詐以相傾故信明而民無多求自重其言無禮則民慢上故蒐以順少長明貴賤作執秩之官以正其等皆以文德教民而非專競武力故伯業一舉而成宣明也易貿易也明徴明白可徴也執主秩爵秩也二十八年春晉侯將伐曹假道于衞衞人弗許還自南河濟侵曹伐衞正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍上徳也晉侯齊侯盟于斂盂衞侯請盟晉人弗許衞侯欲與楚國人不欲故出其君以說于晉衞侯出居于襄牛楚人救衞不克晉侯圍曹門焉多死曹人尸諸城上晉侯患之聴輿人之謀曰稱舍於墓師遷焉曹人兇懼為其所得者棺而出之因其兇也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犨顛頡怒曰勞之不圖報於何有爇僖負羈氏魏犨傷於胷公欲殺之而愛其材使問且視之病將殺之魏犨束胷見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡以狥于師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舎我而賂齊秦藉之告楚我執曹君而分曹衞之田以賜宋人楚愛曹衞必不許也喜賂怒頑能無戰乎公說執曹伯分曹衞之田以畀宋人楚子入居于申使申叔去穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衞侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是弃宋也救而弃之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衞以攜之執宛春以怒楚既戰而後圖之公說乃拘宛春于衞且私許復曹衞曹衞告絶于楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在乆乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憗次于城濮楚師背酅而舍晉侯患之聴輿人之誦曰原田每每舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大耻不如戰也晉侯夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬭勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乘韅靷鞅靽晉侯登有莘之虚以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曵柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀及癸酉而還甲午至于衡雍作王宫于踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也已酉王享醴命晉侯宥王命尹氏及王子虎内史叔興父策命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受策以出出入三覲衞侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟癸亥王子虎盟諸侯於王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼君子謂是盟也信謂晉於是役也能以徳攻初楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀余余賜女孟諸之麋弗致也大心與子西使榮黄諫弗聴榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聴出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連穀而死晉侯聞之而後喜可知也曰莫余毒也已蒍呂臣實為令尹奉已而已不在民矣六月晉人復衞侯衞侯先期入叔武將沐聞君至喜捉髪走出前驅射而殺之元咺出奔晉城濮之戰晉中軍風于澤亡大斾之左旃祁瞞奸命司馬殺之以徇于諸侯使茅茷代之師還壬午濟河舟之僑先歸士㑹攝右秋七月丙申振旅愷以入于晉獻俘授馘飲至大賞徴會討貳殺舟之僑以徇于國民於是大服君子謂文公其能刑矣三罪而民服詩云惠此中國以綏四方不失賞刑之謂也曹衞前既無禮復偕即楚故用狐偃謀伐之以救齊宋時衞國今河南衞輝府曹國今山東曹州晉自絳由潞澤至衞曹越在衞南故假道既從汲縣南渡出衞南而東侵因回軍伐衞取其邑五鹿胥臣司空季子原軫食邑以賢超升故曰上徳斂盂襄牛皆衞地時衞文公已卒今其子成公晉追前怨不使與盟時晉强楚不能救門攻其門尸陳其尸舍墓若將發塚者故曹懼軒大夫車言其濫爵弃賢故責其功狀報施報飱璧之施犨頡有從亡之勞故怒其不圖而焚僖氏爇焚也距躍直跳曲踊横跳百陌同又道也蓋躍踊之度約有陌許者三門尹般宋大夫晉既伐曹衞而宋圍猶未解故復告急公欲與楚戰以齊秦未從則助晉者寡軫謀使宋賂二國以求救假藉之為宋請又激楚使不許齊秦喜得宋賂而怒楚之頑不可告必自戰公從焉楚子雅知其必伯故使其臣避之公亡時年十七至此年四十矣害謂世難也三言皆兵書允當無過求也伯棼越椒字間執塞也讒慝若吕臣蒍賈之言楚子還申遣兵以就前圍宋之衆楚有左右廣又太子有宫兵若敖楚武王祖父子玉祖也六卒子玉宗人之兵六百人蓋不悉師以益之然不更召之反而乃少與之師誠失計矣子玉知其君意故使使两解而歸以釋宋圍一徳與晉侯以復衞封曹二功歸已故子犯以僭上無禮可急擊先軫以定國為禮不可與爭然許其請則徳自楚出晉為無權不許則弃宋而三怨皆集故私復曹衞拘執其使皆奪其德而搆之使怨且激之怒以進其兵彼進而我則退以報其贈送之惠實三舍之言凡皆居敵于曲而自居於直子玉墮其計中追晉不止晉帥宋齊秦之師與之遇攜之貳之也亢蔽也宋為楚之仇救宋謂蔽其仇素飽直氣盈飽有素也國歸父崔夭齊大夫小子憗秦穆公子城濮衞地酅丘陵險阻名公恐衆畏險故聴其歌誦高平曰原喻晉君美盛若原田之草每每然可以謀立新功不足念舊惠公以衆不直已疑焉故子犯究勝負之致以決之公猶懐楚惠欒枝以滅諸姬為大恥小惠為不足懐又以夢㓙為懼子犯權解為吉其君臣詳慎如此漢陽漢水之北盡盡滅也盬蠱同捧持而毁損之也晉侯仰故得天楚子俯故伏罪腦氣和煦物近之柔因審見事宜皆曲以果其志鬬勃楚大夫以戰為戯輕民命也晉使戒敬其事命止命詰朝平旦也七百乘五萬二千五百人在背曰韅在胷曰靷在腹曰鞅在後曰靽言駕乘脩備有莘故國名公望其師有禮戰志益決觀子玉請戰之詞與欒枝之對晉侯之觀兵勝負已别子西鬬宜申子上鬬勃子玉既輕晉而晉尤多設權譎務期必勝以陳蔡師弱馬畏虎故蒙其皮先犯之所謂攻瑕也本屬右故奔而右潰斾大旗建大斾而退使若大將稍却又曵柴起塵詐為衆走以誘楚師逐已公族之兵屬中軍以之横擊則其陣亂復以上軍張兩翼夾攻之故左亦潰唯子玉猶能全其所將之卒館舍也晉食楚軍三日之穀襄王聞晉戰勝乃自徃勞之故為之作宫鄉役戰之前致致之來子人氏九其名踐土衡雍皆鄭地今河南榮澤縣有衡雍故城踐土臺以敵王愾故獻俘駟介四馬被甲徒兵步卒傅相也以周平王享晉文侯仇之禮享晉侯享醴宥解見本事内前以策書命晉侯為伯周禮九命作伯尹氏王子虎皆王卿士叔興父大夫也三官命之以寵晉大輅金輅祭祀所乘其服自王公以下各有等而侯伯則鷩冕七章周禮王公衮冕九章一曰龍二曰山三曰華蟲四曰繡火五曰宗彞繢于衣六曰藻七曰粉米八曰黼九曰黻之於裳侯伯七章自華蟲以下戎輅戎車兵事所乘其服以韎韋為弁又以為衣而素裳白舄彤赤弓玈黑弓弓一矢百則矢千弓十矣諸侯賜弓矢然後專征伐秬黑黍鬯香酒所以降神卣中尊也周禮虎賁氏以虎士三百人先後王而趨侯伯始受此命逖逺也有惡于王者糾而逺之晉侯從來至去凡三覲王元咺衞大夫叔武衞侯弟奉攝君事也王庭踐土宫之庭𫝊謂盟合信義以文徳勝楚弁冠也有皮弁爵弁疑此爵弁也纓冠系瓊與玉分飾瓊赤玉孟諸宋藪澤水草之交曰麋大心子玉子子西子玉族子玉剛愎故因榮黄而諫季榮黄字濟師謂得神佑可以勝晉不勤民謂其惜所寳而忤神以殘民也王言申息二邑子弟皆從征而死何以見其父老孫伯大心字二子答言欲令徃就君戮至連穀王無赦命故自殺可知公喜見顔色也言吕臣唯便其身圖吕臣能知子玉之不堪而不為文公所忌豈識優而才弱者乎以叔武受盟故歸衞侯衞侯有疑叔武心故先入叔武喜倉皇出迎前驅探君意射殺之咺奔晉愬其事詳見甯武子弭晉難風馬牛因風而走大斾大將之旗通帛曰旃祁瞞掌此二事而失之為奸命攝權代也愷樂也軍勝奏凱而歸授數也獻楚俘于廟徵召也三罪顛頡祁瞞舟之僑詩大雅言賞刑不失則中國愛惠四方安靖冬會于温討不服也衞侯與元咺訟甯武子為輔鍼莊子為坐士榮為大士衞侯不勝殺士榮刖鍼莊子謂甯俞忠而免之執衞侯歸之于京師置諸深室甯子職納橐饘焉是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也壬申公朝于王所丁丑諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衞偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舎此三者君將若之何公說復曹伯遂會諸侯于許晉侯乘戰勝之威復合諸侯召王出狩以諸侯見展臣子之禮不服謂衞許大士治獄官也周禮命夫命婦不躬坐獄訟元咺又不宜與其君對坐故使鍼莊子為主又使衞之忠臣及其獄官質正元咺而三子詞屈故囚衞侯甯俞忠慮專親其飲食以槖乘饘而納焉職專也夫子以召王意雖美而不合道故云不可為訓使若天王自狩并隠其闕以明晉之徳河陽晉地今河南孟縣有河陽城豎小臣名侯獳筮史晉掌卜筮之史解釋也使以釋曹為言異姓邢衞振鐸曹始封君前衞侯歸以殺叔武更執故云不偕復二十九年夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不會公侯會伯子男可也翟泉今洛陽城内舊有大倉西南池水也晉侯始霸翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵公侯虧禮傷教故貶諸大夫諱公與盟大國之卿當小國之君故可以會伯子男三十年春晉人侵鄭以觀其可攻與否狄閒晉之有鄭虞也夏狄侵齊齊晉與國晉侯使醫衍酖衞侯甯俞貨醫使薄其酖不死公為之請納玉於王與晉侯皆十瑴王許之秋乃釋衞侯文公怨衞侯深罪不至死故使酖之衍醫名甯俞視衞侯食故得賂醫薄酖雙玉曰瑴餘見甯武子弭晉難九月甲午晉侯秦伯圍鄭以其無禮於晉且貳於楚也無禮於出亡時餘見秦穆公霸西戎三十一年春敢濟西田分曹地也使臧文仲往宿於重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東𫝊于濟盡曹地也襄仲如晉拜曹田也濟水出陶丘至汶上縣同汶水入海一名大清河曹濟之西魯濟之東重館在山東魚臺縣境舊有重鄉城前討曹分其地而界未定至是乃實賜三十二年春楚鬭章請平于晉晉陽處父報之晉楚始通冬晉文公卒晉文行師動崇禮信嫓迹齊桓而夫子以正譎分之其殆專指戰楚一事乎使其捐曹衞之怨一以綏懷為徳幾於王矣而惜其病此也既勝而諸侯麇從强楚縮焉而不敢競與桓異焉以子玉死而代之者不克以抗衡故爾噫當分裂雲擾之際必皆雄俊乃能分峙稍劣不敵焉覆亡隨之矣而况能逺務外畧哉若吕臣其蓋審勢而自守者與以下附襄公繼伯三十三年冬晉陳鄭伐許討其貳於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭晉陽處父侵蔡楚子上救之與晉師夾泜而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上子上鬬勃字陳今為河南陳州許今為許州介于二伯與蔡鄭同故爭之餘見鄭穆公之立泜水一名滍水源出今河南魯山縣流至葉縣入沙河蓋迎水而軍兵家所忌此兩軍夾水莫能先渡故患相持不決乃使云文以綏柔為徳因其順而犯之非徳也武以克難為勇畏其强而避之非勇也若欲戰而不退舍使之得涉或半涉或未成陳而擊之皆悖此二義處父料楚必不敢涉必退舎楚退而晉涉亦如大孫伯所慮故誘使稍却因誣以遁去而歸商臣怨子上止王立已故譛之事見楚成王之弑文公元年晉文公之季年諸侯朝晉衞成公不朝使孔逹侵鄭伐緜訾及匡晉襄公既祥使告于諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居胥臣伐衞五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子衞人使告于陳陳共公曰更伐之我辭之衞孔達帥師伐晉君子以為古古者越國而謀秋晉侯疆戚田故公孫敖會之孔達衞大夫匡本衞邑為鄭所取故伐之緜訾地闕祥小祥且居軫子效尤謂效其不朝之尤昭子衞大夫戚其食邑今北直𨽻開州有戚城陳以見伐求和不競太甚故使報伐示彊而已為之詞古謂古者友邦道厚越國而相與謀疆正其疆伐晉非謀之善乃以古美之然非越國而謀之非所以為謀者非也二年春晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公未至六月穆伯會諸侯及晉司空士縠盟于垂隴晉討衞故也書士縠堪其事也陳侯為衞請成于晉執孔達以說獻猶臨也晉使大夫盟公為非禮而公受其辱故立文為以尊臨之者復為之諱垂隴今河南滎陽縣東舊有隴城陳始與衞謀謂可以强得免今晉不聴故更執孔達以為辭三年春莊叔會諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃沈今河南汝陽縣有平輿故城其國潰如水之潰放不可止逃如匹夫脫身逃竄也衞侯如陳拜晉成也冬晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂菁莪詩小雅取其既見君子樂且有儀降降階登成俱還上成拜禮嘉樂詩大雅取其顯顯令徳宜民宜人受祿于天四年春晉人歸孔達于衞以為衞之良也故免之夏衞侯如晉拜曹伯如晉會正拜謝歸孔達會正會受貢賦之政六年秋季文子將聘於晉使求遭䘮之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害八月乙亥晉襄公卒文子名行父聞晉侯疾故求䘮禮其人從者難難卒得所謂三思而行者冬十月襄仲如晉葬襄公七年秋八月齊侯宋公衞侯陳侯鄭伯許男曹伯會晉趙盾盟于扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也後至不書其國辟不敏也扈鄭邑在今河南原武縣境舊有扈亭晉侯靈公也書所會謂列其公侯卿大夫也辟除也以其怠事而辟除之若不與也冬晉郤缺言於趙宣子曰日衞不睦故取其地今巳睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懐何以示徳無徳何以主盟子為正卿以主諸侯而不務徳將若之何夏書曰戒之用休董之用威勸之以九歌勿使壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府正徳利用厚生謂之三事義而行之謂之徳禮無禮不樂所由叛也若吾子之徳莫可歌也其誰來之盍使睦者歌吾子乎宣子說之郤缺晉卿宣子名盾時將中軍缺欲盾以徳綏諸侯夏書禹謨人有善則戒喻而休美之有罪則董督而威懼之徳禮謂以徳行其禮賞罰有章禮也為善者競勸斯皆樂而歌之來逺之道也八年春晉侯使解揚歸匡戚之田于衞且復致公壻池之封自申至于虎牢之竟前孔達伐鄭不能復匡盾因郤缺言始令鄭歸之并歸以元年所取戚田公壻楚地名此人因地為氏池其名疑本楚人奔晉晉取鄭地以封之既令鄭歸匡于衞因思池封乃鄭地亦宜歸故盡其竟致之以故盾能相幼君主盟晉人以扈之盟來討冬襄仲會晉趙孟盟于衡雍報扈之盟也討公後至報猶復也世稱桓文一耳而實異焉桓公兩定周難封衞存邢把平魯晉之亂南伐楚北伐山戎威徳幾遍海宇矣晉文僅勝楚扶襄較未能當其半也然桓身死國亂不復振晉主夏盟者百餘年固其𦙍祚有異亦由托國建嗣之攸致也哉春秋左傳屬事卷二
