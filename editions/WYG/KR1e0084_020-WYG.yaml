body:
  text: 春秋左傳屬事卷二十明傅遜撰楚呉越昭王復國定公四年初伍貟與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰呉為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮呉之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出包胥楚大夫與子胥善而各行其志復報也荐數也言呉貪害如蛇豕封大也呉有楚則與秦鄰故患取分與呉共分楚地撫存恤也伏隠處也無衣秦風取其王于興師脩我戈矛與子同仇與子偕作與子偕行無衣三章章三頓首故九頓其首五年夏申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知呉道使楚人先與呉人戰而自稷會之大敗夫㮣王于沂呉人獲薳射於柏舉其子帥奔徒以從子西敗呉師於軍祥秋七月子期子蒲滅唐九月夫㮣王歸自立也以與王戰而敗奔楚為堂谿氏呉師敗楚師于雍澨秦師又敗呉師呉師居麇子期將焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰呉師敗又戰于公壻之谿呉師大敗呉子乃歸囚闉輿罷闉輿罷請先遂逃歸葉公諸梁之弟后臧從其母於呉不待而歸葉公終不正視道謂行兵之法稷沂皆楚地薳射楚大夫奔徒敗散之卒軍祥亦楚地以唐從呉伐國滅之夫㮣戰敗奔楚蓋事後此終言之棠溪河南郾城西八十五里有棠溪故城麇楚地子期欲焚其師於此子西謂前與呉戰父兄多死其中不忍并焚子期言焚呉復國則祭祀不廢而死者得歆公壻楚地闉輿罷楚大夫先被呉囚誑呉而歸諸梁沈尹戊之子葉公子髙也其弟后臧與母俱獲於呉竟弃母而歸故惡其人冬楚子入于郢初鬭辛聞呉人之争宫也曰吾聞之不讓則不和不和不可以逺征呉争於楚必有亂有亂則必歸焉能定楚王之奔随也將涉於成臼藍尹亹涉其帑不與王舟及寧王欲殺之子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懷子西曰請舍懐也王曰大徳滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸遂逃賞王將嫁季芈季芈辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹王之在隨也子西為王輿服以保路國於脾洩聞王所在而後從王王使由于城麇復命子西問髙厚焉弗知子西曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在袒而示之背曰此余所能也脾洩之事余亦弗能也成臼水名在今湖廣漢川縣南一百二十里源出縣西界入漢藍尹楚官名亹寧安定也志記也鬬辛等九子皆從王有功故賞懐初謀弑王故欲舍之王憐其念父以其兄有大功故并賞子旗有功平王恃功見殺包胥常尤其人遂逃賞以自異脾洩楚邑失王恐國人潰散乃偽為王車服權立國脾洩以保安道路之人城麇築城于麇今岳州府境有東西二城其所築也子西以由于不能其事當辭勿行由于以人材質不同于能受戈蔽王而不能如脾洩之事豈能知城事乎傳言楚多賢臣各致其能故昭王歸國六年四月己丑呉大子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚令尹子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國終纍闔廬長子夫差兄潘子臣小惟子楚二帥陵陸也水陸二師皆敗子西以國人知懼而後可與圖安故遷郢於鄀改紀以安定之鄀本都商密漢為丹水縣後廢在今河南内鄉縣西南一百二十里楚徙之近郢後為襄州樂鄉縣襄州今為襄陽樂鄉巳廢其地在襄陽府城南二百二十里子西遷郢實此竊謂臨難遷都智謀所忌楚雖遭呉患國猶未虧也何用遷鄀以自弱乎子西諸臣皆忠勇有謀籌之豈其畧耶緣楚郢本今江陵呉自江而至頗為便易襄陽稍北呉既難犯尤居國上流其勢易以制呉斯見謀國營慮萬端不可以一律拘也至今襄陽控制南北天下之形勝實稱焉子西其審矣哉十四年頓子牂欲事晉背楚而絶陳好二月楚滅頓牂頓子名頓今河南商水縣十五年呉之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡豹胡子名胡今南直𨽻頴州哀公元年春楚子圍蔡報柏舉也里而栽廣丈髙倍夫屯晝夜九日如子西之素蔡人男女以辨使疆于江汝之間而還蔡於是乎請遷于呉栽設版築為圍壘周匝去蔡城一里壘厚一文髙二丈夫役屯聚晝夜不止凡九日而壘成子西本計如此今如之辨别也男女各别係纍而出降楚欲使蔡徙國在江水之北汝水之南蔡權聽命故楚師還既還而蔡叛楚即呉二年秋呉洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷于州來蔡請遷于呉中悔故因聘襲之蔡殺駟以説於呉言不時遷駟之為也將遷與先君辭故哭四年春蔡昭侯將如呉諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴承音懲蓋楚言或云衍字翩蔡大夫射公公卒門之翩以矢自守門鍇亦蔡大夫如牆並行如牆俱進中肘中鍇之肘旰即霍也夏楚人既克夷虎乃謀北方左司馬取申公壽餘葉公諸梁致蔡於負函致方城之外於繪闗曰呉將泝江入郢將奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍于菟和右師軍于倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸夷虎蠻夷叛楚者謀北方既定其内而圖外也販夀餘諸梁皆楚大夫致蔡者先以蔡之故地人民以為邑今復會其衆於負函又會方城外之衆於繪闗負函繪闗皆楚地偽詞將以備呉夜約其期即襲梁霍使不知備一昔一夜也梁霍蠻二邑皆在今河南汝州境有廢梁縣有霍山又有蠻中聚浮餘楚大夫晉隂地在河南山北自今陜西洛南縣至河南嵩縣司馬即眅也起發也析豐皆楚邑析今為内鄉縣南舊有豐鄉眅發二邑之兵與戎狄之衆以臨上雒而分軍為二以脅晉之命大夫之守隂地曰士蔑者上洛即洛南莬和上雒東山倉野上雒之野少習武闗在今陜西商縣東一百八十里將大開武闗伐晉時晉有范中行之難故曰未寧九州戎在晉隂地陸渾者詐以田封蠻子而為之卜城因執之以與楚三户楚地内鄉縣西南有三户城楚復詐為蠻子作邑立其宗主誘而悉俘之六年春呉伐陳秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死弃盟逃讐亦不如死死一也其死讐乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大㝠卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀濳師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由巳率常可矣伐陳詳見楚滅陳前敗柏舉此戰更敗是再敗楚先於陳有盟呉為世仇若不救陳是弃盟逃仇申子西名結子期名啟子閭名皆昭王兄大㝠陳地呉師所在二順謂前許立為順命今立君子為順分濳師密發閉塗伏道也越女昭王妾章恵王名日為君象妖氛守之故以為當王身雲在楚上唯楚見之故禍不及他國禜禳祭諸侯望祀境内山川故不越望江今在荆州府城南源自蜀之岷山歴歸州夷陵宜都枝江公安石首而東與漢合漢今在荆門州東九十里源自陜西漢中為漢江至荆山東為滄浪水過濳江為沔水睢今在當陽縣北出房陵縣界與漳水合流通沱江至枝江縣界入大江漳今在當陽縣北界出臨沮縣南至當陽與沮水合流入大江皆在楚境夏書五子之歌云唐虞及夏皆都冀桀乃於此滅亡由不知天道之常也又書大禹謨言信出巳則福亦在巳昭王由巳率其常道可以保國白公勝之亂哀公十六年楚大子建之遇讒也自城父奔宋又辟華氏之亂於鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木請行而期焉子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在呉子西欲召之葉公曰吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊境使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處呉竟為白公請伐鄭子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣勝自厲劍子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝謂石乞曰王與二卿士皆五百人當之則可矣乞曰不可得也曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言説告之故辭承之以劍不動勝曰不為利謟不為威惕不􅂥人言以求媚者去之呉人伐慎白公敗之請以戰備獻許之遂作亂秋七月殺子西子期于朝而刼恵王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死石乞曰焚庫弑王不然不濟白公曰不可弑王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡方城之外皆曰可以入矣子髙曰吾聞之以險徼幸者其求無饜偏重必離聞其殺齊管脩也而後入白公欲以子閭為王子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將専利以傾王室不顧楚國有死不能遂殺之而以王如髙府石乞尹門圉公陽穴宫負王以如昭夫人之宫葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日日以㡬若見君面是得艾也民知不死其亦夫有奮心猶將旌君以狥於國而又掩面以絶民望不亦甚乎乃免胄而進遇箴尹固帥其屬將與白公子髙曰微二子者楚不國矣弃徳從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言曰不言將烹乞曰此事也克則為卿不克則烹固其所也何害乃烹石乞王孫燕奔頯黄氏沈諸梁兼二事國寧乃使寧為令尹使寛為司馬而老於葉建遇讒見前建奔鄭見宋華向之亂諜間伺者子木建字請行而期請行襲鄭而定其期也鄭殺建子勝亡在呉子西以勝信勇欲召之使藩衛其國葉公云周旋於仁之厚斯成其信率由於義之正斯成其勇言必求復以死為期則必悖仁傷義以濟其私謀豈曰信勇乎卒召之白楚邑在今河南息縣有白公城未節言楚新破未得節適讐不逺比于西於鄭人翼而長以鳥喻巳之愛育勝第用士之次第得死得良死言必殺之方為我也悛懼也石乞勝之徒二卿士子西子期熊宜僚楚勇士説相悦辭辭其事承之㧞劍指其喉慎楚邑在今南直𨽻廬州府城東北有慎城戰備欲陳鎧杖兵器如與呉戰時以入獻㨗因作亂以袂掩慚於葉公故豫章大木抉以殺人效其多力乞欲焚庫以息覬覦弑王以絶羣望勝志止復仇故弗從蔡遷州來楚并其地故葉公在蔡言行險圖倖者多求于人則偏重而離散欲須其斃討之管脩楚賢大夫管仲之後聞其殺賢知可討髙府楚别府居王於内乞主其門圍公陽楚大夫穴其宫以出王昭夫人王母也歳年穀㡬冀望也艾安也旌表也國人或勸之胄或勸之勿胄見葉公之得民也箴尹楚官名固欲助白公子髙葉公字言二子功多楚由以國而勝殺之是賊也豈可保其終而從之因使率衆攻勝勝奔縊微匿也長者謂白公燕白公弟頯黄呉地二事令尹司馬國寜國安也寧子西子字子國寛子期之子授二子位而歸老亦要後言之十七年秋王與葉公枚卜子良以為令尹沈尹朱曰吉過於其志葉公曰王子而相國過將何為他日改卜子國而使為令尹枚卜暗指所卜以令龜子良恵王弟志望也過相將為王也十八年春巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志故命之及巴師志將卜帥王曰寧如志何卜焉使帥師而行請承王曰寢尹工尹勤先君者也三月楚公孫寧呉由于薳固敗巴師于鄾故封子國於析君子曰恵王知志夏書曰官占唯能蔽志昆命元龜其是之謂乎志曰聖人不煩卜筮恵王其有焉巴四川重慶府有巴子城鄾時屬楚觀瞻楚開卜大夫子國未為令尹時卜為右司馬得吉兆故此命使為之帥請承請其佐寝尹由于以背受戈工尹薳國執燧象奔呉師所謂勤先君者析楚邑知志知用其志夏書大禹謨官占卜筮之官蔽斷也昆後也言當先斷以志後用龜蓋詳於人不瀆神也楚滅陳襄公三十年六月鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門以介於大國能無亡乎不過十年矣以陳之亡形巳備不可結好昭公八年陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼太子偃師而立公子留夏四月辛亥哀公縊干徴師赴于楚且告有立君公子勝愬之于楚楚人執而殺之公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚人執陳行人干徴師殺之罪不在行人也招過皆哀公弟哀公先愛留屬招過立之既見殺大子而立留知人心不順復憂恚自殺干徴師陳大夫以喪赴于楚而勝愬招過殺大子楚遂殺干徴師秋陳公子招歸罪於公子過而殺之九月楚公子弃疾帥師奉孫呉圍陳宋戴惡會之冬十一月壬午滅陳輿嬖袁克殺馬毁玉以葬楚人將殺之請置之既又請私私於幄加絰於顙而逃孫呉偃師子恵公奉之伐陳示欲立之也戴惡宋大夫輿嬖衆寵人袁克嬖之貴者殺馬毁玉以非禮葬哀公為將殺請置馬玉不用而求私盡其臣禮於幄中加絰以喪公義不臣楚故逃九年夏四月陳災鄭裨竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年陳顓頊之後顓頊以水徳王天下故為水屬火畏水故為之妃相治也楚之先祝融為髙辛氏火正治火火心星心星見而陳火是陳以水得火為之妃而興陳封而楚去故曰逐楚建陳火出於周五月而以四月者以長歴推前年悞置閏故也妃合也五行各相妃合得五而成故五嵗而陳復封是嵗嵗在星紀五嵗及大梁而陳復封自大梁四嵗而及鶉火後四周四十八嵗凡五及鶉火五十二年天數以五為紀故五及鶉火火盛則水滅而陳亡十三年平王即位悼大子之子呉歸于陳哀公元年呉之入楚也使召陳懷公懐公朝國人而問焉曰欲與楚者右欲與呉者左陳人從田無田從黨逄滑當公而進曰臣聞國之興也以福其亡也以禍今呉未有福楚未有禍楚未可弃呉未可從而晉盟主也若以晉辭呉若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無徳亦不艾殺其民呉日敝於兵暴骨如莽而未見徳焉天其或者正訓楚也禍之適呉其何日之有陳侯從之及夫差克越乃脩先君之怨秋八月呉侵陳脩舊怨也懐公令以與楚與呉者分右左陳人謂無所與者從其田之東西為左右都邑之人無田者隨其黨逄滑陳大夫當公見志在公也國勝國為呉所勝如莽如草生野莽莽然言多也訓楚使懼而改過何日無㡬日六年春呉伐陳復脩舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師于城父九年夏楚人伐陳陳即呉故也十年冬楚子期伐陳呉延州來季子救陳十一年夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女有餘以為巳大器國人逐之故出道渴其族轅咺進稻醴梁糗腶脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行封田封内之田悉賦税之大器鐘鼎之屬稻醴酒也梁糗乾飯腶加薑桂曰脯給備也言知必逐故即具此若諌恐見怒而先逐以弱小介乎强暴而所任若此何得不亡十五年夏楚子西子期伐呉及桐汭陳侯使公孫貞子弔焉及良而卒將以尸入呉子使大宰嚭勞且辭曰以水潦之不時無乃廩然隕大夫之尸以重寡君之憂寡君敢辭上介芋尹蓋對曰寡君聞楚為不道荐伐呉國滅厥民人寡君使蓋備使弔君之下吏無禄使人逢天之慼大命隕隊絶世于良廢日共積一日遷次今君命逆使人曰無以尸造于門是我寡君之命委于草莽也且臣聞之曰事死如生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而弃之是弃禮也其何以為諸侯主先民有言曰無穢虐士備使奉尸將命苟我寡君之命達于君所雖隕于深淵則天命也非君與涉人之過也呉人内之桐汭桐水之曲呉地今南直𨽻廣徳州弔弔其被兵也良亦呉地在邳州境尸未葬之通稱呉不欲以尸入故托言值水潦難濟恐隕其尸為重憂以辭廪然傾動貌尹蓋陳大夫貞子之上介據禮以必行荐重也備猶充也廢日并日共積共給委積一日即遷不敢留命也聘禮若賔死未將命則既斂於棺造於朝介將命又聘遭喪入竟則遂也不郊勞不筵几不禮賔主人畢歸禮賔唯饔餼之受不賄不禮玉不贈朝禮巳亡虐士死者無穢不以為穢也必欲奉尸以逹君命雖隕于淵無悔呉詘于禮而内之蓋誠知禮矣不二年而陳旋亡者以經國家定上下蓋有所不逮而或以觸楚之怒也豈若逢滑當公言之為智乎惜白公亂時無復聞有滑言也吁十七年楚白公之亂陳人恃其聚而侵楚楚既寧將取陳麥楚子問帥於大師子穀與葉公諸梁子榖曰右領差車與左史老皆相令尹司馬以伐陳其可使也子髙曰率賤民慢之懼不用命焉子穀曰觀丁父鄀俘也武王以為軍率是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝唯其任也何賤之有子髙曰天命不謟令尹有憾於陳天若亡之其必令尹之子是與君盍舍焉臣懼右領與左史有二俘之賤而無其令徳也王卜之武城尹吉使帥師取陳麥陳人御之敗遂圍陳秋七月巳卯楚公孫朝帥師滅陳聚積聚子穀言差車老二帥甞從子西子期伐陳習陳事諸梁言二帥官賤民不用其令穀又言先王武文皆用俘囚有功雖賤可使封畛於汝開封疆北至汝水子髙即諸梁又以天命揆之陳為子四所憾而其子必有功并知二帥賤而無徳憾憾其弃楚即呉也舍舍二帥朝子西之子勾踐滅呉昭公三十二年夏呉伐越始用師於越也史墨曰不及四十年越其有呉乎越得嵗而呉伐之必受其凶越自少康之庻子封于會稽今為浙江紹興府治國于呉之南自此之前雖疆埸小争未甞用大兵故曰始用史墨晉史官以存亡之數不過三紀嵗星三周三十六嵗故曰不及四十年此年嵗星在星紀星紀呉越之分嵗星所在其國有福呉先舉兵伐越故受其殃定公五年春越入呉呉在楚也呉入郢故也十四年夏呉伐越越子句賤禦之陳于檇李句踐患呉之整也使死士再禽焉不動使罪人三行屬劍於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈撃闔廬闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭苟出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越句踐越王允常子檇李今嘉興府城東有檇李城死士敢死士禽如鷙鳥之發急持以衝其陳呉陳堅不可動屬頸以劍注頸治治軍旅靈姑浮越大夫將指足大指見斬屨為所取陘呉地夫差闔廬子兩雄相持無間可乘少得焉則大勝矣夫差亦其流亞哉而卒以亡國惜也哀公元年春呉王夫差敗越于夫椒報檇李也遂入越越子以甲楯五千保于會稽使大夫種因呉大宰嚭以行成呉子將許之伍貟曰不可臣聞之樹徳莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸於有仍生少康焉為仍牧正惎澆能戒之澆使椒求之逃奔有虞為之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其徳而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今呉不如過而越大於少康或將豐之不亦難乎句賤能親而務施施不失人親不弃勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長冦讎後雖悔之不可食巳姬之衰也日可俟也介在蠻夷而長冦讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外呉其為沼乎三月越及呉平呉入越不書呉不告慶越不告敗也夫差報其父仇乘勝深入越國夫椒山在今無錫縣西大湖濵會稽山在今紹興府東南十餘里宰嚭讒諛越因之求成子胥知句踐君臣智勇失此不取後必滅呉以少康事為諌澆寒浞子浞寒國支庻今山東濰縣東北有寒亭其本國也事羿弑之有其室生澆封之過山東液縣舊有過鄴二斟夏同姓諸侯后相啓孫失國依之壽光縣東南舊有灌亭濰縣東南有斟亭澆伐二斟而滅相后緡相妻娠孕少康也緡仍女牧正牧官長惎毒戒備也椒澆臣虞舜後國今河南虞城縣庖正掌膳羞之官賴此以得除巳害思虞君以二女妻少康姚虞姓綸虞邑十里為成五百人為旅兆始也女艾少康臣諜候也季杼少康子后杼豷澆弟戈豷國與過俱滅舊物故業喻今釋越亦必爾也又言句踐施恵皆得其人推親愛則不遺小勞見其必復强報呉也違天言天與不取不可食巳言雖忿而欲食之不可得矣生育聚集也教訓使閑於戰陣為沼言呉宫廢為沼池也秋八月呉侵陳脩舊怨也呉師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患呉矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有災癘親巡孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也巳安能敗我前呉入郢召陳懐公辭不往夫差既入越脩是怨詳見楚滅陳楚諸臣懲前事患之子西言夫差與父異將自亡不足患不崇壇平地作室彤丹鏤刻也不觀無臺榭擇擇其堅厚而不靡費者分猶徧也後後於衆與焉與下同甘也與之共之也死知知身死不見曠廢易輕之也積土為髙曰臺有木曰榭過再宿曰次妃嬙貴者嬪御賤者日新不巳也六年春呉伐陳復脩舊怨也七年夏公會呉于鄫呉來徴百牢子服景伯對曰先王未之有也呉人曰宋百牢我魯不可以後宋且魯牢晉大夫過十呉王百牢不亦可乎景伯曰晉范鞅貪而弃禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦弃禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今弃周禮而曰必百牢亦唯執事呉人弗聽景伯曰呉將亡矣弃天而背本不與必弃疾於我乃與之大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯苟不以禮豈可量也寡君既共命焉其老豈敢弃其國大伯端委以治周禮仲雍嗣之斷髮文身臝以為飾豈禮也哉有由然也反自鄫以呉為無能為也鄫故國會鄫呉欲伯中國也宋百牢我呉過宋以百牢禮之也晉大夫謂范鞅數有常數淫過其數也天有十二次故制禮以象之冕旂玉路樊纓之類皆以十二為至牢數亦如之弃天謂過其數背本謂廢周禮弃疾言放弃凶疾以兵陵我也道長長大於道路子貢云畏大故君親行又言仲雍嗣大伯君呉變禮以治自同於夷由時遷易事以權濟不一拘於禮也及歸魯而知其不伯矣此言制禮以象天數冕服俱禮之大虞書制服十有二章周袞服乃九章云日月星辰畫於旂為足其數蓋因臧僖伯之諌云爾漢儒據之以解周禮愚久以為疑至有楊信齊氏云周天子服亦十二章公服九章昭然甚明辨之詳覈福寧黄氏深取其説則知宇宙之廣莫必有同心者特識之以俟好古君子考焉又按史大伯仲雍奔荆蠻文身斷髪示不可用以避季歴而此云云竊謂大伯始以夷習成其讓可耳若大伯既以禮治仲雍何用自同於夷乎恐子貢一時辨説之詞未足為據也八年春呉為邾故伐我盟而還為魯伐邾執其君也詳見季康子搆怨邾齊夏五月齊鮑牧帥師伐我齊侯使如呉請師將以伐我秋及齊平詳見田氏傾齊季康子搆怨邾齊九年春齊侯使公孟綽辭師于呉呉子曰昔嵗寡人聞命今又革之不知所從將進受命於君革易也秋呉城邗溝通江淮邢今揚州廣陵城東南築邢城今名蕪城下掘深溝謂之邢江自江東北通射陽湖又西北入淮以便兵餉也今名官河冬呉子使來儆師伐齊前呉與齊謀伐魯齊既與魯成而止故呉恨之反與魯謀伐齊十年春公會呉子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴于師呉子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之呉師乃還鄎齊地弑悼公以説於呉承呉大夫秋呉子使來復儆師冬楚子期伐陳呉延州來季子救陳謂子期曰二君不務徳而力争諸侯民何罪焉我請退以為子名務徳而安民乃還名勇名也避之以成其名季子至此年蓋九十餘矣故論之者多異説焉十一年春齊為鄎故國書髙無㔻帥師伐我師及齊師戰于郊詳見康子搆怨邾齊夏為郊戰故公會呉子伐齊五月克博壬申至于嬴中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍髙無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約呉髮短東郭書曰三戰必死於此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而巳不聞金矣甲戌戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公將戰呉子呼叔孫曰而事何也對曰從司馬王賜之甲劒鈹曰奉爾君事敬無廢命叔孫未能對衛賜進曰州仇奉甲從君而拜公使大史固歸國子之元置之新篋褽之以𤣥纁加組帶焉置書于其上曰天若不識不衷何以使下國呉將伐齊越子率其衆以朝焉王及列士皆有饋賂呉人皆喜唯子胥懼曰是豢呉也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志于齊猶獲石田也無所用之越不為沼呉其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于茲邑是商所以興也今君易之將以求大不亦難乎弗聴使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也呉其亡乎三年其始弱矣盈必毁天之道也前伐齊未逞復會魯再伐博嬴齊二邑皆屬今泰安州萊蕪縣中軍王自將巢姑曹展如呉三將書子占得志以死事也子陽即樓也與明相勸厲致死國子書也必死亦勸勉之虞送葬歌曲具含玉皆示以必死子行陳逆也尋繹也約繩也呉髮短欲以繩貫其首故預繹之三戰夷儀五氏與今也弦多齊人六年奔魯問遺也不復見言將死也聞鼓不聞金有進無退也艾陵齊地時齊呉之上軍皆敗勝負猶相當而王以精卒乘之故大勝而獲齊之羣帥公以兵從故以革車甲首勞公叔孫州仇也從司馬唯從呉司馬所命衛賜子貢拜拜受之褽荐也書云天唯識此不善故使下國殺國子衷善也下國魯自謂也齊國之士莫不致死以敵呉而竟至於敗可見呉兵之强極矣此其鋭盡焉而卒破于越也將伐齊是役之先豢養也如人養犧牲非愛之將殺之有欲欲并之也石田喻不可耕盤庚商書顛越不共從横不受命者劓割也殄絶也育長也易種轉生種類也王使貟于齊貟因托其子改姓為王孫欲避呉禍也反使返屬鏤劒名越朝齊敗盈之極也子胥誠智士論呉越之利害亦悉矣然以先王不共天之仇為言夫差庻有儆於心而不及是何也鮑氏亡不旋踵而以托後豈貟之明亦於此而有奪也哉十二年夏公會呉于槖臯呉子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也巳若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟呉徴會于衛初衛人殺呉行人且姚而懼謀於行人子羽子羽曰呉方無道無乃辱吾君不如止也子木曰呉方無道國無道必弃疾於人呉雖無道猶足以患衛往也長木之斃無不摽也國狗之瘈無不噬也而况大國乎秋衛侯會呉于鄖公及衛侯宋皇瑗盟而卒辭呉盟呉人藩衛侯之舍子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼以相辭也今呉不行禮於衛而藩其君舍以難之子盍見大宰乃請束錦以行語及衛故大宰嚭曰寡君願事衞君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以覇乎大宰嚭説乃舍衛侯槖臯在今南直𨽻巢縣柘臯有會呉城尋盟尋鄫之盟周固也制制其義奉奉贄明神結結其信要要以禍福尋重也寒歇也徴㑹召之使就會也且姚呉行人名子羽子木皆衛大夫患衛為衛患摽撃也瘈狂也噬齧也與宋衛盟畏呉竊盟藩籬也侯伯致禮以禮賔地主所會主人餼生物各以禮相辭讓難之苦困之束錦以賂呉語及若將不為衛請者墮毁也崇猶與也十三年夏公會單平公晉定公呉夫差于黄池六月丙子越子伐呉為二隧疇無餘謳陽自南方先及郊呉大子友王子地王孫彌庸壽於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也大子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗呉師獲大子友王孫彌庸夀於姚丁亥入呉呉人告敗于王王惡其聞也自剄七人於幕下秋七月辛丑盟呉晉争先呉人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今呉王有墨國勝乎大子死乎且夷徳輕不忍久請少待之乃先晉人呉人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於呉有豐於晉無不及焉以為伯也今諸侯會而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於呉八百乘若為子男則將半邾以屬於呉而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉呉人乃止既而悔之將囚景伯景伯曰何也立後於魯矣將以二乘與六人從遲速惟命遂囚以還及户牖謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉自襄以來未之改也若不會祝宗將曰呉實然且謂魯不共而執其賤者七人何損焉大宰嚭言於王曰無損於魯而祇為名不如歸之乃歸景伯呉申叔儀乞糧於公孫有山氏曰佩玉繠兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰粱則無矣麤則有之若登首山以呼曰庚癸乎則諾王欲伐宋殺其丈夫而囚其婦人大宰嚭曰可勝也而弗能居也乃歸冬呉及越平呉前既勝齊復與晉争伯而國破于越單平公周卿士黄池在今河南封丘縣南隧道也疇無餘謳陽越二大夫泓水名姑蔑今浙江龍游縣有蔑姑城蔑姑墓彌庸父為蔑姑所殺得其旌旗屬會也越始敗而後人勝先以弱兵誘之而以精兵繼之故遂入其國王剄七以絶口也争先争㰱血先後呉大伯後故云長晉盟主故云伯寅晉大夫旰晚也大事盟也二臣鞅與寅也墨氣色下勝為越所勝少待無與争也按曲禮云五官之長曰伯是職方也九州之長入天子之國曰牧於外曰侯職方者二伯各主一方州長者州牧各主一州周禮所謂八命作牧九命作伯是也王合諸侯則伯帥侯牧如康王之誥大保帥西方諸侯畢公帥東方諸侯是也當盡帥諸侯而獨言侯牧者舉尊而言也伯合諸侯則侯帥子男侯謂牧也牧帥諸國之君見于伯亦當盡帥諸侯而獨云子男舉卜為言也魯以侯事呉故賦八百乘今呉率之以見晉是晉為伯呉為侯魯為子男故半邾以三百乘事呉如邾以六百乗事晉蓋邾子爵其賦六百乗也悔謂景伯欺之何景伯名户牖地名襄襄公會會祭呉實然言為呉所執也呉人信鬼故以此恐之名惡名儀呉大夫有山魯大夫二人舊相識橤垂貌言上人佩服美好已獨無以繋佩一盛一器也睨視也褐寒賤之人言有㫖酒但得視不得飲軍中不得出糧故相為隠語庚西方主穀癸北方主水言呉子不恤下故亡以宋不會黄池欲伐之殺丈夫囚婦人悖虐甚也不能報越與之平子胥所謂始弱也十七年春三月越子伐呉呉子禦之笠澤夾水而陳越子為左右句卒使夜或左或右鼔譟而進呉師分以禦之越子以三軍潛涉當呉中軍而鼔之呉師大亂遂敗之笠澤今大湖句卒鉤伍相著别為左右屯以此為聲勢分呉師而以三軍精兵并力撃其中軍故得勝十九年春越人侵楚以誤呉也夏楚公子慶公孫寛追越師至㝠不及乃還秋楚沈諸梁伐東夷三夷男女及楚師盟于敖誤呉使若與楚搆怨使呉不為備㝠越地伐東夷報越也三夷三種之夷從越者敖東吳地二十年秋呉公子慶忌驟諫呉子曰不改必亡弗聽出居于艾遂適楚聞越將伐呉冬請歸平越遂歸欲除不忠者以説于越呉人殺之艾呉地除不忠者内以靖其國外駕罪焉以説于越是時呉之亡形具矣夫差猶不悟而殺諫臣英雄消阻會愚人之不若也哀夫然越計巳素定而欲假焉以説之慶忌雖忠而少智哉十一月越圍呉趙孟降于喪食楚隆曰三年之喪親暱之極也主又降之無乃有故乎趙孟曰黄池之役先主與呉王有質曰好惡同之今越圍呉嗣子不廢舊業而敵之非晉之所能及也吾是以為降楚隆曰若使呉王知之若何趙孟曰可乎隆曰請嘗之乃往先造于越軍曰呉犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君志之不從請入視之許之告于呉王曰寡君之老無恤使陪臣隆敢展謝其不共黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠使問趙孟曰句踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉趙孟諡襄子名無恤時有父簡子之喪飲食又降之楚隆襄子家臣先主簡子質明信也嗣子襄子自謂以欲敵越救呉而不能甞試也隆欲入見呉王恐越不聽故偽詞以説越人而得入展陳也簞卜笥問遺也夫差自喻所問不急猶溺人不知將溺而反笑晉史黯云不及四十年呉當亡呉王感此而問隆言黯進退咸宜於人故有美稱二十一年夏五月越人始來越既勝呉欲伯中國始遣使適魯二十二年冬十一月丁卯越滅呉請使呉王居甬東辭曰孤老矣焉能事君乃縊越人以歸呉圍三年而亡甬東今浙江定海縣境唐為翁山縣今廢以歸以其尸歸夫差痛父創亡使人呼名自警必報其仇志亦壯矣且句踐君臣皆人傑也而能大勝入其國都畧亦豈世出哉卒侈心務勝以至滅亡斯見保基固業者不在於雄勇機智而在於履信思順也噫使兼秉而並運之尤足稱賢也巳春秋左傳屬事卷二十
