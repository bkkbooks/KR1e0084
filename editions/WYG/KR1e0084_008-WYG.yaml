body:
  text: 春秋左傳屬事卷八明傅遜撰魯魯與宋衞之好僖公元年冬莒人來求賂公子友敗諸酈求還慶父之賂詳見季友立僖公二十五年衞人平莒于我十二月盟于洮修衞文公之好且及莒平也洮曹地莒以酈故怨魯衞文公將平之未及而卒成公追成父志二十六年春王正月公㑹莒兹㔻公甯莊子盟于向尋洮之盟也齊師侵我西鄙討是二盟也夏衞人伐齊洮之盟故也向國莒滅而邑之甯莊子名速二十八年春晉侯伐衞公子買戍衞公懼于晉殺子叢以說焉時晉文伯業已成冬衞侯與元咺訟不勝執衞侯歸之于京師詳見晉文公之伯與甯武子弭晉難三十年夏公為之請納玉于王與晉侯皆十瑴王許之秋乃釋衞侯詳見晉文公之伯文公四年秋衞甯武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾武子名俞衞大夫湛露彤弓二詩皆小雅私私問之肄習也言自習此樂歌非為已以魯人失所賦故佯為此詞朝正朝而受政教也湛湛露斯匪陽不晞言露見日而乾猶諸侯見天子而敬畏自用其命也敵猶當也愾恨怒也覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂方稱天子之樂故自稱陪臣以歌者大不敢僣當也六年臧文仲以陳衞之睦也欲求好于陳夏季文子聘于陳且娶焉以親衞故而并及陳臣非君命不越境故因聘而自為娶宣公七年春衞孫桓子來盟始通且謀會晉也公即位衞始修好且以未事晉而謀㑹之成公三年冬十一月晉侯使荀庚來聘且尋盟衞侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之于晉也其位在三孫子之于衞也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衞在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衞禮也古制公為大國侯伯為次國子男為小國次降上一等下降上二等衞本侯國春秋時以强弱為大小故為中國計等則二人位敵以盟主故先晉四年春宋華元來聘通嗣君也五年春孟獻子如宋報華元也八年春宋華元來聘聘共姬也夏宋公使公孫壽來納幣禮也納幣應使卿冬衞人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否九年二月伯姬歸于宋夏季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入晉人來媵禮也韓奕詩大雅其五章言蹶父嫁女于韓侯為女相所居莫如韓樂文子喻魯侯有蹶父之徳宋公如韓侯宋土如韓樂穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死稱未亡人言先君亦望子之若此緑衣詩邶風取其我思古人實獲我心同姓媵故云禮襄公元年冬衞子叔來聘禮也二年秋穆叔聘于宋通嗣君也七年秋季武子如衞報子叔之聘且辭緩報非貳也言國家多難故不時報冬衞孫文子來聘且拜武子之言而尋孫桓子之盟餘見孫甯廢立十五年春宋向戍來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢閒傳言獻子友于兄且不隠其實二十年冬季武子如宋報向戍之聘也褚師段逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也褚師段宋共公子字子石逆迎也受享禮始賦武子賦也七章以卒盡八章取其妻子好合如鼓瑟琴宜爾室家樂爾妻孥言二國好合宜其室家相親如兄弟魚麗詩小雅亦武子賦卒章曰物其有矣唯其時矣喻聘宋得其時南山有臺詩小雅取其樂只君子邦家之光公喻武子奉使為國光輝昭公十一年春王二月叔弓如宋葬平公也十二年夏宋華定來聘通嗣君也二十五年九月公孫于齊十一月宋元公將為公故如晉己亥卒于曲棘詳見季氏逐昭公二十七年秋會于扈且謀納公也宋衞皆利納公固請之范獻子取貨于季孫乃辭小國而以難復詳見季氏逐昭公定公六年二月公侵鄭往不假道于衞及還陽虎使季孟自南門入出自東門舍于豚澤衞侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之將以為之質此羣臣之所聞也今將以小忿蒙舊徳無乃不可乎太姒之子唯周公康叔為相睦也而效小人以弃之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止虎將逐三桓欲使得罪鄰國故徃不假道而徑自出入其國門豚澤衞地子瑕衞嬖大夫文子公叔發舒鼎文公之鼎昭兆成公寳龜鞶鑑定公之鞶帶以鏡為飾者于三物擇其一與公子及大夫子為質以求納昭公蒙覆也太姒文王妃國有老臣知國故事能息兵以全舊好賢矣即以其臣同升諸公而夫子稱其文者小國交魯戎狄附向向今為南直𨽻含山縣舊有向城隱公二年莒子娶于向向姜不安莒而歸夏莒人入向以姜氏還滕薛滕今為山東滕縣薛滕縣南有薛城隱公七年春滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經盟以名告神故薨亦以名告同盟告亡者之終稱嗣位之主嗣位之主當奉而不忘故曰繼好好同則和親故曰息民經常也十一年春滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請于薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯薛祖奚仲夏時所封故稱先卜正卜官之長非周同姓故稱庶擇擇所宜而行之薛任姓齒列也文公十二年秋滕昭公來朝亦始朝公也宣公九年秋滕昭公卒冬宋人圍滕因其䘮也十年滕人恃晉而不事宋六月宋師伐滕成公十六年夏四月滕文公卒襄公六年秋滕成公來朝始朝公也三十一年六月辛巳公薨于楚宫冬十月滕成公來㑹葬惰而多涕子服惠伯曰滕君將死矣怠于其位而哀已甚兆于死所矣能無從乎兆死兆在葬處故曰死所昭公三年春王正月丁未滕子原卒同盟故書名五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之忌忌日也懿伯舊云敬子之從祖惠伯之叔父疑即惠伯之父敬子叔弓諡惠伯子服椒也禮忌日不用不用不為他事也故叔弓為椒避不入椒言公不以私廢而先入故叔弓亦入三十一年夏薛伯穀卒同盟故書滕薛皆侯爵也而滕降子薛降伯先儒蓋臆說耳竊謂或自以國小不能從侯禮乃自貶以從殺􅁘把把今為河南把縣桓公二年秋七月把侯來朝不敬把侯歸乃謀伐之九月入把討不敬也三年夏公㑹把侯于郕把求成也十二年夏盟于曲池平把莒也曲池今山東汶上縣境舊有曲池亭莊公二十七年春公㑹把伯姬于洮非事也天子非展義不巡守諸侯非民事不舉卿非君命不越竟洮魯地非事非諸侯之事言上下舉動皆有制展義宣布徳義也冬把伯姬來歸寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某歸寧歸問父母寧否歸不來之辭僖公二十三年十一月杞成公卒書曰子把夷也不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否辟不敏也禮同盟者皆以名赴則亦書其名有既同盟而不赴以名則不達于禮故辟之若非同盟者辟除也敏達也二十七年春把桓公來朝用夷禮故曰子公卑把把不共也把先代之後而迫于東夷風俗雜壞言語衣冠有時而夷此來朝而復用夷禮公以此卑之故經貶其爵秋入杞責無禮也文公十二年春把桓公來朝始朝公也且請絶叔姬而無絶昏公許之二月叔姬卒不言把絶也書叔姬言非女也公即位始來朝不絶昏立其娣以為夫人也不書大歸未歸而卒也既許其絶故不言把已成婦故不稱女成公四年春把伯來朝歸叔姬故也將出叔姬先來言其故八年冬把叔姬卒來歸自把故書愍其見出來歸故書之九年春把桓公來逆叔姬之䘮請之也把叔姬卒為把故也逆叔姬為我也叔姬已絶于把魯復請把使還其䘮以葬還為把婦故卒稱把既弃而復逆其䘮明為魯故魯女歸把者凡二出襄公六年春把桓公卒始赴以名同盟故也二十九年六月把文公來盟書曰子賤之也時晉治把田魯歸之故來盟賤賤其用夷禮州穀鄧州今為山東冠縣穀今湖廣穀城縣有穀城鄧今湖廣襄陽府有鄧城桓公五年冬淳于公如曹度其國危遂不復淳于州所都國有危難不能自安出朝而遂不還六年春自曹來朝書曰寔來不復其國也七年春穀伯鄧侯來朝名賤之也鄫鄫今山東嶧縣僖公十四年春季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝季姬魯女鄫夫人也鄫子本無朝志因公怒季姬召之朝宣公十八年秋邾人戕鄫子于鄫凡自虐其君曰弑自外曰戕邾大夫就鄫殺鄫子弑戕皆殺也别内外之名曹子臧讓國附曹今山東曹州桓公九年冬曹太子來朝賔之以上卿禮也享曹太子初獻樂奏而嘆施父曰曹太子其有憂乎非嘆所也諸侯之適子未誓于天子而攝其君則皮帛繼子男故賔之各當其國之上卿施父魯大夫時曹伯有疾而世子出聘憂其父之將及也十年春曹桓公卒文公十一年秋曹文公來朝即位而來見也十五年夏曹伯來朝禮也諸侯五年再相朝以修王命古之制也成公十三年五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之䘮秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑伐秦見秦晉交伐負芻成公名欣時子臧名皆曹宣公庶子太子嫡子國人素附子臧且不義負芻故從之請請留子臧反子臧反致邑不食其祿曹小國也簒弑大惡也速討焉亂即弭矣而乃請俟他年使君國踰年而人心已戴之為君故得以為辭是晉成其惡也十五年春㑹于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也凡君不道于其民諸侯討而執之則曰某人執某侯不然則否諸侯將見子臧于王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋不及惡不及民也稱人示衆所欲執惡止其身則不稱人聖人權不失正故能達次賢者下愚者十六年六月曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以忘曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺徳刑以伯諸侯豈獨遺諸敝邑敢私布之七月曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出憂未弭言君薨太子弑相繼鎮公子子臧也泯滅也言今君無罪而見討得無以先君故若以今君有罪則巳列于戚之㑹矣蓋是時凡簒弑者既與諸侯同㑹則不復致討故云然不出不仕也負芻簒位國之賊也子臧既為國人所嚮曷不正其罪而更立賢君乎至諸侯見于王而立之即從人望以主國而討負芻何病義之有乃避之以濟其簒吾不知其所守何節也然于争奪者則不可同年而語矣襄公二十一年冬曹武公來朝始見也郕郕在今山東汶上縣北文公十一年冬郕太子朱儒自安于夫鍾國人弗徇安處也夫鍾郕邑徇順也十二年春郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也太子自安于外邑故國人别立君而太子以二邑奔郕邽亦其邑未為君故曰非禮以既書爵故不書地以泯其竊地之罪郯郯今山東郯城縣有郯子廟宣公四年春公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮十六年秋郯伯姬來歸出也襄公七年春郯子來朝始朝公也昭公十七年秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我高祖少皥摯之立也鳳鳥適至故紀于鳥為鳥師而鳥名鳳鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀于近為民師而命以民事則不能故也仲尼聞之見于郯子而學之既而告人曰吾聞之天子失官學在四夷猶信少皥金天氏黄帝子已姓之祖郯子其後黄帝軒轅氏姬姓祖也黄帝受命有雲瑞故以雲紀事百官師長皆以雲為名縉雲氏蓋其一官也炎帝神農氏姜姓祖有火瑞以火紀事名百官共工以諸侯伯有九州者在神農前太皥後亦受水瑞故以水名官太皥伏羲氏風姓祖有龍瑞故以龍命官摯少皥氏之名鳯鳥知天時故以名厯正之官𤣥烏燕也以春分來秋分去伯趙伯勞也以夏至鳴冬至止青鳥鶬鴳也以立春鳴立夏止丹鳥驚雉也以立秋來立冬去入大水為蜃上四鳥為四司皆歴正之屬官祝鳩鷦鳩也祝鳩孝故為司徒主教民鴡鳩王鴡也鷙而有别故為司馬主法制鳲鳩鴶鵴也鴶鵴平均故為司空平水土爽鳩鷹也鷙故為司冦主盗賊鶻鳩鶻鵰春來冬去故為司事是為五鳩鳩聚也治民上聚故以鳩為名雉有五種西方曰鷷雉攻木之工東方曰鶅雉摶埴之工南方曰翟雉攻金之工北方曰鵗雉攻皮之工伊洛之南曰翬雉設五色之工夷平也使度量器用平也扈有九種春扈鳻鶞相五土之宜趣民耕種者夏扈竊𤣥趣民耘苗者秋扈竊藍趣民收歛者冬扈竊黄趣民蓋藏者棘扈竊丹為巢驅鳥者行扈唶唶晝為民驅鳥者宵扈嘖嘖夜為農驅獸者桑扈竊脂為蠶驅雀者老扈鷃鷃趣民收麥令不得晏起者皆以教民事扈止也止使民不淫放也顓頊氏代少皥者徳不能致逺瑞而以民事命官夫子學而嘆之時年二十八失官官不修其職傳言聖人無常師小邾邾今在山東滕縣境莊公五年秋郳犂來來朝名未王命也附庸未受爵命為諸侯例稱名後從齊桓尊周室王命為小邾子襄公七年夏小邾穆公來朝亦始朝公也僖七年朝魯無傳昭公三年秋小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之卑之不欲以諸侯禮待之一睦小邾也十七年春小邾穆公來朝公與之燕季平子賦采叔穆公賦菁菁者莪昭子曰不有以國其能乆乎采叔詩小雅取其君子來朝何錫與之以穆公喻君子菁莪亦小雅取其既見君子樂且有儀昭子嘉其能答賦言其賢故能乆有國哀公十四年春小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能濟成也介介今為山東膠州僖公二十九年春介葛盧來朝舎于昌衍之上公在㑹饋之芻米禮也葛盧介國君名昌衍在今山東曲沃縣境舊有昌平城嫌公行不當致饋故曰禮冬介葛盧來以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信燕宴禮好貨好也一歲再來故加之周禮夷𨽻掌與鳥言貉𨽻掌與獸言註云夷𨽻征東夷所獲貉𨽻征東北夷所獲介葛盧是東夷之國其土俗有知獸言者故聞牛聲而知其情戎狄隱公二年春公㑹戎于潜修惠公之好也戎請盟公辭夏戎請盟秋盟于唐復修戎好也桓公二年秋公及戎盟于唐修舊好也冬公至自唐告於廟也凡公行告于宗廟反行飲至舍爵策勲焉禮也特相㑹徃來稱地讓事也自叅以上則往稱地來稱㑹成事也舊好惠隱之好凡公出入皆告廟告至飲酒廟中既飲畢置爵則書勲勞于策速紀有功也特相㑹公與一國㑹也凡㑹必有事二君㑹則或以其地之近或以其事之重而為主賔主相讓而事成故往書㑹于某歸書至自某明有讓以為禮也叅以上則必以國强爵尊或伯國主其事故來歸則書至自㑹以見其㑹事之成凡諸侯㑹必有讓與事此分稱者各舉其重耳莊公十八年夏公追戎于濟西不言其來諱之也戎來侵魯魯人不知去乃追之故諱不言其來襄公十八年春白狄始來魯取小國僖公十七年夏師滅項淮之㑹公有諸侯之事未歸而取項齊人以為討而止公秋聲姜以公故㑹齊侯于卞九月公至書曰至自㑹猶有諸侯之事焉且諱之也項今山東項城縣汴今山東泗水縣宣公九年秋取根牟言易也牟今山東福山縣有牟城襄公十三年夏邿亂分為三師救邿遂取之凡書取言易也用大師焉曰滅弗地曰入邿今山東濟隂縣有邿城弗地不有其地昭公四年九月取鄫言易也詳見邾莒之難鄫見上卷孔夫子仕魯昭公七年三月公如楚鄭伯勞于師之梁孟僖子為介不能相儀及楚不能答郊勞九月公至自楚孟僖子病不能相禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅于宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫予敢侮饘於是鬻於是以餬余口其共也如是臧孫紇有言曰聖人有明徳者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬說與何忌于夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則故已矣師之梁鄭城門僖子名獲大夫其屬也聖人謂正考父滅于宋謂其子孔父嘉為華督所殺其子奔魯孔子之六代祖也弗父何正考父之曾祖宋閔公之子厲公之兄適嗣當立以讓厲公三傳而至考父考父相宋三君曰戴武宣三命上卿言高位鼎銘考父廟鼎之銘而僂而傴而俯言愈共循墻不敢安行莫敢侮言恭甚而人不之慢於是鼎中為饘為鬻以餬口而已言至儉也紇武仲也正考父以明徳而不得志于宋其後應大于孔子獲沒得以夀終也說南宫敬叔何忌孟懿子皆僖子之子知禮則位可安故曰定位詩小雅定公十年夏公㑹齊侯于祝其實夾谷孔丘相犂彌言于齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好于神為不祥于徳為愆義于人為失禮君必不然齊侯聞之遽辟之將盟齊人加于載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是弃禮也若其不具用秕稗也用秕稗君辱弃禮名惡子盍圖之夫享所以昭徳也不昭不如其已也乃不果享齊人來歸鄆讙龜隂之田夾谷今山東淄川縣西南夾谷山一名祝其山其陽即齊魯㑹盟之地犂彌齊勇士不知孔子大聖徒以知禮稱之萊人齊所滅萊夷兵之以兵擊萊人辟辟去萊兵也如此盟謂如此盟詛之禍兹無還魯大夫言須齊歸汶陽田乃共齊命梁丘據齊嬖臣故舊典成㑹成事也犧象犧尊象尊嘉樂鐘磬秕穀不成者稗草之似榖者喻享不具禮穢薄若秕稗孔子知齊懐詐故拒之鄆讙龜隂三田即汶陽田也龜隂龜山之隂在山東泰安州境後人因名謝過城十二年夏仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輙帥費人以襲魯仲尼命申句須樂頎下伐之二子奔齊遂墮費將墮成公歛處父謂孟孫我將不墮冬十二月公圍成弗克三都費郈成也强盛為國害故欲墮之不狃費宰輙不得志于叔孫氏申句須樂頎魯大夫仲尼時司冦二子不狃輙也處父孟氏成宰俱詳見陪臣交叛是時費郈數叛為二家患故仲由宰季氏而墮之未暇專為公室謀也若成忠于孟氏則不能墮矣夫子因而斃之蓋亦撫其機而不失耳蘇子瞻乃謂孔子之所以為聖或謂非孔子事是過待聖人而考之未詳也哀公十一年孔文子之將攻太叔也訪于仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衞國之難也將止魯人以幣召之乃歸文子名圉攻太叔事見衞父子争國胡瑚通鳥自喻言當擇地而處度謀將止善其意也召而歸所謂自衞反魯樂正雅頌各得其所季孫欲以田賦使冉有訪于仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私于冉有曰君子之行也度于禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度于禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聴兵賦之法因其田財通出馬一疋牛三頭今欲别其田及家財各為一賦故云田賦發問也卒終也行行政事丘十六井以丘賦周公之舊典也十二年春王正月用田賦十四年夏六月甲午齊陳恒弑其君壬于舒州孔丘三日齊而請伐齊三公曰魯為齊弱乆矣子之伐之將若之何對曰陳恒弑其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言十六年夏四月己丑孔丘卒公誄之曰昊天不弔不憖遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律弔恤憖强俾使屏蔽也無自律言我無以為法也餘見哀公孫越列卿世嗣之變孟獻子之立伯叔孫穆子之立季悼子孟孝臧為之立叔孫昭子之立康孟懿子之生臧㑹之立季子奪嫡文公元年春王使内史叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀也豐下必有後於魯國内史中大夫叔服其字葬僖公故來㑹公孫敖慶父子諡穆伯穀字文伯難字惠叔敖二子也食謂祭祀供養收葬其身豐下頥頷豐大也七年穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諫曰臣聞之兵作于内為亂于外為冦冦猶及人亂自及也今臣作亂而君不禁以啓冦讎若之何公止之惠伯成之使仲舎之公孫敖反之復為兄弟如初從之已莒姓戴聲皆諡聲已辭言聲已在可無復聘也襄仲公子遂諡敖之從弟莒被徐伐求援于魯而盟鄢陵莒邑惠伯叔牙孫名彭生既諫公復和于下成和也舍不娶也反還莒女也八年秋襄王崩穆伯如周弔䘮不至以幣奔莒從已氏焉十四年穆伯之從已氏也魯人立文伯穆伯生二子于莒而求復文伯以為請襄仲使無朝聴命復而不出三年而盡室以復適莒文伯疾而請曰穀之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告䘮請葬弗許敖雖以淫奔而魯復立其子故求復歸遂不許朝錮之於家榖子名蔑是為孟獻子以其㓜弱故讓於弟請葬請歸葬于魯十五年夏齊人或為孟氏謀曰魯爾親也飾棺寘諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之䘮為孟氏且國故也葬視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰䘮親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬䘮哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之他年其二子來孟獻子愛之聞於國或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如死一人門于句鼆一人門于戾丘皆死敖䘮乆不得歸齊人或為之謀飾棺不殯示無所歸堂阜齊魯境上地卞人魯卞邑大夫惠叔前請至今期年猶未已毁過䘮禮魯哀其志得殯於孟氏之寢如叔服言大夫䘮還不書因魯感子以赦父敦公族之義故書之葬制如慶父以罪降也聲已怨敖弃已故帷堂以自隔襄仲忿其奪已婦故弗哭感惠伯言親親宜厚乃率以哭致美各盡其美好善吉事也二子敖在莒所生者惠叔卒獻子立傳闕記聞於國愛之篤也不如死以死自明也句鼆戾丘魯二邑有冦攻門二子禦之而死以上為孟獻子之立以下叔孫穆子之立文公十一年秋鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉冬十月甲午敗狄于鹹獲長狄僑如以命宣伯鄋瞞狄國名防風之後漆姓身長三文故名長狄僑如其君名因命其子名之以旌其功宣伯僑如諡詳附見晉并諸戎成公十四年秋宣伯如齊逆女稱族尊君命也九月僑如以夫人婦姜氏至自齊舍族尊夫人也故君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之為君逆故稱叔孫舎族為不稱叔孫因謂春秋之稱善也或其詞微以隠矣而其義則明以顯惟因事以誌其事而以義則深以晦或婉曲以示順而尤秩乎其成章或盡其事而詳書之而實粹乎其無汚凡善者以褒惡者以貶而勸懲之訓著故唯聖能之十六年六月晉楚遇于鄢陵戰之日齊國佐高無咎至于師衞侯出于衞公出于壞隤宣伯通於穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聴命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫儆備設守而後行是以後使孟獻子守于公宫秋㑹于沙隨謀伐鄭也宣伯使告郤犫曰魯侯待于壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公於晉侯晉侯不見公鄢陵事見鄢陵之戰壞隤魯邑穆姜成公母淫於僑如欲取季孟二家以益之公不得已托晉難以緩其事偃鉏公二庶弟皆君欲廢公更立之公恐有變故申勑宫備設置留守致後晉楚戰期因得譖云待其勝者而從之訴譖也七月公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食於鄭郊師逆以至聲伯四日不食以待之食使者而後食如初復欲逐二子督揚鄭地畏鄭不敢過之聲伯名嬰齊豹僑如弟先慮僑如之禍奔齊聲伯知其賢不忘宗國故就使之請逆復戒其使者必須逆師至已乃食故為食以待使未至四日不食既至又先食之而後食見其忠至宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有貳矣魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆使子叔聲伯請季孫于晉郤犫曰苟去仲孫蔑而止季孫行父吾與子國親于公室對曰僑如之情子必聞之矣若去蔑與行父是大弃魯國而罪寡君也若猶不弃而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎亡而為讎治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫于魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而弃忠良若諸侯何子叔嬰齊奉君命無私謀國家不貳圖其身不忘其君若虚其請是弃善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊十二月季孫及郤犫盟于扈歸刺公子偃召叔孫豹于齊而立之齊聲孟子通僑如使立於高國之閒僑如曰不可以再罪奔衞亦閒於卿宣伯知犫惡欒范故以季孟比蔑無也苕丘晉地鄆魯地親於公室言親魯甚于晉公室情淫慝之情仇讐齊楚也屬齊楚則還為晉仇𨽻賤官介因也承奉也無私不二不忘君謂力辭邑請季孟見其忠也盟僑如諸大夫共盟之以為戒刺偃偃獨與謀故召豹不絶其後且立賢也聲孟子齊靈公母高國齊二卿傳終言僑如之佞十七年初聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒洹水在今河南林縣境至安陽縣經永和鎮入衞河一名安陽河瓊玉瑰珠也食珠玉含象淚下化為珠玉滿懷夢中復歌之不占知其凶也貍脤地名繁多也莫暮同傳戒數占夢嬰齊忠賢而不永世魯故不競襄公九年夏穆姜薨於東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利弃位而姣不可謂貞有四徳者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣因穆姜薨追記其始往之筮前魯以其淫亂故徙之太子宫艮下艮上艮震下兌上隨五爻皆變惟二爻不變故為隨周禮太卜掌三易雜用連山歸藏周易周易用變爻兼之卦為占九六也此獨言八七八定爻也舊說謂二易用定爻為占理或然史疑遇八為不利故更以周易變爻得隨卦而論隨為出之象以苟恱于姜姜自知不吉而曰無也周易五爻皆變則占之卦之定爻六爻變則占之卦彖詞爻言隨而不言用爻故姜因而即以彖為言據周易故姜亦不及他易因引周易言隨以四徳備而後無咎詳引四徳之善不可以誣妄得之已行皆與四徳相戾故必凶婦人卑于丈夫故曰下位姣淫也傳言穆姜辨而不徳以上為叔孫穆子之立以下為季悼子孟孝伯臧為之立二十二年春臧武仲如晉雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人國之蠧也令倍其賦御叔魯御邑大夫武仲多知時稱為聖人故譏其不預知將雨而出遇之為不知穆叔言其既不任使而又傲君之使徒靡祿而無益故為國蠧古者大夫以國邑為家重貢於公是減已而貢之故以倍賦為罰二十三年季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽絜之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季氏失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃故公鉏氏富又出為公左宰孟孫惡臧孫季孫愛之孟氏之御騶豐㸃好羯也曰從余言必為孟孫再三云羯從之孟莊子疾豐㸃謂公鉏苟立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己夘孟孫卒公鉏奉羯立于户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長於公宫姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勲敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰母或如東門遂不聴公命殺適立庶盟叔孫氏也曰母或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎公彌字公鉏悼子名紇皆武子庶子申豐其屬大夫兩問而治行示以失常不敢預也紇武仲名客上賔也重席新樽絜降逆皆尊寵之以示立旅而召使與齒皆卑下之以示廢季氏雖素愛悼子見頓易常分又恐公鉏不從故失色旅旅酬也馬正家司馬閔子馬字馬父所位也言廢置在父惟當敬共其命禍福唯人自召不可以常論公鉏從之而富且出仕於公為左宰御騶孟氏之屬官豐㸃名羯孟莊子庶子孝伯其長名秩為孟孫為之後也請讐臧知公鉏怨之深也鉏為言秩固當立若能立羯則比臧之立紇尤為有力蓋臧順季氏意而季氏能專立之故也户側䘮主季氏因已廢長立㓜故前弗能應於此亦徇唯才之對而不得復以長㓜為序又云孟孫之命蓋誣之也紇多智自知作不順於季氏季孟將踵其逆以搆已故多涕蓋自傷也更正詞以答其御愛則縱欲長惡故曰疢疾惡則拂情止欲故曰藥石告臧氏為亂為公鉏仇之也戒為備辟穿藏藉除借人除葬道也正夫遂正也甲從以甲士從已視作者畏孟氏也季孫時已悔前廢立追怨紇故怒其甲逐之鑄國名其姪穆姜姨母之子與穆姜為姨兄弟立之立為嗣大蔡大龜不弔不為天所弔又自言罪輕應有後納蔡以請可得立也賈使為代已請而為乃背賈自請焉防臧孫邑今曲阜縣東有防山智不足謂使甲從已慮事不周二勲謂文仲宣叔此夫子所謂要君者其人從者謂將陳其罪惡盟大夫以為戒臧以廢立季孫所忌故云無詞惡臣謂奔亡者外史掌之盟首載書之章首仲遂僑如事俱見前孟椒獻子之孫子服惠伯也居語詞臧孫心服盟已之詞嘆國之有人又揣知其為椒皆智也齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也為田與之邑言伐晉自誇其功臧孫知其將敗不欲受邑故以鼠比之使怒而止以避其禍夫子故稱之為知而原其奔亡者由其廢長立庶逆天理而拂人情也又引書云行事常常念如在己身則無此患以上為季悼子孟孝伯臧為之立以下為叔孫昭子之立二十四年冬齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路郟王城也於是穀雒毁王宫齊因叛晉欲求媚於天子故城之大路天子所賜車之總名昭公四年初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧而見人黒而上僂深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之乆矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫於齊歸未逆國姜子明取之故怒其子長而後使逆之田於丘蕕遂遇疾焉豎牛欲亂其室而有之强與孟盟不可叔孫為孟鐘曰爾未際饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外牛又强與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜洩見告之饑渇授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使寘饋于个而退牛弗進則置虚命徹十二月癸丑叔孫不食乙夘卒牛立昭子而相之公使杜洩葬叔孫豎牛賂叔仲昭子與南遺使惡杜洩於季孫而去之杜洩將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿以葬不亦左乎季孫曰然使杜洩舍路不可曰夫子受命于朝而聘于王王思舊勲而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勲今死而弗以是弃君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之穆子叔孫豹諡畏宣伯之難先奔齊庚宗魯地有婦人聞其故哭送之上僂肩上僂傴豭喙口如豬穆子以夢異故志之以待騐饋饋宣伯也願之乆言始為亂已有此願蓋忿詞既立立為卿姓子也問有子否豹以牛狀名與夢協故寵之其亂蓋天啓也豎小臣為政掌家政明齊大夫穆子在齊與相知及歸而明娶其妻故怒并惡其二子而遲逆之丘蕕魯地孟長子孟丙牛强盟欲使從已孟不可為孟鐘為孟丙鑄鐘也際接也古者大夫立子為嫡必須接見同僚孟未接諸大夫故饗之以豭血釁鐘曰落具享具日享日謁白也命日詐命之日北婦人國姜也客謂公孫明以怒豹而又止其往此牛以計殺其長子萊書公御士名觀於公私遊觀於公宫環玉環示示叔孫命佩詐命使之佩而何如何起穆子之問自見仲已自往見公而自佩其環古者大夫立子為嫡必以見之於君今不由父命故怒牛又以計逐其次子杜洩叔孫氏宰牛不食叔孫故告之饑渇而使以戈逐之牛寵任日乆洩卒不虞其惡之至此未喻其意而云求食可得無須去之牛又詐稱叔孫病惡見人使饋者置於个而去不以食叔孫復寫器令空示已食徹之絶食三日而卒今東西厢昭子豹之庶子名婼昭子叔仲帶也與南遺皆季氏家臣使毁杜洩憎其異已故惡毁也路王前所賜冡卿謂季氏介次也左不順也吾子謂季孫夫子謂叔孫書名定位號服車服之次工正所書勲王功也杜洩據禮守正卒不能奪去中軍非叔孫意誣之以媚季孫五年春王正月舍中軍以書使杜洩告於殯杜洩受其書而投之帥士而哭之叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門季孫命杜洩杜洩曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宫射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺嫡立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之初穆子之生也莊叔以周易筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛讒不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終舍中軍詳見三桓弱公室殯叔孫之殯哭痛其見誣帶叔仲子名不夀而終為鮮鮮年少也西門非魯朝正門自朝從生時朝覲之正路遷易也自自從也葬而行盡其終事方自逺也仲仲壬聞䘮而歸大庫魯庫名今山東曲阜縣東有大庭氏庫東鄙叔孫氏邑亂大從猶亂大作隠言殺其父耳披折也塞關齊魯境上關寧風齊地不勞不以立已為功勞詩大雅覺直也言徳行直則四方順從之莊叔叔孫得臣諡穆子父也離下坤上明夷艮下坤上謙明夷初九變為謙楚丘卜人姓名行出奔祀奉祀此下皆詳解卦占之義離為日夷傷也日入地故曰明夷日之數自甲至癸故曰十日中當王食時當公平旦為卿雞鳴為士夜半為皁人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺隅中日出闕不在第曠其位以尊王公也日中盛明故以為上當王次之為公又次之為卿此以十時當十位而止於卿者以占者卿也此離在坤下日在地中之象又變為謙謙道卑退故曰明而未融日明未融故曰當旦莊叔卿也以卦論之當為卿故曰為子祀離為日為鳥離變為謙日光不足故當鳥鳥飛行故曰于飛于日為未融于鳥為垂翼明夷初九得位有應君子象也在明傷之世居謙下之位故將辟難而行旦位在三又非食時故曰三日不食離艮合體故曰火焚山艮為言為離所敗故曰言敗離變為艮故言有所往往而見燒故主人有言言而見敗故必讒言易離下離上畜牝牛吉故曰純離為牛離焚山則離勝譬世亂則讒勝山焚則離獨存故知名牛也豎牛非牝牛故不吉謙道冲退故飛不逺翔翼垂下而不高峻故不能廣逺不翔不廣故必為子祀旦日正卿之位莊叔父子世為亞卿不足以終卦體故將不獲其終也據傳穆子之禍預兆於蓍繼符於夢有若前定不可避者然君子以守道為正知人為哲禨祥夢卜等有不必道者矣以上為叔孫昭子之立以下為孟懿子之立十一年夏孟僖子㑹邾莊公盟于祲祥泉丘人有女夢以其帷幕孟氏之廟遂奔僖子其僚從之盟于清丘之社曰有子無相弃也僖子使助薳氏之簉反自祲祥宿于薳氏生懿子及南宫敬叔于泉丘人其僚無子使字敬叔祲祥地闕泉丘魯地其女以夢當為孟氏婦故從僖子鄰女為僚友者因隨之而共相為盟簉副倅也薳氏之女為僖子副妾别居在外故納泉丘女令助之懿子敬叔似雙生字養也以上為孟懿子之生以下為臧㑹之立二十五年初臧昭伯如晉臧㑹竊其寳龜僂句以卜為信與僭僭吉臧氏老將如晉問㑹請往昭伯問家故盡對及内子與母弟叔孫則不對再三問不對歸及郊會逆問又如初至次於外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉計於季氏臧氏使五人以戈楯伏諸桐汝之閭㑹出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡及昭伯從公平子立臧㑹㑹曰僂句不余欺也臧㑹昭伯從弟僂句龜所出地因以為名僭不信也問問昭伯起居㑹家事盡對而内事不對若有他故以疑昭伯欲亂其家也執戮惡其詐也魴假郈邑大夫賈正掌貨物使有常價若市吏計送計簿也臧氏伏兵逐㑹執之致平子怒昭伯因從昭公伐季氏不克從公出奔季孫恨之乃立㑹為臧孫㑹以僂句為信桐汝里名國亂君亡以僭獲利世道之衰極矣以上為臧㑹之立以下為季康子奪適哀公三年秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告于君與大夫而立之今生矣男也敢告遂奔衞康子請退公使共劉視之則或殺之矣乃討之召正常正常不反正常桓子寵臣欲付以後事故勑令弗從已死南孺子季桓子妻言若生男告公而立之肥季康子名桓子庶長子退辟位也共劉魯大夫殺之康子使殺之也討討殺者不反義不可反也春秋左傳屬事卷八
