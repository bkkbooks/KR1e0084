body:
  text: 春秋左傳屬事卷九明傅遜撰魯三桓弱公室季友立僖公如仲遂立宣公公季孫宿專政意逐昭公哀遜越莊公二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀齊因祭社蒐軍實公往觀之故劌諌謂國君以禮齊民朝㑹禮之大者㑹之所謀必皆尊王室脩臣禮是訓其則也必號令諸國出貢賦多少是制其節也諸侯朝天子或小國朝大國其先後之次皆以王朝班爵之制為定是正其義也爵同則以年之長㓜為次是帥其序也有不朝不會或朝㑹而不率其常則征伐以討之諸侯脩王事天子省四方皆大習朝㑹之禮人君必以是為舉動當書之於策為後法知公此舉非貽謀燕翼之道矣秋丹桓宫之楹二十四年春刻其桷皆非禮也御孫諫曰臣聞之儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎禮楹天子諸侯黝堊大夫蒼士黈丹楹非禮也又禮天子之桷斵之礱之加密石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非禮也御孫魯大夫儉則心歛而敬日躋故曰徳之恭侈則心驕而惡日肆故曰惡之大秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公娶于齊夏已親迎時齊女方至後諡哀姜贄之為言至也執之見人以表至誠公侯伯子男執玉諸侯世子附庸孤卿執帛卿執羔大夫執鴈士執雉章所執之物以表貴賤榛小栗脩脯䖍敬也皆取其名以示敬男女異物以厚别也今莊公在位日乆多越禮以行於夫人始至復自亂其别宜其起禍亂而弱後嗣也二十五年春陳女叔來聘始結陳好也嘉之故不名季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘卿以名書字之為嘉二十七年秋公子友如陳葬原仲非禮也原仲季友之舊也因季友與陳厚交故後遇亂奔陳友於此已見愛於莊故得越國行其私三十二年初公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于鍼巫氏使鍼季酖之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏八月癸亥公薨于路寢子般即位次于黨氏冬十月己未共仲使圉人犖賊子般于黨氏成季奔陳立閔公黨氏魯大夫臺臨其家今山東曲阜縣有莊公臺孟任黨氏女閟不從也公許以為夫人復割臂以為信既而生般雩祭天講肄也女公子般妹也圉人掌養馬者名犖以慢言戲之般鞭犖公以其力能自投接其屋之桷反覆門上鞭之恐銜忿作亂殺之亂弭時慶父威權已盛故公疾謀後而叔牙以為材季友知將有亂誓奉般以死忠節著矣復以君命酖叔牙而仍為立後至公薨慶父果使犖弑般季避患奔陳國人立公之庶子是為閔公時年八歲梁氏鍼巫氏皆魯大夫僖叔牙諡酖鳥名其羽有毒以畫酒飲之則死逵泉在今山東曲阜縣魯城南即位即喪位共仲慶父也閔公元年春不書即位亂故也國亂不得成禮夏六月葬莊公亂故是以緩秋八月公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之季子來歸嘉之也冬齊仲孫湫來省難歸曰不去慶父魯難未已十一月乃葬故緩閔公初立國家多難以季友忠賢故請伯主而復之落姑齊地湫齊大夫詳見齊桓公之伯二年初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右閒于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之成風聞成季之􅣟乃事之而屬僖公焉故成季立之齮魯卜大夫公㓜知愛其傅遂成其意以奪齮田齮忿傅并及公故慶父使之弑公闈宫中門僖公閔公庶兄成季以之適邾至慶父奔乃以入而立之密魯地今山東昌邑縣有密城公子魚字奚斯請免其死不許而自裁其後為孟氏慶父罪浮于叔牙既不正其罪而皆為之立後季子之私也哀姜與弑閔公齊為魯殺之夷魯地僖公請還其喪外欲以厚固齊内存母子之義卜楚丘魯掌卜大夫在右言用事也兩社周社亳社兩社之閒朝廷執政之所乾下離上大有六五變而為乾乾下乾上其筮詞曰同復于父敬如君所乾為君父離變為乾故云云以手文理自成為友故遂以名之成風莊公妾僖公母􅣟卦兆之占辭僖公元年春不稱即位公出故也公出復入不書諱之也諱國惡禮也國亂身出而入故即位之禮闕掩惡揚善臣子之禮冬莒人來求賂公子友敗諸酈獲莒子之弟挐非卿也嘉獲之也公賜季友汶陽之田及費酈魯地求賂求還慶父之賂莒既不能為魯討賊前已受賂而復求其貪已甚故經以季友獲之為嘉公固感其援立之恩因事而賜之二邑夫人氏之喪至自齊君子以齊人之殺哀姜也為已甚矣女子從人者也言女子有三從之義在夫家有罪非父母家所宜討于時魯國亂君危小君又難於致戮桓方以義正天下况其所自出非桓討之而誰也八年秋禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也寢小寢同同盟將葬又不以殯過廟故致之為非禮哀姜以淫亂國在廟猶宜出之而況致之乎三十三年春齊國莊子來聘自郊勞至于贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衞也迎來曰郊勞送去曰贈賄敏速於事以禮相親則社稷永固故曰衞冬公如齊朝且弔有狄師也反薨于小寢即安也小寢夫人寢也譏公就所安不終於路寢葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟僖公以十二月薨明年四月葬甫及其期但作主在二年則為緩又謂凡既葬卒哭則以新死者之神祔之於祖尸柩已逺孝子思慕故造木主立几筵焉用喪禮特祭於寢其四時常祭與禘祭則合祀之於廟此錯簡當在明年葬僖公下按禮父母之喪哭無時既葬而虞乃卒無時之哭唯朝夕哭而已謂之卒哭卒哭而祔祔者告新主以當入祖廟而告祖父以當遷也廟也既告則新主復於寢三年喪畢遞遷其應遷主而復奉以入廟此云君薨卒哭而不云反虞虞祭已有主如傳云祔而作主則作主後矣又云特祀于主謂如小祥大祥禫則就寢特祀此主此於禮為近若夫喪服不以入宗廟又三年喪不為禮不為樂曽子問緦不祭而又云烝嘗禘於廟與禮大異矣文公元年夏四月丁巳葬僖公見前冬穆伯如齊始聘焉禮也凡君即位卿出竝聘踐脩舊好要結外援好事鄰國以衞社稷忠信卑讓之道也忠徳之正也信徳之固也卑讓徳之基也穆伯公孫敖諡慶父子也忠則無邪故曰正信則能守故曰固卑讓則善日益故曰基二年春丁丑作僖公主書不時也見前秋八月丁夘大事於太廟躋僖公逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虚器縱逆祀祀爰居三不知也禮父子異昭穆兄弟昭穆同僖是閔兄同為穆耳然僖甞臣閔僖應下今上閔故為逆祀宗伯掌宗廟昭穆之禮新鬼僖公也既兄死時又長故大閔公弟死時少弗忌明見其如此又以僖賢聖故自以為禮君子譏之臣繼君猶子繼父不得以齊聖為論齊中也禹湯文王不以齊聖而先其祖父帝乙微子父厲王鄭桓公父亦不以不肖而不祖之忒差也皇皇美也后帝天也詩頌僖公郊祭上帝配以后稷詩邶風衞女思歸不得故願致問於姑姊二詩皆以尊先其親譏弗忌阿比文公而先其親父也臧文仲以賢稱夫子譏以六事而逆祀在其中展禽栁下惠知其賢使在下位六關塞關陽關之屬禁絶末遊而廢之家人販席與民専利為不仁三虚器謂居蔡有器而無其位聴夏父躋僖公海鳥曰爰居止於東門外文仲以為神命國人祀之為不知三九年冬秦人來歸僖公成風之襚禮也諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好追贈僖公并及成風送死不及尸故曰不當事亦書於典策垂示子孫使無忘過厚之禮以上為季友立僖公以下為仲遂立宣公文公二年冬襄仲如齊納幣禮也凡君即位好舅甥脩昏姻娶元妃以奉粢盛孝也孝禮之始也諒闇既終嘉好之事通于内外内外之禮始備此除凶之即位也諸僖公薨在十二月乙巳至是未備二十五月其納幣昏禮皆在三年内傳謂之孝不亦悖乎四年夏逆婦姜于齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之弃信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也禮娶必親迎卿亦不行失甚矣允信也始不見尊貴終必不為所敬信公薨而出故曰出姜遂納幣為貴聘非卿為賤逆君小君不以夫人禮逆是卑廢之主内主也詩頌言畏天威則保福禄文公反之宜其後之微也十八年二月丁丑公薨六月葬文公秋襄仲莊叔如齊惠公立故且拜葬也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聴弗聴乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏夫人姜氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜襄仲公子遂諡莊叔叔孫得臣諡二妃次妃叔仲惠伯也惡太子視其母弟君命詐以子惡命姜氏惡視之母出姜也大歸歸而不反所謂不允於魯也莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司冦出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀徳徳以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶徳有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶徳是以去之昔高陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其姜不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝内平外成昔帝鴻氏有不才子掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒蒐慝以誣盛徳天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲很明徳以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之饕餮舜臣堯賓于四門流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賓于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎紀公莒子號也莒夷無諡季文子名行父友之子克太史名則法也合法斯為吉處猶制也度量也食養也誓命要信也毁則壞法也掩匿也賄財也器國用也藏名掩賊為名也姦用用姦器也誓命至無赦皆九刑之書其書今亡還環同兆猶徴也八愷即垂益臯陶之倫舊云庭堅臯陶字未詳愷和也八元即稷契朱虎熊羆之倫元善也后土地官禹作司空平水土故以禹在八愷契作司徒敬敷五教故以契在八元帝鴻黄帝少皥金天氏次黄帝顓頊即高陽氏縉雲黄帝時官名渾敦窮竒檮杌饕餮俱惡獸名故取以為凶人之號縉雲氏非帝王後故曰比裔衣裾喻邊逺也魑魅山川異氣所出為人害者五典克從八元之功百揆時序八愷之功四門穆穆流四凶之效舉十六相去四凶為二十功也是時宣公以簒得國行父以賢秉政而莒僕行與宣類宣喜納之故行父必黜之以儆懾其心且盛稱古聖賢之事以自誇比此宣公所以欿歉於心授之柄而不敢收也又按高辛子八人堯兄弟也堯豈不知而待舜且八愷主后土以揆百事地平天成伯禹之任八元使布五教契之任元愷八人既同徳且同職何别無任乎若為長佐同主一事則不宜曰十六相也且與書文亦異此非文子見聞之謬則左氏之誇恐不足為據也宣公元年春王正月公子遂如齊逆女尊君命也三月遂以夫人婦姜至自齊尊夫人也前稱公子後止書名故云然夏季文子如齊納賂以請㑹㑹于平州以定公位東門襄仲如齊拜成六月齊人取濟西之田為立公故以賂齊也春秋時簒立者既列於㑹則不得復討臣子殺之與弑君同故宣公求㑹於齊侯以濟西賂之拜成謝得㑹也平州齊地在今山東新泰縣境襄仲居東門故以稱今山東曲阜縣有襄仲臺五年春公如齊高固使齊侯止公請叔姬焉夏公至自齊書過也秋九月齊高固來逆女自為也故書曰逆叔姬卿自逆也冬來反馬也公簒得國恃齊為安故齊留公强成昏公既見止連昏于鄰國之臣厭尊毁列辱其先君而於廟行飲至之禮故書以示過禮送女留其送馬謙不敢自安三月廟見遣使反馬高固遂與叔姬俱寧故經傳具見以示譏七年春衞孫桓子來盟始通且謀㑹晉也夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免故黒壤之盟不書諱之也萊今為山東萊州黄縣又有萊城國近齊故伐之公感齊定位之恩不事晉而專事齊於此又以兵㑹伐既而致晉辱黄父即黒壤八年夏有事于太廟襄仲卒而繹非禮也繹又祭陳昨日之禮所以賔尸於時襄仲既卒有卿佐之喪宜廢此禮而猶繹故曰非禮冬葬敬嬴旱無麻始用葛茀雨不克葬禮也禮卜葬先逺日辟不懷也記禮變之所由茀所以引柩殯則有之以備火葬則以下柩古者葬必卜日必先卜其日之逺者懷親之意十年春公如齊齊侯以我服故歸濟西之田夏齊惠公卒公如齊奔喪公親奔喪非禮秋師伐邾取繹季文子初聘于齊冬子家如齊伐邾故也國武子來報聘文子以齊侯初立而聘子家名歸父仲遂子也以伐邾取邑懼討而往報報文子也十四年冬公孫歸父㑹齊侯于穀見晏桓子與之言魯樂桓子告高宣子曰子家其亡乎懷於魯矣懷必貪貪必謀人謀人人亦謀已一國謀之何以不亡穀今山東東阿縣有穀城樂樂其土也桓子晏嬰父宣子高固也十五年秋初稅畆非禮也穀出不過藉以豐財也周法民耕百畆公田十畆借民力而治之稅不過此使民富厚而國之財自豐十七年冬公弟叔肸卒公母弟也凡太子之母弟公在曰公子不在曰弟凡稱弟皆母弟也十八年公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命于介既復命袒括髪即位哭三踊而出遂奔齊書曰歸父還自晉善之也宣公徳遂立已而寵其子以心膂不堪三桓之專與謀去之故季文子乘公薨逐之適謂子惡齊之甥襄仲殺之而立宣公南通于楚既不能固又不能堅事齊晉故云失大援宣叔文仲子武仲父許其名也時為司冦主行刑言子自以歸父害已欲去者許請為子去之子家以君薨家遣故除地為壇而張帷介副也將奔使介反命于君已袒衣以麻約髪依在國即喪位三踊致哀而後奔善善其見逐盡禮以行以上為仲遂立宣公以下為季孫宿專政成公十八年八月己丑公薨于路寢言道也十二月孟獻子㑹于虚朾請于諸侯而先歸㑹葬丁未葬我君成公書順也在路寢得君薨之道五月而葬故曰順時成公薨襄公以冲年即位故政權益下移而季氏益强襄公二年夏齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順徳之行季孫於是為不哲矣且姜氏君之妣也詩曰為酒為醴烝畀祖妣以洽百禮降福孔偕齊姜成公婦襄公嫡母穆姜成公母襄公祖母也是為姑婦檟梓屬櫬棺也頌琴琴名猶言雅琴皆穆姜自備終事文子取之以葬齊姜故為逆詩大雅言哲人行事無不順不哲言其逆也言妣見卑於祖妣又詩周頌烝進也畀與也偕徧也言敬事祖妣則鬼神降福季孫逆取以葬是不以禮為不敬祖妣四年秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為已樹六檟于蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎定姒襄公生母無櫬者素不備櫬至死方作季氏以定姒本賤既無器備議其喪制欲殯不過廟又不反哭匠慶魯大匠謂如季孫所議則為夫人禮不成慢其母是不終事君之道君長知之必季任其咎蒲圃塲圃名文子樹檟欲自為櫬請木將為定姒櫬也畧不以道取也既許故僅不御御止也季孫於穆姜定姒之薨皆不以禮而季氏旋卒故傳引古志以騐之定姒雖故賤身産襄公其禮雖不並嫡而亦當有加行父簡忽如是其心悖矣傳明言其罪而前註皆與傳異西山真氏乃謂季孫意抑妾母又以畧取槚不禁為賢何大謬哉五年冬季文子卒大夫入歛公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎喪大記畧云大夫喪將大斂君至主人迎入門右巫止於門外君釋菜祝先入登堂君即位於序端又士喪禮君若有賜焉則視歛既布衣君至升自阼階西向庀其也大率下而盜上者必立賢行美名以外收人譽故能隂操其柄自古簒竊奸雄皆階此以濟而忠賢大臣為衆望所歸其跡亦與之類人君於此能辨其邪正而進退之斯可以稱明矣七年夏南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費南遺季氏家臣費季氏邑今山東費縣有費城隧正主役徒昭伯叔仲惠伯之孫九年冬公送晉侯晉侯以公宴于河上問公年季武子對曰㑹于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衞冠于成公之廟假鍾磬焉禮也季武子文子之子名宿㑹沙隨在成十六年歲星十二歲而一周天冠成人之服必冠而後生子故為嘉禮之大必備禮以行祼謂灌鬯酒享祭先君金石鐘磬也以鐘磬為舉動之節祧即廟也以廟之兆域為言成公獻公曽祖天子諸侯無冠禮近世儒者論之詳矣使果宜冠則返國而行乎祖廟何後事之有乃寄他國以行此季氏弱其君非禮速冠以阿伯主意傳謂之禮則何適而非禮也十一年春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍魯固有三軍時已廢壞季氏欲專其民人故假以作為名請分為三而各征之穆子知季氏將執魯政必厚自封殖不能終均為三也武子方志在分國而固請穆子料其必復變故盟之僖閎僖宫之門五父衢道名在今曲阜縣西南詛以禍福之言相要於是三家各毁其家乘以足成其數季氏使其軍乘之人率邑役入其家者無公征不入者則使公家倍征之設利病以驅民入已孟氏唯取其子弟之半為已臣蓋四分其乘之人以三歸公而取其一叔氏盡取其子弟以父兄歸公其本謀如此不然不舎其故而改作也此三家皆專公室而季氏尤横皆乘襄公幼弱而為之二十九年夏四月葬楚康王公及陳侯鄭伯許男送葬公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公問公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭强之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非徳賞也且無使季氏葬我送葬事餘見晉楚為成平王得國方城楚山卞今山東泗水縣季武子乘公不在國取之以自益使其屬大夫公冶問公起居既封璽書以去復追而言取卞事故冶初不知既致其使命及發書方聞公言季氏欲得卞而欺我言叛益疏我不敢歸冶以君國莫違為對公以冕服賞之榮成伯魯大夫詩邶風曰式微式微胡不歸義取寄寓之微勸公歸也冶以此不義季氏致其所與邑而終不入其家猶深以欺君為恨冕服生不能辭死必不以歛并拒其葬於季氏冕服卿服𤣥冕非徳賞以為季氏使而賞也賢人不幸而仕於强家其志可悲矣六月范獻子來聘拜城杞也公享之展莊叔執幣射者三耦公臣不足取於家臣家臣展瑕展王父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦晉平公把出前合諸侯城杞故為禮謝魯執幣將以酬賓也公臣不能備三耦見公室卑微以上為季武子專政以下為季孫意如逐昭公三十一年夏五月公作楚宫穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月辛巳公薨于楚宫叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪立胡女敬歸之子子野次於季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子裯穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聴卒立之比及葬三易衰衰衽如故衰於是昭公十九年矣猶有童心君子是以知其不能終也公適楚喜其宫倣而作之以為名太誓武王伐紂誓師之詞拱璧公大璧也帶竊之魯人以此薄帶子孫不得志於魯胡歸姓國敬歸襄公妾毁過哀毁瘠以致滅性敬齊皆諡裯昭公名義鈞均有可立之義衰已三易而衰衽復如舊衽甚言其嬉戲無度也昭公四年十二月癸丑叔孫不食乙夘卒叔孫穆子也為豎牛絶糧三日而卒詳見列卿世嗣之變五年春王正月舍中軍卑公室也毁中軍於施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公以書使杜洩告於殯曰子固欲毁中軍既毁之矣故告杜洩曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之季氏果欲厚自予而四分其軍則無中軍故曰舍又不欲親其議勑二家㑹諸大夫發毁置之計而避其惡名故於施氏臧氏前三分時季孟叔雖專而猶有差至舍而四分則以二之良歸季以其二歸叔孟國人盡屬三家惟隨時獻於公而已其専益甚復以書告於穆子之殯而誣之云云其臣杜洩痛其見誣而投之哭之餘見列卿世嗣之變公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔侯於是乎知禮昭公不能收其國柄而徒習於儀文之細為知禮者所譏女叔齊司馬侯也羈莊公𤣥孫字懿伯陵小謂伐莒取諢利難謂乘莒亂取鄫不知私不自知有私難民食言威權盡去如民之寄食他三家也一云君以養民不能養民使其民仰食於他思莫圖終無有為公謀其終者䘏民憂國禮之本也威儀文詞其末也時平公亦失政故女齊并以諷諫十一年五月齊歸薨大蒐于比蒲非禮也九月葬齊歸公不慼晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有太喪國不廢蒐有三年之喪而無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國齊歸昭公母蒐數軍實也晉史趙言昭公必出在郊野不能有國蓋公生於歸不思親則不為祖考所歸祐姓生也叔向亦以臣無君君無親度必失國十七年夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月謂之孟夏平子弗從昭子退曰夫子將有異志不君君矣周六月夏四月也為正陽之月純陽用事隂氣未動而侵陽為災重故天子不舉鼎伐鼓于社責羣隂社爵為上公諸侯爵卑於社用幣以請而伐鼓於朝以自責故祝史請用幣昭子謂禮也平子止之以為唯建子之月歲首日食為災宜救故太史曰在此月非歲首因詳述其禮分春分至夏至三辰日月星日月相侵又犯是宿故三辰皆為災降物減物采也辟避正寢移時過日食時奏伐也用幣用於社用辭以自責夏書𦙍征集安房舍也日月不安其舍則食瞽樂師嗇夫司空屬主帛者車馬曰馳步曰走為救日食備也孟夏正夏之四月平子竟不從故昭子知其有無君之心蓋日君象救之所以抑臣助君也二十五年春叔孫婼聘于宋宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能乆季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂昭子聘於宋且為平子逆女餘見宋桓魋之亂新宫逸詩車轄詩小雅周人思得賢女以配君子喻平子求配宋女也右坐坐宋公右以相近改禮坐也樂祁宋司城佐助宴禮可樂而哀可哀而樂皆喪其心時宋公昭子飲酒而泣故云死徴公若平子庶叔其姊與公若同母者宋元夫人曹氏邾女也為平子外姊公若從昭子逆其女三世文武平四公宣成襄昭詩大雅言無人則憂患至夏有鸜鵒來巢書所無也師已曰異哉吾聞文武之世童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與襦鸜鵒之巢逺哉遥遥禂父喪勞宋父以驕鸜鵒鸜鵒往歌來哭童謠有是今鸜鵒來巢其將及乎鸜鵒不踰濟故為魯所無師已魯大夫跦跦跳行貌褰袴也禂父昭公死外故喪勞宋父定公代立故以驕昭公生出故歌死還故哭將及將及此事也初季公鳥娶妻於齊鮑文子生申公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶已以示秦遄之妻曰公若欲使余余不可而抶余又訴於公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿内日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯亦怨平子臧昭伯之從弟會為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若洩臣不獲死乃館於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出乆矣隠民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將蕰蕰蓄民將生心生心同求將合君必悔之弗聴郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執冰而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行己亥公孫于齊次于陽州齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待于平隂為近故也書曰公孫于齊次于陽州齊侯唁公于野井禮也將求於人則先下之禮之善物也齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事唯命是聴君之憂寡人之憂也公喜子家子曰天禄不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力壹心好惡同之信罪之有無繾綣從公無通外内以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通外内且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外内而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之公與昭子言於幄内曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒左師展將以公乘馬而歸公徒執之季氏專橫日乆公私之怨俱集共欲以公去之而公才非撥亂反致失國公鳥公亥俱平子庶叔父鳥為兄亥一名若思展季氏族相佐也季姒即公鳥妻鮑文子女也饔人食官檀其名抶扑也秦遄魯大夫妻公鳥妹秦姬也使使以非禮公甫平子弟要劫以非禮公之亦平子弟逆迎也執夜姑之有司欲迎受生殺之命季郈二家相近雞鬬今曲阜縣西南有鬬雞臺介雞擣芥子播其羽令辛一云為雞著申金距以金為雞距怒怒其不下已益宫侵郈氏以自益讓責也昭伯臧為子讒事見列卿世嗣之變旃之也禘大祭萬舞也於禮公當四十八人今俱萬於季氏僅得二人不能庸謂其弃禮太甚將廢之不用也公為昭公子務人果賁皆其弟無命獨言執而無勑命小人嫌其微不足謀大懿伯子家羈受名徒以虚名受禍館於公明無所洩也子家之言誠知時矣然公室其容以不張乎季氏雖强亦非莾操懿温之比使昭公稍有英畧則雖不受誅亦守臣分之不遑矣子家以公庸暗不能辦是耳公從諸臣謀以兵伐季氏而昭子適往闞闞今屬山東東平州季氏廹於難三請命弗得子家知公必危沂水在魯城南隠民潜亡逃匿者日入時將起而作慝慝惡也蕰積也同求謂生悖心而求同惡者合而攻君也氷棚通櫝丸蓋可以取飲執之而踞無戰心故叔孫氏之兵得陷而入之孟氏因即殺公使連兵以逐公子家言若非公本意者公自止季氏有所懲必稍改公不忍如墓謀辭先君且謀所奔也陽州齊魯境上邑平隂今山東平隂縣野井今屬禹城縣舊有野井亭弔失國曰唁齊侯將唁公於平隂而公先至野井待之故齊侯自咎以謝公言不勅有司逺詣陽州而欲近㑹平隂故魯侯過恭先至野井逺迎善物善事也二十五家為社千社二萬五千家以給公待役使之命唯命伐季氏之命為臣以給公也信明也罪有無言處者有罪從者無罪繾綣無離散也皆有罪言從者陷君留者逐君也何守何必守君而弗去也昭子歸以義責意如意如欲歸公以自贖故謂猶既死復生枯骨復肉也昭子以意如意往言於公子家恐從者知其謀命執適館者昭子恐反側者撓公歸將安之以納公而公徒乃伏兵欲殺之故自鑄避焉既平子變前志昭子恥為所欺因祈自殺展魯大夫謀與公乘馬輕歸昭公之奔實由叔孫氏司馬昭子徒責季氏而不罪其臣何也豈亦以伐季氏為非而叔季固一體耶至季氏中變唯自祈死使身免於不義而已豈以權在季氏而不可孰何耶誠有不可解者十一月宋元公將為公故如晉己亥卒于曲棘如樂祁言曲棘今河南杞縣舊有曲棘里十二月庚辰齊侯圍鄆鄆今山東鄆城縣欲取以居公二十六年春王正月庚申齊侯取鄆三月公至自齊處于鄆言魯地也夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人高齮能貨子猶為高氏後粟五千庾高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力於魯君者非不能事君也然據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之弃魯耶抑魯君有罪于鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衞國也請我受師許之請納質弗許曰信女足矣告於齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩于齊齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆魯成備而後告曰不勝衆師及齊師戰于炊鼻齊子淵捷從洩聲子射之中楯瓦繇胊汰輈匕入者三寸聲子射其馬斬鞅殪改駕人以為鬷戾也而助之子車曰齊人也將擊子車子車射之殪其御曰又之子車曰衆可懼也而不可怒也子囊帶從野洩叱之洩曰軍無私怒報乃私也將亢子又叱之亦叱之冉豎射陳武子中手失弓而罵以告平子曰有君子白晳鬒鬚眉甚口平子曰必子彊也無乃亢諸對曰謂之君子何敢亢之林雍羞為顔鳴右下苑何忌取其耳顔鳴去之苑子之御曰視下顧苑子刜林雍斷其足鑋而乘於他車以歸顔鳴三入齊師呼曰林雍乘齊既取鄆居公復欲納公入國而其臣賄君暗卒於無成豐賈皆季氏家臣二丈為端二端為兩瑱充耳縳卷也急卷使如充耳易藏且見錦之熟細子猶梁丘據齮其家臣豐言若能為我行貨于據當請使為高氏後又致粟五千庾庾十六斗齮為言於據魯人買此甚多布陳之以百兩為數先以二兩見幣材之美如此財材同異所怪也卜卜可否鉏齊大夫成孟氏邑今山東寧陽縣有成城朝欲以成禦齊師于境不使及國恐見疑故請質因詐齊師欲降使之懈而成備淄水源出泰安州萊蕪縣原山違臨淄至夀光縣入濟齊師飲馬於淄而成敗之托言衆心不服姑伐以厭衆既備乃告齊云衆不欲降已不能勝於是季氏師與齊戰炊鼻魯地淵捷齊大夫字子車洩聲子魯大夫一名野洩從逐也瓦櫓脊繇過也朐車軛汰矢激輈車轅匕矢鏃也射馬射淵捷之馬在腹曰鞅殪馬死故改駕人魯人鬷戾叔孫司馬誤以淵捷為戾而助之戰捷因疑為齊人而試呼之魯人方知非戾遂擊捷為捷所射殪其御又欲射餘人捷以不可怒衆止之囊帶齊大夫亦逐野洩叱之不加害洩欲以公戰禦之不欲私報其叱而子囊又叱故洩亦叱齊二人逐野洩俱縱之歸見齊人無戰心冉豎季氏臣罵武子罵也子彊武子字亢拒也冉偽言不敢亢以順季武林雍顔鳴皆魯人雍羞為鳴右故下車戰何忌齊大夫不欲殺雍但取其耳以辱之鳴見雍被獲懼而去御復欲何忌擊其足故使下顧遂擊斷雍足雍一足寄車以歸鳴不以私怨三入齊師呼雍共乘制擊也鑿一足行也見魯人皆致力於季氏秋盟于鄟陵謀納公也齊侯與莒邾把盟也鄟陵地舊闕二十七年春公如齊公至自齊處于鄆言在外也秋會于扈令戍周且謀納公也宋衞皆利納公固請之范獻子取貨于季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而說甲執冰以游叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復戍周見子朝之亂子梁宋樂祁字貞子衞北宫喜諡復復存也淮夷魯東夷宣布也如在國即後歸馬具衣履之類難復以難納復晉君也孟懿子陽虎伐鄆鄆人將戰子家子曰天命不慆乆矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知虎季氏臣伐鄆欲奪公鄆也慆恱也言天乆不佑君衆違天而戰必敗而使君終於亡蓋子家意欲公静以竢命且戰敗則威愈褻而無復歸道也且知近鄆地冬公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出子家忿齊無納公之意度其必不加禮於公故云將飲酒耳齊果如其言宰膳宰獻獻爵請安請公安也君不敵臣故使宰獻既命以安皆公享卿大夫之禮蓋卑公也子仲魯公子愸字前謀逐季氏不能奔齊其女重為齊夫人此飲酒欲使重見從宴媟也故子家使公避之二十八年春公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造于竟弗聴使請逆于晉晉人曰天禍魯國君淹恤在外君亦不使一个辱在寡人而即安於甥舅其亦使逆君使公復于竟而後逆之乾侯晉邑今北直𨽻成安縣齊卑公故適晉子家欲使公次于晉境以待命而公不用其言果見辱一个單使也亦使逆言自使齊逆君也復于境使公復還於晉之境而後逆之居乾侯二十九年春公至自乾侯處于鄆齊侯使高張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯主君比君于大夫也為齊所卑故復還晉冀見恤夏平子每嵗賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衞侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以帷裹之公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊侯喜與之陽穀公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜於陽穀而思於魯曰務人為此禍也且後生而為兄其誣也乆矣乃黜之而以公衍為太子意如雖逐公猶稍為君禮而公自杜其善意賈買也賣之賣其馬也啓服馬名塹堕塹也為櫝作棺也禮曰敝幃不弃為埋馬子家請以馬食從者以公為櫝故深抑之公感其言始依禮以裹龍輔禱旱玉為龍文又云鑄金為龍以玉為凾輔盛之故曰龍輔陽穀齊地出出産室内則云妻將生子及月辰居側室産室側室也公為母誘留公衍母待已生子共告至後生而乃先告務人公為也是年冬鄆潰無傳三十年春王正月公在乾侯不先書鄆與乾侯非公且徴過也徴明也公在鄆在乾侯過謬猶可掩故不顯書其所在使若在國然自是鄆人潰叛齊晉卑公子家忠謀終不能用外内弃之非復過誤所當掩諱是以每歲必書公所在三十一年春王正月公在乾侯言不能外内也晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適歴荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸荀范俱黨季孫外姑正言責之以示義季孫冠服如喪示有罪君謂魯侯言但以事君為願請囚賜死皆飾辭以見忠順心亦欲公歸以掩前罪知伯荀躒也糞掃也糞除革舊從新之意夫人季孫也如河如河水以自誓荀躒以公言切故示不忍聞而言寡君唯恐得罪不敢復知魯難蓋拒之也子家勸公單車歸公被脅而止不能自主荀躒以晉侯命責意如勸公歸此一機也失此其客死必矣三十二年春王正月公在乾侯言不能外内又不能用其人也人謂子家羈言公不能用其人故於今猶在乾侯十二月公疾徧賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜已未公薨子家子反賜于府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪貳故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日乆矣民之服焉不亦宜乎魯君世從其失季氏世脩其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功於魯受費以為上卿至於文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人公亡外八年終死於亡臨歿賜從亡諸臣琥祀西方玉作虎形輕服細好之服失所不於國正寢也無常唯以徳也詩小雅言高下有變易三后虞夏商也大壯乾下震上故曰雷乘乾乾為天子震為諸侯而在乾上君臣易位為雷在天上失國失其權也器車服名爵號名器假而威權隨之魯君所以失國為永鑑也史墨論君臣天人之際辨矣時晉事與魯畧同簡子聞之不益興代晉之心乎定公元年夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聴命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聴子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也冦而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位季孫使役如闞公氏將溝焉榮駕鵞曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵞曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公於墓道南孔子之為司冦也溝而合諸墓昭公出故季平子禱于煬公九月立煬宫公薨外意如使逆其喪而易其嗣以子家子數勸公歸喜之成子婼之子名不敢言於我以我之事言於公聴命以衆事訪之幾哭位羈不欲見叔孫故朝夕不同㑹未得見出時成子未為卿也不命未受公使見之命蓋以義拒之也宋昭公弟未有後蓋欲之與從政而以有後歆之也貌出謂以義從公與季氏無怨者冦出與季氏為冦讐者已以貎出而將逃者其志操不與衆同義不可入也子家忠節明哲尚矣𫝊不究其所終惜哉諸侯薨五日而殯殯則嗣子即位癸亥昭公喪至五日殯于宫定公乃即位闞公氏魯羣公墓所在公氏猶言公家溝欲溝絶昭公兆域别於先君又諡以惡諡雖有駕鵞之言猶别葬于墓道之外至孔子相方於昭公墓外而溝之與先君合駕鵞魯大夫榮成伯也旌章也自信自實也煬公伯禽之次子禱之求公不入以為獲福故立其宫十五年夏五月壬申公薨秋七月壬申姒氏卒不稱夫人不赴且不祔也葬定公雨不克襄事禮也葬定姒不稱小君不成喪也赴於同盟祔於姑夫人之禮二者皆闕故不曰夫人襄成也兩而成事若汲汲於欲葬者故以不克襄為禮公未葬而夫人薨煩於喪禮故不以夫人禮喪之臣子之愎也又哭於寢故書葬哀公十二年夏五月昭夫人孟子卒昭公娶于呉故不書姓死不赴故不稱夫人不反哭故不言葬小君孔子與弔適季氏季氏不絻放絰而拜諱娶同姓故謂之孟子若宋女而小君之禮俱闕孔子告老與諸臣之列以小君禮弔焉而適季氏見其不絻亦去絰以為稱絻喪冠絰喪帶是時公室寢微矣二十三年春宋景曹卒季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人曰以肥之得備彌甥也有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎景曹宋元公夫人小邾女季桓子之外祖母康子之外曾祖母也康子名肥社稷事重事競盛也以見不能逺違紼引棺索送葬者執之求冉有名輿衆也彌增也彌甥猶云曽孫薦進也稱副稱也馬以駕車車有旌旄仍以繁纓飾馬皆國君之服謙言可以稱此否傳終樂祁之言以上為季孫意如逐昭公以下為哀公孫越哀公十六年夏四月己丑孔丘卒公誄之曰昊天不弔不憗遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律子贛曰君其不没於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之仁覆閔下故稱旻天弔恤憗强俾使屏蔽疚病也律法言喪尼父無以自為法天子稱一人非諸侯名也二十一年夏五月越人始來越既勝呉欲伯中國始遣使適魯二十三年秋八月叔青如越始使越也越諸鞅來聘報叔青也二十四年夏公子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之閏月公如越得太子適郢將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止荆哀公庶子宗人禮官名釁夏武公名敖孝公名稱惠公名弗皇商宋也桓公始娶文姜於齊得相親恱適郢越太子名有山魯臣從公者嚭故吳臣二十五年夏六月公至自越季康子孟武伯逆於五梧郭重僕見二子曰惡言多矣君請盡之公宴於五梧武伯為祝惡郭重曰何肥也季孫曰請飲彘也以魯國之密邇仇讐臣是以不獲從君克免於大行又謂重也肥公曰是食言多矣能無肥乎飲酒不樂公與大夫始有惡孟武伯名彘五梧魯南鄙郭重魯臣為公御謂公季孟不臣之言甚多請公盡極以觀之祝上夀酒何肥憎其貌也季孫云以魯近於仇羣臣處守不從君行重隨君逺行劬勞乃詬之宜罰也公以三桓數食言故反謂重食言而肥以激之君臣相猜如此二十七年夏四月己亥季康子卒公弔焉降禮過自貶屈公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多閒公游於陵阪遇孟武伯於孟氏之衢曰請有問於子余及死乎對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月甲戌公如公孫有陘氏因孫于邾乃遂如越國人施公孫有山氏及死可得壽終否三辭以其言無緒也有陘即有山公從其家出故施以罪春秋左傳屬事卷九
