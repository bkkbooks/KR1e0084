body:
  text: 春秋左傳屬事後序竊觀古今學術其始也有自其成也有漸其行也有藉必天篤生睿聖始能超悟先物創制遜弱冠至崑獲師歸熙甫有光子建有極獲友周汝亨士淹汝允士洵俞仲蔚允文徐道潛三省與陳吉甫敬純王敬文執禮皆卑視時藝交相淬礪以博古髙逺為務中少許可遜年輩獨後皆推情分好開發予蒙今此纂與訓註粗成而二師四友先巳徂謝吉甫潦倒家居敬文官天朝無緣一一質之良可恨也尚幸焉稍後獲交今兵侍顧公觀海刑侍王公鳳洲與其弟學憲陳霽巖公為内閣王公荆石禮逮寒陋并得交其弟學憲和石公以嵗賦至京復得師掌經局趙定宇公皆䝉不以凡衆鄙夷此書脱槀即錄以求正六公繼得以首冊正定宇師幸留荆石公許最久煩更定數條以示儗作序適内召未果定宇師與諸公並虚加賞詡而鳳洲公為尤以雄作逺恵兵書張公崌崍公臭味也撫浙時疏薦云註左氏而雅有發明又安居帥公視吾臨桂張公念華連州馬公連城俱以名御史按浙俱辱薦揚有云業精三傳有云見超色相有云具見淵源之學其他監司諸公亦交口過譽深愧蕪謬得當世名公指訓品隲如此或可藉以不磨也猶恐無以仰荅諸公知遇於傳中文義頗竭思慮特於地理殊有遺憾焉幼聞天文易學地理難精天象有常運度躔次亘古不易區域屢遭易代割據制度名號務以相矯并裂互錯新故疊更紛紛籍籍有難殫紀前人偶遺後終無證而况所居朴野少蓄書者舊所藏地志皆不獲帶來惟得一統志廣輿圖及向所記憶者與史記漢書叅考而已然巳几案為盈手翻目閲形罷神耗而景晷易移或旰不得一中焉憒憒憶向年周汝允藏酈道元水經皆手自㸃竄校訂又云東南非其身歴多錯曾會藝吉甫園其書室有地理圖如席許者數十幅絲分疆里曲直縱横吉甫云予數十年究意於此猶不能精今此不得與二友共之痛九原之不起嘆縮地之無術不知吾涕之潸然也因圖付梓遂濫叨兵憲施公郡守潘公邑令陳侯腆賜刻工一集事不容緩其中訛舛能必無乎但以西晉至今千百餘年若不即為一更恐後彌逺彌難考失其真矣故寧以疎畧取笑當世而不敢避焉愚前語敬文云通鑑有何難解呉三省安用註為敬文曰不然先生云其註地理極可觀愚復讀之信先生蓋熙甫也今此註有媿於呉氏𢎞多如天假以緣使遜遍蒐天下郡邑志而精考之復見於左氏編年本固大願也此譬之築宅焉以曠野而頓為營搆也難既有堂室而欲増易之也易元凱無漢儒不能為集解遜無元凱亦不能為此註今於元凱既有加焉後人欲因此而更正之當益易矣歐陽子曰六經非一世之書其將與天地無終極而存也夫既非一世之書則豈一世之人所能定乎今學校科舉皆襲宋儒一人一時之見為著令遜雖不敢輕議而中耿耿者難自冺也則此書之隃望於天下後世者誠殷矣敢識之卷尾以竢萬厯乙酉中秋古婁後學傅遜書於江西南康府建昌縣學宫
