body:
  text: 春秋左傳屬事後叙先聖王經籍雖遭秦燬而自西漢以後千數百年名儒碩士撰述叙紀巳汗牛充棟雖稱博洽者亦莫能殫閲士生今世若無庸復有所益矣然事有剴要而於古遺焉其可漫焉而任其缺乎往嵗余以遷補與諸同籍聚晤京邸有謂袁仲樞通鑑紀事本末可便覽讀而上有左傳恨無有如其法而列之前者余曰某曽讀宋學士集有左傳始末叙文又近世毗陵唐荆川氏亦有此纂時璽丞王敬文曰宋學士所叙藏諸祕府某等未之見荆川所纂事頗不全又少注難讀余向年有志纂之未竟會將計偕以授吾同門友傅遜氏渠因更張附益之國以次叙事以國分先後相續巨細相維傳事既羅之無漏矣又將杜氏集解變其體裁而革其訛謬余詳讀一二卷及其辨誤精核必傳無疑此真足以列紀事本末之前矣余聞而心識之惜未獲即覩其書也去嵗秋杪傅君適補建昌學諭甫及參謁余因詢得前書與王敬文所語符遂諷令鋟之板以廣所傳傅諭云雅有此志而詘於力會建昌陳令縱臾之且捐俸以資之始既巡道施公聞而贍成之余亦微有濟焉然傅諭既以此為袁氏之前又欲以宋元事繼其後并取袁氏書釐其未允而增其未備瞿瞿焉恆以不克副其志為懼余每慨近世科舉之習日趨簡便蘇子瞻所謂束書不觀遊談無根者殆尤甚矣今臺省諸公識際𢎞逺思挽其弊屢建白欲得窮經讀史博古通今之士以當科目之選則斯編也其可幽伏而不使之播揚耶使海內學者皆如其志豈不以通博稱而乃致夫寡昧之誚耶但人情忽於近見而慕於逺聞或誦古人遺書而追憶其人則不免有隔世之嘆設遇其人而與之處則安為故常而不見其殊異使見其異則又為衆所嫉而不容於世此古今賢豪所以多伏櫪之悲也吾於傅遜氏而深有感焉既訖工持以請叙於余余憐其居今而學古力微而志逺不欲拒其意以鳳洲先生既叙其前矣遂推敬文之意以繫之後萬厯乙酉秋九月朔日守匡廬松陵潘志伊撰
