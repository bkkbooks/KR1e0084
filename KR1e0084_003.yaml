body:
  text: 春秋左傳屬事卷三明傅遜撰伯晉靈公楚穆王爭伯文公九年春范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭囚公子堅公子龍及樂耳鄭及楚平公子遂會晉趙盾宋華耦衞孔達許大夫救鄭不及楚師卿不書緩也以懲不恪夏楚侵陳克壺丘以其服於晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平范山楚大夫時晉靈㓜而不君故山云爾楚在南故以中原為北狼淵鄭地在今河南許州境堅龍樂耳鄭三大夫列卿救鄭不及其難故書人以示懲壺丘陳邑朱楚息公茷楚公子生曰囚死曰獲陳以小勝大故懼而請平十年秋陳侯鄭伯會楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聴命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以徇或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹母縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎息國楚滅之為縣今河南息縣宋獨未從楚故將伐之欲與戰宋先服焉御事宋大夫孟諸宋大藪在今河南歸徳州境盂田獵陣名復遂楚期思邑公將獵張二甄故置左司馬二以右司馬一人當中夙早也燧取火者宋公違此命撻其僕狥于軍以示戮抶撻也子舟無畏字二詩皆大雅上美山甫不避彊禦下言禁戢詭人隨人以飭不中者罔無極中也子舟自言持此義故戮宋公十一年夏叔仲惠伯會晉郤缺于承匡謀諸侯之從於楚者氶匡宋地今河南睢州境秋襄仲聘于宋因賀楚師之不害也十三年冬公如晉朝且尋盟衞侯會公于沓請平于晉公還鄭伯會公于棐亦請平于晉公皆成之鄭伯與公宴于棐子家賦鴻鴈季文子曰寡君未免於此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜沓地闕鄭衞貳於楚畏晉故因公請平棐鄭地子家鄭公子名歸生鴻鴈詩小雅義取侯伯哀矜鰥寡有征行之勞言鄭國寡弱欲使魯侯還晉恤之四月詩小雅義取行役踰時思歸祭祀不欲為還晉載馳詩鄘風四章以下義取小國有憂欲引大國以救助采薇詩小雅取其豈敢定居一月三㨗許為鄭還不敢安居拜謝公為行是歲穆王卒子莊王立幼而逢國多難不能與中國競故靈公雖無道猶主夏盟而其擕貳人心者已多至莊王强明内難既除而務外畧孫叔敖為令尹成公景公雖無失徳不能當之矣十四年夏六月同盟于新城從於楚者服且謀邾也新城宋地在今河南夏邑縣境因宋陳鄭皆服故盟復謀納捷菑秋七月乙夘夜齊商人弑舍商人桓公子舎昭公子宜立而商人弑之以簒其國是為懿公九月齊人定懿公齊人多不服至乆而後定詳見桓公五子爭立十五年新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之獲大城焉曰入之勝國絶其社稷有其土地入得而不有秋齊人伐我西鄙故季文子告于晉冬十一月晉侯宋公衞侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也凡諸侯會公不與不書諱君惡也與而不書後也商人弑君且數伐魯故謀討之乃受賂而還齊侯侵我西鄙謂諸侯不能也十六年冬十一月宋人弑其君杵臼杵臼昭公名詳見宋昭公之弑十七年春晉荀林父衞孔達陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也失所謂不能討罪失所職也夏四月晉侯蒐于黄父遂復合諸侯于扈平宋也公不與會齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入于敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克減侯宣多而隨蔡侯以朝于執事十二年六月歸生佐寡君之嫡夷以請陳侯于楚而朝諸君十四年七月寡君又朝以蕆陳事十五年五月陳侯自敝邑往朝于君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之密邇於楚而不敢貳焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝于襄而再見于君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇命之岡極亦知亡矣將悉敝賦以待於鯈唯執事命之文公二年六月壬申朝于齊四年二月壬戌為齊侵蔡亦獲成於楚居大國之間而從於彊令豈其罪也大國若弗圖無所逃命晉鞏朔行成於鄭趙穿公壻池為質焉冬十月鄭太子夷石楚為質于晉黄父晉地一名黑壞晉不能治宋亂故曰無功復濫焉以責鄭貳故歸生有詞執訊通訊問之官宣多既立穆公恃寵作難減損而未靖遂汲汲以隨朝夷太子名蕆飭也飭成前好朝夷相夷朝晉也孤謂鄭伯絳晉都首尾皆畏則身中不畏者無幾鹿得美草呦呦相呼音之善也將死其音必惡若以鋌鋌鹿則畏死走於險其情急矣豈復擇其善音而鳴之喻晉虐鄭鄭必急而欲一鬬以死也鋌銅鐵朴也罔極無常也鯈晉鄭之境言欲以兵拒晉鞏朔趙穿公壻池皆晉大夫石楚鄭大夫楚莊王之伯宣公元年宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又會諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋會于棐林以伐鄭也楚蒍賈救鄭遇于北林囚晉解揚晉人乃還棐林鄭地在今河南榮陽中牟二縣境舊有林亭解揚晉大夫冬晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚靈公無道固然然取賂齊宋而不能討庸非盾之罪乎二年春鄭公子歸生受命於楚伐宋宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人狂狡輅鄭人鄭人入于井倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聴之之謂禮殺敵為果致果為毅易之戮也將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎殘民以逞宋人以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸立于門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而来奔宋城華元為植巡功城者驅曰睅其目皤其腹棄甲而復于思于思棄甲復来使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰従其有皮丹漆若何華元曰去之夫其口衆我寡鄭既從楚遂以其命伐宋宋師敗将獲華元樂吕皆宋卿大棘宋地今河南寧陵縣有大棘城狂狡宋大夫輅迎也戎兵事昭明果敢毅必行也聴敬従也易反也詩小雅義取不良之人相怨以亡文馬馬之毛色有文采者四馬為駟告城門而後入見元不苟叔牂羊斟字得先歸元見而尉之牂自任其罪合猶㑹也食士不及御元先有偏焉然牂之罪大而得免于死宋失刑矣植將主也睅目出皤大腹棄甲亡師于思多鬚貌那猶何也牛與犀兕皮皆以造甲丹漆所以飾之者𫝊言元不吝其咎寛而容衆夏晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆将斃矣姑益其疾乃去之隂地河南山北鬬椒楚若敖之族自子文以來世為令尹盾言物盛則衰彼宗强甚必驕而吾示弱當益驕而速亡盾實力不能姑托辭以解于衆耳是嵗靈公弑成公立三年春晉侯伐鄭及郔鄭及晉平士㑹入盟郔鄭地楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協于上下以承天休桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其姦回昏亂雖大輕也天祚明徳有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也陸渾戎雜居雒水間楚子因伐戎而至問鼎示欲偪周取天下滿周大夫對昔禹徳方隆逺方圖畫山川竒異之物以獻九州之牧貢金於是象其所圖著之於鼎使民知備深入幽阻而螭魅罔兩之類莫之遇故民無災害上下和而受天之祐桀紂昏暴而鼎以遷鼎輕重由徳周以明徳為天所祐年世未窮何得妄意神姦即所圖者若順也螭山神魅妖怪罔兩水神一云木石之怪載祀皆年也郟鄏今河南府城西有郟鄏陌王孫滿善於辭足以杜奸雄之心而奪之氣夏楚人侵鄭鄭即晉故也四年冬楚子伐鄭鄭未服也五年冬楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉衞侵陳陳即楚故也冬楚人伐鄭取成而還後所稱厲之役蓋此七年夏鄭及晉平公子宋之謀也故相鄭伯以會冬盟于黑壤王叔桓公臨之以謀不睦宋字子公四年弑靈公立襄公懼晉討故從晉而相之以㑹王叔桓公周卿士銜天子之命監臨之八年冬陳及晉平楚師伐陳取成而還九年秋會于扈討不睦也陳侯不會晉荀林父以諸侯之師伐陳晉侯卒於扈乃還成公卒子景公立冬陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲于朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎寧行父陳二卿夏姬鄭穆公女陳大夫御叔妻衷懐也衵服近身衣宣揚也納藏也辟邪也辟法也詩大雅言邪辟之世不可立法楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于栁棼國人皆喜唯子良憂曰是國之災也吾死無日矣六年楚伐鄭取成於厲既成鄭伯逃歸栁棼鄭地十年夏陳靈公與孔寜儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之二子奔楚舒夏姬子以母淫謂其多似以為戲舒恥之弑陳侯六月鄭及楚平諸侯之師伐鄭取成而還冬楚子伐鄭晉士會救鄭逐楚師于潁北諸侯之師戍鄭潁北潁水之北潁水源自河南登封縣潁谷東徑鄭州至襄城臨潁沙河西入淮十一年春楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也楚左尹子重侵宋王待諸郔辰陵陳地在今河南西華縣境舊有辰亭子重莊王弟名嬰齊宋不服故遣侵之令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板榦稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆于素艾獵孫叔敖别名沂楚邑封人主築城者慮計也司徒掌役者日日數財用築作具榦楨也畚盛土器稱量其輕重程限也議均勞逸也趾城足略行其廣狹也餱乾食有司監主者素素所慮之期見叔敖能使民冬楚子為陳夏氏亂故伐陳謂陳人無動將討于少西氏遂入陳殺夏徴舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徴舒為不道弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罸已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳鄉取一人焉以歸謂之夏州故書曰楚子入陳納公孫寜儀行父于陳書有禮也晉不能討陳罪而楚得執之以為辭少西徴舒祖子夏之名轘車裂也栗門城門縣滅之為縣陳侯靈公子名午縣公楚縣大夫蹊徑也取懷與之言辟如取人物於其懷而還之愈於不還夏州示討夏氏所獲也武昌府夏口舊有洲名夏州時能匡君于貪逺出楚諸臣之上楚莊聴其言而復陳善矣乃復納其致亂之臣豈禮乎厲之役鄭伯逃歸自是楚未得志焉鄭既受盟于辰陵又徼事于晉自厲之役鄭南北兩屬故楚以為恨十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉國人大臨守陴者皆哭楚子退師鄭人脩城進復圍之三月克之入自皇門至於逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聴其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善會聞用師觀釁而動徳刑政事典禮不易不可敵也不為是征楚軍討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔歲入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不奸矣蒍敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後勁百官象物而動軍政不戒而備能用典矣其君之舉也内姓選於親外姓選於舊舉不失徳賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵彊而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟知莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰律否臧且律竭也盈而以竭夭且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎師遂濟楚子北師次於郔沈尹將中軍子重將左子反將右將飲馬於河而歸聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔歲入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反旆伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聴而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次于管以待之晉師在敖鄗之間鄭皇戌使如晉師曰鄭之從楚社稷之故也未有貳心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申儆之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林箴之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨于楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕數及日中左則受之以至於昏内官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子知季曰原屏咎之徒也趙莊子曰欒伯善哉實其言必長晉國楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行也將鄭是訓定豈敢求罪于晉二三子無淹乆隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹於鄭曰無辟敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉曰以歲之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及滎澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者叔黨命去之趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰備之善若二子怒楚楚人乘我䘮師無日矣不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衞不徹警也彘子不可士季使鞏朔韓穿帥七覆于敖前故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡趙旃夜至於楚軍席于軍門之外使其徒入之楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而說左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右乙夘王乘左廣以逐趙旃趙旃弃車而走林屈蕩搏之得其甲裳晉人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寜我薄人無人薄我詩云元戎十乘以先啓行先人也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動工尹齊將右拒卒以逐下軍楚子使唐狡與蔡鳩居告唐惠侯曰不穀不德而貪以遇大敵不穀之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨率游闕四十乘從唐侯以為左拒以從上軍駒伯曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敢王見右廣將從之乘屈蕩户之曰君以此始亦必以終自是楚之乘廣先左晉人或以廣隊不能進楚人惎之脫扃少進馬還又惎之拔旆投衡乃出顧曰吾不如大國之數奔也趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去弃車而走林逄大夫與其二子乘謂其二子無顧顧曰趙傁在後怒之使下指木曰尸女於是授趙旃綏以免明日以表尸之皆重獲在木下楚熊負羈囚知罃知莊子以其族反之廚武子御下軍之士多從之每射抽矢菆納諸廚子之房廚子怒曰非子之求而蒲之愛董澤之蒲可勝既乎知季曰不以人子吾子其可得乎吾不可以苟射故也射連尹襄老獲之遂載其尸射公子穀臣囚之以二者還及昏楚師軍於邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至於邲遂次于衡雍潘黨曰君盍築武軍而收晉尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無徳而强爭諸侯何以和衆利人之幾而安人之亂以為已榮何以豐財武有七徳我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又可以為京觀乎祀于河作先君宫告成事而還鄭伯許男如楚秋晉師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃乆不競乎林父之事君也進思盡忠退思補過社稷之衞也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位楚於此決計必鄭専屬已乆圍之臨哭也大宫鄭祖廟出車於巷示將遷國陴城上僻倪皆哭以窮告楚哀之而退師猶不服故復圍克之塗方九軌曰逵肉袒牽羊示服為臣僕不天不順天也俘以實遷其民剪以賜分其地皆滅也前好前世盟好周厲王宣王鄭所自出桓公武公鄭始封賢君徼福此四君存其社稷使比九縣以服事不滅之也蓋時楚地為縣者九退退舍以禮鄭晉方悉師以救林父謚桓子先縠謚彘子士會食采於隨字季謚武子郤克謚獻子趙朔盾之子謚莊子書欒盾之子謚武子括嬰齊皆盾異母弟鞏朔士莊伯也穿萬之族荀首林父弟别氏知字季謚莊子同趙嬰兄厥萬曾孫謚獻子晉師河北將渡河而南林父以鄭服楚欲還俟楚歸更舉兵伐鄭勦勞也動舉也士會稱善言征伐為有罪釁非為是徳刑政事典禮之不可敵者讟謗也經紀法也荆楚尸陳也楚武王始更為此陳法遂以為名歩曰卒車曰乘奸犯也宰令尹蒍敖孫叔敖左右前後中者楚分其三軍為五部而使之各專其職右部挾轅為戰備左部追求草蓐為宿衞前部以茅慮審有無中軍出權謀以制勝後以勁卒為殿茅明也如軍行前有斥候蹹伏皆持以絳白二幡見騎賊舉絳見步賊舉白之類或云楚以茅為旌幟竊意以茅為烽燧或旄音之訛未詳象物各勤其類不戒閑習有素選親選舊既厚於親故而尤選其賢故舉賞咸得老則不計勞而加惠賔旅則有恩施而無勞役又别其尊卑而貴賤有章仲虺湯左相汋詩頌篇名鑠美也言美武王能遵天之道須暗昧者惡積而後取耆致也致討於昧武詩頌篇名烈勲也言武王兼弱攻昧故成無疆之勲撫撫而取之或云兼之悞烈所功烈之處所也先縠獨持異議欲戰非夫不丈夫中軍佐縠所帥濟渡河也荀首嘆其必危師坎下坤上初六變而為臨兊下坤上其爻辭云云律法否不也言凡執事者以順逆為臧否今彘子逆命是否也衆羣而聴于一則强分散則弱坎變為兊兊少女而弱衆散之象也川流則不竭壅而為澤則竭矣坎為兊澤川壅之象也蓋將帥之貴于法律者能使其下如已之志故謂之律所謂順成而臧也否臧則律且竭而敗矣夭屈也言其法律如水之壅而盈則必竭屈而不伸散而不整故為凶水變為澤乃成臨卦澤不行之物彘子違命必不能行此臨之謂也遇遇敵尸主此禍也韓厥乃勸桓子同濟失屬謂鄭從楚亡師謂縠師陷云三軍皆敗則六卿同罪不專罪元帥彘子誖矣而又成於厥厥言既失專制之權尤無謀國之忠師敗業隳厥之由也沈或作寢叔敖後封寢丘今河南固始縣子重公子嬰齊字子反公子側字伍參奢祖父以智謀寵於王策晉必敗激王還戰南轅回軍南向旆軍前大旗專行各欲行其志非主將故不獲聴而無上謂欲禀聴進止而無上命則其令不一而不知所從管鄭地今河南鄭州有管城敖鄗二山在今河南榮陽縣境鄭既從楚猶飾詞於晉承繼也欒書知楚兵精而素備與鄭人之偽克庸事見楚滅庸舒軍實謂車徒器械若敖蚡冒皆楚之賢君簞路柴車藍縷敝衣言此二君勤儉以啓土不徳謂專以力爭徼要也廣楚乘車名以其親兵分左右二部故名二廣司馬法百人為卒二十五人為兩每廣用百人而四分之以其一為承副令番休以備不虞偏半也内官近臣序次也師叔潘尫字得屬服鄭也原趙同邑屏趙括邑朔善書言謂必執晉政少宰楚官閔憂也二先君成王穆王率遵也候人伺候望敵者遷徙去也致師挑戰也楚雖將崇和猶單車挑戰以示武靡旌驅疾故也摩近也菆美矢兩作掚飭也掉正也以示閒暇馘斷耳角張兩角逐之麗著也龜背之隆高當心者免止不逐也魏錡魏犨子公族公族大夫滎澤今河南有滎澤縣新殺為鮮見六得一言不如楚叔潘黨字尫之子趙旃穿之子與錡偕使郤克所謂二憾也七覆伏兵七所不敗先濟要後言之錡與旃雖俱受命而不隨行錡見逐退旃後至席布席坐示無所畏說舎也楚王更迭載二廣故各有御右司馬法車十五乘為偏今楚用舊法而易其名軘車屯守之車元戎戎車在前者詩小雅言王者軍行必有戎車在前開道先人為備可掬言多也右移自西而奔渡河上軍以有備獨不移工尹齊楚大夫右拒陳名唐狡蔡鳩居皆楚大夫唐屬楚小國游闕游車補闕者駒伯郤克字同奔為分謗不戰為生民殿卒自為其所將卒之後殿時楚右廣當代王欲右蕩恐軍中易乘人惑故止之户止也軍事本尚右以乘左得勝故先左廣隊廣車墜于埳也惎毒害也扃車上兵闌隊埳則扃礙不能進晉人脫之乃進還便旋不進旆大旗也楚人見晉兵馬旋又欲害之晉人拔旆投衡上使不帆風差輕乃得出顧楚兵而曰吾唯此偶敗耳不如大國之數敗而奔何用毒我乎逢大夫知趙旃在後見之必當與乘故使二子無顧乃顧之云云故怒使之尸此授綏以免旃明日以所表木敢尸果累尸於下負羈楚大夫知罃莊子之子族家兵反還戰廚武子魏錡也抽擢也菆美箭房箭舍蒲楊栁以為箭者董澤所出山西聞喜縣有董池陂穀臣楚王子知莊子獲襄老囚穀臣將以相當而易罃也軍營屯也邲鄭地今河南鄭州有邲城有聲言晉兵猶衆將不能用重輜重楚既大勝黨請築軍營以彰武功而積尸封土其上謂之京觀楚子不許文字也戢藏櫜韜肆遂夏大也詩美文王誅暴亂而息兵信哉能保此肆夏之美徳武頌篇名耆致也言武王誅紂致定其功其三三篇鋪布時是繹陳思語辭頌美武王能布政陳教使天下歸往求安定其六六篇綏安也屢數也言武王能安天下數致豐年此三六之數與今詩頌篇次不同蓋楚樂歌次第章典章幾危也鯨鯢大魚以喻不義之人吞食小國所罪之在也古者師行必以遷主載於齊車每舍奠焉今為此主作宫而祀之以告戰勝之事傳言楚莊有禮故遂興餘見鄭石制之亂桓子請死以當敗軍之罪晉侯聞文公子玉事而復任之士貞子渥濁也再世謂成王穆王也是時楚莊雖强而晉無大挫猶足以持之自邲既敗於是晉勢失而楚兵獨横莫能校焉林父之罪實博矣宜於用鉞而乃使之復位可謂以刑訓國乎貞子喻以日月之食抑何不倫也哉宜其日弱而不振也冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊遂傅於蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之蕭宋附庸今徐州蕭縣有蕭城宜僚丙楚二子纊綿也挾纊說以忘寒也還無社蕭大夫司馬卯申叔展皆楚大夫無社素識叔展故因卯以呼之麥麴鞠窮食之皆可以禦濕欲無社逃泥水中無社不悟故曰無河魚腹疾言無禦濕藥如魚在河將有腹疾也眢井廢井如目無明也無社意悟故使展叔視廢井而求極已展叔又教結茅以表井須已哭乃應傳言蕭人無守心晉原縠宋華椒衞孔達曹人同盟于清丘曰恤病討貳於是卿不書不實其言也宋為盟故伐陳衞人救之孔達曰先君有約言焉若大國討我則死之清丘衞地在北直𨽻開州原縠先縠不實謂宋伐陳衞救之是不討貳楚伐宋晉不救是不恤患前衞成公與陳共公有舊好故孔達欲背盟救陳而以死謝晉十三年夏楚子伐宋以其救蕭也君子曰清丘之盟唯宋可以免焉宋討陳貳今宋見伐而諸侯莫恤故云清丘之盟晉以衞之救陳也討焉使人弗去曰罪無所歸將加爾師孔達曰苟利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之說解也亢當也十四年春孔達縊而死衞人以說于晉而免遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告衞人以為成勞復室其子使復其位成勞平國之功夏晉侯伐鄭為邲故也告于諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚鄭伯如楚謀晉故也鄭以子良為有禮故召之子張穆公孫有禮必能安定其國家楚子使申舟聘于齊曰無假道于宋亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋古者入國必假道楚子自以威陵二國不使行其禮申舟無畏字孟諸事見穆王爭伯昭明聾暗也犀申舟子以子托王示必死華元以我比其鄙邑等於亡國而殺之投袂振袖也窒皇寢門闕屨及劒及車及怒甚而去速追及之也楚莊於此復肆其夷風焉冬孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說楚威動中國孟孫勸公往賄之旅陳也百言備也陳百品實于庭以為獻物獻功獻其治國若征伐之功於牧伯容貌采章謂𤣥纁璣組羽毛齒革可充衣服旌旗之飾者嘉淑謂美善之物加貨財賂之多皆賔所獻亦庭實也薦進也無及謂見責而往則不足解罪十五年春公孫歸父會楚子于宋用獻子言宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之彊能違天乎諺曰高下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則弃之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衞社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考死又何求楚子舍之以歸夏五月楚師將去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王弃言焉王不能答申叔時僕曰築室反耕者宋必聴命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聴子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞宋被圍乆故告晉求救樂嬰齊宋大夫伯宗晉大夫在心言或高或下權之心耳山川良玉及國君皆天下之美大者必有以玷之雖含隠無害其美大此天道之於物不容使之完美也晉侯恥不能救宋故以為喻藪林藪疾毒害也於是止不救使誑之固守解揚前為楚囚歸晉任使樓車車有望櫓者無二信謂信于晉不復信于楚無二命謂受命于晉不復受命于楚霣廢墜也考成也伯宗之言使其君懷安而甘不競豈畧之𢎞哉且楚師乆駐宋郊亦已老矣悉師以救未必無功乃弃人于危而復用迋之何以主夏盟乎楚在宋積九月不服故去弃言謂舍宋也遂築室於宋分兵歸田示無去志華元夜入楚軍乘子反不虞登其牀以病告而詞復强果如曹沫之刼盟齊桓者故子反懼卒如其言與之平蓋其時以城下之盟為辱國故也楚莊既討徴舒之亂力足以有陳鄭而不取宋既病甚必退師與之平皆度時審勢而并酌于義也故列之伯焉然而陵偪宗周與桓文異矣其皆縁於晉之失策也哉晉景公楚共王爭伯宣公十三年春齊師伐莒莒恃晉而不事齊故也十七年春晉侯使郤克徴會于齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使高固晏弱蔡朝南郭偃會及斂盂高固逃歸夏會于斷道討貳也盟于卷楚辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于温苗賁皇使見晏桓子歸言於晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有貳志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故高子及斂盂而逃夫三子者曰若絶君好寜歸死焉爲是犯難而來吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又乆之以成其悔何利之有焉使反者得辭而害來者以懼諸侯將焉用之晉人緩之逸秋八月晉師還范武子將老召文子曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以已亂也弗已者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子唯敬乃請老郤獻子為政齊有輕晉心故侮其使徴召也郤子跛而登階故笑欒京廬郤之介必得齊罪乃復至請以私伐恨之深也固知之故逃斷道晉地苗賁皇以楚臣仕晉不逮言急也乆之以成其悔言三子被執齊人必有悔遣使之心今又乆之或將背晉是成其悔反者謂高固辭不當來之詞君行師從故盟還而言師老致仕士會更受邑於范文子武子之子名燮類倫也易反也詩小雅遄速也沮止也祉福也豸解也晉侯禁其臣不得以私憾逞是矣果以賁皇言為然當有詞以謝三子乃緩之使逸豈禮乎然上卿見辱於伯威亦已大損陳詞以責齊必引愆自謝矣而惜乎不及是也十八年春晉侯衞太子臧伐齊至于陽穀齊侯會晉侯盟于繒以公子彊為質于晉晉師還蔡朝南郭偃逃歸夏公使如楚乞師欲以伐齊秋楚莊王卒楚師不出既而用晉師楚於是乎有蜀之役晉既與齊盟守者解緩故二子得逃公不事齊以齊晉盟故懼乞師于楚用晉師盟蜀事在後傳因王卒終言之成公元年春為齊難故作丘甲聞齊將出楚師夏盟于赤棘前乞師於楚伐齊楚反與齊好故懼而作丘甲又從晉與盟赤棘晉地周制九夫為井四井為邑四邑為丘四丘為甸旁加一里為成共出長轂一乘步卒七十二人甲士三人則丘得十八人不及一甲此作丘甲令丘出二十五人矣冬臧宣叔令脩賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞賦車馬也繕完治完城郭備戰守之備同共伐也逞解也二年春齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聴殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘衞侯使孫良夫石稷甯相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救孫桓子桓子是以免既衞人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故㨗克於先大夫無能為役請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衞臧宣叔逆晉師且道之季文子帥師會之及衞地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也師從齊師于莘六月壬申師至於靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衞兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊高固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇癸酉師陳于鞌邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合苟有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子輿謂已曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中綦母張喪車從韓厥曰請寓乘從左右皆肘之使立於後韓厥俛定其右逢丑父與公易位將及華泉驂絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衞請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隠且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出每出齊師以帥退入于狄卒狄卒皆抽戈楯冒之以入于衞師衞師免之遂自徐闗入齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也予之石窌晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聴客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非徳類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹徳而濟同欲焉五伯之霸也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百禄是遒子實不優而弃百禄諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聴魯衞諫曰齊疾我矣其死亡者皆親暱也子若不許讎我必甚唯子則又何求子得其國寳我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衞請若苟有以藉口而復於寡君君之惠也敢不唯命是聴禽鄭自師逆公秋七月晉師及齊國佐盟于爰婁使齊人歸我汶陽之田公會晉師于上鄍賜三帥先路三命之服司馬司空輿帥候正亞旅皆受一命之服時郤子蓄憾無由發而齊頃數伐魯衞速其國禍門焉攻其門膊磔也龍巢丘魯二邑今山東泰安州境良父等衞四大夫齊伐魯還與之遇夏有闕文失新築戰事成子石稷諡衞師敗良父戰不止稷欲使須救此稷於此戰止良夫止車來新築救兵也鞫居新築衞地于奚新築大夫周禮天子樂宫縣四面諸侯軒縣闕南方曲縣軒縣也繁纓馬飾皆諸侯之服器車服名爵號禮義信相胥以成政而本於名器故聖人重之魯衞俱請兵伐齊晉侯始許七百乘五萬二千五百人無能役不中其役使八百乘六萬人莘齊地今山東莘縣靡笄山名輿衆也大國謂齊敝邑魯衞自稱無辱命言自欲戰不須命也高固先以單車入晉軍挑戰桀磔同繫桑本欲以自異賈勇以已餘勇賈於人鞌齊地去齊五百里翦削也克以中軍將自執旗鼔雖傷而鼓不息張侯解張也朱血色乆則殷血多汚輪御猶不敢懈有險馬不能進故緩推車克戰急故不識殿鎮也擐貫也華不注山在今山東濟南府城東北下有華泉齊君臣恃勇輕敵而晉大將御右皆扶傷致死後能勝之所謂兩敵相當貴於忍也凡戰非元帥則御在中將在左厥以父子輿示夢故代御以追齊侯齊侯果以御為君子不射而射左右左隊右斃故綦毋張寄車亦不使在左右張晉大夫厥復俯而安隠其右之斃者丑父乃得與公易位厥不之見轏士車不堅者一云卧車丑先寢其中傷於蛇欲為右而匿之故驂馬絓木不能推為厥所及縶馬絆厥執之盡臣禮謙言本為二國請救不欲過入君地乃以戎士而承臣僕之空乏以攝其職丑父詐以公為賤者使下取飲副車載以免丑身代之厥執獻郤子義其言不殺齊侯重其代已三入晉軍求之齊師皆有退心故輕出以帥厲退者遂迸入狄衞狄衞畏齊之彊皆䕶免之狄從晉者歸過城邑皆勉使善守辟辟之使避也銳司徒主銳兵者有禮謂其先君後父也辟司徒主壘壁者石窌在山東長清縣境舊有地名石窌與丘輿馬陘皆齊邑賔媚人國佐别名甗無底甑山形滅紀所得磬樂器玉為貴皆齊之寳同叔蕭君字齊侯外祖子女也難斥言其母故逺言之東畝使壟畝盡東行佐以王命尊卑有等質其母是廢其等詩大雅言孝子心無窮恒推其類以錫之於人徳類孝德之類也物别也别其土之所宜以制疆理而播種殖之利詩小雅言或南或東各從土宜晉伐齊循壟東行易故欲東違其宜矣四王禹湯文武五伯夏昆吾商大彭豕韋周齊桓晉文役供也詩啇頌遒聚也何害非其病也不然不如此也戰而曰犒孫詞震威也餘燼譬言敗亡餘衆借一求一戰也若幸而勝亦從晉命不幸而敗敢有不從國佐詞毅而辨晉已心屈因諌許之伐敵而得其寳足為國重齊服則侵田歸而難亦紓天授言難必也賦輿猶兵車藉借也借以為詞袁婁去齊五十里汶陽在今山東泰安州境本魯田為齊所侵故使歸我上鄍地闕前禽鄭歸逆公以會晉師三帥郤克士燮欒書禮公之卿三命先路革路已嘗受王所賜今改而易新并此車所建所服之物司馬主甲兵司空主壁壘輿帥主兵車候正主斥候皆大夫亞次也旅衆也次於卿而為衆大夫者皆受魯賜一命禮大夫再命今一命未詳九月衞穆公卒晉三子自役弔焉哭于大門之外衞人逆之婦人哭于門内送亦如之遂常以葬師還過衞故因弔之未復命故不敢成禮惟哭門外衞人亦於門外設喪位凡喪位婦人哭于堂今賔在門外故移於門内至葬遂行此禮不復移之於内蓋以喪禮有進無退也晉師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉文子避功故武子度其免於禍郤伯郤克字荀庚將上軍時不出文子佐上軍代行故稱帥以讓詔告也欒書下軍帥故推功上軍傳言晉將帥克讓故以能勝齊宣公使求好於楚莊王卒宣公薨不克作好公即位受盟于晉會晉伐齊衞人不行使于楚而亦受盟于晉從于伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寜夫文王猶用衆况吾儕乎且先君莊王屬之曰無徳以及逺方莫如惠恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆强冠之冬楚師侵衞遂侵我師于蜀使臧孫往辭曰楚逺而乆固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斲執鍼織紝皆百人公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寜衞孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯況其下乎詩曰不解於位民之攸暨其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以弃魯國國將若之何誰居後之人必有任是夫國弃矣是行也晉辟楚畏其衆也君子曰衆之不可以已也大夫為政猶以衆克況明君而善用其衆乎大誓所謂商兆民離周十人同者衆也楚忿魯衞興師伐之以救齊為名時共王年十二三故曰弱詩大雅言文王以衆士安大户閲户口已責免逋責逮鰥及鰥寡也王卒盡行故王戎車亦行雖王不在令蔡許二君當左右之位蜀陽橋皆魯地名退師之名執斵匠人執鍼女工織紝織繒布者公衡成公子匱乏也二君乘楚王車為左右謂失位詩大雅言在上者勤正其位則國安民息居助語猶歟言衡父逃歸不終楚好後人必有當此者後昭公如楚蓋縁此太誓周書萬億曰兆民離則弱合則成衆言殷以散亡周以衆興嬰齊不務徳而徒以衆逞内勞民而苟以懼敵逄晉少懦幸而有功豈先王耀徳之意而𫝊乃多言以誇之陋矣晉侯使鞏朔獻齊㨗于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親暱禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又奸先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而太師之後也寜不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍鞏朔士莊伯名單襄公王卿士獻齊捷非禮故王使辭之式用也兄弟同姓國甥舅異姓國略經略法度淫慝謂虣掠百姓取囚俘也鞏朔上軍大夫非命卿名位不達於王室委屬也三吏三公也相相禮者籍書也王畏晉故私宴賄以慰朔三年春諸侯伐鄭次于伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戍如楚獻捷覆伏兵也伯牛鄤丘輿皆鄭地夏公如晉拜汶陽之田許恃楚而不事鄭鄭子良伐許秋叔孫僑如圍棘取汶陽之田棘不服故圍之十二月齊侯朝于晉將授玉郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也授玉執圭行朝禮也克忿猶未釋復宣前事以恥之服改戎朝異服也明識其人克懻甚矣厥之言何婉而恭也四年夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎秋公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聴焉未可以貳史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止不免不令終也詩頌言天道顯明受其命甚難不可不敬以奉之命在諸侯謂敬諸侯則得天命也史佚周文王太史非族言楚夷也不與華同冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書將中軍荀首佐之士燮佐上軍以救許伐鄭取氾祭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決也曰君若辱在寡君寡君與其二三臣共聴兩君之所欲成其可知也不然側不足以知二國之成鄭前伐許取其田今正其界展陂許地氾祭鄭地河南鄭州有祭城攝代對也子反欲許鄭決直曲於其王五年夏許靈公愬鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戍及子國故鄭伯歸使公子偃請成于晉秋八月鄭伯及晉趙同盟于垂棘鄭自邲戰服楚今以楚曲鄭而執其二臣始受盟于晉宋公子圍龜為質于楚而歸華元享之請鼓譟以出鼓譟以復入曰習攻華氏宋公殺之冬同盟于蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難圍龜文公子字子靈前宋楚平後華元使圍龜代已為質故怨而鼓譟以習攻之蟲牢鄭地在河南封丘縣境舊有桐牢宋公不欲會故托其難以辭六年春鄭伯如晉拜成子游相授玉於東楹之東士貞伯曰鄭伯其死乎自弃也已視流而行速不安其位宜不能乆子游公子偃禮授玉兩楹之間鄭伯行疾故東過視流不端諦二月季文子以鞌之功立武宫非禮也聴於人以救其難不可以立武立武由已非由人也三月晉伯宗夏陽說衞孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋以其辭會也師于鍼衞人不保說欲襲衞曰雖不可入多俘而歸有罪不及死伯宗曰不可衞唯信晉故師在其郊而不設備若襲之是弃信也雖多衞俘而晉無信何以求諸侯乃止師還衞人登陴夏陽說晉大夫蠻氏戎别種河南汝州有蠻中聚不保不守備登陴聞說謀也六月鄭悼公卒如貞伯言子叔聲伯如晉命伐宋秋孟獻子叔孫宣伯侵宋晉命也楚子重伐鄭鄭從晉故也晉欒書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌於民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎繞角鄭地河南魯山縣有繞角城申息二邑皆近蔡桑隧在河南確山縣境舊有桑里遷戮不義怒敵難任故不克六軍悉出故曰成師酌於民取民心而酌之也商書洪範鈞等也武子以善為衆不以人為衆傳言欒書得從衆之義七年春鄭子良相成公以如晉見且拜師秋楚子重伐鄭師于氾諸侯救鄭拜師謝其救汜鄭地今河南汜水縣南八月同盟于馬陵尋蟲牢之盟且莒服故也馬陵衞地在北直𨽻大名府境莒本屬齊齊服故莒從之餘見下卷八年春晉侯使韓穿來言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷徳畏討無有貳心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士貳其行士也罔極二三其徳七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而況霸主霸主將徳是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之齊以大國服事晉晉故感焉使魯還其所取田祖而舍軷飲酒於其側曰餞私私與言解體不親附也詩衞風婦人怨丈夫不一其行喻魯事晉猶女事夫不敢過差而晉有罔極之心反二三其德猶圖也簡諌也詩大雅言王者圖事不逺是以大道諫之晉欒書侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣是行也鄭伯將會晉師門于許東門大獲焉申驪楚大夫還遇繞角還也欒書自此從三子不與楚戰嗣後每從其言師出有功如流順也宜宜有功也遐與何通作用也詩大雅言文王愷悌必作人也㑹伐蔡過許見其無備因攻之秋晉侯使申公巫臣如呉假道于莒與渠丘公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉況國乎巫臣以楚人奔晉渠丘莒邑莒子朱以為號今山東安丘縣有狡猾思開封疆者有縱弛無備者故多得兼并以成大國勇夫恐人謀害必重閉其門國尤當備矣九年春為歸汶陽之田故諸侯貳于晉晉人懼㑹于蒲以尋馬陵之盟季文子謂范文子曰徳則不競尋盟何為范文子曰勤以撫之寛以待之堅彊以御之明神以要之柔服而伐貳德之次也諸侯貳如季孫言蒲衞地北直𨽻長垣縣治名蒲城楚人以重賂求鄭鄭伯會楚公子成于鄧秋鄭伯如晉晉人討其貳於楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭銅鞮晉地在今山西沁州鄭自垂棘之盟事晉今以重賂貳於楚而被執伯蠲鄭行人陳與晉故楚伐之冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫詩曰雖有絲麻無弃菅蒯雖有姬姜無弃蕉萃凡百君子莫不代匱言備之不可以已也浹辰十二日詩逸詩絲麻精細之物菅蒯皆草屬姬姜大國之女蕉萃賤陋之人鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君公孫申字叔申紓緩也伐國而緩使示將更立君者晉抱空質必自歸君十年春晉侯使糴茷如楚詳見下卷衞子叔黑背侵鄭晉命也鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立太子州蒲以為君而會諸侯伐鄭鄭子罕賂以襄鐘子然盟于脩澤子駟為質辛巳鄭伯歸黑背衞侯弟公子班字子如髠頑成公太子州蒲厲公名襄鐘鄭襄公之廟鐘子然子駟皆穆公子脩澤鄭地河南脩武縣境六月丙午晉侯欲麥使甸人獻麥將食張如厠陷而卒張腹满也詳見卿族興廢鄭伯討立君者戊申殺叔申叔禽君子曰忠為令徳非其人猶不可況不令乎禽叔申弟傳言叔申本非賢者雖欲效忠而不見信於君適以害身聖人忠孝之道豈擇人而為之此非所以為訓叔申亦不幸焉耳秋公如晉晉人止公使送葬於是糴茷未反謂公貳于楚須茷反審其虚實冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也親弔故晉得止之辱自取也故不書葬以諱之十一年春王三月公至自晉晉人以公為貳於楚故止公公請受盟而後使歸郤犨來聘且涖盟夏季文子如晉報聘且涖盟也十三年六月丁夘夜鄭公子班自訾求入于大宫不能殺子印子羽反軍于市己巳子駟帥國人盟于大宫遂從而盡焚之殺子如子駹孫叔孫知訾鄭地大宫鄭祖廟十年班出奔許今欲還為亂子印子羽穆公子駹班弟孫叔子如子孫知子駹子春秋左傳屬事卷三
