body:
  text: 春秋左傳屬事卷十九明傅遜撰吳楚吳通上國季札讓國附成公二年楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明德慎罰文王所以造周也明德務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是子反乃止王以豫連尹襄老襄老死於邲不獲其尸其子黑要蒸焉巫臣使道焉曰歸吾聘女又使自鄭召之曰尸可得也必來逆之姬以告王王問諸屈巫對曰其信知罃之父成公之嬖也而中行伯之季弟也新佐中軍而善鄭皇戍甚愛此子其必因鄭而歸王子與襄老之尸以求之鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘于齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣於晉晉人使為邢大夫子反請以重幣錮之王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣且彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉巫臣屈姓本楚宗為申縣公討夏氏見楚莊王之伯周書康誥子蠻鄭靈公名夏姬之兄殺死無後御叔夏姬之夫亦早死靈公陳靈公夏南夏姬子徴舒孔儀孔寧儀行父喪陳楚滅陳有不獲死言死易得無為取夏姬以速之黑要襄老子下淫上曰蒸巫臣以正諫王止子反而竟自取之道道使夏姬歸鄭知罃父名荀首中行伯荀林父字邲之戰楚人囚知罃荀首囚王子穀臣獲襄老巫臣聘聘夏姬也楚伐魯至陽橋見晉景楚共爭伯叔跪申叔時子桑中衛風淫奔之詩介副也幣聘物齊敗敗于鞍也邢晉邑錮某之弗令仕將可與之仕也七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣郯今南直𨽻海州振旅整衆也弔相恤也詩小雅刺在上者不能弔愍下民故號天告亂上謂伯主楚圍宋之役師還子重請取于申呂以為賞田王許之申公巫臣曰不可此申呂所以邑也是以為賦以御北方若取之是無申呂也晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子壽夢説之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之會吳入州來子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國吳僻在蠻夷不與中國通自巫臣以一婦人故奔晉使吳而始通焉圍宋見莊王之伯申吕楚二邑分申呂之田以自賞巫臣言申呂賴此田成邑去此田則無以出兵而二邑壞北方中國也閻蕩弗忌皆巫臣族以夏姬并怨黑要亦殺之二子子重子反吳屬楚楚晉爭衡故巫臣獻謀於晉使巳使吳教吳反楚為其內害夀夢吳子乘季札父也車一乘為兩百人為卒偏車之半也又五十人為偏楚廣百人故以百人往而留其二十五人則半車之一矣故曰舍偏兩之一狐庸巫臣子亦智士故置之吳為行人使謀外事巢今南直𨽻巢縣徐今泗州有徐城州來今為壽州皆楚屬國於是二子往來奔命而楚不獲寧矣八年秋晉侯使申公巫臣如吳餘見晉景楚共爭伯冬晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師會伐郯士燮諡文子言受命于君不得有二失信於君無以自立朝聘既有贈送之禮復有私賂是加貨於禮所無公私之事不兩成以君命為公受賄為私也不得事君將與魯絶也九年春會于蒲以尋馬陵之盟是行也將始會吳吳人不至蒲衛地詳見晉景楚共爭伯十五年十一月會吳于鍾離始通吳也鍾離楚邑今鳳陽府境襄公三年春楚子重伐吳為簡之師克鳩兹至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而巳子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒簡選也鳩兹吳邑今南直𨽻蕪湖縣東四十里有鳩茲港衡山在今浙江湖州府城南組甲漆甲成組文被練練袍皆精兵也飲至告廟而飲至也心疾愧恚成疾六月公會單頃公及諸侯巳未同盟于雞澤晉侯使荀會逆吳子于淮上吳子不至頃公王卿士淮河自今泗州龜山北流入淮安府界滎回城東入城吳不至道逺多難也五年夏吳子使夀越如晉辭不會于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳于善道九月丙午盟于戚會吳也夀越吳大夫聽好更請會也以道逺先告其期善道吳地今南直𨽻旴𣅿縣十年春會于柤會吳子壽夢也柤楚地十二年秋吳子夀夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟周廟文王廟外於城外向其國宗廟所出之王廟祖廟始封君之廟禰廟父廟同族謂髙祖以下諸姬同姓國邢凡等六國皆周公之支子别封共祖周公周公廟祖廟也十三年秋楚共王卒吳侵楚養由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師獲公子黨君子以吳為不弔詩曰不弔昊天亂靡有定養由基字叔子庚楚司馬戒備也覆伏兵庸浦楚地不弔謂乘楚喪不以天道相恤也詩小雅言不為天所弔恤則禍亂無定時十四年春吳告敗于晉會於向為吳謀楚故也范宣子數吳之不德也以退吳人向鄭地士丐以吳伐喪為不德餘見悼公復伯吳子諸樊既除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢姦君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之諸樊吳子乘之長子季札諸樊少弟以賢故讓之立札自附曹子臧之義固讓而止子臧事見小國交魯傳言季札之讓吳兄弟相傳春秋中讓國者三吳季札曹子臧衛子南南事微不著皆足稱賢而皆不克以靖國蓋其性自不樂於為君非有為也然德非至德而于王季武王之事亦不逮矣秋楚子為庸浦之役故子囊師於棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜穀棠楚邑今為南直𨽻六合江浦二縣殿後軍臯舟吳險厄之道二十四年夏楚子為舟師以伐吳不為軍政無功而還軍政嚴設賞罰也冬吳人為楚舟師之役故召舒鳩人舒鳩人叛楚詳見楚五令尹代政二十五年秋楚令尹子木伐之吳人救之吳師大敗詳見五令尹代政十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒門攻其門啓開門也殪死也諸樊卒餘祭立二十六年夏楚子秦人侵吳及雩婁聞吳有備而還雩婁吳地在今霍丘縣境餘見楚平王得國晉平楚康爭伯二十九年夏五月吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之餘祭弒夷昧立六月吳公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細巳甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請巳其出聘也通嗣君也故遂聘于齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難夷昧嗣位使札聘上國始至魯穆子名豹不得死不以夀終竟死於豎牛之手周樂天子之禮樂魯以周公故得有之以從樂歌皆依本國所常用歌曲周南召南王化之基化未大行勤勞而得其正邶鄘皆衛也武王伐紂分其地為三監三監叛周公滅之更封康叔并其地故三國盡被康叔之化淵深也亡國之民哀以思其民困武公康叔九世孫二公德化深逺雖遭宣公淫亂懿公滅亡民猶秉義不至於困所遺固然也王黍離也幽王遇犬戎之禍平王東遷王政不行於天下與諸侯同故不為雅宗周殞滅故憂思猶有先王之遺風故不懼鄭詩第七美其有政治之音譏其煩碎知不能久齊詩第八泱泱𢎞大之聲大公封齊為東海表率其後將強大也豳周之舊國詩第十五美其德之廣樂而有節故不淫周公遭管蔡之變東征三年為成王陳后稷先公不敢怠荒以成王業故曰周公之東秦詩第十一後仲尼刪定故不同秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲襄公佐周平王東遷而受其地故曰周之舊魏詩第九魏姬姓國晉獻戚之渢渢浺瀜之聲謂如風行巨水也是大而險然婉而易行故可以德輔唐詩第十晉本唐國故有堯之遺風憂思深逺必令德之後陳詩第十二淫聲放蕩無所畏忌故曰國無主鄫第十三曹第十四季聞此歌不復譏論之以二國微也小雅小正亦歌樂之常憂思怨忿而無二心猶不忍形於言疑當幽厲之世去文武未逺其遺民猶存蓋變小雅也大雅陳文王之德以正天下熙熙和樂之聲委曲而有正直之體故知為文德頌者以成功告于神明至哉言道備也不倨直之美不屈曲之美不逼謙也不攜仁也不淫有守也不厭日新也不愁知命也不荒節之以禮也不匱德𢎞大不宣不自顯不費因利而利之不貪義然後取底滯也不底守以道也不流制以義也五音宫商角徵羽八風八方之風八音既諧節有度也無相奪倫守其序也頌有殷魯故曰盛德之所同樂有歌有舞舞以容故云見象象其功德也萷舞所執之竿即詩序所謂維清奏象舞武舞也南籥二南之籥文舞也皆文王之樂美美其德也憾憾未周洽天下大武武王樂韶濩湯樂韶猶紹也紹繼大禹故曰韶防濩下民故曰濩慙慙於放桀言湯而不及武者或為先王諱也大夏禹樂禹治水八年其勤至矣而不矜不伐故云不德韶簫舜樂紹堯之德曰韶札以舜德盛如天地蔑加故止焉而不敢復請且知其篇終也札觀樂而知政極其評議之當何其賢明才博之絶人豈在吳而涉知其樂歌之文或左氏附會之也又聘諸國而遍識其賢納歸之公歇盡也欒髙之難見田氏傾齊帶大帶吳地貴縞鄭地貴紵故各以獻瑗蘧伯玉史狗史朝之子文子史鰌史魚發公叔文子戚孫文子邑辨猶爭也君在殯獻公未葬也君不德而臣賢且富故政必歸之三十一年冬吳子使屈狐庸聘于晉通路也趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立狐庸以吳行人聘晉延州來季札前後食邑故以為稱延延陵今南直𨽻常州嗣君光度檢則也昭公四年秋七月楚子以諸侯伐吳圍朱方克之詳見靈王之亂冬吳伐楚入棘櫟麻以報朱方之役楚沈尹射奔命於夏汭葴尹宜咎城鍾離薳啓疆城巢然丹城州來棘櫟麻皆楚東鄙邑夏汭漢水曲今湖廣武昌府境有夏汭吳兵在東北楚盛兵東南以絶其後宜咎陳大夫奔楚然丹鄭子革前奔楚五年冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師會於夏汭越大夫常壽過帥師會楚子于瑣聞吳師出薳啓疆帥師從之遽不設備吳人敗諸鵲岸楚子以驛至於羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣兹敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟於羅汭沈尹赤會楚子次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清吳不可入楚子遂觀兵於坻箕之山是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命于巢逺啓強待命于雩婁禮也薳射楚大夫瑣楚地遽匆遽也鵲岸楚地南直𨽻舒縣杜云有鵲尾渚又河南羅縣南有鵲山未詳驛傳也羅水名守龜疑寶龜藏于宗廟者余亟使述吳令龜之詞馮怒盛怒也兆龜兆報應也城濮戰楚卜吉應乃在邲報志志在應其卜吉也南懷汝清皆楚界禮謂備敵之禮懼而修備兵家之常何禮之有六年九月徐儀楚聘于楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩帥師伐吳師于豫章而次于乾溪吳人敗其師於房鍾獲宫廄尹棄疾子蕩歸罪於薳泄而殺之儀楚徐大夫薳泄楚大夫乾溪楚東竟房鍾吳地棄疾鬭韋龜之父歸罪薳泄以解其敗軍之罪十三年夏晉並徴會告于吳秋晉侯會吳子于良水道不可吳子辭乃還徴會召諸侯會平丘也良今南直𨽻邳州城北有良城十九年冬令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣舍前之忿可也乃歸蹶由楚子平王也子瑕言靈王怒吳子而執其使猶人忿於室家而作色於市人闔廬入郢昭公十三年冬吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之州來今夀州為吳楚要害之地吳前入而今滅之以封季子後以遷蔡十五年楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也朝吳有功於平王無極忌其寵謀害之誘之請求上位而又間其位在吳上者使逐之至王怒又云去吳以翦蔡欲悅也異言其多權謀以烏喻蔡言吳必能使蔡速飛背楚故翦之是年吳夷昧卒王僚立十七年冬吳伐楚陽胸為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請於其衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸陽胸字子瑕子魚名魴司馬主兵故卜戰令龜以事命於龜長岸楚地餘皇舟名隧出入道置炭火滿於隧陳兵守之光諸樊子闔廬藉借衆力也長鬛多髭鬚似楚人者三呼更對楚人以為怪殺之而亂傳言光有謀十九年楚子之在蔡也郹陽封人之女奔之生大子建及即位使伍奢為之師費無極為少師無寵焉欲譖諸王曰建可室矣王為之聘于秦無極與逆勸王取之正月楚夫人嬴氏至自秦在蔡蓋為大夫時往聘蔡郹陽蔡邑伍奢舉之子貟之父室妻也無極既言可妻又以女美勸王皆欲譖建而先為之地也秦女歸王故稱夫人夏楚子為舟師以伐濮費無極言於楚子曰晉之伯也邇於諸夏而楚辟陋故弗能與爭若大城城父而置大子焉以通北方王收南方是得天下也王説從之故太子建居于城父濮南夷也城父今為南直𨽻亳縣東南七十里有城父城居太子亦將為讒地也令尹子瑕聘于秦拜夫人也拜謝秦冬楚人城州來沈尹戍曰楚人必敗昔吳滅州來子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戍曰吾聞撫民者節用於內而樹德於外民樂其性而無冦讎今宫室無量民人日駭勞罷死轉忘寢與食非撫之也前吳滅州來今楚復取而城之戌莊王曾孫葉公諸梁父駭驚也轉遷徙也二十年春費無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣何信於讒王執伍奢使城父司馬奮揚殺大子未至而使遣之三月太子建奔宋王召奮揚奮揚使城父人執已以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟二奉初以還不忍後命故遣之既而悔之亦無及矣王曰而敢來何也對曰使而失命召而不來是再姦也逃無所入王曰歸從政如他日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟貟曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可棄名不可廢爾其免之相從為愈伍尚歸奢聞貟不來曰楚君大夫其旰食乎楚人皆殺之貟如吳言伐楚之利於州于公子光曰是宗為戮而欲反其讐不可從也貟曰彼將有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕於鄙無極讒計巳成王信其讒召奢詰之一過納建妻也王忿其言切執之奮揚知太子寃故遣去初初命還周旋也姦犯也歸王善其言舍之使還棠邑今六合江浦二縣奢長子尚為棠邑大夫稱君貟尚弟子胥不逮知不及貟尚以已死遣弟為孝仁知勇復勉弟報仇愈于相隨俱死旰食有吳憂不得早食也州于吳子僚時光欲弒僚不利貟用事故破其謀員知光之可輔遂進勇士以求入退居鄙野鱄設諸勇士也二十一年三月葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸暨今蔡侯始即位而適卑身將從之在卑謂不在嫡子位以長幼齒詩大雅暨息也冬蔡侯未出奔楚費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴於楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱太子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣東國隱太子之子平侯廬之弟朱之叔父有盟盟于鄧依陳蔡人以國是也在君言權在君他他心也二十三年秋吳人伐州來楚薳越帥師及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師熸吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲巳是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子從之戊辰晦戰于雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以繫於後中軍從王光帥右掩餘帥左吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾軍死矣師譟而從之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也不言戰楚未陳也凡將威重則兵皆嚴整詐不能施時令尹子瑕以疾將兵使蘧越攝其事而瑕竟卒主帥喪亡其軍人無復鬬志故如熸熸火滅也無謂越賤軍多寵人政令不一可以詐襲故令前隊去戰備薄威嚴示不整以誘之後則敦厚其陳整衆以待兵忌晦犯晦擊楚不意也雞父在南直𨽻夀州境舊有雞備亭罪人不習戰以餌之王王僚掩餘僚弟國君社稷之主與宗廟共其存亡故稱滅大夫輕故曰獲此戌所謂挑吳者楚既大敗州來必入吳矣楚大子建之母在郹召吳人而啓之冬十月甲申吳太子諸樊入郹取楚夫人與其寶器以歸楚司馬薳越追之不及將死衆曰請遂伐吳以徼之薳越曰再敗君師死且有罪亡君夫人不可以莫之死也乃縊於薳澨郹郹陽也平王前娶秦女廢太子建故母歸其家恨失寵而召吳人諸樊門巢巳卒此誤應即諸樊之太子光也徼要其勝負既敗雞父設往復敗是再敗薳澨楚地楚囊瓦為令尹城郢沈尹戍曰子常必亡郢苟不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城於郢守巳小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待夫正其疆埸修其土田險其走集親其民人明其伍候信其鄰國慎其官守守其交禮不僭不貪不懦不耆完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德無亦監乎若敖蚡冒至于武文土不過同慎其四竟猶不城郢今土數圻而郢是城不亦難乎囊瓦子囊之孫字子常前用子囊遺言巳築郢城今畏吳復增修以自固天子德及逺四夷為之守在諸侯巳卑諸侯政修四鄰為之守四竟裁自完而巳狎安習也三務春夏秋之務梁事見秦取梁走集邊竟之壘璧伍伍部候候望交禮交接之禮懦弱也耆強也詩大雅無念念也聿述也義取念祖考則述其德以顯之若敖蚡冒武文楚四君皆賢方百里為同方千里為圻難難以為安前子囊城郢君子以為忠此囊瓦城郢戍以為必亡者蓋共王之季當楚方強而思城其國都是防患於豫有謀國之深思焉今畏吳而城是智略無施自保不遑矣此事同而勢異情異不可不察也二十四年冬楚子為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乘舟倉及夀夢帥師從王王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王一動而亡二姓之帥幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎略行也行吳境將侵之踵躡其後汭水曲歸遺也越既遺王以舟復以師從王圉陽楚地壽夢越大夫二姓之帥守巢鍾離二大夫詩大雅厲惡階道梗病也二十五年十二月楚子使薳射城州屈復茄人焉城丘皇遷訾人焉使熊相禖郭巢季然郭卷子大叔聞之曰楚王將死矣使民不安其土民必憂憂將及王弗能久矣薳射熊相禖季然楚三大夫州屈丘皇巢卷楚四邑城築其城郭築其郭茄訾皆楚地復復於故遷遷之新二十六年九月楚平王卒令尹子常欲立子西曰大子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王子西平王之長庶壬昭王名言其母為建聘是揚王之惡外援秦也瀆慢也不立秦出將來討是速讐也名篡國之名子西若立則無入郢之禍子常之言亦不可以人廢也然子西以正拒自不能違矣二十七年春吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍濳使延州來季子聘于上國遂聘于晉以觀諸侯楚莠尹然工尹麇帥師救濳左司馬沈尹戍帥都君子與王馬之屬以濟師與吳師遇于窮令尹子常以舟師及沙汭而還左尹郤宛工尹壽帥師至于潛吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弒也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階户席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入于堀室鱄設諸置劍於魚中以進抽劍刺王鈹交於胸遂弒王闔廬以其子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待吳公子掩餘奔徐公子燭庸奔鍾吾楚師聞吳亂而還掩餘燭庸皆王僚母弟潛楚邑在南直𨽻廬江縣有灊城季子聘觀強弱也二尹楚官然麇其名都君子在都邑之士有復除者王馬之屬王之養馬官屬校人濟師益其師也窮楚地沙水名遇窮之師當吳之前至濳之師要吳之後故吳不能退光言二弟將兵在外為敵國所制國內空此機宜乘光諸樊子故自稱王嗣料季聘還亦以光當立專諸深然之以僚無復可忌光感其意遂以身委之堀室掘地為室預為避計僚備光甚密甲士坐道邊至光門以其親持鈹環衛進羞者使解衣于外膝行而進以鈹夾之及其體復以次相授進於王設諸灸全魚置劍於中以刺王雖鈹交其胸而竟弒之鈹劍屬闔廬光也以鱄諸子為卿異自諸樊以下兄弟相傳而不立適欲以次及季子季子不立而僚以夷昧之子立光固宜有國者故札云爾復使命於僚墓而哭之居本位待光命徐鍾吾二國鍾吾今為南直𨽻宿遷縣郤宛以乘亂不祥故還郤宛直而和國人説之鄢將師為右領與費無極比而惡之令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠巳甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及他與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王専禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何令尹病之右領楚官子惡郤宛字酬報獻也曰置至酬之無極辭帷帳帷陳甲兵其中此役救潛之役遂令將師令也爇燒也編菅苫也秉把也秆藁也投投於地競取其屋之材以投地不忍燒之也炮燔郤宛也令終陽胸子晉陳楚大夫皆郤氏黨蒙蔽也楚郤宛之難國言未巳進胙者莫不謗令尹沈尹戌言於子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟至于今不巳戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳出蔡侯朱喪大子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位吳新有君疆埸日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月巳未子常殺費無極與鄢將師盡滅其族以説于國謗言乃止進胙國人祭祀者謗詛也左尹郤宛也中廄尹陽令終也三不辜郤氏陽氏晉陳氏不愆位在位無愆過三十年秋吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆吳公子使居養莠尹然左司馬沈尹戍城之取於城父與胡田以與之將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吾邊疆使柔服焉猶懼其至吾又強其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同於先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聽吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之巳卯滅徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戍帥師救徐弗及遂滅夷使徐子處之吳子忌二子在徐故使執之楚乃大封殖之故子西以為重其怒大封多分與土田定徒定其所徙之居又使逆之於竟養所封邑城城養胡田故胡子之田柔服使吳柔而服自同先王言光文甚志美欲比於先周盛時也終不逺言其究竟可俟億安也歸善惡之歸播揚宣耀而無遵養之意防壅也壅山水以灌徐斷髮自刑示懼夷城父也吳子問於伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病肄習也數往數來如肄習也道敝罷敝於道三十一年秋吳人侵楚伐夷侵濳六楚沈尹戍帥師救濳吳師還楚師遷潛於南岡而還吳師圍弦左司馬戍右司馬稽帥師救弦及豫章吳師還始用子胥之謀也濳六楚二邑十二月辛亥朔日有食之是夜也趙簡子夢童子裸而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始始有謫火勝金故弗克裸裸體也轉宛轉也簡子夢適與日食會疑咎在已故問之史墨知夢非日食之應故不釋夢而釋日食之咎在楚周十二月夏十月日月合朔於辰尾而食庚午周十月十九日閲四十一日至辛亥朔日雖食於辛亥而變始于庚午以始變為占而日在辰故知入郢之日必以庚辰午南方楚位以午日有變故災在楚辰東方吳在楚東故入郢必吳午火庚金金為火妃午火勝庚金楚氣猶旺故吳終不克亥水也水數六故六年辰尾龍尾謫變氣也定公二年四月桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師于豫章吳人見舟于豫章而濳師于巢冬十月吳軍楚師于豫章敗之遂圍巢克之獲楚公子繁桐今南直𨽻安慶府有桐城舒舒城縣與鳩皆楚屬國吳教舒鳩誘楚使以兵臨我我伐桐偽若畏楚師之臨巳而為伐其叛國以取媚者欲使楚不忌所謂多方以誤之楚從舒鳩伐吳吳見舟豫章偽若為楚伐桐而實濳師以擊楚軍楚不忌故敗繁守巢大夫三年冬蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以弄馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚佩佩玉唐國在湖廣棗陽縣東南百五十里舊有上唐縣成公惠侯後肅爽駿馬名隨州城北唐城白雲鄉有驌驦陂自拘以竊馬故也隱憂約相助也夫人謂圉馬者官不共言禮遣蔡侯之物不供備蔡在汝南漢北誓言若復渡漢事楚當受禍明如大川囊瓦之賄不足論矣唐蔡二君以弱小處強暴之下忍欲示檏猶恐不寧而乃以玩好誇示貪夫其及也宜矣四年春三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得乃辭蔡侯沈人不會于召陵晉人使蔡伐之夏蔡滅沈秋楚為沈故圍蔡伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳大宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常曰吳用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡説十一月庚午二師陳于柏舉闔廬之弟夫概王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫概王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死吳從楚師及清發將擊之夫概王曰困獸猶鬭況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢已卯楚子取其妹季芊畀我以出涉睢針尹固與王同舟王使執燧象以奔吳師庚辰吳入郢以班處宫子山處令尹之宫夫概王欲攻之懼而去之夫概王入之左司馬戍及息而還敗吳師于雍澨傷初司馬臣闔廬故恥為禽焉謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也巳句卑布裳剄而褁之藏其身而以其首免楚子涉睢濟江入于雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芊以從由于徐蘇而從鄖公辛之弟懷將弒王曰平王殺吾父吾殺其子不亦可乎辛曰君討臣誰敢讐之君命天也若死天命將誰讐詩曰柔亦不茹剛亦不吐不侮矜寡不畏強禦唯仁者能之違強陵弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也必犯是余將殺女鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之惠也漢陽之田君實有之楚子在公宫之北吳人在其南子期似王逃王而巳為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而密邇於楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聽命吳人乃退爐金初宦於子期氏實與隨人要言王使見辭曰不敢以約為利王割子期之心以與隨人盟文公王官伯也晉人假王命以討楚故曰文公合諸侯餘見晉失諸侯沈今為汝陽縣鄰蔡晉使蔡滅之伯氏郤宛黨嚭因奔吳員與嚭皆志必報其仇共謀破楚故楚苦兵淮汭淮水曲吳乘舟從淮過蔡舍之時豫章乃今湖廣德安府東􅕊里章山也戍欲瓦緣漢水上下遮使勿渡巳以方城外入毁吳所舍舟大隧在今河南羅山縣西南百二十里一名九重關直轅疑為武勝關在今河南信陽縣南冥厄在信陽縣東南九十里一名平靖關有大小石門鑿山為道是漢東三隘道塞之使吳不得退因與瓦師夾擊黑武城大夫用軍器革不可持久故欲速決史皇楚大夫又緣國人素情恐戍獨克為功欲速戰以先之城口三隘道總名瓦濟漢從其言禹貢漢水至大别南入江則此二别在江夏界今大别在漢陽府城東北漢江之右小别在漢川縣一十里不可不可支也安求言安寧時求知政事難時不可逃又以致死克吳可免貪賄致冦之罪二師吳楚之師柏舉楚地在今河南西平縣本柏子國地夫概後自立為王故稱王擅以偏師擊囊瓦卒而大勝清發水名雍澨為今嶽州府東南灉湖自此楚兵又五止戰皆敗及郢如戍之謀楚殊有勝形而史皇以妬功之心背其謀而輕戰以致敗則入郢之禍幾史皇之為也固一死不足贖矣於時吳多謀臣而其功夫概實成之亦所謂非一狐之腋者哉楚以重兵禦吳於境不虞其大敗吳乘勝而至故不暇為守禦倉皇以出卑我或云李芊字吳兵自東迫楚王涉睢自西而稍南睢沮同燧象燒火燧繫象尾使赴吳師驚却之以班吳以尊卑班次處楚君臣之宫室子山吳王子夫概自以功髙奪其宫戍聞楚敗故還雖能敗吳師而身被重創句卑戌臣失不知其賢也戍將死剄取其首以裳褁之見戍之忠壯雲中雲夢澤中蓋江北之夢今湖廣德安府其地王前既涉沮避吳兵此復由沮入江繞吳兵南而北濟鍾建由于皆楚臣干以背代王受戈關絶至蘇復從鄖本雲中地前平王封蔓成然之子鬭辛於鄖事見上卷懷欲弒王以報父仇辛既禁止復奉王奔隨隨與鄖鄰壤也公宫隨侯之宫子期昭王兄公子結一人謂楚王鳩安集也爐金子期臣要言無以楚王與吳并免子期王喜其意欲引見之以比王臣金言不敢乘君父困約時以致榮利割心當心前割血以盟示其至心世稱五伯齊桓晉文信云盛矣秦穆僅婎西陲楚莊用夷陵夏巳難為並而宋襄志業猶劣又安能與之伍也白虎通以吳闔廬繼晉救蔡與桓文穆莊列而伍之蓋庶幾焉子胥謂夫差曰我令若父霸則當時固亦以伯稱也哉又按此傳云囊瓦城郢又云吳從楚師五戰及郢楚子涉睢則郢止一城吳兵至而昭王避之出矣考史記注楚都郢今江陵縣北紀南城是至平王更城郢在江陵東北故郢城是也又荆州紀云昭王十年吳通漳水灌紀南入赤湖進灌郢城遂破楚則郢與紀南為二城而吳以水攻楚破之與傳不協古書之異同如此春秋左傳屬事卷十九
