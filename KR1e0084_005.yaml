body:
  text: 春秋左傳屬事卷五明傅遜撰伯晉平公楚康王爭伯襄公十四年冬㑹于戚范宣子假羽毛於齊而弗歸齊人始貳析羽為旌王者遊車之所建齊私有之因謂之羽毛宣子借觀而匿之遂貳十五年夏齊侯圍成貳於晉故也於是乎城成郛成魯孟氏邑今山東寜陽縣有成城當齊衝故城其郛以備之十六年春葬晉悼公平公即位羊舌肸為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服脩官烝于曲沃警守而下會于湨梁命歸侵田晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸於是叔孫豹晉荀偃宋向戌衞甯殖鄭公孫蠆小邾之大夫盟曰同討不庭許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師會晉荀偃書曰會鄭伯為夷故也夏六月次于棫林庚寅伐許次于函氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰于湛阪楚師敗績晉師遂侵方城之外復伐許而還平公悼公子名彪肸叔向名君臣張老子代其父祁奚前中軍尉韓襄無忌子盈黶之子鞅匄之子虞丘書代程鄭既葬改喪服脩官職曲沃武公始封邑祖廟在焉烝冬祭順流曰下湨水名梁隄也爾雅梁莫大於湨梁在今河南濟源縣境諸侯相侵之田皆命各歸之餘詳見魯與邾莒之怨時葬悼公已太速又即吉烝皆非禮必類必使從其義類高厚齊大夫齊有二心故不類齊大國小國必有從者故盟之果逃許叛楚故請遷既不可故以師討之鄭與許有夙怨故獨君行則君臣分别於鄭伯宜有以尊異之而其時唯以伯國為重鄭伯乃夷諸大夫故齊子本㑹苟偃而經特以會鄭伯為文序於伯臣之上不使夷之於大夫諸侯師次於許晉師獨進伐楚敗其師侵其境湛水阪陂也水源出河南汝州馬泡泉經葉縣入汝水穆叔名豹齊子名叔老棫林函氏皆許地楊梁役見上卷秋齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之閒恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰匄在此敢使魯無鳩乎齊既逃盟復圍成孟孺子獻子之子名速海陘魯隘道言齊故欲晉救也禘王祭晉僭之民未息以新伐許楚也庶幾望之也獻子偃諡圻父詩小雅周司馬掌封畿之兵甲故謂之圻父詩人責圻父為王爪牙不脩其職使百姓困苦無所止居宣子匄諡鴻雁詩小雅卒章曰鴻雁于飛哀鳴嗸嗸唯此哲人謂我劬勞言魯憂困嗸嗸然如鴻雁之失所鳩集也十七年春宋莊朝伐陳獲司徒卬卑宋也莊朝宋微者卬陳大夫卑宋故不設備齊人以其未得志於我故秋齊侯伐我北鄙圍桃高厚圍臧紇于防師自陽關逆臧孫至于旅松鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衞唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死冬邾人伐我南鄙為齊故也桃魯邑今山東泗水縣有桃城齊既圍之復使圍紇防紇食邑魯遣師逆紇畏齊不敢至叔梁紇與臧孫之昆弟疇賈先在防故夜送紇於師復還守防齊失紇去唯獲紇之族名堅者愛其勇故使衞唁欲生之堅以衞奄人使唁為辱已而自殺陽關旅松皆近防地杙橜也齊三伐魯不勝故邾助之晉楚争衡而秦齊時倔彊其間為晉伯梗秦在西陲晉蔽之害不及諸國齊居山東一與晉異即及魯衞而邾莒助之為魯害也尤士匄乃以微物啓貳罪可勝道哉十八年秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東方則可以逞獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二瑴而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曽臣彪將率諸侯以討焉其官臣偃實先後之苟㨗有功無作神羞官臣偃無敢復濟唯爾有神裁之沉玉而濟冬十月會于魯濟尋湨梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衞曰不能戰莫如守險弗聴諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能乆矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必旆而疏陳之使乘車者左實右偽以旆先輿曵柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁夘朔入平隂遂從齊師夙沙衞連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衞殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰曰止將為三軍獲不止將取其衷顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆衿甲面縛坐于中軍之鼓下晉人欲逐歸者魯衞請攻險己夘荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩范鞅門于雍門其御追喜以戈殺犬于門中孟莊子斬其槆以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門于揚門州綽門于東閭左驂迫還於門中以枚數闔齊侯駕將走郵棠太子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之太子抽劍斷鞅乃止甲辰東侵及濰南及沂獻子將為魯伐齊前弑厲公故夢與訟梗陽晉邑臯巫名今山西清源縣南有梗陽城穆子見巫之所夢中見巫巫又與同夢知其必死故迎其意勸之致死伐齊因濟河而南雙玉曰瑴環齊侯名民神之主謂數伐魯殘民禮諸侯視四岳不得稱臣此更稱曽臣蓋非禮以曲媚神耳曽重也前盟湨梁云同討不庭故此伐齊為尋其言平隂齊邑今山東平隂縣其城有防門齊作塹於此拒晉横廣一里衞謂非險不足守析文子齊大夫字子家宣子既譎言於析以恐齊而又多為疑兵以示衆斥開也開其險以疏建旌旗又偽以衣服為人形建旆以先驅曵柴揚塵齊侯遽歸師繼遁其營空鳥得之而樂馬以班别而鳴烏亦止城上諸師既入其城復乘勝追之隧路之深隘者二子以衞奄人殿師為辱國代之衞恨二子故以馬塞其道使晉得之今山東長清縣有隔馬山因此以名脰頸也取𠂻復射兩矢之中有如日言必不殺明如日具丙右之名衿甲面縛蓋縛手於後唯見甲之衿與其面也晉欲長驅深入魯衞恐腹背受敵請攻險克而復進京兹在平隂東南邿今山東濟隂縣有邿城盧山東長清縣有盧城皆齊邑秦周魯大夫趙武及之共伐萩萩楸同木也雍門齊城門殺犬示閒暇槆亦木也劉難士弱晉大夫揚門東閭皆齊城門枚馬檛闔門扇數其枚示無恐郵棠齊邑太子名光勇略已見於此郭榮齊大夫濰水源出山東莒州箕屋山達密州沂水有二一出尼山西流入泗一出沂水縣雕厓山經縣入沂鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不穀主社稷而不出師死不從禮不穀即位於今五年師徒不出人其以不穀為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵于汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭次於魚陵右師城上棘遂涉潁次于旃然蒍子馮公子格率銳師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉于魚齒之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之徳也子孔乘其君不在國召楚兵為亂子庚楚令尹名午揚豚邑尹名宜死不從禮謂生隳先業則死當降禮利社稷謂審敵而保境安民不幸一時之功也汾今河南襄城縣境有汾丘城二子展西完城郭内保守魚陵魚齒山也在今河南汝州東南城上棘者將涉潁故於水邊權築小城以備進退旃然水舊出滎入汴胥靡獻于雍梁皆鄭地梅山在今河南鄭州西南再宿曰信魚齒山下有滍水故云涉師曠欲審晉楚之强弱故歌南北風南風微故云不競歌者吹音律以味八風歳在豕韋月又建亥故曰多在西北叔向意在正君故歸之徳十九年春諸侯還自沂上盟于督揚曰大母侵小晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乘馬先吳壽夢之鼎荀偃癉疽生瘍於頭濟河及著雍病目出大夫先歸者皆反士匄請見弗内請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰其為未卒事於齊故也乎乃復撫之曰主苟終所不嗣事於齊者有如河乃瞑受含宣子出曰吾淺之為丈夫也晉欒魴帥師從衞孫文子伐齊季武子如晉拜師晉侯享之范宣子為政賦黍苗季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月季武子以所得於齊之兵作林鐘而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令徳諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彝器銘其功烈以示子孫昭明徳而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也督揚即祝柯舊屬山東濟南府今闕餘詳見魯與邾莒之怨六卿伐齊還魯公享而賜之如鞌戰還之賜唯無先路偃為中軍元帥故特賄之五匹為束四馬為乘夀夢呉子乘也獻鼎於魯遂因以為名古之獻物必有以先今以璧馬先鼎癉火邪毒發為疽在頭曰瘍著雍晉地匄次當代偃故問後鄭甥荀呉其母鄭女視目開不可含口噤大夫稱主懷子名盈淺以私度之伐齊以嗣事也拜謝討齊黍苗詩小雅美召伯勞來諸侯如隂雨之長禾苗喻晉君憂勞魯如召伯六月詩小雅吉甫佐天子征伐之詩以晉侯比吉甫出征以匡王國林鐘律名鑄鐘聲應之因以名令命也命以徳志於銘言言其得時計計其有功伐勞也德功伐皆以位為差彝器謂鐘鼎宗廟之常器夏五月壬辰晦齊靈公卒莊公即位晉士匄侵齊及穀聞䘮而還禮也莊公太子光餘見齊崔慶之亂穀今山東東阿縣禮不伐䘮冬十一月城西郛懼齊也齊及晉平盟于大隧故穆叔會范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城魯小勝大懼而城郛大隧地舊闕晉與齊平故與晉㑹以觀其勢柯北直𨽻内黄縣有柯城載馳詩小雅四章曰控于大邦誰因誰極取其欲引大國以自救助向度齊未靖故許救魯因之脩備今山東費縣有武城城二十年夏盟于澶淵齊成故也今北直𨽻開州有澶淵城秋蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚陳慶虎慶寅畏公子黄之偪愬諸楚曰與蔡司馬同謀楚人以為討公子黄出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死書曰蔡殺其大夫公子燮言不與民同欲也陳侯之弟黄出奔楚言非其罪也公子黄將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也蔡乆事楚燮欲背之而事晉國人不欲殺之二慶陳卿畏黄侵奪其政先君文侯父莊侯無常徴發無准燮欲棄夷從夏正也遭國亂而被殺乃以違衆罪之非矣齊子初聘于齊禮也齊魯以怨絶好今始通繼好息民故曰禮二十一年春公如晉拜師二十二年夏晉人徴朝于鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢擕貳於楚我四年三月先大夫子蟜又從寡君以觀釁于楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨于執事以會歲終貳于楚者子侯石盂歸而討之湨梁之明年子蟜老矣公孫夏從寡君以朝于君見於嘗酎與執燔焉閒二年聞君將靖東夏四月又朝以聽事期不朝之閒無歲不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讎敝邑是懼其敢忘君命委諸執事執事實重圖之時鄭事晉已恭復召之朝徴召也少正鄭卿官僑子産名子蟜名蠆觀釁實朝楚而飾詞也臭味同姓故差池不齊也土實土地所有宗器宗廟之器齊盟同盟會歲終朝正也石盂即石㚟夏子西名嘗秋祭酎三重醇酒嘗而以酎薦祖考曰嘗酎當嘗酎時鄭伯適往因助祭而執膰靖東夏為齊平而盟澶淵鄭先往以聴㑹期荐仍也口實據其不及以為所責之詞翦削也仇讎背晉為仇敵也傳言子産有詞能免大國之討二十三年春陳侯如楚公子黄愬二慶于楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黄君子謂慶氏不義不可肆也故書曰惟命不于常黄前奔楚今因陳侯往朝愬其誣楚為之召二慶二慶畏誅使其族名樂者徃楚殺之慶乃以國叛治城以距君殺其役人之以板墜地者故衆役怨相與殺二慶黄歸陳書康誥言有義則存無義則亡秋齊侯伐衞自衞將遂伐晉取朝歌以報平隂之役朝歌晉邑今北直𨽻濬縣有朝歌城晉有欒氏之變故齊乘之以報前憾詳見齊崔慶之亂八月叔孫豹帥師救晉次于雍榆禮也雍榆晉邑北直𨽻濬縣有雍榆城救盟主故曰禮二十四年范宣子為政諸侯之幣重鄭人病之二月鄭伯如晉子産寓書於子西以告宣子曰子為晉國四隣諸侯不聞令徳而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳若吾子頼之則晉國貳諸侯貳則晉國壞晉國貳則子之家壞何没没也將焉用賄夫令名徳之輿也徳國家之基也有基無壞無亦是務乎有徳則樂樂則能乆詩云樂只君子邦家之基有令徳也夫上帝臨女無貳爾心有令名也夫恕思以明徳則令名載而行之是以逺至邇安毋寜使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子說乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐於敝邑寡君是以請罪焉敢不稽首晉令諸侯朝聘之幣重於昔子産以宣子能受言故以書責之没没沉溺之意輿所以行也詩小雅言君子以令德而為邦家之基又詩大雅言武王為天所臨無貳心以有令名也恕思以恕為思也恕施則人咸懷而名令德由之行是名以載德而原於恕浚取之深也與恕戾矣焚猶滅也介因也大國楚也請罪請問陳我何罪將伐國故稽首夏齊侯既伐晉而懼將欲見楚子楚子使薳啓彊如齊聘且請期秋齊侯聞將有晉師使陳無宇從薳啓彊如楚辭且乞師㑹于夷儀將以伐齊水不克冬楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉子太叔戒之曰大國之人不可與也對曰無有衆寡其上一也太叔曰不然部婁無松柏二子在幄坐射犬于外既食而後食之使御廣車而行已皆乘乘車將及楚師而後從之乘皆踞轉而鼓琴近不告而馳之皆取胄于櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免復踞轉而鼓琴曰公孫同乘兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也楚子自棘澤還使薳啓彊帥師送陳無宇期㑹期辭辭有晉師未及㑹詳見齊崔慶之亂夷儀時屬衞晉㑹諸侯代齊阻水故迴師救鄭棘澤鄭地張骼輔躒晉大夫致師挑戰欲得鄭人自御知其地利射犬鄭公孫不可與欲使卑下之對言上下有常分豈以國大小而有異部婁小阜松柏大樹喻小難以容大坐外後食皆輕之也廣車兵車乘車安車及而從乘踞轉鼓琴皆示暇也轉舊説衣裝恐非愚謂軫字之訛軫車前後兩端横木所以收斂所載詩云俴收是也犬恨輕已故近敵逕馳弗待先出二子言同乘義親何兩不相謀犬為之釋詞亟性急不受屈也楚既為齊伐鄭復使送其使臣其交固也陳人復討慶氏之黨鍼宜咎出奔楚齊人城郟郟王城也是時穀雒鬬毁王城齊叛晉欲求媚天子故為城之二十五年夏崔杼弑其君崔杼齊臣君莊公光詳見齊崔慶之亂晉侯會于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告於諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣前取晉朝歌故伐以報之齊人歸曲莊公以解於晉以班示降服宗器祭祀之器樂器鐘磬之屬六正六卿五吏文職三十帥武職百官正長羣有司也師旅小將師以内外大小而差等之皆致賂平公受賂不討齊罪失德甚矣楚欲爭長獨不能顯義以正其失而操主盟之柄乎初陳侯會楚子伐鄭當陳隧者井堙木刊鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還前年楚子伐鄭東門陳蔡許皆從而陳獨肆暴鄭報之襲入其國隧陘堙塞刋除也廵城不欲載公托之以辭賈獲陳大夫不祥以男女無别御止也免䘮服擁社抱社主纍自係待命執縶稽首獻飲皆以脩臣禮子美子産别字數俘數其所獲之俘明無他虣掠祓除也節兵符陳亂故正其衆官脩其所職以安定之秋七月己巳同盟于重丘齊成故也今山東東昌府有重丘城八月鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王頼其利器用也與其神明之後也庸以元女太姬配胡公而封諸陳以備三恪則我周之自出至于今是頼桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大徳蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥太姬天誘其衷啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉捷入陳俘獲也子産故以發晉詰而舉典以對使不能屈閼父舜後為武王陶正舜大聖故稱神明聖必神靈也庸用也元女武王之長女胡公閼父之子滿周得天下封夏殷二王後又封舜後謂之恪并二王後謂之三恪其禮轉降示敬而已故曰恪出蔡之甥桓公之子厲公也五父名佗桓公弟殺太子免鄭莊因立之為蔡所殺復與蔡同奉事厲公與厲公子莊公宣公夏氏之亂靈公之子成公奔晉自晉因鄭而入不可億逞言周鄭素施徳於陳而今逞肆如此不可億度恥太姬謂上辱太姬之靈𠂻中也辟法也方千里曰圻方百里曰同衰差降謂七十里五十里武莊鄭二公平桓周二王士莊伯名弱拜功謝晉受其功前雖入陳惟服之故更伐以結成志古書足猶成也二十六年夏楚子秦人侵呉遂侵鄭五月至于城麇印堇父與皇頡戍城麇楚人囚之以獻于秦鄭人取貨于印氏以請之子太叔為令正以為請子産曰不獲受楚之功而取貨于鄭不可謂國秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不予更幣從子産而後獲之城麇鄭邑餘見楚平王得國印堇皇頡皆鄭大夫請贖之歸也令正詞令之正子産以太叔之辭使秦嫌有貪名傷國體故不獲必為歸功於秦之辭使秦可以施徳於鄭耳秋鄭伯歸自晉使子西如晉聘辭曰寡君來煩執事懼不免於戾使夏謝不敏君子曰善事大國言自懼失敬而得罪子西名夏鄭之事晉也過於恭國將不勝矣而又何善之有齊人城郟之歲其夏齊烏餘以廩丘奔晉襲衞羊角取之遂襲我高魚有大雨自其竇入介于其庫以登其城克而取之又取邑于宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往城郟前見烏餘齊大夫廩丘齊邑今山東范縣有廩丘城又有羊角城舊有高魚城衞魯邑竇水竇乘雨不閉而入入庫而介其甲討類見討之類胥梁帶晉大夫有權謀故能不用師二十七年春胥梁帶使諸䘮邑者具車徒以受地必周使烏餘具車徒以受封烏餘以其衆出使諸侯偽效烏餘之封者而遂執之盡獲之皆取其邑而歸諸侯諸侯是以睦於晉諸䘮邑齊魯衞宋周密也恐烏餘知而有備乃詐使之受封而出四國若致邑以封之者遂執之獲其徒衆而各歸其邑傳言趙文子賢故平公雖失政而諸侯猶睦晉楚為成襄公二十五年秋趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭趙武繼范宣子幣奉晉者禮晉禮之令尹屈建二十六年秋許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展說不禦冦十二月乙酉入南里墮其城涉於樂氏門於師之梁縣門發獲九人焉涉于氾而歸而後葬許靈公前晉以諸侯伐許鄭獨以君行故許必報之因卒于楚故楚必為之伐鄭子産知其情故使之得氣去昧猶貪冒釁動也嗇貪也言欲與楚戰者皆釁勇貪名之人非能為國家忠慮南里鄭邑樂氏津名師之梁鄭城門楚於氾城下涉汝水南歸如許志而葬二十七年夏宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為會于宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折爼禮也仲尼使舉是禮也以為多文辭戊申叔孫豹齊慶封陳須無衞石惡至甲寅晉荀盈從趙武至丙辰邾悼公至壬戌楚公子黑肱先至成言於晉丁夘宋向戌如陳從子木成言於楚戊辰滕成公至子木謂向戍請晉楚之從交相見也庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使馹謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳陳孔奐蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入於宋若我何辛已將盟於宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是弃其所以服諸侯也固請釋甲子木曰晉楚無信乆矣事利而已苟得志焉焉用有信太宰退告人曰令尹將死矣不及三年求逞志而弃信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚𠂻甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衞吾匹也乃盟故不書其族言違命也晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也乆矣豈専在晉叔向謂趙孟曰諸侯歸晉之徳只非歸其尸盟也子務徳無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉晉有信也壬午宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于蒙門之外子木問於趙孟曰范武子之徳何如對曰夫子之家事治言於晉國無隠情其祝史陳信於鬼神無愧辭子木歸以語王王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟宋左師請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設乆矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之左師辭邑向氏欲攻司城左師曰我將亡夫子存我徳莫大焉又可攻乎君子曰彼已之子邦之司直樂喜之謂乎何以恤我我其收之向戌之謂乎楚薳罷如晉涖盟晉侯享之將出賦既醉叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政其焉往晉楚爭伯諸侯苦兵向戌素有賢稱兼善二國之相故欲使交驩弭天下之兵為名高時雖知其不可而以其事美咸從之折爼體解節折升之於爼合卿宴享之禮周禮司馬掌㑹同之事時趙武叔向向戌皆賢大夫又以弭兵為事故會時文辭多美舉謂記録之既而諸國大夫以次皆至盈後武至而言從者武命盈追已故後遣如楚成言成盟載之言兩相然可交相見使諸侯從晉從楚者更相朝見不能不能服而使之馹傳也齊言預要齊其詞至盟時不得復争訟也以藩示不相忌伯夙晉大夫氛氣也楚有襲晉之氣故懼有難晉營在宋之北偏以東為左有難可左迴入宋東門𠂻甲甲在衣中欲因㑹襲晉太宰州犂也志言信三者具而身可安信亡則三者俱廢故不及三年單獨也言獨自取死不病不能為人病也因宋守病因宋為弭兵而恃之以坐致此病則宋宜為之致死宋地主力可倍楚且楚之不義聞於諸侯皆背楚而固事晉故為我用庸用也季孫以兩事晉楚則貢賦重故欲比小國恐叔孫不從假公命以喻私屬於人也爭先爭先㰱也狎更也只語辭尸主也小國主辦具此姑假以先楚苟焉成盟也叔孫權君命以存國體誠得出疆之義而乃以違命為罪必不然矣其不書族或以惡與楚盟而槩與諸國之大夫不序以示貶歟趙孟偷而懼楚甘為之下夫子豈以信與之特以正其序耳宋公以在其國兼享二國之相客一座所尊前盟諸大夫不敢敵宋公故公謙而重盟蒙門宋城門士㑹賢聞諸侯故子木問之無愧辭謂祝陳馨香徳足副之歆神人神享其祭人懷其徳五君文襄靈成景也涖盟重結晉楚之好餘見子産相國戍欲宋公稱功加厚賞謙言免死六十六十井示示以賞書五材金木水火土兵金也居其一削削其所示也前詩鄭風喜子罕名善其不阿後詩周頌恤憂收取也善戌改過詩文假以溢我何為假聲之轉溢為恤字之訛薳罷字子蕩涖盟報荀盈詩大雅曰既醉以酒既飽以徳君子萬年介爾景福以美晉侯比之太平君子敏則周於事而能養民政必歸之二十八年夏齊侯陳侯蔡侯北燕伯把伯胡子沈子白狄朝于晉宋之盟故也齊侯將行慶封曰我不與盟何為于晉陳文子曰先事後賄禮也小事大未獲事焉從之如志禮也雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行宋盟云交相見故陳蔡胡沈屬楚者皆朝晉齊不與盟以前釋秦齊也故慶封為疑北燕未通中國不屬晉楚而亦同朝或有慕也先從事後薦賄以事大於賄也未獲其事先從其志蓋欲齊朝者晉之志也秋蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎日其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者恒有子禍不免不免於禍迋往也淫不父通於太子班之妻也孟孝伯如晉告將為宋之盟故如楚也蔡侯之如晉也鄭伯使游吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子太叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以歲之不易聘于下執事今執事有命曰女何與政令之有必使而君棄而封守䟦涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君徳而執事有不利焉小國是懼不然其何勞之敢憚子太叔歸復命告子展曰楚子將死矣不脩其政徳而貪昧於諸侯以逞其願欲乆得乎周易有之在復之頥曰迷復凶其楚子之謂乎欲復其願而棄其本復歸無所是謂迷復能無凶乎君其往也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣禆竈曰今兹周王及楚子皆將死歲弃其次而旅於明年之次以害鳥帑周楚惡之九月鄭游吉如晉告將朝于楚以從宋之盟子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其菑患賞其徳刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於徳小適大有五惡說其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也鄭伯獨不朝而游吉往吉字太叔楚以違宋盟拒之馹乘車也問晉問鄭伯應朝否不易凶荒也故不能備朝禮復震下坤上上六變而為頥迷復凶復上六爻辭上處極位迷而復反失道已逺逺而無應故凶復其願欲得鄭朝以復其願也棄其本不脩徳也是失道已逺又無所歸故知必死往當送其葬失道逺者復之亦難故將十年楚不能為難故休吾民旅客處也歲星弃星紀之次客在𤣥􅑎歲星所在其國有福失次于北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎宋盟使晉楚之從交相見故陳蔡胡沈先朝晉鄭朝楚亦盟誓之言而太叔云爾者以楚王死傳故為之兆耳亦所謂誣也至敵國郊必除地封土為壇子産不為故外僕之掌次舍者以為疑說解說也時命朝㑹之命無昭禍言告子孫當自强立國無如先世微弱聴命於人以禍自昭子産之言有激而云爾古今以才傑而困於弱小者豈獨一子産耶十一月癸巳天王崩終禆竈言十二月為宋之盟故公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇饑寒之不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也榮成伯曰逺圖者忠也公遂行宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反楚屈建卒趙文子䘮之如同盟禮也楚都漢水西南至漢聞王卒昭伯名帶專足專任始學未識逺也成伯駕䳘字魯臣以逺慮辱君趙孟以同盟過禮皆卑之乎為識矣二十九年春王正月公在楚釋不朝正于廟也楚人使公親襚公患之穆叔曰祓殯而襚則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之歲首公當朝正于廟今守臣于朔日告廟云公在楚故云釋諸侯薨鄰國有遣使賵襚之禮今楚使公親襚蓋比之于使臣故先使巫祓除殯之凶邪而行襚禮與朝而布幣無異茢苕也桃茢二物皆能除凶禮君臨臣䘮乃祓殯故楚悔夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓五月葬靈王鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎詩云王事靡盬不遑啓處東西南北誰敢寧處堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周靈王周王也弱年少官卑詩小雅言王事不可不堅固故不暇跪處傳言周衰卑於晉楚三十年夏四月蔡景侯為太子般娶于楚通焉太子弑景侯如子産言三十一年公薨之月子産相鄭伯以如晉晉侯以我䘮故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不脩冦盗充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館高其閈閎厚其墻垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺墻以待賔客若皆毁之其何以共命寡君使匄請命對曰以敝邑褊小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廏繕脩司空以時平易道路圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄𨽻人牧圉各瞻其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足賔至如歸無寧菑患不畏冦盜而亦不患燥濕今銅鞮之宫數里而諸侯舍於𨽻人門不容車而不可踰越盗賊公行而天厲不戒賔見無時命不可知若又勿壊是無所藏幣以重罪也敢請執事將何所命之雖君之有魯䘮亦敝邑之憂也若獲薦幣脩垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不徳而以𨽻人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以己也如是夫子産有辭諸侯頼之若之何其釋辭也詩曰辭之輯矣民之協矣辭之繹矣民之莫矣其知之矣鄭子皮使印段如楚以適晉告禮也時晉政已偷待諸侯之賔多不以禮而自崇侈恣於遊觀故子産毁垣以致詰而發其辭且以趙孟賢而近弱可以理屈也公襄公薨於六月充斥多也無若何無以待之也閈閭也閎其門也繕治完備葺覆也匄文伯名時事朝會薦進陳列也易治也圬人塗者塓塗也庭燎設火于庭廵宫行夜也所處也代代其役也巾車主車之官以脂塗其轄瞻敬也事職也展閱也各閱其物之可用與否以備賔需賔得速去故不留而事集巡巡其當否無寧寧也言見遇如此寧復有菑害耶銅鞮今山西沁州有銅鞮城晉築離宫於其地天厲天之厲氣為患者不戒不為戒備信信如其言贏受也詩大雅言辭輯睦則民協同辭說繹則民安定莫猶定也謂子産知辭之益故善其辭亦以如晉告楚事兩伯之禮十二月北宫文子相衞襄公以如楚宋之盟故也文子北宫佗昭公元年春楚公子圍聘于鄭遂會于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志于晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉况不信之尤者乎楚重得志于晉晉之耻也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以耻午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕于晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟䀻鄭詳見子産相國虢鄭邑故東虢公地得志謂先歃詐謂𠂻甲駕陵也武相晉㑹夷儀㑹宋兩㑹澶淵㑹虢齊侯白狄朝晉與秦成城把之淳于以遷把讟誹僭侵越也耘草為穮壅苗為蓘言力農如此終逢歳喻君子為善終獲福也詩大雅賊害也楚恐晉先歃故以舊書加于牲上不復㰱也餘見楚平王得國季武子伐莒取鄆莒人告于㑹楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與趙孟聞之乃請諸楚曰魯雖有罪其執事不避難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子會而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視逺如邇疆埸之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可壹於是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可壹乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辯焉呉濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯爭鄆為日乆矣苟無大害於其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫時尋弭兵之盟而魯伐莒取邑豹在㑹故欲戮之請帶欲求貨而假為辭也詳見魯與邾莒之怨執事謂豹也汚穢辱也靖安靖也安靖其能則衆附從表旗表識以别其封界制令不得相侵三苗饕餮放三危者觀扈夏二叛國山東觀城縣有觀國陜西鄠縣有扈國姺邳商二叛國邳南直𨽻邳州徐詩稱徐方宣王征之奄書序云成王踐奄二國皆屬魯大簒弑滅亡小封疆之事焉用魯不用治也呉在東濮在南皆楚仇亢禦也餘見楚靈王之亂夏四月趙孟叔孫豹曹大夫入于鄭鄭伯兼享之子皮戒趙孟禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下趙孟辭私於子産曰武請於冡宰矣乃用一獻趙孟為客禮終乃宴穆叔賦鵲巢趙孟曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安尨也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國頼子知免於戾矣飲酒樂趙孟出曰吾不復此矣趙孟與豹自宋盟還過鄭戒戒享期也瓠葉詩小雅受所戒禮而賦此義取古人不以微薄廢禮雖瓠葉兎首必與賔客共之穆叔悟其㫖而知其欲一獻聘禮饔餼五牢故卿當五獻趙孟以非聘鄭故辭而又私言已賦瓠葉於子皮既以一獻成享禮乃折爼以宴鵲巢詩召南言鵲有巢而鳩居之穆叔以喻晉侯有國趙孟治之武不敢當采蘩詩亦召南取蘩菜薄物可以薦公侯又欲趙孟秉前儉徳以臨諸侯故既賦之而復云小國如蘩大國惜而省用之何所不從命死麕亦召南卒章曰舒而脫脫兮無感我帨兮無使厖也吠子皮惡楚圍以厖比之欲趙孟安徐馴擾之勿使其陵暴諸侯常棣詩小雅取其凡今之人莫如兄弟言兄弟之國内自親協則圍不能為害三國皆兄弟故拜兕爵以罰不敬言小國蒙趙孟徳比以禦圍自知必免此罰時諸國皆賢大夫又皆欣戴趙孟故樂甚而曰不復此已有亡徴焉天王使劉定公勞趙孟于潁館於雒汭劉子曰美哉禹功明徳逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於𨽻人朝不謀夕弃神人矣神怒民叛何以能乆趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年十二月晉既烝趙孟適南陽將會孟子餘甲辰朔烝于温庚戌卒鄭伯如晉弔及雍乃復道由周故景王使勞之定公名夏潁雒皆水汭水曲在今河南鞏縣劉子覩河雒而思禹功弁冕冠也端委禮衣勸趙孟使纂禹績趙自言苟免目前不復能念逺劉言其自比賤人而無䘏民之心民為神主不䘏民神人皆弃當此年而卒孟子餘趙衰字武曽祖廟在南陽温縣將㑹祭之晉既烝乃烝其家廟先公後私也既卒鄭伯將弔之不果而反傳言大夫强諸侯畏而弔之荆楚僭稱王號于周窮經者皆以大義黜而夷之諒聖人之意當亦爾矣然是時之稱為伯者則唯以其勢强横甚能制而屈之者為雄以懾諸侯而威之使已服耳於大義初無計也故少不競而懐安斯有弭兵合成之說焉然晉齊鄭國多謀臣相爭者幾二百年卒無一言及此豈其見有不逮耶抑以為虚名不足較徒重其怒耶使有慮𢎞志正之士倡而陳之不知荆楚當何辭焉而惜其寥寥乎未之聞也噫春秋左傳屬事卷五
